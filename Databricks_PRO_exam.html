  {section:"CI/CD & Deployment",text:"A data engineer uses GitHub Actions to deploy a Databricks Asset Bundle. The workflow runs databricks bundle deploy --target prod. The GitHub Actions runner does not have Databricks CLI installed. What must be added to the workflow?",options:["A. A step that runs pip install databricks-sdk to install the SDK.","B. A step that runs curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh or uses the actions/setup-databricks action.","C. A step that uses docker run databricksruntime/databricks-cli:latest.","D. A Databricks webhook trigger that pulls code from GitHub when the workflow runs.","E. Nothing — GitHub Actions includes the Databricks CLI by default on ubuntu-latest runners."],answer:"B",explanation:"<strong>Correct: B.</strong> To use the Databricks CLI in GitHub Actions, you must install it as part of the workflow. The official approach: use the <code>databricks/setup-cli</code> GitHub Action (<code>uses: databricks/setup-cli@main</code>) which installs the CLI and authenticates using secrets (<code>DATABRICKS_HOST</code> and <code>DATABRICKS_TOKEN</code> environment variables or a service principal OAuth). The CLI is NOT pre-installed on standard GitHub Actions runners."},
  {section:"Delta Lake & Tooling",text:"A Delta table's transaction log has grown to 100,000 JSON files (one per commit). Queries against the table are slow to start. What operation should the data engineer run to improve this?",options:["A. VACUUM the table to remove old transaction log files.","B. OPTIMIZE the table to compact data files.","C. Run DESCRIBE HISTORY to rebuild the transaction log index.","D. Delta automatically checkpoints the transaction log every 10 commits; no manual intervention is needed.","E. Run ALTER TABLE table_name SET TBLPROPERTIES ('delta.checkpointInterval'='10') to force more frequent checkpointing."],answer:"D",explanation:"<strong>Correct: D.</strong> Delta Lake automatically creates a Parquet checkpoint file every 10 commits (default, configurable via <code>delta.checkpointInterval</code>). When reading table state, Delta only needs to read the latest checkpoint plus any JSON commits since that checkpoint — not all 100,000 JSON files. So 100,000 files means ~10,000 checkpoints exist; the reader loads the latest checkpoint + up to 10 JSON files. If query startup is slow despite checkpointing, check if the checkpoint interval is too large or if the checkpoint itself is large (many files). VACUUM does not touch log files (only data files)."},
  {section:"Data Modeling & Medallion",text:"A fact table in the gold layer is queried by analysts with filters on product_category, region, and date. The table has 50 billion rows. With Liquid Clustering on (product_category, region, date), approximately how many files does a query filter on all three columns need to scan?",options:["A. All files in the table — Liquid Clustering doesn't help when all three clustering columns are used simultaneously.","B. A small subset of files — Liquid Clustering co-locates data by all three columns using a space-filling curve, enabling effective data skipping for multi-column predicates.","C. Files in the date partition only — Liquid Clustering uses date as the primary sort key.","D. One file per unique combination of (product_category, region, date).","E. Half the files — Liquid Clustering achieves 50% data skipping on average."],answer:"B",explanation:"<strong>Correct: B.</strong> Liquid Clustering uses a space-filling curve (similar to Z-order) to co-locate data across multiple clustering columns simultaneously. When a query filters on all clustering columns, Delta's data skipping can eliminate a large fraction of files — potentially scanning only 1-5% of the total table for highly selective queries. This is the core value proposition of Liquid Clustering for multi-dimensional analytics. The exact reduction depends on data distribution and cardinality."},
  {section:"Structured Streaming & CDF",text:"A streaming job reads from Kafka and writes to Delta Lake. The job fails mid-way through a micro-batch. When the job restarts, what happens to the records that were partially written in the failed micro-batch?",options:["A. The partial records remain in the Delta table and the job continues from where it left off.","B. Delta Lake rolls back the partial write automatically; the job restarts the failed micro-batch from scratch using the checkpoint offset.","C. The partial records remain in Delta, and the job skips the failed micro-batch to avoid duplicates.","D. The job reads all records from the Kafka topic from the beginning to ensure no data loss.","E. The data engineer must manually delete partial records and reset the checkpoint."],answer:"B",explanation:"<strong>Correct: B.</strong> Structured Streaming + Delta Lake provides exactly-once semantics via: (1) Checkpointing: Kafka offsets are recorded atomically with the Delta write. If the micro-batch fails mid-write, the Delta transaction is not committed (ACID atomicity). (2) On restart, Spark reads the checkpoint to find the last successfully committed offset and re-processes the failed micro-batch from scratch. (3) Delta's idempotent write support ensures the retry doesn't create duplicates. The partial uncommitted write is invisible to readers."},
  {section:"Data Ingestion",text:"A data pipeline uses Auto Loader to ingest files from a GCS bucket. The cloudFiles.format is 'json'. Files have consistent schema but occasionally a file has a corrupt JSON record (invalid JSON syntax). What does Auto Loader do with the corrupt record by default?",options:["A. The entire file is rejected and moved to an error directory.","B. The entire pipeline fails when a corrupt JSON record is encountered.","C. The corrupt record is stored in the _rescued_data column with the raw string value; valid records in the same file are processed normally.","D. The corrupt record is silently skipped and not counted in any metrics.","E. Auto Loader retries the file 3 times before marking it as failed."],answer:"C",explanation:"<strong>Correct: C.</strong> Auto Loader with JSON format uses <code>PERMISSIVE</code> mode by default (like Spark's JSON reader). Corrupt records that cannot be parsed are stored in the <code>_rescued_data</code> column as the raw string. Valid records in the same file continue to be processed normally. The _rescued_data column also captures fields not in the inferred schema. This allows pipelines to process data without failing on occasional bad records, while preserving the bad data for investigation."},
  {section:"Performance Optimization",text:"A data engineer has a query with multiple joins and complex aggregations that takes 30 minutes. They run EXPLAIN EXTENDED. They see ShuffleExchangeExec nodes in multiple places. Which Spark configuration reduces shuffle overhead across the board?",options:["A. spark.sql.adaptive.enabled=true — enables AQE to automatically optimize shuffle partitions, skew handling, and join strategies at runtime.","B. spark.executor.extraJavaOptions='-XX:+UseG1GC' — reduces GC pauses during shuffle.","C. spark.reducer.maxSizeInFlight=96m — increases shuffle buffer size.","D. spark.shuffle.file.buffer=64k — increases shuffle file write buffer.","E. spark.sql.optimizer.maxIterations=100 — allows more optimizer passes to eliminate shuffles."],answer:"A",explanation:"<strong>Correct: A.</strong> <code>spark.sql.adaptive.enabled=true</code> (AQE, enabled by default in Databricks) provides the broadest shuffle optimization: (1) dynamic coalescing of small shuffle partitions; (2) dynamic skew join handling; (3) dynamic join strategy switching (shuffle to broadcast). This single configuration activates multiple runtime optimizations that address the most common shuffle inefficiencies. The other options are minor tuning knobs that have much smaller impact than enabling AQE."},
  {section:"Unity Catalog",text:"A data engineer creates a foreign catalog in Unity Catalog for a Snowflake database using Lakehouse Federation. Which statement about querying this foreign catalog is TRUE?",options:["A. Queries are executed natively in Snowflake using query pushdown; only results are returned to Databricks.","B. Databricks copies all Snowflake data into Delta format on first access and caches it for 24 hours.","C. Foreign catalog queries are not supported in Databricks SQL; only Spark can access them.","D. The Databricks optimizer always performs a full table scan of the Snowflake table.","E. Lakehouse Federation requires Snowflake data to be exposed as Delta Sharing shares first."],answer:"A",explanation:"<strong>Correct: A.</strong> Lakehouse Federation uses query pushdown — when you query a foreign catalog table in Databricks, the Databricks optimizer pushes compatible predicates, projections, and sometimes joins DOWN to the source system (Snowflake). Snowflake executes the query and returns only the filtered result set to Databricks. This minimizes data transfer and leverages the source system's compute. Data is NOT copied into Delta. This architecture enables federation: query external systems without data movement."},
  {section:"Data Processing",text:"A PySpark DataFrame has 1 billion rows. A data engineer calls df.cache() and then runs three different analyses. After the analyses, they forget to call df.unpersist(). What is the consequence?",options:["A. Spark automatically evicts the cached DataFrame after 1 hour.","B. The cached DataFrame occupies executor memory until the SparkContext is stopped or the cache is manually evicted, potentially causing OOM for subsequent operations.","C. Cached DataFrames are written to DBFS automatically to avoid memory pressure.","D. Spark's LRU cache manager automatically evicts the DataFrame when memory pressure increases.","E. The cache has no consequence — Spark uses off-heap memory for caching that doesn't affect executor JVM heap."],answer:"B",explanation:"<strong>Correct: B.</strong> <code>df.cache()</code> (or <code>df.persist(StorageLevel.MEMORY_AND_DISK)</code>) stores the DataFrame in executor memory (and disk if it doesn't fit). Without calling <code>df.unpersist()</code>, the cached data remains allocated. While Spark's LRU (D) can eventually evict it under memory pressure, relying on LRU is not deterministic — for 1 billion rows, the cache is enormous and may prevent other operations from getting sufficient memory. Always call <code>unpersist()</code> when done with a cached DataFrame."},
  {section:"Delta Lake & Tooling",text:"A data engineer creates a bloom filter index on a Delta table's email column. For which type of query does this provide the MOST benefit?",options:["A. Range queries: WHERE email >= 'a@example.com' AND email <= 'z@example.com'","B. Equality queries: WHERE email = 'user@example.com'","C. LIKE queries: WHERE email LIKE '%@example.com'","D. IS NULL queries: WHERE email IS NULL","E. GROUP BY queries: GROUP BY email"],answer:"B",explanation:"<strong>Correct: B.</strong> Bloom filters are probabilistic data structures optimized for <strong>equality predicates</strong>: 'is this value in this file?' For a query like <code>WHERE email = 'user@example.com'</code>, the bloom filter quickly determines whether a file MIGHT contain that email (if the filter says no, skip the file with certainty; if it says yes, read the file). Bloom filters cannot answer range queries, LIKE/wildcard queries, or NULL checks. They are most effective for high-cardinality string columns (like emails, UUIDs) with equality filters."},
  {section:"Monitoring & Alerting",text:"A streaming job's Spark UI shows the 'Input Rate' metric is 10,000 rows/sec but the 'Processing Rate' is only 6,000 rows/sec. What does this indicate and what will happen over time?",options:["A. The job is running at normal efficiency; 40% of records are filtered out by business logic.","B. The job is falling behind — input rate exceeds processing rate. The Kafka/source lag will grow unboundedly until the job catches up or is scaled up.","C. This is expected behavior for Structured Streaming; micro-batch processing always shows input > processing.","D. The job is buffering data in the state store; processing rate reflects only non-stateful operations.","E. The cluster is auto-scaling to add more workers; the processing rate will increase to match input rate automatically."],answer:"B",explanation:"<strong>Correct: B.</strong> When <strong>input rate > processing rate</strong>, the streaming job cannot keep up with incoming data. The backlog (source lag) grows continuously. If left uncorrected: Kafka will eventually reach retention limits and data will be lost; or the backlog will grow so large that catching up becomes infeasible. Remedies: scale up the cluster (more executors), increase trigger interval, optimize the processing logic, enable auto-scaling, or reduce the input rate. This is the most critical metric to monitor for streaming jobs."},
  {section:"CI/CD & Deployment",text:"A data engineer wants to parameterize a Databricks job so that the same job definition can be used for daily runs (with date=today) and backfill runs (with a specific historical date). Which feature enables this?",options:["A. Job parameters passed via the job's widget defaults in the notebook.","B. Dynamic task values set using dbutils.jobs.taskValues.set() and retrieved in downstream tasks.","C. Job-level parameters defined in the job configuration, passed to tasks via {{job.parameters.date}} syntax and overridable at run time.","D. Environment variables set in the cluster configuration, different per job run.","E. A separate job definition for each date range, deployed via CI/CD."],answer:"C",explanation:"<strong>Correct: C.</strong> Databricks Workflows supports job-level parameters. You define parameters in the job configuration (e.g., <code>date</code> with a default of <code>{{job.start_time.iso_date}}</code>). Tasks reference them using the <code>{{job.parameters.date}}</code> syntax. When triggering a run, you can override parameters via the UI or REST API (<code>POST /api/2.1/jobs/run-now</code> with <code>job_parameters: {date: '2024-01-15'}</code>). This is how the same job handles both scheduled (uses default) and backfill (overrides date) runs."},
  {section:"Data Modeling & Medallion",text:"A data engineer designs a gold layer for a reporting use case. Business analysts need to calculate year-over-year growth for any date range they select. The silver table has daily grain. What gold table design supports arbitrary date range YoY calculations most efficiently?",options:["A. Pre-aggregate to monthly grain and store 3 years of history; analysts join current and prior year months.","B. Keep the silver daily grain in gold and let analysts run window functions at query time.","C. Create a wide table with current_year_sales and prior_year_sales columns, updated daily.","D. Create a date spine table and join it with the silver table in a gold view.","E. Store the silver table in gold with Liquid Clustering on (date, product_id) for fast range scans."],answer:"E",explanation:"<strong>Correct: E.</strong> For arbitrary date range queries with YoY calculations, the most efficient approach is to keep granular data (daily) in gold with optimal physical organization. Liquid Clustering on (date, product_id) enables fast range scans for any date range. The YoY calculation (joining current period to prior year period) benefits from date-clustered data because both date ranges are quickly located. Pre-aggregating (A) locks you into fixed granularity — if analysts need weekly or custom ranges, you can't answer from monthly data. The clustered daily table is the most flexible and still fast."},
  {section:"Structured Streaming & CDF",text:"A data engineer wants to use foreachBatch to write to two different Delta tables from a single streaming query. Table A gets all records; Table B gets only records where category='premium'. Which implementation is CORRECT?",options:["A. Use two separate streaming queries, each with its own checkpoint.","B. In the foreachBatch function, write to both tables: batchDF.write.save(table_a_path); batchDF.filter('category=premium').write.save(table_b_path) — but cache batchDF first.","C. Use foreachBatch with batchDF.write.format('delta').mode('append').saveAsTable('a'); batchDF.filter('category=premium').write.format('delta').mode('append').saveAsTable('b')","D. Use the MultiSink operator: streamDF.writeStream.multiSink([sink_a, sink_b])","E. Both B and C are correct; cache batchDF before writing to prevent re-computation"],answer:"E",explanation:"<strong>Correct: E.</strong> Both B and C show valid foreachBatch patterns, but the critical detail is <strong>caching</strong> batchDF. Without caching, applying batchDF to two different write operations triggers two separate executions of the batch computation (lazy evaluation). With <code>batchDF.cache()</code> (and <code>batchDF.unpersist()</code> after writes), the computation runs once and both writes use the cached result. The complete pattern: <code>batchDF.cache(); batchDF.write...; batchDF.filter().write...; batchDF.unpersist()</code>."},
  {section:"Security & Governance",text:"A Databricks workspace uses Unity Catalog. A data engineer creates a notebook that reads from table A and writes to table B. The job runs as a service principal. Which identity's Unity Catalog permissions are checked when the job runs?",options:["A. The permissions of the user who created the job.","B. The permissions of the workspace admin, since jobs always run with admin privileges.","C. The permissions of the service principal configured as the job's 'run as' identity.","D. The permissions of the cluster's instance profile (IAM role for AWS).","E. Both C and D — Unity Catalog checks both service principal and instance profile permissions."],answer:"C",explanation:"<strong>Correct: C.</strong> When a Databricks job has a 'run as' service principal configured, ALL Unity Catalog permission checks during the job run use the <strong>service principal's identity</strong>. The service principal must have the appropriate grants (USE CATALOG, USE SCHEMA, SELECT, MODIFY, etc.) for all tables accessed. This is the recommended pattern for production jobs: use dedicated service principals with minimum required permissions, not individual user credentials. The instance profile (D) governs cloud storage access, not Unity Catalog permissions."},
  {section:"Data Processing",text:"A data engineer needs to process a JSON column containing nested arrays. The schema is: {user_id: int, purchases: [{item_id: int, amount: double}]}. They need one row per purchase. Which function correctly explodes the purchases array?",options:["A. df.select('user_id', explode('purchases').alias('purchase')).select('user_id', 'purchase.item_id', 'purchase.amount')","B. df.flatMap(lambda row: [(row.user_id, p.item_id, p.amount) for p in row.purchases])","C. df.select('user_id', explode(col('purchases')).alias('purchase')).select('user_id', col('purchase.item_id'), col('purchase.amount'))","D. df.select('user_id', posexplode('purchases').alias('pos', 'purchase')).select('user_id', 'purchase.item_id', 'purchase.amount')","E. Both C and D are correct; C uses explode (no position), D uses posexplode (with position index)"],answer:"E",explanation:"<strong>Correct: E.</strong> Both C and D correctly explode the purchases array into individual rows: (C) <code>explode(col('purchases'))</code> produces one row per array element; (D) <code>posexplode(col('purchases'))</code> produces one row per element WITH its array index (pos). Both then navigate the struct fields using <code>col('purchase.item_id')</code> dot notation. Choose explode when you don't need the position, posexplode when you need the array index. Option A has a syntax issue (string 'purchases' without col() wrapper — works but less explicit)."},
  {section:"Delta Lake & Tooling",text:"A data engineer runs: CONVERT TO DELTA parquet.'/path/to/data'. After conversion, which statement is TRUE?",options:["A. The Parquet files are physically rewritten as Delta files with a new schema.","B. The Parquet files remain unchanged; a Delta transaction log (_delta_log) is created to provide Delta capabilities on top of the existing Parquet files.","C. The conversion fails because Parquet files cannot be converted to Delta without rewriting.","D. The original Parquet files are backed up and new Delta files are written to the same location.","E. The conversion only works for Parquet files; ORC, Avro, and CSV cannot be converted."],answer:"B",explanation:"<strong>Correct: B.</strong> <code>CONVERT TO DELTA</code> is non-destructive. It reads the existing Parquet files, generates the Delta transaction log (<code>_delta_log/</code> directory) with file statistics, and enables Delta Lake capabilities — ACID transactions, time travel, schema enforcement — WITHOUT rewriting the data files. The original Parquet files become the initial version (version 0) of the Delta table. This is a fast, zero-copy operation. Future writes will use Delta format, but the existing Parquet files are untouched."},
  {section:"Data Modeling & Medallion",text:"A data engineer needs to implement a lookup table for product categories that is referenced by multiple silver tables. The lookup table changes rarely (quarterly updates). Which design BEST balances performance and maintainability?",options:["A. Store the lookup table as a Delta table; use broadcast joins in each silver table pipeline.","B. Hardcode the lookup values directly in each silver table's transformation SQL as CASE WHEN statements.","C. Store the lookup as a CSV file in DBFS and re-read it on every pipeline run.","D. Duplicate the lookup data into each silver table to avoid joins entirely.","E. Store the lookup as a streaming table in Lakeflow, updated via Auto Loader."],answer:"A",explanation:"<strong>Correct: A.</strong> A Delta table for the lookup (A) is the best practice: (1) centralized, version-controlled, auditable (Delta history); (2) easy to update when categories change; (3) fast joins via auto-broadcast (lookup tables are small, typically < 10MB); (4) consistent schema enforcement. Hardcoding (B) requires code changes on every update. DBFS CSV (C) lacks version control and ACID. Duplication (D) causes inconsistency. Streaming table (E) is overkill for quarterly updates."},
  {section:"Monitoring & Alerting",text:"A data engineer notices that OPTIMIZE on a large Delta table is taking 3 hours and consuming significant resources. The table is queried during this time. What is the impact on concurrent read queries during OPTIMIZE?",options:["A. OPTIMIZE blocks all reads until it completes — Delta tables are fully locked during optimization.","B. OPTIMIZE blocks only writes; reads can proceed normally.","C. Read queries are not blocked — OPTIMIZE uses snapshot isolation; concurrent readers see the pre-OPTIMIZE snapshot while OPTIMIZE runs.","D. Read queries are blocked for the duration of each individual file rewrite but not the entire OPTIMIZE.","E. OPTIMIZE automatically pauses when concurrent reads are detected to avoid interference."],answer:"C",explanation:"<strong>Correct: C.</strong> Delta Lake's ACID guarantees mean OPTIMIZE (and all write operations) use snapshot isolation. Concurrent readers see a consistent snapshot of the table taken before OPTIMIZE started — they are not blocked and do not see partial OPTIMIZE results. When OPTIMIZE commits its transaction, subsequent reads see the optimized state. This non-blocking behavior is a key advantage of Delta Lake's MVCC (Multi-Version Concurrency Control) model."},
  {section:"CI/CD & Deployment",text:"A data engineer configures a Databricks job with a retry policy: max_retries=3, retry_on_timeout=false. The first task fails with an OutOfMemoryError. How many times will the task be retried?",options:["A. 0 times — OutOfMemoryError is considered a fatal error that cannot be retried.","B. 3 times — all failure types are retried up to max_retries.","C. 1 time — OOM errors are retried once by default, then fail.","D. It depends on whether the OOM is on the driver or an executor.","E. 3 times, but only if the engineer has configured retry_on_oom=true."],answer:"B",explanation:"<strong>Correct: B.</strong> Databricks Workflows retry policy with <code>max_retries=3</code> retries the task up to 3 times on ANY failure type by default (including OOM, network errors, application errors). The <code>retry_on_timeout</code> flag specifically controls whether timeout-based failures are retried. There is no special OOM-only retry setting. Note: retrying an OOM without addressing the root cause (insufficient memory) will likely fail again — the engineer should also investigate the OOM root cause and potentially increase driver/executor memory."},
  {section:"Data Ingestion",text:"A data engineer configures Auto Loader with cloudFiles.backfillInterval='1 day'. What does this accomplish?",options:["A. Auto Loader ingests historical files (backfill) once per day in addition to monitoring new files.","B. Auto Loader retries failed file ingestions every day until successful.","C. Auto Loader performs a full directory listing every day to catch any files missed by event notifications.","D. Auto Loader batches new files into daily micro-batches instead of processing each file individually.","E. Auto Loader archives processed files to a backfill directory every day."],answer:"C",explanation:"<strong>Correct: C.</strong> <code>cloudFiles.backfillInterval</code> is relevant when using file notification mode (<code>cloudFiles.useNotifications=true</code>). File notifications can occasionally miss files (network issues, notification service delays). The backfill interval triggers a periodic full directory listing to catch any files that the notification system missed. Without backfill, notification mode relies entirely on event notifications — if a notification is lost, that file is never ingested. Backfill provides a safety net while still benefiting from low-latency notifications for new files."},
  {section:"Performance Optimization",text:"A data engineer runs OPTIMIZE on a Delta table every hour. After 2 weeks, the table has 100,000 data files (from compaction) but also 50,000 deleted obsolete files. Queries are slow. What should be done?",options:["A. Run VACUUM to remove the 50,000 obsolete files that OPTIMIZE replaced.","B. Disable OPTIMIZE — running it too frequently creates file fragmentation.","C. Increase spark.databricks.delta.optimize.maxFileSize to create larger files.","D. Run ANALYZE TABLE to update statistics on the new compact files.","E. Convert the table to Liquid Clustering to avoid needing frequent OPTIMIZE."],answer:"A",explanation:"<strong>Correct: A.</strong> <code>OPTIMIZE</code> compacts small files into larger ones but does NOT delete the old files — it only removes them from the active table state (they become 'obsolete'). The Delta transaction log still lists all files including obsolete ones. Query planning must scan the transaction log to determine which files are active, and too many obsolete files slow this down. <code>VACUUM</code> physically deletes the obsolete files from cloud storage, cleaning up the clutter. Regular OPTIMIZE + periodic VACUUM is the correct maintenance pattern."},
  {section:"Security & Governance",text:"A company mandates that all queries against the customer_pii table must be logged, including the query text and the user who ran it. Which Databricks feature captures this?",options:["A. Delta Lake transaction log — records all DML operations with user information.","B. Unity Catalog audit logs in system.access.audit — captures data access events including user identity, action, and query details.","C. Spark event logs in DBFS — contain full query text and execution details.","D. Databricks SQL query history — stores queries for 90 days and is accessible via the UI.","E. Both B and D — audit logs for compliance, query history for operational monitoring."],answer:"E",explanation:"<strong>Correct: E.</strong> For compliance-grade logging: (B) <code>system.access.audit</code> provides immutable audit logs with user identity, timestamp, action type, and request parameters (including table accessed) — this is the system of record for compliance. (D) Databricks SQL query history stores full query text with execution details for operational purposes. Both serve different but complementary purposes. For strict compliance requirements, audit logs (B) are authoritative; query history (D) is more convenient for debugging and analysis."},
  {section:"Data Process",text:"A data engineer creates a Delta table with GENERATED ALWAYS AS columns. Specifically: event_date DATE GENERATED ALWAYS AS (DATE(event_timestamp)). What behavior should the engineer expect?",options:["A. The event_date column can be manually specified during INSERT; the generated expression is used only when the column is omitted.","B. The event_date column is automatically computed from event_timestamp on every INSERT and UPDATE; manual specification is rejected.","C. Generated columns are computed at read time only and not stored in the data files.","D. Generated columns require a full table rewrite to add after table creation.","E. Generated columns are only available in Databricks Runtime 13.0 and above."],answer:"B",explanation:"<strong>Correct: B.</strong> <code>GENERATED ALWAYS AS</code> columns are automatically computed and cannot be manually specified. When you INSERT or UPDATE a row, Delta computes the generated column value from the expression. Attempting to specify the generated column value manually raises an error. Generated columns are stored in the data files (not computed at read time) and can be used as partition columns — making it easy to partition by date when the source has a timestamp: <code>PARTITIONED BY (event_date)</code> or <code>CLUSTER BY (event_date)</code>."},
  {section:"Lakeflow Declarative Pipelines",text:"A Lakeflow pipeline reads from a bronze streaming table and writes to a silver table. The pipeline is updated (new logic added). In Triggered mode, what happens to previously processed records when the pipeline runs after the update?",options:["A. All records in the bronze table are re-processed from the beginning (full refresh).","B. Only new records added to the bronze table since the last pipeline run are processed; existing records are not re-processed.","C. The pipeline performs a partial re-processing: the last 7 days of records are re-processed.","D. The pipeline automatically detects which records are affected by the logic change and re-processes only those.","E. The pipeline fails until the engineer manually triggers a full refresh."],answer:"B",explanation:"<strong>Correct: B.</strong> Lakeflow Streaming Tables maintain a checkpoint of their progress. When the pipeline runs after a code update, Streaming Tables process only <strong>new data</strong> since the last successful run — unchanged records are not re-processed. This is the incremental processing model. If you need to re-process historical data with new logic (e.g., a bug fix), you must trigger a <strong>full refresh</strong> explicitly: in the pipeline UI select 'Full Refresh' or use the API. A regular triggered run is always incremental."},
  {section:"Unity Catalog",text:"A workspace has Unity Catalog enabled. A data engineer tries to mount an S3 bucket using dbutils.fs.mount(). What happens?",options:["A. The mount succeeds normally; dbutils.fs.mount() works with Unity Catalog.","B. The mount fails; Unity Catalog workspaces do not support DBFS mounts — external locations should be used instead.","C. The mount succeeds but is only accessible to the user who created it.","D. The mount is created but immediately deprecated — a warning is shown to use external locations.","E. The mount succeeds and is automatically registered as a Unity Catalog external location."],answer:"B",explanation:"<strong>Correct: B.</strong> In Unity Catalog workspaces, <strong>DBFS mounts are not supported</strong> (and are being deprecated). Instead, cloud storage is accessed via <strong>Unity Catalog External Locations</strong>, which are created by storage administrators and governed by Unity Catalog permissions. Users access external location paths directly (e.g., <code>abfss://container@storage.dfs.core.windows.net/path</code>) or via volumes. This is a significant behavior change from non-UC workspaces where DBFS mounts were common."},
  {section:"Data Processing",text:"A data engineer needs to efficiently find all records modified in the last 24 hours in a Delta table that does NOT have CDF enabled. The table is partitioned by date. Which approach works?",options:["A. SELECT * FROM table WHERE _commit_timestamp > current_timestamp() - INTERVAL 24 HOURS","B. Use DESCRIBE HISTORY to find the version number 24 hours ago, then read changes between that version and current using a full table scan.","C. SELECT * FROM table WHERE date >= current_date() - 1 — use partition pruning to limit scans.","D. Read the Delta transaction log directly to identify which files were modified in the last 24 hours.","E. Without CDF, efficiently finding modified records is not possible; CDF must be enabled."],answer:"C",explanation:"<strong>Correct: C.</strong> Without CDF, Delta Lake does NOT track which individual rows changed — only which files were committed. If the table is partitioned by date, the pragmatic approach is to re-process recent partitions (today and yesterday) using partition pruning. This is fast because only 2 of potentially thousands of partitions are read. Option D (reading the transaction log) works programmatically but is complex. Option A (<code>_commit_timestamp</code>) is not a real column in Delta tables. For true row-level CDC without CDF, there's no efficient solution."},
  {section:"Performance Optimization",text:"A data engineer's Spark job has a stage with 10,000 tasks each processing 1KB of data. The stage takes 20 minutes to complete. What is the MOST LIKELY cause and solution?",options:["A. Cause: insufficient executor memory. Solution: increase executor memory.","B. Cause: too many small tasks — task scheduling and launch overhead dominates computation time. Solution: coalesce partitions to reduce task count to 100-200.","C. Cause: data spill to disk. Solution: increase executor memory to avoid spill.","D. Cause: network bottleneck. Solution: use network-optimized instance types.","E. Cause: GC pressure from object serialization. Solution: use Kryo serialization."],answer:"B",explanation:"<strong>Correct: B.</strong> 10,000 tasks × 1KB = 10MB total data, but 20 minutes execution time = each task takes ~120ms. Most of this time is Spark overhead: task serialization, scheduling, launch, and teardown — not actual computation. This is the 'small tasks' problem. When tasks are too small, overhead dominates. Solution: use <code>coalesce(N)</code> or increase <code>spark.sql.shuffle.partitions</code> to a smaller number to merge partitions and reduce task count. Target tasks that process 100MB+ of data for efficient resource utilization."},
  {section:"Data Governance",text:"A data engineer adds a column tag 'pii_type'='email' to the email column of a table. Who can see this tag in Unity Catalog?",options:["A. Only workspace admins and the tag creator.","B. Anyone with USE CATALOG and USE SCHEMA on the table's catalog/schema — tags are visible to users who can discover the table.","C. Only users with a special 'tag_reader' privilege in Unity Catalog.","D. Tags are not visible to end users; they are only used by Databricks internal governance services.","E. Only data stewards designated by the metastore admin."],answer:"B",explanation:"<strong>Correct: B.</strong> Unity Catalog tags (on tables, columns, schemas, catalogs) are metadata visible to users who have discovery access — i.e., USE CATALOG and USE SCHEMA permissions. Tags appear in the Unity Catalog UI (Data Explorer), <code>DESCRIBE TABLE EXTENDED</code> output, and via the system catalog views. Tags are intentionally visible to support data discovery and governance workflows. They do NOT enforce access controls — they're labels that humans and governance tools can use to understand data classification."},
  {section:"Data Modeling & Medallion",text:"A data engineer needs to implement normalized data modeling in the gold layer with foreign key relationships between a customer dimension and an orders fact table. Delta Lake doesn't enforce referential integrity. What approach should be used to MAINTAIN consistency?",options:["A. Add a CHECK constraint on the orders table: CONSTRAINT fk_customer CHECK (customer_id IN (SELECT customer_id FROM customers)).","B. Use a Lakeflow pipeline that validates referential integrity as a data quality expectation before writing to gold.","C. Implement application-level enforcement: the ETL pipeline joins orders to customers, rejects orders with no matching customer, and logs rejected records.","D. Use FOREIGN KEY constraints: ALTER TABLE orders ADD CONSTRAINT fk FOREIGN KEY (customer_id) REFERENCES customers(customer_id).","E. B and C are both valid approaches; D is not supported in Delta Lake."],answer:"E",explanation:"<strong>Correct: E.</strong> Delta Lake does NOT support FOREIGN KEY constraints (D) — they can be declared informally but are not enforced. Option A (IN subquery in CHECK) is also not supported as a valid Delta constraint (CHECK constraints support scalar expressions, not subqueries). Valid approaches: (B) Lakeflow data quality expectations can check for null customer_ids or use a join to validate keys exist; (C) application-level ETL logic validates and rejects records with missing foreign keys. Both B and C correctly handle the constraint at the pipeline level rather than the storage layer."},
  {section:"Structured Streaming & CDF",text:"A streaming job uses Trigger.AvailableNow() and is scheduled to run every 30 minutes via a Databricks Workflow. Compared to Trigger.Once(), what is the advantage?",options:["A. Trigger.AvailableNow() is identical to Trigger.Once(); there is no practical difference.","B. Trigger.AvailableNow() processes data across multiple micro-batches for efficiency (better parallelism for large backlogs), while Trigger.Once() processes everything in a single large micro-batch.","C. Trigger.AvailableNow() supports continuous processing; Trigger.Once() only processes batch data.","D. Trigger.AvailableNow() is only available for Kafka sources; Trigger.Once() works with all sources.","E. Trigger.AvailableNow() automatically retries failed micro-batches; Trigger.Once() does not."],answer:"B",explanation:"<strong>Correct: B.</strong> Both <code>Trigger.AvailableNow()</code> and <code>Trigger.Once()</code> process all available data and terminate. The key difference: <code>Trigger.Once()</code> processes ALL available data in a SINGLE micro-batch, which can be problematic for large backlogs (one giant micro-batch, potential OOM, long duration). <code>Trigger.AvailableNow()</code> processes available data across MULTIPLE micro-batches with normal micro-batch sizes, allowing better resource utilization, checkpoint granularity, and fault tolerance. AvailableNow() is the recommended replacement for Trigger.Once()."},
  {section:"Data Process",text:"A data engineer runs: df = spark.read.format('delta').option('versionAsOf', 10).load('/path/to/table'). Then they write the DataFrame to a new table. What happens when VACUUM is run on the source table with RETAIN 168 HOURS (7 days) and version 10 is older than 7 days?",options:["A. The write to the new table fails because version 10's files are no longer accessible.","B. Version 10's data files are deleted by VACUUM; however, the write already completed successfully because the data was read before VACUUM ran.","C. The new table retains the data because it was written as a new Delta table with its own files; VACUUM on the source doesn't affect the new table.","D. VACUUM automatically preserves version 10's files because they are referenced by the new table.","E. The engineer must create a deep clone of version 10 before running VACUUM to safely preserve the data."],answer:"C",explanation:"<strong>Correct: C.</strong> When the data is read from version 10 and written to a NEW Delta table, the new table has its OWN data files stored at a separate location. VACUUM on the SOURCE table deletes the source table's old version files — but this has NO impact on the NEW table, which has completely independent files. The data was already copied when the write occurred. VACUUM on the source only removes files unreferenced by the SOURCE table's current state."},
  {section:"Unity Catalog",text:"A metastore admin runs: GRANT CREATE SCHEMA ON CATALOG prod TO GROUP data_engineers. What can members of data_engineers now do?",options:["A. Create, alter, and drop any schema in the prod catalog.","B. Create new schemas in the prod catalog only; cannot alter or drop schemas they don't own.","C. Create schemas AND all tables within those schemas in prod.","D. Access all existing schemas and tables in prod with read-only permission.","E. Create schemas in prod and automatically receive all privileges on objects within those schemas."],answer:"B",explanation:"<strong>Correct: B.</strong> <code>CREATE SCHEMA</code> on a catalog grants the ability to CREATE new schemas within that catalog. It does NOT grant: (1) the ability to modify or drop schemas owned by others; (2) automatic access to existing schemas; (3) the ability to create tables in those schemas (requires USE SCHEMA + CREATE TABLE separately). The group members own the schemas they create and have full control over those, but CREATE SCHEMA alone is narrowly scoped to schema creation only."},
  {section:"Data Processing",text:"A data engineer implements a Type 2 SCD using a batch MERGE with foreachBatch in Structured Streaming. Each micro-batch processes customer record changes. The MERGE logic closes the existing record (sets end_date, is_current=false) and inserts a new record. After running for a week, the engineer notices some customers have 3-4 'current' records instead of 1. What is the MOST LIKELY cause?",options:["A. The MERGE condition is wrong — it's matching on customer_id only, but duplicate records in a single micro-batch cause multiple inserts for the same customer.","B. The foreachBatch function is not using transactions — parallel writes create duplicate records.","C. The streaming query is using update output mode which generates duplicate rows.","D. The checkpoint is not configured, causing micro-batches to re-run.","E. The Delta table doesn't have schema enforcement, allowing duplicate is_current=true rows."],answer:"A",explanation:"<strong>Correct: A.</strong> The classic SCD Type 2 streaming bug: if a single micro-batch contains multiple updates for the same customer (e.g., customer changed address twice in one batch), a simple MERGE matches on customer_id, closes the 'old' current record, and inserts a new one — but then processes the second update, closes that new record, and inserts ANOTHER. Result: multiple current records. Fix: deduplicate the micro-batch BEFORE the MERGE — keep only the latest change per customer using <code>QUALIFY ROW_NUMBER() OVER (PARTITION BY customer_id ORDER BY event_time DESC) = 1</code>."},
  {section:"Monitoring & Alerting",text:"A data engineer queries system.billing.usage to build a cost dashboard. They want to see cost broken down by job and user for the past 30 days. Which columns are MOST relevant?",options:["A. workspace_id, cluster_id, dbu_count, usage_date","B. workspace_id, usage_metadata.job_id, usage_metadata.user, dbus, usage_date, sku_name","C. billing_account_id, invoice_id, charges, tax","D. cluster_id, node_type, instance_count, running_hours","E. pipeline_id, event_type, dbu_consumed, event_timestamp"],answer:"B",explanation:"<strong>Correct: B.</strong> <code>system.billing.usage</code> contains: <code>usage_metadata</code> (a struct with job_id, cluster_id, user, notebook path, etc.), <code>dbus</code> (DBU count), <code>usage_date</code> (date of consumption), <code>sku_name</code> (job compute, all-purpose compute, SQL compute, etc.), and <code>workspace_id</code>. For job+user cost breakdown: GROUP BY usage_metadata.job_id, usage_metadata.user, SUM(dbus) × sku_price. The usage_metadata nested struct is the key to attributing cost to specific jobs and users."},
  {section:"Delta Lake & Tooling",text:"A data engineer wants to add a NOT NULL constraint to an existing column in a Delta table that already has NULL values in that column. What happens?",options:["A. The constraint is added successfully; existing NULL values are not validated.","B. The constraint fails to be added because existing NULL values violate the constraint.","C. The constraint is added and all existing NULL values are automatically replaced with a default value.","D. The constraint is added in 'deferred' mode — it only applies to new inserts, not existing data.","E. Delta automatically runs a repair job to remove rows with NULL values before adding the constraint."],answer:"B",explanation:"<strong>Correct: B.</strong> Adding a NOT NULL constraint to a Delta table uses: <code>ALTER TABLE table_name ALTER COLUMN col_name SET NOT NULL</code>. Delta validates ALL existing data in the table before applying the constraint. If any existing rows have NULL values in that column, the ALTER TABLE command fails with a constraint violation error. You must first eliminate the NULLs (via UPDATE or DELETE) before successfully adding the NOT NULL constraint. This ensures constraint consistency from the moment it's applied."},
  {section:"CI/CD & Deployment",text:"A data engineer writes a Python module that transforms DataFrames. They want to test it locally with pytest before deploying. The module uses spark.sql(). How should the test set up Spark?",options:["A. The test must use a live Databricks cluster connected via databricks-connect.","B. The test creates a local SparkSession: spark = SparkSession.builder.master('local').appName('test').getOrCreate() and uses it throughout the module.","C. Mock the spark.sql() calls using unittest.mock.patch to avoid needing an actual Spark session.","D. Use pyspark.testing.utils.assertDataFrameEqual with a pre-configured test SparkSession from the pyspark.sql.session module.","E. Both B and D — create a local SparkSession (B) and use pyspark.testing assertions (D) for DataFrame comparison."],answer:"E",explanation:"<strong>Correct: E.</strong> The complete local PySpark testing setup: (1) Create a local SparkSession with <code>SparkSession.builder.master('local[*]').getOrCreate()</code> — runs Spark in local mode on the test machine without a cluster; (2) Use <code>pyspark.testing.assertDataFrameEqual</code> and <code>assertSchemaEqual</code> for assertions. This is the recommended approach for CI/CD testing: fast, no cluster cost, fully deterministic. Databricks Connect (A) requires a live cluster and is slower/more expensive for unit tests."},
  {section:"Data Ingestion",text:"A streaming pipeline ingests financial transactions from Kafka. Exactly-once processing is required. The pipeline writes to a Delta table. Which combination guarantees exactly-once?",options:["A. Kafka consumer with auto-commit enabled + Delta append write.","B. Kafka source with enable.auto.commit=false + Structured Streaming checkpoint + Delta ACID transaction on write.","C. Kafka source with isolation.level=read_committed + Delta merge operation on each micro-batch.","D. Kafka consumer with manual offset commit BEFORE writing to Delta.","E. Kafka source + Lakeflow pipeline in Continuous mode with a 1-second trigger."],answer:"B",explanation:"<strong>Correct: B.</strong> Exactly-once with Kafka + Delta requires: (1) <code>enable.auto.commit=false</code> — Spark controls offset commits, not Kafka's auto-commit (which would commit even if the Spark write fails); (2) Structured Streaming checkpoint — atomically records Kafka offsets with each committed micro-batch, preventing re-processing; (3) Delta ACID transaction — ensures the write is atomic (either fully committed or fully rolled back). Together these three components guarantee exactly-once: each Kafka record is processed and written exactly once, even across failures and restarts."},
  {section:"Performance Optimization",text:"A data engineer uses Photon acceleration on a Databricks SQL cluster. For which operation type does Photon provide the GREATEST performance improvement?",options:["A. Python UDF execution — Photon rewrites Python UDFs in C++ for maximum speed.","B. Vectorized columnar processing of Spark SQL operations — scans, joins, aggregations, and sort operations on large datasets.","C. Machine learning inference using MLflow models deployed as UDFs.","D. Streaming micro-batch processing with frequent state store checkpoints.","E. Single-row lookups using primary key indexes."],answer:"B",explanation:"<strong>Correct: B.</strong> Photon is a native vectorized query execution engine written in C++ that replaces the JVM-based Spark execution engine for SQL operations. It processes data in columnar batches (SIMD vectorization) and provides the greatest speedups for: large-scale table scans, hash joins, aggregations (GROUP BY, COUNT, SUM), and sort operations. Photon does NOT accelerate Python UDFs (they still run in the Python interpreter) — this is why minimizing Python UDFs in favor of native Spark SQL is recommended in Photon environments."},
  {section:"Delta Lake & Tooling",text:"A data engineer uses MERGE INTO with a complex condition involving multiple columns. The merge takes 45 minutes on a 1TB table. Analysis shows Spark is doing a full table scan on both sides. What optimization can be applied?",options:["A. Add a partition filter in the MERGE condition to limit which partitions are scanned.","B. Increase spark.sql.shuffle.partitions for the MERGE operation.","C. Use MERGE with WHEN MATCHED FIRST to short-circuit matching early.","D. Convert the MERGE to individual INSERT and UPDATE statements.","E. Run OPTIMIZE before the MERGE to compact files."],answer:"A",explanation:"<strong>Correct: A.</strong> Delta Lake's MERGE can be optimized by adding partition-level predicates directly in the MERGE statement. Example: <code>MERGE INTO target USING source ON target.id = source.id AND target.date >= '2024-01-01'</code>. When the match condition includes a partition column predicate, Delta performs partition pruning on the target table — only scanning the relevant partitions instead of the full 1TB table. This can reduce scan time by orders of magnitude. This is called 'MERGE with partition pruning' and is a critical optimization for large Delta tables."}
  ]
}
];

// =====================================================================
// STATE
// =====================================================================
let currentExam = null;
let currentQ = 0;
let answers = [];
let flagged = [];
let timerInterval = null;
let timeLeft = 0;
let reviewMode = false;
let scores = JSON.parse(localStorage.getItem('db_exam_scores') || '{}');

// =====================================================================
// HOME SCREEN
// =====================================================================
function renderHome() {
  document.getElementById('home-screen').style.display = 'flex';
  document.getElementById('exam-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'none';
  const container = document.getElementById('exam-cards');
  container.innerHTML = '';
  EXAMS.forEach((exam, i) => {
    const score = scores[i];
    const scoreHtml = score !== undefined
      ? `<div class="card-score has-score">✓ Best score: ${score}%</div>`
      : `<div class="card-score">Not attempted</div>`;
    container.innerHTML += `
      <div class="exam-card" onclick="startExam(${i})">
        <div class="card-num">EXAM ${String(i+1).padStart(2,'0')}</div>
        <div class="card-title">${exam.title}</div>
        <div class="card-desc">${exam.focus}</div>
        <div class="card-meta">
          <div class="meta-pill">60 Questions</div>
          <div class="meta-pill">120 min</div>
        </div>
        ${scoreHtml}
      </div>`;
  });
}

function startExam(idx) {
  currentExam = idx;
  currentQ = 0;
  answers = new Array(EXAMS[idx].questions.length).fill(null);
  flagged = new Array(EXAMS[idx].questions.length).fill(false);
  reviewMode = false;
  timeLeft = 120 * 60;
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('exam-screen').style.display = 'block';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('exam-title-bar').textContent = EXAMS[idx].title;
  buildNavGrid();
  renderQuestion();
  startTimer();
}

function confirmExit() {
  if (confirm('Exit exam? Your progress will be lost.')) {
    clearInterval(timerInterval);
    renderHome();
  }
}

// =====================================================================
// TIMER
// =====================================================================
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) { clearInterval(timerInterval); submitExam(); }
  }, 1000);
}

function updateTimerDisplay() {
  const h = Math.floor(timeLeft / 3600);
  const m = Math.floor((timeLeft % 3600) / 60);
  const s = timeLeft % 60;
  const el = document.getElementById('timer');
  el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className = 'timer';
  if (timeLeft < 600) el.classList.add('danger');
  else if (timeLeft < 1800) el.classList.add('warning');
}

// =====================================================================
// NAV GRID
// =====================================================================
function buildNavGrid() {
  const grid = document.getElementById('q-grid');
  const qs = EXAMS[currentExam].questions;
  grid.innerHTML = '';
  qs.forEach((_, i) => {
    grid.innerHTML += `<div class="q-dot ${i===currentQ?'current':''}" id="qdot-${i}" onclick="goToQ(${i})">${i+1}</div>`;
  });
}

function updateNavGrid() {
  const qs = EXAMS[currentExam].questions;
  qs.forEach((q, i) => {
    const dot = document.getElementById(`qdot-${i}`);
    if (!dot) return;
    dot.className = 'q-dot';
    if (reviewMode) {
      if (answers[i] !== null) {
        dot.classList.add(answers[i] === q.answer ? 'correct' : 'wrong');
      }
    } else {
      if (i === currentQ) dot.classList.add('current');
      else if (flagged[i]) dot.classList.add('flagged');
      else if (answers[i] !== null) dot.classList.add('answered');
    }
  });
  const answered = answers.filter(a => a !== null).length;
  const total = qs.length;
  document.getElementById('progress-fill').style.width = `${(answered/total)*100}%`;
  document.getElementById('progress-text').textContent = `${answered} / ${total}`;
}

function goToQ(idx) {
  currentQ = idx;
  renderQuestion();
}

// =====================================================================
// QUESTION RENDER
// =====================================================================
function renderQuestion() {
  const exam = EXAMS[currentExam];
  const q = exam.questions[currentQ];
  const selected = answers[currentQ];
  const isReview = reviewMode;

  let optionsHtml = '';
  q.options.forEach(opt => {
    const letter = opt[0];
    const text = opt.slice(3);
    let cls = 'option';
    if (isReview) {
      if (letter === q.answer) cls += ' correct';
      else if (letter === selected && letter !== q.answer) cls += ' wrong';
    } else {
      if (letter === selected) cls += ' selected';
    }
    optionsHtml += `<div class="${cls}" onclick="${isReview ? '' : `selectAnswer('${letter}')`}">
      <div class="option-letter">${letter}.</div>
      <div class="option-text">${text}</div>
    </div>`;
  });

  const showExplanation = isReview || selected !== null;
  const isCorrect = selected === q.answer;

  const explanationHtml = `
    <div class="explanation ${showExplanation ? 'show' : ''}" id="explanation-box">
      <div class="explanation-header">
        <div class="explanation-badge ${isReview ? (isCorrect ? 'correct' : 'wrong') : 'correct'}">
          ${isReview ? (isCorrect ? '✓ CORRECT' : '✗ INCORRECT') : 'EXPLANATION'}
        </div>
      </div>
      <div class="explanation-text">${q.explanation}</div>
    </div>`;

  const reviewBanner = isReview ? `<div class="review-banner">📋 Review Mode — All answers and explanations are shown</div>` : '';

  document.getElementById('q-area').innerHTML = `
    ${reviewBanner}
    <div class="q-section-tag">${q.section}</div>
    <div class="q-number">Question ${currentQ + 1} of ${exam.questions.length}</div>
    <div class="q-text">${q.text}</div>
    <div class="options">${optionsHtml}</div>
    ${explanationHtml}
    <div class="q-actions">
      ${currentQ > 0 ? `<button class="btn btn-secondary" onclick="goToQ(${currentQ-1})">← Previous</button>` : ''}
      ${currentQ < exam.questions.length - 1 ? `<button class="btn btn-primary" onclick="goToQ(${currentQ+1})">Next →</button>` : ''}
      ${!isReview ? `<button class="btn-flag ${flagged[currentQ]?'active':''}" onclick="toggleFlag()" title="Flag question">🚩</button>` : ''}
    </div>`;

  updateNavGrid();
}

function selectAnswer(letter) {
  if (reviewMode) return;
  answers[currentQ] = letter;
  renderQuestion();
}

function toggleFlag() {
  flagged[currentQ] = !flagged[currentQ];
  renderQuestion();
}

// =====================================================================
// SUBMIT
// =====================================================================
function submitExam() {
  clearInterval(timerInterval);
  const unanswered = answers.filter(a => a === null).length;
  if (unanswered > 0 && !reviewMode) {
    const proceed = confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`);
    if (!proceed) { startTimer(); return; }
  }
  reviewMode = true;
  showResults();
}

function showResults() {
  const exam = EXAMS[currentExam];
  const qs = exam.questions;
  let correct = 0;
  const sectionMap = {};

  qs.forEach((q, i) => {
    const isCorrect = answers[i] === q.answer;
    if (isCorrect) correct++;
    if (!sectionMap[q.section]) sectionMap[q.section] = {correct:0,total:0};
    sectionMap[q.section].total++;
    if (isCorrect) sectionMap[q.section].correct++;
  });

  const pct = Math.round((correct / qs.length) * 100);
  const pass = pct >= 70;

  if (!scores[currentExam] || pct > scores[currentExam]) {
    scores[currentExam] = pct;
    try { localStorage.setItem('db_exam_scores', JSON.stringify(scores)); } catch(e){}
  }

  const sectionRows = Object.entries(sectionMap).map(([name, {correct:c, total:t}]) => {
    const p = Math.round((c/t)*100);
    const color = p >= 70 ? 'var(--green)' : p >= 50 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="section-row">
      <div class="section-name">${name}</div>
      <div class="section-bar-wrap"><div class="section-bar-fill" style="width:${p}%;background:${color}"></div></div>
      <div class="section-pct">${p}%</div>
    </div>`;
  }).join('');

  document.getElementById('exam-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('results-inner').innerHTML = `
    <div class="results-header">
      <div class="score-circle ${pass?'pass':'fail'}">
        <div class="score-pct">${pct}%</div>
        <div class="score-label">${correct}/${qs.length}</div>
      </div>
      <div class="result-verdict">${pass ? '🎉 PASS — Well done!' : '📚 Not quite — Keep studying'}</div>
      <div class="result-sub">${pass ? 'You exceeded the 70% passing threshold.' : 'Review the explanations and focus on weak sections.'}</div>
    </div>
    <div class="results-stats">
      <div class="stat-card"><div class="stat-num" style="color:var(--green)">${correct}</div><div class="stat-label">Correct</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--red)">${qs.length-correct}</div><div class="stat-label">Incorrect</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${pct}%</div><div class="stat-label">Score</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--accent)">70%</div><div class="stat-label">Pass Mark</div></div>
    </div>
    <div class="section-breakdown">
      <h3>Performance by Section</h3>
      ${sectionRows}
    </div>
    <div class="results-actions">
      <button class="btn btn-primary" onclick="reviewExam()">Review All Questions</button>
      <button class="btn btn-secondary" onclick="renderHome()">← Back to Home</button>
    </div>`;
}

function reviewExam() {
  reviewMode = true;
  currentQ = 0;
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('exam-screen').style.display = 'block';
  document.getElementById('timer').textContent = 'REVIEW';
  document.getElementById('timer').className = 'timer';
  updateNavGrid();
  renderQuestion();
}

// =====================================================================
// INIT
// =====================================================================
renderHome();
</script>
</body>
</html>
