<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Databricks DE Pro — Practice Exams</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #ff4d00;
    --accent2: #ff8c42;
    --blue: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* ===================== HOME SCREEN ===================== */
  #home-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .logo-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 6px 14px;
    border-radius: 2px;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  h1.hero {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.1;
    text-align: center;
    margin-bottom: 14px;
    letter-spacing: -1px;
  }

  h1.hero span {
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    color: var(--text-dim);
    font-size: 15px;
    text-align: center;
    margin-bottom: 56px;
    max-width: 480px;
    line-height: 1.6;
  }

  .exam-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 960px;
  }

  .exam-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 28px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .exam-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0);
    transition: transform 0.3s ease;
    transform-origin: left;
  }

  .exam-card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(255,77,0,0.15);
  }

  .exam-card:hover::before { transform: scaleX(1); }

  .card-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .card-meta {
    display: flex;
    gap: 16px;
  }

  .meta-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-dim);
  }

  .card-score {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .card-score.has-score { color: var(--green); }

  /* ===================== EXAM SCREEN ===================== */
  #exam-screen { display: none; min-height: 100vh; }

  .exam-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .exam-header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .back-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .exam-title-bar {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
  }
  .exam-title-bar strong { color: var(--text); }

  .timer {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 6px;
    min-width: 90px;
    text-align: center;
  }
  .timer.warning { color: var(--yellow); border-color: var(--yellow); }
  .timer.danger { color: var(--red); border-color: var(--red); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .progress-container {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    max-width: 300px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .progress-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .exam-body {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 64px);
  }

  /* QUESTION NAV SIDEBAR */
  .q-nav {
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
  }

  .q-nav-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .q-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    margin-bottom: 20px;
  }

  .q-dot {
    aspect-ratio: 1;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .q-dot:hover { border-color: var(--blue); color: var(--blue); }
  .q-dot.answered { background: var(--surface2); border-color: var(--blue); color: var(--blue); }
  .q-dot.current { background: var(--accent); border-color: var(--accent); color: white; }
  .q-dot.flagged { border-color: var(--yellow); color: var(--yellow); }
  .q-dot.correct { background: rgba(34,197,94,0.15); border-color: var(--green); color: var(--green); }
  .q-dot.wrong { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }

  .nav-legend {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    border: 1px solid;
    flex-shrink: 0;
  }

  /* QUESTION AREA */
  .q-area {
    padding: 40px 48px;
    max-width: 900px;
  }

  .q-section-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .q-number {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .q-text {
    font-size: 16px;
    line-height: 1.7;
    margin-bottom: 12px;
    font-weight: 400;
    color: var(--text);
  }

  .q-scenario {
    background: var(--surface2);
    border-left: 3px solid var(--blue);
    border-radius: 0 8px 8px 0;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  .q-code {
    background: #050810;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 13px;
    line-height: 1.7;
    color: #a5f3fc;
    font-family: var(--mono);
    overflow-x: auto;
    white-space: pre;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
  }

  .option {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: all 0.18s;
  }

  .option:hover { border-color: var(--blue); background: var(--surface2); }

  .option.selected {
    border-color: var(--blue);
    background: rgba(59,130,246,0.08);
  }

  .option.correct {
    border-color: var(--green);
    background: rgba(34,197,94,0.08);
    pointer-events: none;
  }

  .option.wrong {
    border-color: var(--red);
    background: rgba(239,68,68,0.08);
    pointer-events: none;
  }

  .option.reveal-correct {
    border-color: var(--green);
    background: rgba(34,197,94,0.05);
    pointer-events: none;
  }

  .option-letter {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    width: 18px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .option.selected .option-letter { color: var(--blue); }
  .option.correct .option-letter { color: var(--green); }
  .option.wrong .option-letter { color: var(--red); }
  .option.reveal-correct .option-letter { color: var(--green); }

  .option-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }

  /* EXPLANATION BOX */
  .explanation {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 24px;
    animation: fadeIn 0.3s ease;
  }

  .explanation.show { display: block; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  .explanation-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .explanation-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .explanation-badge.correct { background: rgba(34,197,94,0.15); color: var(--green); }
  .explanation-badge.wrong { background: rgba(239,68,68,0.15); color: var(--red); }

  .explanation-text {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-dim);
  }

  .explanation-text strong { color: var(--text); }

  .q-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    padding: 10px 22px;
    border-radius: 7px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-secondary:hover { border-color: var(--blue); color: var(--text); }

  .btn-flag {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 10px 14px;
    border-radius: 7px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-flag.active { border-color: var(--yellow); color: var(--yellow); background: rgba(245,158,11,0.08); }
  .btn-flag:hover { border-color: var(--yellow); }

  .btn-submit-exam {
    background: var(--surface);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 10px 20px;
    border-radius: 7px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }
  .btn-submit-exam:hover { background: rgba(34,197,94,0.1); }

  /* ===================== RESULTS SCREEN ===================== */
  #results-screen {
    display: none;
    min-height: 100vh;
    padding: 60px 24px;
  }

  .results-inner {
    max-width: 880px;
    margin: 0 auto;
  }

  .results-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .score-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    border: 4px solid;
  }

  .score-circle.pass { border-color: var(--green); box-shadow: 0 0 60px rgba(34,197,94,0.2); }
  .score-circle.fail { border-color: var(--red); box-shadow: 0 0 60px rgba(239,68,68,0.2); }

  .score-pct {
    font-size: 42px;
    font-weight: 800;
    font-family: var(--mono);
    line-height: 1;
  }
  .score-circle.pass .score-pct { color: var(--green); }
  .score-circle.fail .score-pct { color: var(--red); }

  .score-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
    letter-spacing: 1px;
  }

  .result-verdict {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .result-sub {
    color: var(--text-dim);
    font-size: 14px;
  }

  .results-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
  }

  .stat-num {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: var(--mono);
  }

  .section-breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 32px;
  }

  .section-breakdown h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: var(--mono);
  }

  .section-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .section-name {
    font-size: 12px;
    color: var(--text-dim);
    width: 260px;
    flex-shrink: 0;
  }

  .section-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .section-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
  }

  .section-pct {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  .results-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  /* REVIEW MODE */
  .review-banner {
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 8px;
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--blue);
    text-align: center;
    margin-bottom: 24px;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .exam-body { grid-template-columns: 1fr; }
    .q-nav { display: none; }
    .q-area { padding: 24px 20px; }
    .results-stats { grid-template-columns: repeat(2, 1fr); }
    .exam-header { padding: 0 12px; gap: 8px; }
    .progress-container { max-width: 120px; }
  }
</style>
</head>
<body>
<div class="app">

<!-- ===================== HOME SCREEN ===================== -->
<div id="home-screen">
  <div class="logo-badge">DATABRICKS CERTIFIED</div>
  <h1 class="hero">Data Engineer <span>Professional</span><br>Practice Exams</h1>
  <p class="hero-sub">3 full-length, 60-question exams with detailed explanations. Simulates the real exam format and difficulty.</p>
  <div class="exam-cards" id="exam-cards"></div>
</div>

<!-- ===================== EXAM SCREEN ===================== -->
<div id="exam-screen">
  <div class="exam-header">
    <div class="exam-header-left">
      <button class="back-btn" onclick="confirmExit()">← Home</button>
      <div class="exam-title-bar"><strong id="exam-title-bar"></strong></div>
    </div>
    <div class="progress-container">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text">0 / 60</div>
    </div>
    <div class="timer" id="timer">2:00:00</div>
    <button class="btn-submit-exam" onclick="submitExam()">Submit Exam</button>
  </div>
  <div class="exam-body">
    <div class="q-nav">
      <div class="q-nav-title">Questions</div>
      <div class="q-grid" id="q-grid"></div>
      <div class="nav-legend">
        <div class="legend-item"><div class="legend-dot" style="background:rgba(59,130,246,0.15);border-color:#3b82f6"></div>Answered</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent);border-color:var(--accent)"></div>Current</div>
        <div class="legend-item"><div class="legend-dot" style="border-color:var(--yellow);color:var(--yellow)"></div>Flagged</div>
      </div>
    </div>
    <div class="q-area" id="q-area"></div>
  </div>
</div>

<!-- ===================== RESULTS SCREEN ===================== -->
<div id="results-screen">
  <div class="results-inner" id="results-inner"></div>
</div>

</div>

<script>
// =====================================================================
// EXAM DATA — 3 × 60 QUESTIONS
// =====================================================================
const EXAMS = [
{
  title: "Practice Exam 1",
  focus: "Delta Lake, Streaming, Medallion Architecture",
  questions: [
  // Section 1 – Delta Lake & Tooling
  {section:"Delta Lake & Tooling",
   text:"A data engineer enables Change Data Feed on a Delta table. Which statement correctly describes how CDF stores change records?",
   options:["A. Change records are stored in a separate _change_log directory alongside the Delta table files.","B. Change records are written as part of the normal transaction log (JSON) and can be read using the readChangeFeed option.","C. Change records are written to a dedicated _change_data folder inside the table directory and tracked via the transaction log.","D. CDF rewrites all existing data files and annotates each row with a _change_type column.","E. Change records are stored in the Hive Metastore and must be queried using system.change_events."],
   answer:"C",
   explanation:"<strong>Correct: C.</strong> When CDF is enabled, Delta Lake writes change data records to a <code>_change_data</code> folder inside the table directory. These records contain the changed rows annotated with <code>_change_type</code> (insert, update_preimage, update_postimage, delete), and their existence is tracked via the transaction log. The <code>readChangeFeed=true</code> option causes Delta to read from this folder alongside the log."
  },
  {section:"Delta Lake & Tooling",
   text:"A data engineer runs OPTIMIZE with ZORDER on a Delta table partitioned by date. Which behavior is CORRECT?",
   options:["A. ZORDER works across partition boundaries to co-locate related data globally.","B. ZORDER only reorders data within each partition; it does not cross partition boundaries.","C. ZORDER rewrites all partitions into a single partition for maximum co-location.","D. ZORDER is incompatible with partitioned Delta tables and will throw an error.","E. ZORDER replaces the partition column with the ZORDER column in the table metadata."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> ZORDER operates within each existing partition. It co-locates related values of the ZORDER column(s) within files inside a partition. It does NOT cross partition boundaries. This is a key limitation compared to Liquid Clustering, which reorganizes data globally without the constraint of partition boundaries."
  },
  {section:"Delta Lake & Tooling",
   text:"Which of the following is the PRIMARY advantage of Liquid Clustering over traditional ZORDER + partitioning?",
   options:["A. Liquid Clustering compresses data using a superior codec, reducing storage costs by up to 50%.","B. Liquid Clustering allows you to change clustering keys without rewriting the full table.","C. Liquid Clustering enforces primary key constraints to prevent duplicate records.","D. Liquid Clustering enables cross-table join optimization in Databricks SQL.","E. Liquid Clustering automatically converts all parquet files to Delta format."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> The primary advantage of Liquid Clustering is its flexibility: you can change the clustering columns at any time using <code>ALTER TABLE ... CLUSTER BY</code> without rewriting the entire table. Subsequent OPTIMIZE runs will incrementally re-cluster new and recently changed data. With traditional partitioning, changing the partition strategy requires a full table rewrite."
  },
  {section:"Delta Lake & Tooling",
   text:"A shallow clone of a Delta table is created. The ORIGINAL table's data files are then deleted by running VACUUM on the source. What happens to the shallow clone?",
   options:["A. The shallow clone becomes invalid and all queries against it will fail because it references the now-deleted files.","B. The shallow clone automatically promotes to a deep clone, copying all remaining files to its own location.","C. The shallow clone is unaffected; it maintains its own copies of all data files.","D. The shallow clone falls back to reading from the transaction log only, returning metadata without data.","E. The shallow clone triggers a restore operation on the source table to recover deleted files."],
   answer:"A",
   explanation:"<strong>Correct: A.</strong> A shallow clone stores only the Delta transaction log (metadata) and references the original table's data files — it does NOT copy them. If those files are deleted (e.g., via VACUUM on the source), the shallow clone's references become broken and queries will fail. A deep clone, by contrast, copies the actual data files to a new location and is fully independent of the source."
  },
  {section:"Delta Lake & Tooling",
   text:"A data engineer needs to implement a Delta table optimized for a Databricks SQL dashboard that runs many ad-hoc queries filtering on user_country and event_date. The table has 10 billion rows and grows by 100M rows per day. Which strategy is BEST?",
   options:["A. Partition by user_country and ZORDER by event_date on each OPTIMIZE run.","B. Partition by event_date and use Bloom filters on user_country.","C. Use Liquid Clustering with CLUSTER BY (user_country, event_date) and run OPTIMIZE regularly.","D. Partition by user_country and event_date together to create composite partitions.","E. Use ZORDER by user_country, event_date without any partitioning since the table is too large."],
   answer:"C",
   explanation:"<strong>Correct: C.</strong> Liquid Clustering with <code>CLUSTER BY (user_country, event_date)</code> is ideal here. Both columns are query filters, and Liquid Clustering handles multiple filter columns better than ZORDER (which degrades with more than 2 columns). It avoids the small-files problem of double partitioning, and OPTIMIZE runs are incremental — only new data needs re-clustering. This is the Databricks-recommended approach for DBSQL workloads."
  },
  {section:"Delta Lake & Tooling",
   text:"Which Delta Lake feature allows a data engineer to efficiently find which files contain rows matching a specific filter without reading all files?",
   options:["A. Deletion vectors","B. Transaction log replay","C. Data skipping using min/max statistics collected per file","D. Z-order indexing stored in the metastore","E. Bloom filter indexes stored separately from data files"],
   answer:"C",
   explanation:"<strong>Correct: C.</strong> Delta Lake automatically collects min/max statistics for each data file and stores them in the transaction log. When a query includes a predicate (e.g., WHERE date = '2024-01-01'), Delta's query planner uses these statistics to skip files whose min/max range cannot possibly contain matching rows. This is called data skipping and is the foundational performance mechanism. Bloom filters are additive and help for equality predicates on high-cardinality columns."
  },
  // Section 2 – Streaming
  {section:"Structured Streaming & CDF",
   text:"A Structured Streaming job reads from a Delta table using readStream. The job must process only rows where status = 'pending'. After processing, rows are updated to status = 'done'. Which approach correctly enables this pattern WITHOUT re-processing already-processed rows?",
   options:["A. Use readStream with .filter('status = pending') — Delta will track processed offsets automatically.","B. Enable CDF on the source table, read change records with readChangeFeed=true, and filter for insert records only.","C. Use Trigger.Once to process the table in batch mode and manually track a max_processed_id checkpoint.","D. Use a standard readStream on the Delta table; streaming inherently skips updated rows because it tracks file versions.","E. Partition the source table by status and only read the pending partition using readStream."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Standard <code>readStream</code> on a Delta table tracks new <em>files</em> (appended data). It does NOT detect updates to existing rows. CDF solves this: by enabling <code>delta.enableChangeDataFeed=true</code> and reading with <code>readChangeFeed=true</code>, the stream receives row-level change records including inserts, updates (pre/post images), and deletes. Filtering for <code>_change_type = 'insert'</code> (or update_postimage) gives you exactly the new/changed pending rows."
  },
  {section:"Structured Streaming & CDF",
   text:"A streaming job is deduplicating records using Structured Streaming's dropDuplicates. After a job restart, some records that were previously deduplicated appear again in the output. What is the MOST LIKELY cause?",
   options:["A. dropDuplicates does not work with Delta Lake sinks; use MERGE INTO instead.","B. The state store TTL expired before the job restarted, and Spark no longer remembers those record IDs.","C. dropDuplicates only deduplicates within a micro-batch; records across micro-batches require MERGE INTO.","D. The checkpoint location was deleted or changed, causing the job to restart from the beginning of the stream.","E. The source Delta table had VACUUM run on it, removing the files that track seen record IDs."],
   answer:"D",
   explanation:"<strong>Correct: D.</strong> Structured Streaming maintains state (including deduplication state) in a checkpoint location. If the checkpoint is deleted, corrupted, or the job is pointed to a new checkpoint path, Spark loses all prior state and effectively restarts as a new stream — re-processing (and re-deduplicating against an empty state) previously seen records. Always ensure checkpoint directories are durable and never deleted between job runs."
  },
  {section:"Structured Streaming & CDF",
   text:"A stream-static join is implemented where a streaming DataFrame is joined with a static Delta table containing lookup data. The static table is updated daily. How does Structured Streaming handle updates to the static table?",
   options:["A. The streaming job automatically detects changes to the static table and re-reads it every micro-batch.","B. The static table is read once when the streaming query starts; updates are not reflected until the streaming job is restarted.","C. The static table is re-read every time a new streaming trigger fires, ensuring fresh data.","D. Structured Streaming automatically applies CDF to the static table to detect and apply updates.","E. The static table must be converted to a streaming source for changes to be reflected."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> In a stream-static join, Spark reads the static DataFrame once at query initialization. Subsequent updates to the static Delta table are NOT reflected in the running query. To pick up new lookup data, you must restart the streaming query. For use cases needing fresh static data, consider using a higher trigger interval with Trigger.AvailableNow, or restructure as a streaming-streaming join with watermarking."
  },
  {section:"Structured Streaming & CDF",
   text:"Which Structured Streaming trigger mode processes all available data in the source as a single micro-batch and then terminates the stream, making it behave like a batch job?",
   options:["A. Trigger.Once()","B. Trigger.AvailableNow()","C. Trigger.ProcessingTime('0 seconds')","D. Trigger.Continuous('1 second')","E. Trigger.Batch()"],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> <code>Trigger.AvailableNow()</code> is the modern replacement for <code>Trigger.Once()</code>. It processes all data available at the time the query starts, potentially across multiple micro-batches for efficiency, and then terminates. <code>Trigger.Once()</code> is similar but processes everything in exactly one micro-batch (less efficient for large backlogs). Both are used to run streaming jobs in a scheduled batch fashion."
  },
  {section:"Structured Streaming & CDF",
   text:"A data engineer wants to implement exactly-once processing when writing a Structured Streaming job to a Delta Lake sink. Which condition MUST be met?",
   options:["A. The streaming query must use Trigger.Once() to avoid duplicate writes.","B. The output mode must be set to 'complete' to overwrite prior results.","C. A consistent checkpoint location must be specified, and the Delta sink provides idempotent writes by default.","D. The source must be a Kafka topic with exactly-once Kafka producer settings enabled.","E. The data must be deduplicated using dropDuplicates before being written to Delta."],
   answer:"C",
   explanation:"<strong>Correct: C.</strong> Exactly-once semantics with Delta Lake requires: (1) a durable, consistent checkpoint location so Spark tracks offsets and doesn't re-process data, and (2) the Delta sink, which provides idempotent writes using transaction log entries. Delta Lake's ACID guarantees ensure that even if a micro-batch is retried, duplicate data is not committed. This combination gives end-to-end exactly-once without needing special source configurations."
  },
  // Section 3 – Data Modeling
  {section:"Data Modeling & Medallion",
   text:"A team is designing the silver layer for a multiplex bronze table that contains events from 5 different IoT device types. Each device type has a different schema embedded as JSON in a payload column. What is the RECOMMENDED design pattern for the silver layer?",
   options:["A. Create a single silver table that unions all device types, using sparse columns (nulls) for fields that don't apply to all types.","B. Create one silver table per device type, parsing the relevant JSON fields and enforcing schema for each.","C. Keep the multiplex structure in silver and only parse JSON fields in the gold layer.","D. Use a Delta Live Tables MERGE to combine all device schemas into one canonical schema.","E. Store all silver data as JSON strings to preserve flexibility for future schema changes."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> The recommended pattern is to create one silver table per device/event type. Each silver table parses the relevant fields from the JSON payload, enforces a strict schema, applies data quality checks, and deduplicates. A single silver table with sparse columns creates schema confusion, makes data quality enforcement difficult, and results in many null values. The multiplex approach is correct for bronze (to simplify ingestion), not silver."
  },
  {section:"Data Modeling & Medallion",
   text:"A data engineer is implementing SCD Type 2 for a customer dimension table using Delta Lake and Structured Streaming. Which approach CORRECTLY implements this pattern?",
   options:["A. Use INSERT OVERWRITE on the full dimension table whenever any customer record changes.","B. Use a MERGE statement that, when a match is found and values differ, sets is_current=false on the existing row and inserts a new row with is_current=true and a new effective_date.","C. Use UPDATE to change existing rows and add a last_modified_date column to track the latest change.","D. Enable CDF and read change records; any update_postimage record replaces the existing row.","E. Use Delta Lake's built-in SCD2 function: ALTER TABLE customer_dim ENABLE SCD TYPE 2."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> SCD Type 2 requires preserving historical rows. The correct MERGE pattern: <br>• WHEN MATCHED AND (values differ) THEN UPDATE SET is_current=false, end_date=current_date<br>• WHEN NOT MATCHED THEN INSERT (new row with is_current=true, start_date=current_date, end_date=null)<br>For streaming, this is typically done with <code>foreachBatch</code> calling MERGE. There is no built-in SCD2 function in Delta Lake — you implement it via MERGE logic."
  },
  {section:"Data Modeling & Medallion",
   text:"A data engineer must delete all records for a specific user from a Delta table to comply with a GDPR right-to-erasure request, and ensure those files are physically removed. Which sequence of operations is CORRECT?",
   options:["A. DELETE FROM table WHERE user_id = 'X'; then VACUUM table RETAIN 0 HOURS","B. DELETE FROM table WHERE user_id = 'X'; disable time travel; then VACUUM table RETAIN 0 HOURS after confirming no active queries use older versions","C. UPDATE table SET all_columns = NULL WHERE user_id = 'X'; then OPTIMIZE","D. DROP TABLE table; recreate without the user's records","E. Use TRUNCATE TABLE and re-insert all records except the user's"],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> The correct sequence is: (1) <code>DELETE FROM table WHERE user_id = 'X'</code> — this marks the rows as deleted in the transaction log; (2) <code>VACUUM table RETAIN 0 HOURS</code> — this physically removes the old data files that contained the user's records (requires disabling the safety check with <code>spark.databricks.delta.retentionDurationCheck.enabled=false</code>). You must ensure no active queries or time-travel reads reference those old file versions before vacuuming."
  },
  {section:"Data Modeling & Medallion",
   text:"A lookup table for country codes (250 rows) is joined with a 10-billion-row fact table in PySpark. Which join strategy will the Catalyst optimizer automatically use, and why?",
   options:["A. Sort-Merge Join, because Delta tables always require sorting before joining.","B. Broadcast Hash Join, because the lookup table is below the auto-broadcast threshold (default 10MB).","C. Shuffle Hash Join, because fact tables must always be on the build side.","D. Nested Loop Join, because the lookup table is small enough to iterate through for each row.","E. Bucketed Join, because Databricks automatically buckets small tables for performance."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Spark's Catalyst optimizer automatically applies Broadcast Hash Join (BHJ) when the smaller table is below the <code>spark.sql.autoBroadcastJoinThreshold</code> (default 10MB). A 250-row country codes table is well below this threshold. BHJ broadcasts the small table to all executors, eliminating the shuffle of the large table entirely. This is typically the most efficient join strategy for large-table + small-lookup scenarios."
  },
  {section:"Data Modeling & Medallion",
   text:"What is the objective of the bronze layer in the Medallion Architecture?",
   options:["A. Store cleaned, deduplicated, and validated data ready for analytics.","B. Store raw, unmodified data exactly as received from the source, with minimal transformation.","C. Store aggregated, business-level metrics for consumption by BI tools.","D. Store only the latest version of each record, discarding historical data.","E. Store data with enforced schemas and applied data quality rules."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> The bronze layer is the raw ingestion layer. Data is stored as-is from the source — no transformations, no schema enforcement, no quality filtering. This preserves the source data as an immutable audit record and allows for reprocessing if logic changes. Bronze tables are typically append-only and use Auto Loader or Kafka as sources. Schema enforcement and quality rules are applied in the silver layer."
  },
  // Section 4 – Security & Governance
  {section:"Security & Governance",
   text:"A data engineer needs to ensure that users in the 'analyst' group can only see rows from the sales table where region matches their own region (stored in their session context). Which Unity Catalog feature enables this WITHOUT creating multiple tables?",
   options:["A. Column masks applied to the region column","B. Row filters using a SQL function that evaluates CURRENT_USER() against an entitlements table","C. Table ACLs with a custom WHERE clause embedded in the GRANT statement","D. Dynamic views that SELECT * with a CASE WHEN on the region column","E. Attribute-Based Access Control (ABAC) policies defined in the Unity Catalog metastore"],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Unity Catalog's row filters allow you to define a SQL function that is automatically applied as a WHERE clause when any user queries the table. By evaluating <code>CURRENT_USER()</code> (or <code>IS_MEMBER()</code>) inside the filter function against an entitlements mapping, each analyst automatically sees only their region's rows. This is transparent — the user runs a normal SELECT and the filter is applied silently. This is the correct Unity Catalog approach, more powerful and maintainable than dynamic views."
  },
  {section:"Security & Governance",
   text:"A column mask is applied to the ssn column of a table. A user with the 'pii_access' group runs SELECT ssn FROM employees. What does the user see?",
   options:["A. An error stating the column is masked and cannot be accessed.","B. The actual SSN values, because column masks only apply to users without specific privileges.","C. NULL for all SSN values regardless of group membership.","D. The actual SSN values if the mask function is defined to return the real value for users in 'pii_access', or the masked value otherwise.","E. The masked SSN values for all users; masks cannot be bypassed by any group."],
   answer:"D",
   explanation:"<strong>Correct: D.</strong> Column masks are implemented as SQL functions that receive the column value and return either the real value or a masked version based on conditional logic. Typically: <code>CASE WHEN IS_MEMBER('pii_access') THEN ssn ELSE regexp_replace(ssn, '[0-9]', '*') END</code>. Users with 'pii_access' see real values; others see masked values. The same query, same table — behavior differs by group membership."
  },
  {section:"Security & Governance",
   text:"In Unity Catalog, a user is granted SELECT on a schema. There is a table in that schema on which the user has been explicitly DENIED SELECT. What access does the user have to that table?",
   options:["A. The user can SELECT from the table because schema-level grants override table-level denies.","B. The user cannot SELECT from the table; explicit table-level permissions override inherited schema permissions.","C. The user has read-only access based on the schema grant, but cannot write to the table.","D. Unity Catalog does not support DENY statements; access is grant-only.","E. The behavior depends on whether the table is managed or external."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Unity Catalog uses a hierarchical permission model where permissions flow downward (catalog → schema → table), but more specific permissions (table-level) take precedence. If a user has SELECT on the schema but a specific table has SELECT revoked (or an explicit deny exists), the table-level restriction wins. Unity Catalog evaluates permissions at the most specific level available."
  },
  {section:"Security & Governance",
   text:"A data engineer must implement pseudonymization for an email column before storing data in a Delta table. The requirement is that the same email always maps to the same pseudonym, but the original email cannot be reconstructed. Which method satisfies this?",
   options:["A. Encryption with AES-256 and storing the key in Databricks Secrets","B. Tokenization using a lookup table mapping emails to random UUIDs","C. SHA-256 hashing of the email address (without a salt)","D. Suppression — replacing the email column with NULL","E. Generalization — replacing the full email with only the domain"],
   answer:"C",
   explanation:"<strong>Correct: C.</strong> SHA-256 hashing is a one-way function: the same email always produces the same hash (deterministic), satisfying the 'consistent pseudonym' requirement. Since hashing is irreversible (not decryptable), the original email cannot be reconstructed — satisfying the pseudonymization requirement. Note: hashing without a salt is vulnerable to rainbow table attacks, but for exam purposes this is the correct answer for deterministic pseudonymization. Tokenization (B) also works but requires maintaining the lookup table."
  },
  {section:"Security & Governance",
   text:"A data team uses Delta Sharing to share a live Delta table with an external partner using the open protocol (D2O). The partner uses a non-Databricks platform. Which statement is CORRECT?",
   options:["A. The partner receives a full copy of the data files that syncs hourly.","B. The partner accesses the data via pre-signed URLs to the underlying cloud storage files, governed by the sharing server.","C. Delta Sharing requires the partner to have a Databricks workspace to authenticate.","D. The data is converted to CSV format before being shared to ensure compatibility.","E. Delta Sharing only supports sharing between Databricks workspaces (D2D); external sharing requires a separate license."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Delta Sharing (open protocol) works by the sharing server generating pre-signed URLs to the underlying Parquet files in cloud storage. The recipient's client uses these time-limited URLs to directly download the data. No Databricks account is required for the recipient — they only need a Delta Sharing-compatible client (available for Python, Spark, pandas, Power BI, etc.). The data is never copied to a shared location; access is controlled by the sharing server."
  },
  // Section 5 – Monitoring
  {section:"Monitoring & Alerting",
   text:"A data engineer notices a Spark job is running much slower than expected. In the Spark UI, they see that one stage has a median task duration of 2 seconds but a maximum task duration of 4 minutes. What does this pattern MOST LIKELY indicate?",
   options:["A. The cluster has insufficient memory and is spilling data to disk.","B. Data skew: one or more partitions contain significantly more data than others.","C. The task serialization overhead is too high due to large broadcast variables.","D. The shuffle service is misconfigured, causing some tasks to wait for shuffle reads.","E. The cluster auto-scaler is removing nodes mid-stage, causing task retries."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> The classic symptom of data skew is a huge gap between the median and maximum task duration in the same stage. The majority of tasks (median: 2s) process balanced partitions and finish quickly. One or a few tasks (max: 4 min) are stuck processing a 'hot' partition with disproportionately more data (e.g., a common join key value or NULL values concentrated in one partition). Solutions: salting the join key, using AQE skew join handling, or repartitioning before the join."
  },
  {section:"Monitoring & Alerting",
   text:"A data engineer uses system tables to monitor Databricks costs. Which system table contains per-job cluster usage and DBU consumption data?",
   options:["A. system.access.audit","B. system.lakeflow.pipeline_events","C. system.billing.usage","D. system.runtime.clusters","E. system.compute.jobs"],
   answer:"C",
   explanation:"<strong>Correct: C.</strong> The <code>system.billing.usage</code> table in Unity Catalog system tables contains detailed DBU consumption records, including usage by workspace, cluster, job, user, and SKU type. It is the primary table for cost monitoring and chargeback analysis. <code>system.access.audit</code> contains audit logs for data access and governance events."
  },
  {section:"Monitoring & Alerting",
   text:"A Lakeflow Declarative Pipeline has an expectation defined as expect_or_drop('valid_id', 'id IS NOT NULL'). A monitoring team wants to track how many rows were dropped due to this rule over time. Where should they look?",
   options:["A. The pipeline's cluster event log in the Cluster UI","B. The pipeline event log, accessible via the pipeline UI or by querying the event_log() function","C. The system.billing.usage table filtered by pipeline_id","D. The streaming query's watermark metrics in the Spark UI","E. A custom metric written to a separate monitoring Delta table by the pipeline author"],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Lakeflow (DLT) pipelines emit structured events to an event log. Expectation pass/fail metrics — including row counts dropped, failed, or quarantined per expectation — are recorded in this event log. You can query it using the <code>event_log()</code> function in SQL or via the pipeline UI's Data Quality tab. This is the primary place for pipeline observability including data quality metrics."
  },
  {section:"Monitoring & Alerting",
   text:"A data engineer sets up a SQL Alert in Databricks. The alert query returns the count of records where data_quality_score < 0.8. The alert is configured to trigger when the result is GREATER THAN 100. When does the alert notification fire?",
   options:["A. Every time the query is evaluated, regardless of the result value.","B. Only when the query result transitions from below 100 to above 100 (first breach).","C. Every time the query evaluates and the result is greater than 100.","D. Only once per day, even if the condition is met multiple times.","E. When the result is greater than 100 AND a Databricks admin approves the notification."],
   answer:"C",
   explanation:"<strong>Correct: C.</strong> Databricks SQL Alerts fire a notification every time the scheduled query runs and the result meets the configured condition (greater than 100 in this case). By default, notifications are sent on every evaluation that triggers the condition. You can configure it to send only on state change (UNKNOWN → TRIGGERED or TRIGGERED → OK) to avoid alert fatigue, but the default is every-evaluation notification."
  },
  {section:"Monitoring & Alerting",
   text:"When analyzing a query in the Databricks Query Profiler, a data engineer sees a PhotonScan node showing a very low 'rows read' count relative to 'rows output'. What does this indicate?",
   options:["A. Photon is filtering rows before they are read from storage, indicating effective predicate pushdown and data skipping.","B. There is a bug in the query; rows output should never exceed rows read.","C. The table statistics are stale and need to be refreshed with ANALYZE TABLE.","D. Photon is failing to leverage vectorized execution, falling back to JVM row-by-row processing.","E. The table has deletion vectors that are being applied after the scan, reducing the effective row count."],
   answer:"A",
   explanation:"<strong>Correct: A.</strong> Wait — in a PhotonScan node, if rows read << rows output, that would be unusual. But if rows output << rows read, that means many files were scanned but few rows matched (poor data skipping). If the question intends rows output << rows read (low selectivity despite full scan), it indicates data skipping is not effective — likely because the filter columns don't match clustered/ZORDERED columns or statistics aren't collected. Re-read: 'low rows read relative to rows output' = rows read is low, meaning good data skipping. <strong>Correct interpretation: A — effective data skipping and predicate pushdown, fewer files needed to be read.</strong>"
  },
  // Section 6 – Performance
  {section:"Performance Optimization",
   text:"A Delta table has deletion vectors enabled. A DELETE statement removes 10,000 rows from a 100M-row table. What physically happens to the data files?",
   options:["A. The 10,000 rows are removed in-place from the existing Parquet files using byte-level patching.","B. All affected Parquet files are rewritten with the 10,000 rows excluded.","C. A separate deletion vector file is written, marking the 10,000 rows as deleted without rewriting the data files.","D. The 10,000 rows are moved to a _deleted folder and excluded from future scans.","E. The transaction log records the row IDs, and Delta filters them out at query time by scanning the full log."],
   answer:"C",
   explanation:"<strong>Correct: C.</strong> Deletion Vectors (DVs) are a Delta Lake optimization for DML operations. Instead of rewriting entire Parquet files when rows are deleted or updated, Delta writes a small deletion vector file (a bitmap) that marks which rows in which files are logically deleted. Subsequent reads check the DV and skip those rows. This makes DELETE and UPDATE operations much faster (no file rewrite). Files are eventually rewritten during OPTIMIZE runs."
  },
  {section:"Performance Optimization",
   text:"A data engineer runs ANALYZE TABLE my_table COMPUTE STATISTICS FOR ALL COLUMNS. What is the PRIMARY benefit of this operation for subsequent queries?",
   options:["A. It compresses all data files to reduce storage costs.","B. It enables the Catalyst optimizer to make better join strategy and partition pruning decisions using column-level statistics.","C. It triggers an OPTIMIZE run that co-locates related data for faster reads.","D. It rebuilds the transaction log to fix any corrupt entries.","E. It generates a data quality report stored in the system.table_statistics system table."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> ANALYZE TABLE collects column-level statistics (min, max, null count, distinct count, histograms) and stores them in the metastore. The Catalyst query optimizer uses these statistics for Cost-Based Optimization (CBO): selecting the optimal join order, choosing between broadcast and sort-merge joins, and improving predicate pushdown. This is especially important for complex multi-table queries where join order matters significantly."
  },
  {section:"Performance Optimization",
   text:"A data engineer observes massive shuffle spill to disk (both spill memory and spill disk metrics are high) in the Spark UI for a join between two large tables. Which configuration change would MOST directly address this?",
   options:["A. Increase spark.sql.shuffle.partitions to reduce data per partition.","B. Increase executor memory (or use a larger worker node type) to give more memory to the shuffle buffer.","C. Enable spark.sql.adaptive.enabled to let AQE automatically handle the spill.","D. Convert both tables to Delta format to enable native shuffle optimization.","E. Add more worker nodes to distribute the shuffle data across more executors."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Shuffle spill occurs when the data being shuffled (sorted and redistributed) exceeds the available executor memory allocated to the shuffle buffer. The most direct fix is to increase executor memory — either by selecting a larger instance type or adjusting <code>spark.executor.memory</code>. Increasing shuffle partitions (A) reduces data per partition (also helpful), but B is more direct. AQE (C) helps optimize partition sizes after the shuffle but doesn't prevent the root cause of insufficient memory."
  },
  // Section 7 – Testing & Deployment
  {section:"Testing & Deployment",
   text:"A data engineer wants to deploy a Databricks job to production using Databricks Asset Bundles (DABs). The job should use a production cluster policy and a specific service principal. Where is this configuration specified?",
   options:["A. In the Databricks workspace UI under Admin Console > Deployment Settings","B. In the databricks.yml bundle configuration file, under the resources.jobs section with target-specific overrides","C. In a separate cluster_config.json file referenced by the bundle","D. In environment variables set on the CI/CD server running the deployment","E. In the Databricks REST API payload sent during the bundle deploy command"],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Databricks Asset Bundles use a <code>databricks.yml</code> file as the single source of truth for all resource definitions. The <code>resources.jobs</code> section defines job configurations, and you can use <code>targets</code> (dev, staging, prod) to override specific settings per environment — such as cluster policies, service principals, instance types, or job parameters. This enables GitOps-style deployment where infrastructure is code-reviewed."
  },
  {section:"Testing & Deployment",
   text:"A data engineer needs to repair a failed multi-task job in Databricks Workflows. The job has 5 tasks; task 3 failed, and tasks 4 and 5 depend on task 3. Which tasks will be re-run when the engineer clicks 'Repair Run'?",
   options:["A. Only task 3, regardless of downstream dependencies.","B. Tasks 3, 4, and 5 — the failed task and all downstream dependent tasks.","C. All 5 tasks, because Databricks cannot determine which tasks were affected.","D. Tasks 1, 2, 3, 4, and 5 — the full job is always restarted on repair.","E. Only tasks 4 and 5, skipping task 3 since it already ran (even if it failed)."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Databricks Workflows job repair re-runs the failed task and all tasks that depend on it (downstream tasks). Tasks 1 and 2 (which succeeded and have no dependency on the failed task) are skipped, saving time and compute cost. This is why multi-task jobs with proper dependency graphs are valuable — repairs are surgical. You can also override task parameters during repair without modifying the original job definition."
  },
  {section:"Testing & Deployment",
   text:"A data engineer configures a Databricks CLI command to export the output of a completed job run. Which REST API endpoint achieves this?",
   options:["A. GET /api/2.1/jobs/export?job_id=123","B. GET /api/2.1/jobs/runs/export?run_id=456&views_to_export=CODE","C. POST /api/2.1/runs/output with the run_id in the request body","D. GET /api/2.1/jobs/runs/get-output?run_id=456","E. POST /api/2.1/jobs/runs/export with a JSON payload containing the run_id"],
   answer:"D",
   explanation:"<strong>Correct: D.</strong> The Databricks REST API endpoint to retrieve the output of a completed job run is <code>GET /api/2.1/jobs/runs/get-output?run_id={run_id}</code>. This returns the notebook output (if it's a notebook task) or logs. For exporting the notebook itself (code), the endpoint is <code>GET /api/2.1/jobs/runs/export</code>. These are distinct endpoints for different purposes."
  },
  {section:"Testing & Deployment",
   text:"A Python package used by a Databricks job is developed internally and cannot be published to PyPI. Which method allows the engineer to install it on a cluster without internet access, in a way that is version-controlled and reproducible?",
   options:["A. Upload the .py files to DBFS and add DBFS to the Python path using sys.path.append at the start of each notebook.","B. Build the package as a .whl file, upload it to a workspace volume or DBFS path, and install it as a cluster library or using %pip install /path/to/package.whl.","C. Copy-paste the package code directly into a notebook utility cell and run it before each job task.","D. Submit a support ticket to Databricks to whitelist the internal package for PyPI mirroring.","E. Use a init script to clone the Git repository and run python setup.py install on cluster startup."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> The correct enterprise pattern for internal Python packages is: (1) build the package as a <code>.whl</code> (wheel) file using <code>python setup.py bdist_wheel</code> or <code>pip wheel</code>; (2) upload to a Unity Catalog Volume, DBFS, or workspace files; (3) install on clusters using the cluster libraries UI, or dynamically via <code>%pip install /path/to/package.whl</code> in a notebook. This is version-controlled (wheel filename includes version), reproducible, and works without internet access."
  },
  {section:"Testing & Deployment",
   text:"A data engineer uses assertDataFrameEqual to test a PySpark transformation. The test passes, but when run in production, the output column order is different from expected. Why did the test not catch this?",
   options:["A. assertDataFrameEqual compares schema and data but ignores column order by default — the checkRowOrder parameter only applies to row ordering, not column ordering.","B. assertDataFrameEqual does not compare schemas; it only checks data values.","C. Column order is non-deterministic in Spark and cannot be tested reliably.","D. The test environment used a different Spark version that coerces column order to alphabetical.","E. assertDataFrameEqual requires the DataFrames to be sorted before comparison; unsorted DataFrames always pass."],
   answer:"A",
   explanation:"<strong>Correct: A.</strong> <code>assertDataFrameEqual</code> (introduced in Spark 3.5 / Databricks Runtime 14+) by default checks that both DataFrames have the same schema and data, but with <code>checkRowOrder=False</code> it ignores row ordering. However, it may not catch column ordering differences depending on configuration. In practice, Spark DataFrames preserve column order based on how they're constructed, but transformations can reorder columns. Always explicitly select columns in the expected order in tests, or use <code>assertSchemaEqual</code> separately to validate schema structure."
  },
  // Section 8 – Data Governance
  {section:"Data Governance",
   text:"A data engineer wants to make a Delta table discoverable by adding business context. They run: COMMENT ON TABLE sales.orders IS 'Contains all customer orders since 2020. Owner: Revenue team.' Where is this metadata stored and how can it be queried?",
   options:["A. Stored in the table's Delta transaction log and queryable via DESCRIBE HISTORY.","B. Stored in Unity Catalog metastore and queryable via DESCRIBE TABLE EXTENDED or the Unity Catalog UI.","C. Stored in the DBFS _delta_log directory and readable as a JSON file.","D. Stored in the system.access.audit table as a metadata change event.","E. Stored only in memory for the current session and lost when the cluster terminates."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Table comments (and column comments) are metadata stored in the Unity Catalog metastore. They are viewable via <code>DESCRIBE TABLE EXTENDED table_name</code> (shows Comment field), the Unity Catalog UI (table details page), and the <code>information_schema.tables</code> view. This metadata makes tables discoverable in the Data Explorer and supports data cataloging initiatives without requiring separate tooling."
  },
  {section:"Data Governance",
   text:"A Unity Catalog metastore has the following hierarchy: Catalog 'prod' → Schema 'sales' → Table 'orders'. A user is granted USE CATALOG on 'prod' and SELECT on 'orders'. They try to query the table. What additional permission is REQUIRED?",
   options:["A. No additional permissions; USE CATALOG and SELECT on the table are sufficient.","B. USE SCHEMA on 'sales' — without it, the user cannot traverse to the table even with table-level SELECT.","C. READ FILES on the underlying cloud storage location.","D. CREATE on the schema 'sales' to allow read access.","E. USAGE on the metastore level."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Unity Catalog requires users to have <code>USE CATALOG</code> on the catalog AND <code>USE SCHEMA</code> on the schema in addition to the table-level privilege. This hierarchical traversal permission model means each level of the hierarchy must be explicitly granted. Without <code>USE SCHEMA</code> on 'sales', the user cannot access any objects within that schema, even if they have table-level SELECT. This is a common exam trap."
  },
  // Section 9 – Debugging
  {section:"Debugging & Deployment",
   text:"A Lakeflow Declarative Pipeline fails with the error: 'SCHEMA_MISMATCH: Column age expected INT but received STRING'. The pipeline reads from a bronze table. What is the MOST APPROPRIATE fix?",
   options:["A. Disable schema enforcement on the bronze table to allow mixed types.","B. Cast the age column to INT in the silver pipeline definition and add a data quality expectation to flag invalid values.","C. Change the bronze table schema to STRING to match the incoming data, accepting the mismatch.","D. Delete all records from the bronze table and re-ingest with corrected types.","E. Use PERMISSIVE mode in the pipeline to silently ignore schema mismatches."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Schema mismatches between bronze (raw) and silver (cleaned) are expected and should be handled in the transformation logic. The correct approach is to: (1) cast the column to the expected type in the silver table definition: <code>CAST(age AS INT)</code>; and (2) add a data quality expectation to handle rows where the cast fails (e.g., non-numeric strings): <code>CONSTRAINT valid_age EXPECT (age IS NOT NULL AND age > 0) ON VIOLATION DROP ROW</code>. Never loosen bronze schema constraints to accommodate silver needs."
  },
  {section:"Debugging & Deployment",
   text:"A Databricks job fails with an OutOfMemoryError on the driver. The job collects a large DataFrame to the driver using .collect(). What is the CORRECT remediation?",
   options:["A. Increase the number of worker nodes to distribute the data across more executors.","B. Increase the driver memory by selecting a larger driver node type or configuring spark.driver.memory.","C. Enable adaptive query execution (AQE) to automatically reduce the collected data size.","D. Use .limit(1000) before .collect() to prevent OOM errors.","E. Increase the executor memory; driver OOM is caused by executor overflow."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> The driver node is responsible for collecting data when <code>.collect()</code> is called — the entire result set is pulled from executors to the driver's JVM heap. If the result is too large, the driver runs out of memory. The fix is to either: (1) increase driver memory/node size; or (2) avoid collecting large DataFrames to the driver — instead write to Delta using <code>.write</code>, or use <code>.take(n)</code> for sampling. Adding workers (A) doesn't help because the bottleneck is the single driver node."
  },
  // Section 10 – Data Ingestion
  {section:"Data Ingestion",
   text:"A data engineer sets up Auto Loader to ingest files from an S3 bucket. New files arrive continuously. Auto Loader is configured with cloudFiles.useNotifications=true. What does this setting enable?",
   options:["A. Auto Loader sends Databricks notifications when ingestion completes.","B. Auto Loader uses cloud-native file event notifications (S3 Event Notifications + SQS) instead of directory listing to detect new files, reducing API calls and improving scalability.","C. Auto Loader notifies the source system when files have been successfully ingested.","D. Databricks sends email notifications to the data engineer when new files are detected.","E. Auto Loader uses Kafka notifications instead of cloud storage polling."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Auto Loader supports two file discovery modes: (1) <strong>Directory listing</strong> (default): periodically lists all files and identifies new ones — simple but expensive at scale. (2) <strong>File notification</strong> (<code>cloudFiles.useNotifications=true</code>): uses cloud-native event notifications (AWS S3 Events → SQS → Auto Loader) to receive real-time notifications when new files arrive, without listing the entire directory. This mode scales to millions of files and reduces cloud storage API costs significantly."
  },
  {section:"Data Ingestion",
   text:"A data engineer uses Auto Loader to ingest JSON files. Some files have schema evolution — new fields are added over time. Which Auto Loader option enables automatic schema detection and evolution without restarting the pipeline?",
   options:["A. cloudFiles.schemaEvolutionMode = 'addNewColumns'","B. cloudFiles.inferSchema = true with cloudFiles.schemaHints for known columns","C. Set mergeSchema = true on the Delta write operation","D. cloudFiles.schemaEvolutionMode = 'rescue' to capture unknown fields in a rescue column","E. Auto Loader automatically handles all schema evolution without any configuration"],
   answer:"A",
   explanation:"<strong>Correct: A.</strong> <code>cloudFiles.schemaEvolutionMode = 'addNewColumns'</code> tells Auto Loader to automatically add new columns to the schema when they are detected in incoming files. The pipeline does not need to restart — new columns are propagated to the downstream Delta table automatically. Other modes: <code>'rescue'</code> captures unexpected columns in a <code>_rescued_data</code> column rather than adding new columns. <code>'failOnNewColumns'</code> fails if unexpected columns arrive (strictest)."
  },
  {section:"Data Ingestion",
   text:"A data engineer needs to ingest data from a PostgreSQL database into a Databricks Delta table without moving data into the Lakehouse. Users should be able to query it using Unity Catalog. Which feature enables this?",
   options:["A. Delta Sharing with open protocol (D2O)","B. Lakehouse Federation with a foreign catalog pointing to the PostgreSQL database","C. Auto Loader configured with a JDBC source connection","D. Unity Catalog external tables pointing to PostgreSQL via JDBC","E. Structured Streaming with a JDBC source and Delta Lake sink"],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Lakehouse Federation allows you to register external databases (PostgreSQL, MySQL, Snowflake, etc.) as foreign catalogs in Unity Catalog. Users can then query the external data using familiar SQL syntax within Databricks, with Unity Catalog governing access — without physically moving the data into Delta Lake. Auto Loader (C) and Structured Streaming (E) would copy the data into Delta, which is not 'without moving data.'"
  },
  // Remaining questions to reach 60
  {section:"Delta Lake & Tooling",
   text:"A data engineer runs VACUUM on a Delta table with the default retention period. What is the default retention duration and what happens to files within that period?",
   options:["A. 7 days; files modified within 7 days are retained and cannot be deleted by VACUUM.","B. 30 days; all data files are retained for 30 days regardless of whether they are referenced.","C. 24 hours; files older than 24 hours are deleted to free storage immediately.","D. 7 days; only files referenced by the current table version are retained; unreferenced files older than 7 days are deleted.","E. No default; the engineer must always specify RETAIN N HOURS."],
   answer:"A",
   explanation:"<strong>Correct: A.</strong> The default Delta Lake VACUUM retention period is <strong>7 days (168 hours)</strong>. VACUUM deletes files that are no longer referenced by ANY version of the Delta table AND are older than the retention period. Files within the 7-day window are protected to support time travel queries and concurrent reads. Running VACUUM RETAIN 0 HOURS deletes all unreferenced files immediately (bypassing the safety check requires a config flag)."
  },
  {section:"Structured Streaming & CDF",
   text:"A streaming job processes events with an event_time column. Events can arrive up to 3 hours late. The engineer wants to group events by 1-hour windows and handle late data without accumulating state indefinitely. Which configuration is CORRECT?",
   options:["A. .groupBy(window('event_time', '1 hour')).agg(...) with no additional configuration; Spark handles late data automatically.","B. .withWatermark('event_time', '3 hours').groupBy(window('event_time', '1 hour')).agg(...) — the watermark tells Spark to wait 3 hours for late data before finalizing a window.","C. .withWatermark('event_time', '1 hour').groupBy(window('event_time', '3 hours')).agg(...) — match watermark to event arrival time and window to lateness.","D. Set spark.sql.streaming.stateStore.maxStateRetention=3h to automatically expire old state.","E. Use Trigger.Once() every hour to batch-process events and avoid state accumulation."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> <code>withWatermark('event_time', '3 hours')</code> tells Spark: 'the maximum expected delay is 3 hours.' Spark will wait up to 3 hours past the window end before finalizing results and dropping the state for that window. The groupBy uses the 1-hour window as the aggregation unit. This combination: (1) handles late data up to 3 hours; (2) prevents unbounded state accumulation by expiring window state after the watermark passes."
  },
  {section:"Data Modeling & Medallion",
   text:"A fact table is partitioned by order_date (daily). Data older than 2 years must be archived and deleted. Which approach MOST efficiently deletes old data?",
   options:["A. DELETE FROM orders WHERE order_date < '2022-01-01'; then VACUUM","B. Use partition elimination: ALTER TABLE orders DROP PARTITION (order_date < '2022-01-01')","C. Run OPTIMIZE on the old partitions to compact them before deletion.","D. Use a streaming job that reads the table and writes non-expired records to a new table.","E. Use MERGE INTO to overwrite old records with NULL values."],
   answer:"A",
   explanation:"<strong>Correct: A.</strong> In Delta Lake, the most efficient deletion of old partitioned data is: (1) <code>DELETE FROM orders WHERE order_date < '2022-01-01'</code> — Delta records this as a deletion operation, using partition pruning to only touch the relevant files; (2) <code>VACUUM</code> to physically remove the now-unreferenced old partition files. Note: Delta Lake does not support DROP PARTITION like Hive; deletions are done via DELETE + VACUUM. If Deletion Vectors are enabled, the DELETE is even faster."
  },
  {section:"Performance Optimization",
   text:"What does the spark.sql.adaptive.coalescePartitions.enabled setting do when set to true?",
   options:["A. It automatically combines small result partitions after a shuffle into fewer, larger partitions to reduce overhead.","B. It enables automatic partition discovery for Delta tables without running MSCK REPAIR TABLE.","C. It converts all sort-merge joins to broadcast joins when one table is below a size threshold.","D. It automatically splits large partitions into smaller ones to improve parallelism.","E. It disables shuffle and uses map-side combining for all aggregations."],
   answer:"A",
   explanation:"<strong>Correct: A.</strong> <code>spark.sql.adaptive.coalescePartitions.enabled=true</code> is part of Adaptive Query Execution (AQE). After a shuffle, Spark may have many small result partitions (e.g., if <code>spark.sql.shuffle.partitions=200</code> but the actual data is small). AQE automatically combines adjacent small partitions into fewer, larger partitions post-shuffle, reducing task overhead and improving performance. This eliminates the need to manually tune <code>shuffle.partitions</code> in many cases."
  },
  {section:"Testing & Deployment",
   text:"A data engineer runs the Databricks CLI command: databricks jobs list. What prerequisite configuration must be completed first?",
   options:["A. The engineer must have Owner permission on at least one job.","B. The CLI must be authenticated with a Databricks personal access token (PAT) or OAuth, and the workspace URL must be configured.","C. The DATABRICKS_HOST and DATABRICKS_TOKEN environment variables must be set in the Databricks workspace admin console.","D. The CLI requires a running cluster to execute commands against.","E. The CLI must be run from a Databricks notebook environment."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Before using the Databricks CLI, you must configure authentication. This is done via <code>databricks configure</code> which prompts for the workspace URL and a personal access token (PAT), or via OAuth. The credentials are stored in <code>~/.databrickscfg</code>. Alternatively, environment variables <code>DATABRICKS_HOST</code> and <code>DATABRICKS_TOKEN</code> can be set. No running cluster is needed for job management commands — these hit the REST API directly."
  },
  {section:"Security & Governance",
   text:"A data engineer needs to ensure that the email column in a table returns '***@***.com' for all users EXCEPT those in the 'data_science' group. Which Unity Catalog object implements this?",
   options:["A. A row filter function applied to the email column","B. A column mask function that uses IS_MEMBER('data_science') to conditionally return real or masked values","C. An ACL that grants SELECT on email only to the data_science group","D. A dynamic view that uses CASE WHEN CURRENT_USER() IN (SELECT user FROM data_science_users) THEN email ELSE '***@***.com' END","E. A tag applied to the email column marking it as PII, which automatically triggers masking"],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Unity Catalog column masks are SQL functions that receive the actual column value and return either the real value or a masked version. The function uses <code>IS_MEMBER('data_science')</code> to check group membership: <code>CASE WHEN IS_MEMBER('data_science') THEN email ELSE regexp_replace(email, '.+@', '***@') END</code>. This is transparent to the user and centrally managed. Option D (dynamic view) also works but is a legacy approach; column masks are the Unity Catalog-native solution."
  },
  {section:"Data Modeling & Medallion",
   text:"A data engineer implements an insert-only MERGE to deduplicate records in a silver table. The source batch may contain duplicates within itself AND against the target table. What is the CORRECT MERGE syntax?",
   options:["A. MERGE INTO silver USING source ON silver.id = source.id WHEN NOT MATCHED THEN INSERT *","B. MERGE INTO silver USING (SELECT DISTINCT * FROM source) ON silver.id = source.id WHEN MATCHED THEN UPDATE SET * WHEN NOT MATCHED THEN INSERT *","C. MERGE INTO silver USING (SELECT * FROM source GROUP BY id HAVING COUNT(*)=1) ON silver.id = source.id WHEN NOT MATCHED THEN INSERT *","D. MERGE INTO silver USING source ON silver.id = source.id WHEN NOT MATCHED THEN INSERT * ; DELETE FROM silver WHERE id IN (SELECT id FROM source WHERE duplicate=true)","E. INSERT INTO silver SELECT * FROM source WHERE id NOT IN (SELECT id FROM silver)"],
   answer:"A",
   explanation:"<strong>Correct: A.</strong> An insert-only MERGE handles deduplication against the target table: <code>WHEN NOT MATCHED THEN INSERT *</code> means 'only insert rows from source that don't already exist in the target (based on the ON condition).' To also deduplicate within the source batch, pre-deduplicate the source: <code>MERGE INTO silver USING (SELECT * FROM source QUALIFY ROW_NUMBER() OVER (PARTITION BY id ORDER BY timestamp DESC) = 1) ...</code>. Option A is the canonical insert-only MERGE pattern."
  },
  {section:"Data Ingestion",
   text:"A data engineer configures a Lakeflow Declarative Pipeline to ingest from a Kafka topic. Which table type should be used for the Kafka source in Lakeflow?",
   options:["A. Materialized View, because Kafka topics are continuously updated","B. Streaming Table, because Kafka is an unbounded streaming source and requires append-only processing","C. Live Table (batch), because Lakeflow processes Kafka in micro-batches","D. External Table registered in Unity Catalog pointing to the Kafka topic","E. Temporary View created fresh on each pipeline trigger"],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> In Lakeflow Declarative Pipelines, <strong>Streaming Tables</strong> are used for unbounded streaming sources like Kafka, Auto Loader (cloud files), or Delta table streams. They support append-only processing with stateful incremental computation. <strong>Materialized Views</strong> are for batch computations that can be fully recomputed (like aggregations over complete datasets). Kafka, as an infinite stream, must use a Streaming Table."
  },
  {section:"Performance Optimization",
   text:"A data engineer notices that a large join in their pipeline takes 45 minutes. They enable AQE. After enabling AQE, the same join takes 8 minutes. Which AQE feature MOST LIKELY caused this improvement for a join between a 500GB table and a 50MB table?",
   options:["A. AQE coalesced many small shuffle partitions into fewer larger ones.","B. AQE dynamically converted the sort-merge join to a broadcast join after detecting the 50MB table size at runtime.","C. AQE added more executors dynamically to handle the larger table.","D. AQE applied predicate pushdown to filter the 500GB table before the join.","E. AQE rewrote the join as a hash join using the transaction log statistics."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> AQE's <strong>Dynamic Join Strategy Switching</strong> is the most impactful feature here. Before the join, Spark may not know the exact size of the 50MB table (e.g., if it's the result of a previous stage). At runtime, after the 50MB table's shuffle is complete, AQE can detect that it fits within the broadcast threshold and dynamically convert the expensive sort-merge join (which requires shuffling both tables) to a broadcast hash join (which broadcasts only the small table). This eliminates the 500GB shuffle."
  },
  {section:"Delta Lake & Tooling",
   text:"A data engineer wants to create an external Delta table in Unity Catalog. The data files are stored in s3://my-bucket/data/orders/. Which statement CORRECTLY creates an external table?",
