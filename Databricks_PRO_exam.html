   options:["A. CREATE TABLE catalog.schema.orders USING DELTA LOCATION 's3://my-bucket/data/orders/'","B. CREATE EXTERNAL TABLE catalog.schema.orders USING DELTA LOCATION 's3://my-bucket/data/orders/'","C. CREATE TABLE catalog.schema.orders USING DELTA EXTERNAL 's3://my-bucket/data/orders/'","D. CREATE TABLE catalog.schema.orders LOCATION 's3://my-bucket/data/orders/' TYPE EXTERNAL","E. Both A and B are correct; the EXTERNAL keyword is optional when LOCATION is specified."],
   answer:"A",
   explanation:"<strong>Correct: A (and effectively E).</strong> In Databricks/Delta Lake, specifying <code>LOCATION</code> in a CREATE TABLE statement automatically makes it an external table — the EXTERNAL keyword is optional. Both A and B produce an external Delta table. The key difference from a managed table: dropping an external table removes the metadata from Unity Catalog but does NOT delete the underlying data files at the LOCATION path. This is a common exam trick — EXTERNAL is redundant but not wrong."
  },
  {section:"Data Modeling & Medallion",
   text:"A data engineer designs a gold layer table for a finance dashboard. The table pre-aggregates monthly revenue by product category. Data in the silver layer updates frequently. Which Lakeflow object type is MOST appropriate for the gold table?",
   options:["A. Streaming Table — to continuously update as silver data changes","B. Materialized View — automatically recomputes aggregations when upstream data changes","C. Live Table — runs a full recomputation on every pipeline trigger","D. External Table — stores pre-computed results in a separate S3 bucket","E. Temporary View — computes on-demand without persisting results"],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> A <strong>Materialized View</strong> in Lakeflow is ideal for pre-aggregated gold tables. It automatically tracks changes in upstream tables and recomputes only the affected aggregations (incrementally where possible). Unlike Streaming Tables, Materialized Views support aggregations, joins, and complex transformations over complete datasets. They are the Lakeflow equivalent of a materialized view in traditional databases — precomputed, persisted, and automatically refreshed."
  },
  {section:"Monitoring & Alerting",
   text:"A data engineer wants to identify which users accessed a specific Delta table in the past 30 days. Which system table provides this information?",
   options:["A. system.billing.usage filtered by table_name","B. system.access.audit filtered by request_params.table_name","C. system.lakeflow.pipeline_events filtered by entity_name","D. information_schema.table_privileges","E. system.compute.clusters filtered by creator_user_name"],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> <code>system.access.audit</code> (Unity Catalog audit logs) records all data access events including who accessed which table, when, and what operation was performed. Filtering by <code>request_params</code> containing the table name gives a complete access history. This is the primary table for governance auditing, access pattern analysis, and compliance reporting in Databricks."
  },
  {section:"Testing & Deployment",
   text:"A data engineer wants to configure a Databricks Workflow job to send a Slack notification when a task fails. Which approach is SUPPORTED natively in Databricks Workflows?",
   options:["A. Add a Python task at the end of the job that calls the Slack API using a library.","B. Configure a webhook destination in Databricks notification settings and attach it to the job's 'on failure' notification.","C. Use a job cluster init script that sends a Slack message on cluster termination.","D. Configure a SQL Alert to monitor the job status table and trigger a Slack webhook.","E. Databricks Workflows does not natively support Slack; only email notifications are supported."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Databricks Workflows supports native notification destinations including email, Slack (via webhook), PagerDuty, and Microsoft Teams. You configure a notification destination in the workspace settings (or via REST API) and then attach it to job-level or task-level notification triggers (on_start, on_success, on_failure, on_duration_warning_threshold_exceeded). This is the clean, native approach without needing custom code."
  },
  {section:"Data Governance",
   text:"A Unity Catalog table has tags applied: {'classification': 'PII', 'team': 'marketing'}. Which statement about Unity Catalog tags is TRUE?",
   options:["A. Tags automatically enforce data masking on tagged columns.","B. Tags trigger automatic GDPR compliance workflows in Databricks.","C. Tags are metadata labels used for discovery, search, and governance — they do not automatically enforce any access controls.","D. Tags are used by the Databricks optimizer to skip tagged columns during scans.","E. Tags restrict which users can SELECT from the table based on their tag permissions."],
   answer:"C",
   explanation:"<strong>Correct: C.</strong> Unity Catalog tags (key-value metadata labels) are purely descriptive — they make data discoverable and searchable in the catalog, support governance workflows by tagging sensitive data, and can be used in monitoring/auditing queries. However, they do NOT automatically enforce access controls, masking, or compliance policies. To enforce controls on PII-tagged columns, you must separately configure column masks or row filters. Tags are the 'label'; enforcement requires separate policy objects."
  },
  {section:"Delta Lake & Tooling",
   text:"A Delta table has Optimistic Concurrency Control (OCC). Two transactions run simultaneously: Transaction A reads version 5 and tries to write version 6 (UPDATE on column x). Transaction B also reads version 5 and tries to write version 6 (UPDATE on column y). Do these transactions conflict?",
   options:["A. Yes — any two simultaneous write transactions always conflict in Delta Lake.","B. No — Delta Lake detects that transactions A and B modified different columns and allows both to commit without conflict.","C. Yes — they conflict because both read the same version (5) and tried to write the same version (6).","D. No — Delta Lake uses MVCC; both transactions commit independently to their own version branches.","E. It depends on whether the rows modified by A and B overlap; column-level isolation is not supported."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Delta Lake's OCC evaluates conflicts at the file and partition level, not the version number level. If Transaction A modifies files in partition X (column x) and Transaction B modifies files in partition Y (column y), and there is no file overlap, Delta allows both to commit — one at version 6, the other at version 7. A conflict occurs only when two transactions try to modify the same files. This is how Delta achieves high concurrency without pessimistic locking."
  },
  {section:"Structured Streaming & CDF",
   text:"A data engineer needs to leverage CDF to propagate deletes from a silver table to a downstream gold aggregation table. Why is this particularly challenging without CDF?",
   options:["A. Without CDF, DELETE operations are not recorded in the Delta transaction log.","B. Standard Structured Streaming only delivers new rows (inserts); DELETE operations in the source are not visible as changes to the stream.","C. Gold tables cannot be updated using MERGE; only inserts are supported.","D. CDF is required to decrypt the deleted rows' encryption before they can be propagated.","E. Without CDF, VACUUM immediately removes deleted rows, making them inaccessible."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Standard Structured Streaming on a Delta table reads new data files as they are appended. A DELETE operation in the source does NOT produce new rows — it marks existing rows as deleted. The streaming query has no visibility into these deletions. CDF solves this by emitting delete records (with <code>_change_type = 'delete'</code>) as actual rows in the change stream. The downstream pipeline can then receive and process these delete events to remove or adjust aggregations in the gold table."
  },
  {section:"Testing & Deployment",
   text:"A data engineer uses Git Folders in Databricks to manage notebook code. They push a change to the main branch in GitHub. How does this change get reflected in the Databricks workspace?",
   options:["A. Databricks automatically pulls changes from Git every 5 minutes via a background sync process.","B. The engineer must manually pull the latest changes in the Git Folder UI, or a CI/CD pipeline triggers the pull via the REST API.","C. Git Folders use webhooks to automatically trigger a notebook re-execution on every commit.","D. The Databricks CLI automatically syncs changes when databricks sync is run on the local machine.","E. Changes are automatically reflected because Git Folders store notebooks directly in the GitHub repository."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> Databricks Git Folders (Repos) do NOT automatically sync on every Git push. The engineer must manually pull changes in the workspace UI (or via REST API: <code>POST /api/2.0/repos/{repo_id}</code> with <code>'branch': 'main'</code>). In CI/CD pipelines, the pull step is automated as part of the deployment workflow — the CI system calls the Repos API after a successful build to update the workspace. Databricks Asset Bundles (DABs) are a more modern alternative for automated deployments."
  },
  {section:"Data Ingestion",
   text:"A data engineer uses Auto Loader in a Lakeflow pipeline to ingest CSV files from a cloud storage path. The schema inference is enabled. After 3 months, a new CSV file arrives with an additional column not seen before. With cloudFiles.schemaEvolutionMode='addNewColumns', what happens?",
   options:["A. The pipeline fails with a schema mismatch error and must be manually restarted.","B. The new column is automatically added to the target streaming table schema; existing rows have NULL for the new column.","C. The new column is captured in the _rescued_data column without modifying the table schema.","D. Auto Loader ignores the new column and continues processing without any schema changes.","E. The pipeline pauses and sends a notification to the engineer requesting schema approval."],
   answer:"B",
   explanation:"<strong>Correct: B.</strong> With <code>schemaEvolutionMode='addNewColumns'</code>, Auto Loader automatically detects new columns and evolves the schema by adding them to the target table. Historical rows (ingested before the new column existed) will have NULL for that column, and new rows will have the actual value. The pipeline does NOT need to be restarted. This is the recommended mode for most production pipelines where source schemas evolve over time."
  }
  ]
},
// EXAM 2
{
  title: "Practice Exam 2",
  focus: "Unity Catalog, DLT, Performance, CI/CD",
  questions: [
  {section:"Lakeflow Declarative Pipelines",text:"In Lakeflow Declarative Pipelines, what is the key difference between a Streaming Table and a Materialized View?",options:["A. Streaming Tables support SQL only; Materialized Views support Python only.","B. Streaming Tables process data incrementally from append-only sources; Materialized Views recompute results (fully or partially) from any upstream change.","C. Streaming Tables are persisted to Delta Lake; Materialized Views are stored only in memory.","D. Streaming Tables require a dedicated streaming cluster; Materialized Views run on standard clusters.","E. Streaming Tables cannot be queried by external tools; Materialized Views are externally accessible."],answer:"B",explanation:"<strong>Correct: B.</strong> The core distinction: <strong>Streaming Tables</strong> consume data from unbounded, append-only sources (Kafka, Auto Loader, Delta stream) and process it incrementally — each micro-batch only processes new records. <strong>Materialized Views</strong> define a result set that Lakeflow automatically keeps current when upstream data changes. They can aggregate, join, and transform — and Lakeflow determines whether full or incremental recomputation is needed. Streaming Tables are 'push' from source; MVs are 'pull' from upstream tables."},
  {section:"Lakeflow Declarative Pipelines",text:"A Lakeflow pipeline has the expectation: CONSTRAINT valid_price EXPECT (price > 0) ON VIOLATION FAIL UPDATE. What happens when a record with price = -5 arrives?",options:["A. The record is silently dropped from the output table.","B. The record is written to a quarantine table automatically created by Lakeflow.","C. The ENTIRE pipeline update fails and no records from that batch are written.","D. The record is written with price set to NULL, and a warning is logged.","E. The record is held in the streaming state store until price is corrected."],answer:"C",explanation:"<strong>Correct: C.</strong> Lakeflow has three expectation violation modes: (1) <code>EXPECT</code> (warn only — records pass through, violations logged); (2) <code>EXPECT ... ON VIOLATION DROP ROW</code> (drop bad rows, continue processing); (3) <code>EXPECT ... ON VIOLATION FAIL UPDATE</code> (the entire pipeline update fails if any row violates the constraint). FAIL UPDATE is the strictest mode — used when data quality is absolutely critical and partial results are unacceptable."},
  {section:"Lakeflow Declarative Pipelines",text:"A data engineer uses APPLY CHANGES INTO in a Lakeflow pipeline to process CDC data from a source system. The source sends INSERT, UPDATE, and DELETE operations. Which statement about APPLY CHANGES INTO is TRUE?",options:["A. APPLY CHANGES INTO creates a Streaming Table that reflects the current state of the source, automatically applying inserts, updates, and deletes.","B. APPLY CHANGES INTO creates a Materialized View that recomputes the full CDC history on every pipeline run.","C. APPLY CHANGES INTO requires manual MERGE statements to apply each change type.","D. APPLY CHANGES INTO only supports INSERT and UPDATE; DELETE operations require a separate MERGE.","E. APPLY CHANGES INTO stores all CDC records including historical changes for audit purposes."],answer:"A",explanation:"<strong>Correct: A.</strong> <code>APPLY CHANGES INTO</code> is Lakeflow's declarative CDC API. You define the target table, the keys, and the change type column — Lakeflow handles the MERGE logic to apply INSERTs, UPDATEs, and DELETEs automatically. The result is a Streaming Table that reflects the current state of the source system. It eliminates the need to manually write complex MERGE statements for CDC pipelines and supports SCD Type 1 and Type 2 natively."},
  {section:"Lakeflow Declarative Pipelines",text:"A Lakeflow pipeline runs in Continuous mode. What is the PRIMARY difference compared to Triggered mode?",options:["A. Continuous mode uses a dedicated always-on cluster; Triggered mode starts a new cluster for each run.","B. Continuous mode processes data with very low latency as soon as it arrives; Triggered mode processes all available data at a scheduled interval and stops.","C. Continuous mode supports only SQL; Triggered mode supports both SQL and Python.","D. Continuous mode automatically scales to zero when there is no data; Triggered mode maintains minimum nodes.","E. Continuous mode requires Enterprise tier; Triggered mode is available on all tiers."],answer:"B",explanation:"<strong>Correct: B.</strong> Lakeflow pipeline modes: <strong>Triggered</strong> — processes all available data, completes, and stops the cluster (good for scheduled batch-style runs with cost efficiency). <strong>Continuous</strong> — keeps the pipeline running permanently, processing new data with very low latency (seconds) as it arrives (good for near-real-time use cases). Continuous mode has higher cost because the cluster runs 24/7, but provides much lower latency than Triggered mode."},
  {section:"Unity Catalog",text:"A Unity Catalog metastore is configured for a Databricks workspace. A data engineer creates a table using CREATE TABLE my_table (id INT) without specifying a catalog or schema. Where is the table created?",options:["A. In the 'default' catalog and 'default' schema of the Unity Catalog metastore.","B. In the current session's active catalog and schema, as set by USE CATALOG and USE SCHEMA.","C. In the Hive Metastore if Unity Catalog is enabled, or in Unity Catalog if Hive is disabled.","D. In the user's personal catalog (named after their username) under the 'default' schema.","E. The statement fails because Unity Catalog requires fully qualified three-part names."],answer:"B",explanation:"<strong>Correct: B.</strong> In a Unity Catalog workspace, tables are created in the current session's active catalog and schema, which can be set using <code>USE CATALOG catalog_name</code> and <code>USE SCHEMA schema_name</code>. If not explicitly set, the default catalog is typically 'main' (or whatever is configured as the default for the workspace), and the default schema is 'default'. Best practice is always to use fully qualified three-part names (<code>catalog.schema.table</code>) to avoid ambiguity."},
  {section:"Unity Catalog",text:"A workspace admin wants to grant a service principal the ability to run jobs but NOT access any data tables. Which privilege set is CORRECT?",options:["A. Grant CAN_MANAGE on the workspace and READ on all catalogs.","B. Grant CAN_RUN on specific jobs in Databricks Workflows; no catalog privileges needed for job execution metadata.","C. Grant USE CATALOG and USE SCHEMA on all catalogs and schemas; job execution requires catalog traversal.","D. Grant CREATE CLUSTER and CAN_ATTACH_TO on all clusters to allow job execution.","E. Grant the service principal the 'Data Engineer' workspace role which includes job execution rights."],answer:"B",explanation:"<strong>Correct: B.</strong> Job-level permissions (CAN_VIEW, CAN_MANAGE_RUN, CAN_MANAGE, IS_OWNER) in Databricks Workflows control who can trigger, view, and manage jobs — independently of data access. A service principal with CAN_RUN on a job can trigger runs without needing table-level Unity Catalog privileges. Data access within the job is governed by the job's run-as identity (service principal) and its Unity Catalog grants — these are separate from the ability to trigger the job."},
  {section:"Unity Catalog",text:"What happens to data files when a MANAGED table in Unity Catalog is dropped?",options:["A. The table metadata is removed from Unity Catalog but data files remain in cloud storage for 30 days.","B. Both the Unity Catalog metadata and the underlying data files in the managed location are permanently deleted.","C. The table is moved to a Trash folder in Unity Catalog and can be recovered within 7 days.","D. The data files are moved to the external location and the table is converted to an external table.","E. Only the schema metadata is dropped; data files require a separate VACUUM command to delete."],answer:"B",explanation:"<strong>Correct: B.</strong> Unity Catalog managed tables store data in a Databricks-managed location (Unity Catalog managed storage). When you DROP a managed table, Unity Catalog deletes BOTH the metadata (table definition) AND the underlying data files. This is the key difference from external tables: dropping an external table removes only the metadata; the data files at the LOCATION remain untouched. Choose managed vs external tables based on whether you want Databricks to own the data lifecycle."},
  {section:"Delta Lake & Tooling",text:"A data engineer runs: ALTER TABLE orders CLUSTER BY (customer_id, order_date). The table currently has 500 million rows in 10,000 files. What happens IMMEDIATELY after this command?",options:["A. All 10,000 files are immediately rewritten and reorganized by customer_id and order_date.","B. The clustering configuration is recorded in the table metadata, but no data files are rewritten until OPTIMIZE is run.","C. A background job is triggered to incrementally re-cluster the data over the next 24 hours.","D. The command fails because clustering cannot be changed on a table with existing data.","E. The first 1,000 files are clustered immediately; remaining files are queued for background processing."],answer:"B",explanation:"<strong>Correct: B.</strong> <code>ALTER TABLE ... CLUSTER BY</code> changes the clustering specification stored in the table's Delta metadata. It does NOT immediately rewrite any data files. This is a key advantage of Liquid Clustering — you can change the clustering strategy without any immediate cost or disruption. The actual re-clustering of data happens incrementally during subsequent <code>OPTIMIZE</code> runs — only new or recently modified files are clustered, not the entire table at once."},
  {section:"Performance Optimization",text:"A data engineer needs to write a Spark DataFrame to disk and wants to control output file sizes to be approximately 128MB per file. Which approach achieves this?",options:["A. df.repartition(n).write.format('delta').save(path) where n is calculated as total_size/128MB","B. Set spark.sql.files.maxRecordsPerFile = 1000000 to limit rows per file","C. Use df.write.option('maxFileSize', '134217728').format('delta').save(path)","D. Enable AUTO OPTIMIZE on the Delta table which automatically targets 128MB files","E. Both A and D are valid approaches; A gives immediate control, D is automatic"],answer:"A",explanation:"<strong>Correct: A.</strong> To manually control file sizes when writing a DataFrame to Delta, calculate the desired number of partitions: <code>n = ceil(total_data_size_bytes / 128MB)</code>, then call <code>df.repartition(n).write...</code>. Each partition becomes one output file. This gives precise control. Option D (Auto Optimize) is also useful but adjusts file sizes reactively during OPTIMIZE runs, not at write time. For exam questions about 'manually controlling file size at write time,' repartitioning is the answer."},
  {section:"Performance Optimization",text:"A Spark job has a sort-merge join between two large tables. The join key is user_id, which has high cardinality but very skewed distribution (10% of users account for 80% of rows). AQE is enabled. Which AQE feature will automatically handle this skew?",options:["A. AQE Dynamic Partition Coalescing — combines small partitions after the shuffle","B. AQE Dynamic Join Strategy Switching — converts to broadcast join","C. AQE Skew Join Optimization — detects skewed partitions and splits them into smaller sub-partitions","D. AQE Predicate Pushdown — filters skewed user_ids before the join","E. AQE does not handle skew; the engineer must manually salt the join key"],answer:"C",explanation:"<strong>Correct: C.</strong> AQE's <strong>Skew Join Optimization</strong> (<code>spark.sql.adaptive.skewJoin.enabled=true</code>) detects partitions that are significantly larger than the median partition size (configurable threshold). It automatically splits these skewed partitions into multiple smaller sub-partitions and replicates the corresponding partitions from the other table to join against each sub-partition. This eliminates the stragglers caused by hot keys without manual salting."},
  {section:"Data Processing",text:"A data engineer uses coalesce(1) before writing a DataFrame to produce a single output file. What is the MAIN disadvantage of this approach for large DataFrames?",options:["A. coalesce(1) is not supported for Delta format; use repartition(1) instead.","B. coalesce(1) forces all data to be collected on a single executor, creating a bottleneck and losing parallelism for the write operation.","C. coalesce(1) doubles the shuffle overhead because all data is shuffled twice.","D. coalesce(1) is only valid for streaming DataFrames; batch DataFrames require repartition(1).","E. coalesce(1) creates files without a Parquet schema, making them incompatible with Delta Lake."],answer:"B",explanation:"<strong>Correct: B.</strong> <code>coalesce(n)</code> reduces partitions with minimal shuffling — it merges partitions locally. With <code>coalesce(1)</code>, all data must flow through a single executor to write a single file. For large DataFrames, this becomes a severe bottleneck: that executor must process all data serially, losing all parallelism. Memory pressure on that executor also increases. For large data, prefer writing multiple files (repartition to desired count) or let Delta/Auto Optimize handle file compaction."},
  {section:"Data Processing",text:"A data engineer needs to update records in a large Delta table. The update affects approximately 0.1% of rows. Which operation is MORE efficient — UPDATE or MERGE?",options:["A. UPDATE is always more efficient than MERGE for single-table operations.","B. MERGE is more efficient because it can target specific files using partition pruning on the match condition.","C. Both are equally efficient for Delta tables; the optimizer chooses the same execution plan.","D. UPDATE with deletion vectors enabled is more efficient because it avoids full file rewrites.","E. MERGE is less efficient because it always performs a full table scan to find matching rows."],answer:"D",explanation:"<strong>Correct: D.</strong> With <strong>Deletion Vectors</strong> enabled, an UPDATE operation only writes a DV file marking the old row as deleted and writes a new row to a new file — no full file rewrite required. This makes UPDATE extremely efficient for small percentages of rows. Without DVs, both UPDATE and MERGE must rewrite all files containing matching rows. DVs represent the most significant DML performance improvement in recent Delta Lake versions."},
  {section:"Security & Governance",text:"A data engineer needs to implement data masking for HIPAA compliance. The patient_dob (date of birth) column should show the year only (e.g., '1985' instead of '1985-03-22') for users without PHI access. Which transformation achieves proper generalization?",options:["A. HASH(patient_dob) — one-way hash of the date","B. YEAR(patient_dob) — extracts only the year component","C. DATE_TRUNC('year', patient_dob) — truncates to the first day of the year","D. REGEXP_REPLACE(patient_dob, '-[0-9]{2}-[0-9]{2}', '') — removes month and day","E. NULLIF(patient_dob, patient_dob) — replaces with NULL"],answer:"B",explanation:"<strong>Correct: B.</strong> <strong>Generalization</strong> reduces data precision to a less specific value while preserving utility. Replacing a full birthdate with just the year is a classic generalization technique — it's still useful for age-range analysis but removes the specificity needed to identify individuals. <code>YEAR(patient_dob)</code> extracts the integer year. This is implemented in a Unity Catalog column mask: users without PHI access see only the year; PHI users see the full date."},
  {section:"Monitoring & Alerting",text:"A streaming job processes IoT sensor data. The data engineer notices the processing time per batch is increasing trend over days, eventually approaching the trigger interval. What should the engineer check FIRST?",options:["A. Whether the cluster auto-scaler is removing nodes during processing.","B. Whether the state store is growing unboundedly — state accumulation from streaming aggregations without watermarks or TTL.","C. Whether the Delta sink has too many small files causing slow writes.","D. Whether the source Kafka topic has increased in partition count.","E. Whether the cluster's garbage collection logs show increasing GC pauses."],answer:"B",explanation:"<strong>Correct: B.</strong> Unbounded state growth is the most common cause of gradual performance degradation in streaming jobs. If streaming aggregations (e.g., groupBy, dropDuplicates) are defined without watermarks or state TTL, Spark must maintain state for every key it has ever seen. As the state grows, each micro-batch takes longer to process (more state to check/update/checkpoint). The fix: add <code>withWatermark()</code> to allow state expiration, or configure <code>spark.sql.streaming.statefulOperator.stateRebalancing.enabled=true</code>."},
  {section:"CI/CD & Deployment",text:"A data engineer uses Databricks Asset Bundles. The databricks.yml has three targets: dev, staging, prod. The prod target uses a different job cluster with 8 workers and a specific cluster policy. How should this be structured in the YAML?",options:["A. Create three separate databricks.yml files, one per environment.","B. Define the base job in the resources section and use the targets section to override cluster configuration per environment.","C. Use Jinja templating to dynamically generate the YAML before deployment.","D. The cluster configuration cannot be overridden per target; use the same cluster for all environments.","E. Define variables in the YAML and pass them as environment-specific --var flags during the bundle deploy command."],answer:"B",explanation:"<strong>Correct: B.</strong> DABs use a single <code>databricks.yml</code> with a <code>targets</code> section to define environment-specific overrides. The base resource definitions (jobs, pipelines) are defined once, and the <code>targets.prod</code> section overrides specific fields like cluster size, instance type, cluster policy, service principal, or job parameters. This keeps configuration DRY (Don't Repeat Yourself) and makes environment differences explicit and reviewable."},
  {section:"CI/CD & Deployment",text:"A data engineer runs: databricks bundle deploy --target prod. What does this command do?",options:["A. Deploys only changed resources by comparing local YAML with the remote workspace state.","B. Deploys all resources defined in the bundle's resources section to the prod workspace target, creating or updating jobs, pipelines, and other objects.","C. Runs all jobs defined in the bundle immediately after deploying them.","D. Validates the YAML syntax only and reports errors without making any changes.","E. Packages the bundle as a ZIP file and uploads it to the prod cluster's DBFS."],answer:"B",explanation:"<strong>Correct: B.</strong> <code>databricks bundle deploy --target prod</code> deploys (creates or updates) all Databricks resources defined in the bundle (jobs, pipelines, clusters, etc.) to the workspace configured in the <code>prod</code> target. It does NOT run the jobs — deployment and execution are separate steps. To run a job after deploying: <code>databricks bundle run --target prod job_name</code>. The deploy step is idempotent — re-running it updates existing resources rather than creating duplicates."},
  {section:"Delta Lake & Tooling",text:"A data engineer needs to revert a Delta table to the state it was in 2 hours ago due to a bad data load. Which command achieves this?",options:["A. RESTORE TABLE orders TO TIMESTAMP AS OF (current_timestamp() - INTERVAL 2 HOURS)","B. DELETE FROM orders WHERE load_timestamp > current_timestamp() - INTERVAL 2 HOURS","C. ALTER TABLE orders SET TBLPROPERTIES ('delta.minReaderVersion'='restore')","D. VACUUM orders RETAIN 2 HOURS — this restores the table to the 2-hour-old state","E. CREATE OR REPLACE TABLE orders AS SELECT * FROM orders VERSION AS OF 10"],answer:"A",explanation:"<strong>Correct: A.</strong> Delta Lake's <code>RESTORE TABLE</code> command reverts a table to a prior state: <code>RESTORE TABLE orders TO TIMESTAMP AS OF 'timestamp'</code> or <code>TO VERSION AS OF version_number</code>. The restore is recorded as a new transaction in the Delta log (it doesn't delete history). This is the correct and official way to undo a bad data load. Note: the files for the target version must still exist (not yet vacuumed)."},
  {section:"Data Modeling & Medallion",text:"A data engineer designs a bronze table to ingest from 5 Kafka topics simultaneously into a single table. What columns are ESSENTIAL for a multiplex bronze table design?",options:["A. id, payload, created_at","B. topic (source identifier), payload (raw data as string/bytes), ingest_time (arrival timestamp), partition, offset","C. schema_version, topic, data, checksum, partition_key","D. source_system, record_type, json_payload, batch_id","E. table_name, database_name, operation_type, before_image, after_image"],answer:"B",explanation:"<strong>Correct: B.</strong> A multiplex bronze table for Kafka ingestion must capture: (1) <strong>topic</strong> — identifies which source/schema this record belongs to; (2) <strong>payload/value</strong> — the raw message content (typically as STRING or BINARY); (3) <strong>ingest_time/timestamp</strong> — when the record arrived; (4) <strong>partition + offset</strong> — Kafka coordinates for exactly-once guarantees and replay capability. Topic is critical for the downstream silver layer to correctly route and parse each record type."},
  {section:"Data Processing",text:"A data engineer needs to read data from a Delta table where only records updated since the last pipeline run should be processed. The table has CDF enabled. The last processed version was 42. Which code is CORRECT?",options:["A. spark.readStream.format('delta').option('startingVersion', 42).load(path)","B. spark.read.format('delta').option('readChangeFeed', 'true').option('startingVersion', 43).load(path)","C. spark.read.format('delta').option('readChangeFeed', 'true').option('startingVersion', 42).load(path)","D. spark.read.format('delta').option('versionAsOf', 42).load(path)","E. spark.readStream.format('delta').option('readChangeFeed', 'true').option('startingVersion', 42).load(path)"],answer:"B",explanation:"<strong>Correct: B.</strong> To read CDF changes since (but not including) the last processed version 42, use <code>startingVersion: 43</code> to start from the NEXT version. <code>startingVersion: 42</code> would re-include changes from version 42, causing duplicate processing. The CDF batch read uses <code>spark.read</code> (not <code>readStream</code>) with <code>readChangeFeed=true</code>. This gives you all change records (insert/update/delete) between version 43 and the latest version."},
  {section:"Security & Governance",text:"A company needs to audit all SELECT queries made against tables in the 'finance' catalog in the past 7 days. Which query against system tables retrieves this?",options:["A. SELECT * FROM system.billing.usage WHERE catalog_name = 'finance' AND date > current_date() - 7","B. SELECT * FROM system.access.audit WHERE action_name = 'getTable' AND request_params.catalog_name = 'finance' AND event_date > current_date() - 7","C. SELECT * FROM information_schema.table_privileges WHERE catalog_name = 'finance'","D. SELECT * FROM system.lakeflow.pipeline_events WHERE catalog = 'finance'","E. SELECT * FROM system.compute.query_history WHERE catalog = 'finance' AND start_time > current_date() - 7"],answer:"B",explanation:"<strong>Correct: B.</strong> <code>system.access.audit</code> logs all Unity Catalog data access events. For SELECT operations, the <code>action_name</code> is typically <code>'commandSubmit'</code> or <code>'getTable'</code> depending on the event type. The table includes <code>request_params</code> with catalog/schema/table details and <code>event_date</code> for filtering by time. This is the authoritative source for compliance auditing of data access in Unity Catalog workspaces."},
  {section:"Delta Lake & Tooling",text:"A data engineer partitions a Delta table by year and month. The table has 5 years × 12 months = 60 partitions. A query filters WHERE year=2024 AND month=3. What performance optimization does partitioning provide?",options:["A. Delta reads all 60 partition directories and filters in memory, making partitioning irrelevant for read performance.","B. Delta uses partition elimination to read only the 'year=2024/month=3' directory, skipping 59 other partition directories entirely.","C. Delta uses ZORDER within the partition directory to further skip files based on the month value.","D. Delta broadcasts the partition key to all executors to speed up the filter operation.","E. Delta rewrites the query to use an index scan on the partition column stored in the transaction log."],answer:"B",explanation:"<strong>Correct: B.</strong> Partitioning in Delta Lake stores data in directory-per-partition layout (e.g., <code>/year=2024/month=3/</code>). When a query filters on the partition column(s), Delta performs <strong>partition elimination</strong>: it reads only the matching partition directory(ies) and completely skips all others. For this query, 59 of 60 directories are skipped. This is the primary benefit of partitioning — dramatically reducing I/O for queries that filter on the partition key."},
  {section:"Lakeflow Declarative Pipelines",text:"A Lakeflow pipeline is deployed in Development mode vs Production mode. What is a key difference?",options:["A. Development mode uses a serverless cluster; Production mode uses a classic cluster.","B. Development mode keeps the cluster running after the pipeline completes for interactive development; Production mode terminates the cluster after each run.","C. Development mode only processes a sample of data (1%); Production mode processes all data.","D. Development mode does not write to Delta tables; Production mode persists all results.","E. Development mode requires manual approval before writing; Production mode writes automatically."],answer:"B",explanation:"<strong>Correct: B.</strong> Lakeflow pipeline development mode is designed for iterative development: the cluster remains running after a pipeline update completes, so subsequent runs are faster (no cluster startup overhead). In production mode, the cluster is started for each pipeline trigger and terminated when it completes, saving cost. Development mode also provides more detailed error messages and interactive debugging features. Switch to Production mode before scheduling a pipeline for regular execution."},
  {section:"Data Processing",text:"A data engineer uses repartitionByRange(10, 'order_date') before writing a large DataFrame. What does this accomplish compared to repartition(10, 'order_date')?",options:["A. repartitionByRange sorts data by order_date and creates range-based partitions, ensuring each file contains a contiguous range of dates — better for range scan queries.","B. repartitionByRange is identical to repartition; both use hash partitioning on the column.","C. repartitionByRange creates sorted files with no shuffle; repartition(column) creates shuffled, sorted files.","D. repartitionByRange only works with numeric columns; repartition works with any column type.","E. repartitionByRange distributes data evenly regardless of the column value; repartition may create skewed partitions."],answer:"A",explanation:"<strong>Correct: A.</strong> <code>repartitionByRange(n, col)</code> sorts data by the column and divides it into n partitions containing contiguous value ranges (e.g., partition 1: Jan, partition 2: Feb-Mar, etc.). This contrasts with <code>repartition(n, col)</code> which uses hash partitioning — files contain arbitrary values for the column. repartitionByRange produces files that are more efficient for range-based queries (WHERE order_date BETWEEN ...) because related data is co-located. It uses sampling to determine range boundaries."},
  {section:"Unity Catalog",text:"A data engineer grants a group SELECT on catalog 'prod'. Does this automatically grant access to all tables in all schemas within 'prod'?",options:["A. Yes — granting SELECT on a catalog recursively grants SELECT on all schemas and tables within it.","B. No — SELECT on a catalog is not a valid privilege; only USE CATALOG, CREATE SCHEMA, etc. are catalog-level privileges.","C. No — catalog-level grants apply to the catalog object itself; schema and table access requires separate USE SCHEMA and table-level grants.","D. Yes — Unity Catalog uses cascading grants; any privilege on a parent object applies to all child objects.","E. It depends on the 'inherit_permissions' setting configured by the metastore admin."],answer:"C",explanation:"<strong>Correct: C.</strong> Unity Catalog does NOT cascade privileges down the hierarchy automatically. Granting SELECT on a catalog does not grant SELECT on tables within it. The correct privilege model: USE CATALOG (to access the catalog) + USE SCHEMA (to access objects in a schema) + SELECT/MODIFY/etc. on specific tables. This explicit, granular model prevents accidental over-sharing. Note: <code>SELECT</code> at the catalog level IS a valid privilege that applies to existing tables within, but does NOT auto-grant USE SCHEMA — that must be separate."},
  {section:"Data Processing",text:"A data engineer implements foreachBatch in a Structured Streaming query to perform a MERGE operation. Why is foreachBatch used here instead of a standard streaming write?",options:["A. foreachBatch is required for all Delta Lake streaming writes.","B. Standard streaming write modes (append, complete, update) do not support MERGE — foreachBatch allows arbitrary batch DataFrame operations including MERGE on each micro-batch.","C. foreachBatch improves streaming performance by processing multiple batches simultaneously.","D. foreachBatch is the only way to write streaming data to partitioned Delta tables.","E. Standard streaming writes do not support Delta format; foreachBatch enables Delta integration."],answer:"B",explanation:"<strong>Correct: B.</strong> Structured Streaming's native output modes (append, complete, update) map to specific write patterns. MERGE (upsert) is not a native streaming output mode. <code>foreachBatch(func)</code> gives you access to each micro-batch as a regular batch DataFrame, allowing you to apply any batch operation — including MERGE INTO for deduplication/upserts, writing to multiple sinks, or applying complex business logic. This is the standard pattern for streaming MERGE operations."},
  {section:"Delta Lake & Tooling",text:"A data engineer enables the delta.enableChangeDataFeed property on a table. After enabling, they query CDF starting from version 0. What records will they see?",options:["A. All historical changes from the table's creation, including changes before CDF was enabled.","B. Only changes that occurred AFTER CDF was enabled; changes before enablement are not available.","C. All records currently in the table as 'insert' change records, regardless of when they were written.","D. An error, because CDF can only be read from the current version forward, not from version 0.","E. All records from version 0 as 'update' change records, since the table state was updated when CDF was enabled."],answer:"B",explanation:"<strong>Correct: B.</strong> CDF only captures changes that occur AFTER it is enabled. Historical changes made before enabling CDF are not retroactively captured. If you query with <code>startingVersion=0</code> but CDF was enabled at version 15, you'll only see change records from version 15 onward. This is a critical design consideration: if you need full CDC history, CDF must be enabled from table creation."},
  {section:"Performance Optimization",text:"A data engineer notices that a large Delta table query is scanning all files despite a WHERE clause on a column. DESCRIBE DETAIL shows the table has no ZORDER, no partitioning, and no Liquid Clustering. What is the MOST LIKELY reason data skipping is not working?",options:["A. Data skipping requires Unity Catalog; the table is stored in the Hive Metastore.","B. Delta Lake doesn't collect min/max statistics for string columns longer than 32 characters; if the filter column has long string values, statistics may not be collected.","C. Data skipping only works with Photon-enabled clusters.","D. The query uses a UDF in the WHERE clause which prevents predicate pushdown and data skipping.","E. Data skipping requires the table to have at least 1TB of data to be effective."],answer:"D",explanation:"<strong>Correct: D.</strong> User-Defined Functions (UDFs) in WHERE clauses are opaque to the Catalyst optimizer — it cannot push predicates through UDFs into the scan layer. Without predicate pushdown, Delta cannot use file-level statistics to skip files. The query ends up scanning all files and applying the UDF row-by-row after reading everything. Solution: replace UDFs with native Spark SQL functions where possible, or pre-filter using a native expression before applying the UDF."},
  {section:"CI/CD & Deployment",text:"A data engineer exports a Databricks job configuration using the REST API and saves it to source control. Which endpoint retrieves the full job configuration as JSON?",options:["A. GET /api/2.1/jobs/get?job_id=123","B. GET /api/2.1/jobs/export?job_id=123","C. POST /api/2.1/jobs/get with job_id in the request body","D. GET /api/2.1/jobs/runs/get?run_id=456","E. GET /api/2.1/jobs/list?job_id=123"],answer:"A",explanation:"<strong>Correct: A.</strong> <code>GET /api/2.1/jobs/get?job_id=123</code> returns the complete job configuration JSON including all task definitions, cluster configurations, schedules, and permissions. This is the correct endpoint for exporting a job definition for source control. <code>GET /api/2.1/jobs/runs/get</code> retrieves information about a specific run, not the job definition. The exported JSON can be used with <code>POST /api/2.1/jobs/create</code> to recreate the job."},
  {section:"Data Ingestion",text:"A data engineer needs to ingest XML files from cloud storage into a Delta table. Which approach is SUPPORTED in Databricks?",options:["A. XML is not supported by Databricks; files must be converted to JSON or CSV first.","B. Use spark.read.format('xml').option('rowTag', 'record').load(path) with the spark-xml library.","C. Use Auto Loader with format='xml'; Auto Loader natively supports XML without additional libraries.","D. Use a Python UDF to parse XML using the ElementTree library, then convert to a DataFrame.","E. Convert XML to Parquet using a shell script in an init script before reading with Spark."],answer:"B",explanation:"<strong>Correct: B.</strong> Databricks supports XML ingestion using the <strong>spark-xml</strong> library (developed by Databricks). You read XML files using <code>spark.read.format('xml').option('rowTag', 'element_name').load(path)</code>. The <code>rowTag</code> option specifies which XML element represents a row. The library is available in Databricks Runtime and handles schema inference, nested elements, and attributes. Auto Loader also supports XML format using the same underlying library."},
  {section:"Data Modeling & Medallion",text:"A data engineer needs to implement SCD Type 0 for a reference table of country codes. What does SCD Type 0 imply?",options:["A. The table is fully refreshed (truncated and reloaded) on every update cycle.","B. Once a record is inserted, it is never updated or deleted — values are immutable.","C. The table stores two versions of each record: the original and the current value.","D. Records are soft-deleted by setting an is_active flag to false.","E. The table uses a composite primary key combining the natural key and a version number."],answer:"B",explanation:"<strong>Correct: B.</strong> SCD Type 0 means 'fixed' or 'retain original' — once data is loaded, it is never changed. This is appropriate for reference data that should be immutable, like historical country codes, currency codes at time of transaction, or configuration values that must not drift. In Delta Lake, you implement this with insert-only patterns and adding constraints to prevent updates: <code>ALTER TABLE ref_table ADD CONSTRAINT no_updates CHECK (true)</code> is conceptual — in practice, enforce via pipeline design (no UPDATE/MERGE statements)."},
  {section:"Security & Governance",text:"A workspace admin creates a cluster policy that limits worker node types to memory-optimized instances only. A data engineer creates a new cluster and tries to select a compute-optimized instance. What happens?",options:["A. The cluster creation succeeds but Databricks overrides the instance type to the closest memory-optimized equivalent.","B. The cluster creation fails because the selected instance type violates the assigned cluster policy.","C. The cluster creation succeeds if the data engineer has the 'Unrestricted Cluster Creation' privilege.","D. The cluster creation is flagged for admin approval before provisioning.","E. Cluster policies only apply to job clusters, not interactive clusters."],answer:"B",explanation:"<strong>Correct: B.</strong> Cluster policies define allowed configurations, instance types, auto-termination settings, and other parameters. When a user creates a cluster that violates the policy (e.g., selecting a non-whitelisted instance type), the creation fails with a policy violation error. Cluster policies are enforced at cluster creation time. Users without any policy assignment (or with a permissive policy) can choose freely; users with a restrictive policy must comply with its constraints."},
  {section:"Monitoring & Alerting",text:"A data engineer uses the Ganglia UI to monitor cluster performance. Which metric in Ganglia is MOST relevant for diagnosing network I/O bottlenecks during a shuffle-heavy job?",options:["A. cpu_user — percentage of CPU time in user mode","B. mem_total — total memory available on nodes","C. bytes_in / bytes_out — network bytes received and transmitted per second","D. disk_read / disk_write — disk I/O operations per second","E. proc_run — number of runnable processes"],answer:"C",explanation:"<strong>Correct: C.</strong> Ganglia's <code>bytes_in</code> and <code>bytes_out</code> metrics show network throughput per node. During shuffle-heavy Spark jobs, massive amounts of data are transferred between executors over the network (shuffle write → shuffle read). If network I/O is saturated, it becomes the bottleneck. Signs: high bytes_in/out matching shuffle read/write in the Spark UI, slow stage completion. Remedies: reduce shuffle data (better aggregation before shuffle, broadcasting small tables), or use network-optimized instance types."},
  {section:"Data Processing",text:"A data engineer writes PySpark code with a lambda UDF that is called inside a mapPartitions operation. The UDF has a heavy initialization (loading a 500MB ML model). How should this be optimized?",options:["A. Convert the UDF to a Pandas UDF for vectorized execution.","B. Initialize the model inside the mapPartitions function so it loads once per partition, not once per row.","C. Use sc.broadcast() to send the model to all executors and access it inside the UDF.","D. Pre-load the model in the driver and serialize it with the UDF closure.","E. Use Spark's built-in MLlib instead of a custom model to avoid serialization overhead."],answer:"B",explanation:"<strong>Correct: B.</strong> <code>mapPartitions</code> provides a partition-level iterator, allowing you to initialize expensive resources (like loading an ML model) ONCE per partition rather than once per row. Place the initialization (model loading) at the top of the function body, before the row-level loop. The model is loaded once when the partition starts processing, then reused for all rows in that partition. This dramatically reduces initialization overhead compared to per-row UDFs."},
  {section:"Delta Lake & Tooling",text:"A data engineer accidentally drops a Delta table (managed table in Unity Catalog). The table was dropped 1 hour ago. Can it be recovered?",options:["A. No — managed Unity Catalog tables that are dropped are immediately and permanently deleted.","B. Yes — Unity Catalog has a 7-day retention for dropped managed tables accessible via the Data Explorer's 'Recently Deleted' section.","C. Yes — using RESTORE TABLE immediately after the drop.","D. Yes — using UNDROP TABLE if Unity Catalog's soft-delete feature is enabled.","E. No — but the data files can be manually recovered from cloud storage backups."],answer:"B",explanation:"<strong>Correct: B.</strong> Unity Catalog supports a <strong>managed table recovery</strong> feature: dropped managed tables enter a 'soft delete' state and can be undeleted within a retention window (typically 7 days) via the Unity Catalog Data Explorer UI or the <code>UNDROP TABLE</code> command (where supported). This is a critical safety feature distinguishing Unity Catalog managed tables from traditional Hive managed tables. After the retention window, tables are permanently deleted."},
  {section:"CI/CD & Deployment",text:"A data engineer wants to run unit tests for a Python module before deploying a Databricks job. The module is part of a Databricks Asset Bundle. Which testing approach is MOST practical for CI/CD integration?",options:["A. Deploy the bundle to a dev workspace and run tests using databricks bundle run --test","B. Use pytest locally or in a CI runner with a mocked Spark session (e.g., using pyspark.testing or chispa) to test the module without requiring a live cluster.","C. Run the tests as a separate Databricks job task of type 'Python test' in the bundle definition.","D. Use the Databricks notebook test harness: %run ../tests/test_module in a notebook.","E. Testing Python modules requires a live cluster; local testing is not supported for PySpark code."],answer:"B",explanation:"<strong>Correct: B.</strong> The best practice for CI/CD testing of PySpark modules is to use <strong>pytest</strong> with tools like <code>pyspark.testing</code> (built-in), <code>chispa</code>, or a local SparkSession in test mode. This runs without a live cluster, making tests fast, cheap, and automatable in any CI runner (GitHub Actions, GitLab CI, etc.). Local Spark runs in local mode, allowing full DataFrame testing. <code>assertDataFrameEqual</code> and <code>assertSchemaEqual</code> are the built-in assertion functions for this."},
  {section:"Data Ingestion",text:"A data engineer sets up a Lakeflow pipeline to ingest from Auto Loader. The pipeline should quarantine records where the temperature column is outside [-50, 150]. Which Lakeflow feature handles this?",options:["A. CREATE STREAMING TABLE WITH SCHEMA ENFORCEMENT (temperature BETWEEN -50 AND 150)","B. CONSTRAINT valid_temp EXPECT (temperature >= -50 AND temperature <= 150) ON VIOLATION DROP ROW — dropped rows are logged in the pipeline event log","C. CONSTRAINT valid_temp EXPECT (temperature >= -50 AND temperature <= 150) ON VIOLATION QUARANTINE — records go to a separate quarantine table","D. Auto Loader automatically detects outlier values and writes them to a _quarantine subdirectory","E. Use a CASE WHEN expression in the SELECT to route invalid records to a separate output column"],answer:"B",explanation:"<strong>Correct: B.</strong> In Lakeflow, <code>ON VIOLATION DROP ROW</code> removes invalid records and logs them in the pipeline event log (including the count of dropped rows per expectation). For actual data quarantine (storing bad records for review), the pattern is to define TWO tables: (1) a 'good' streaming table that drops invalid rows; (2) a 'quarantine' streaming table that explicitly filters for INVALID rows (<code>WHERE NOT (temperature >= -50 AND temperature <= 150)</code>). Lakeflow does not have a built-in 'QUARANTINE' destination keyword — quarantine is implemented manually."},
  {section:"Data Modeling & Medallion",text:"A data engineer needs to query the state of a Delta table as it existed 48 hours ago for an audit report. Which query syntax is CORRECT?",options:["A. SELECT * FROM orders AT TIMESTAMP = current_timestamp() - INTERVAL 48 HOURS","B. SELECT * FROM orders TIMESTAMP AS OF current_timestamp() - INTERVAL 48 HOURS","C. SELECT * FROM orders VERSION AS OF (SELECT version FROM history WHERE timestamp < current_timestamp() - INTERVAL 48 HOURS LIMIT 1)","D. SELECT * FROM orders TIME TRAVEL TO current_timestamp() - INTERVAL 48 HOURS","E. SELECT * FROM orders WHERE _commit_timestamp < current_timestamp() - INTERVAL 48 HOURS"],answer:"B",explanation:"<strong>Correct: B.</strong> Delta Lake time travel syntax: <code>SELECT * FROM table TIMESTAMP AS OF 'timestamp_expression'</code> or <code>SELECT * FROM table VERSION AS OF version_number</code>. The correct syntax for timestamp-based time travel is <code>TIMESTAMP AS OF</code> (not AT TIMESTAMP). The timestamp expression can use <code>current_timestamp() - INTERVAL 48 HOURS</code>. This requires the Delta log to still have the files from 48 hours ago (not yet vacuumed with a shorter retention period)."},
  {section:"Performance Optimization",text:"A data engineer has a Delta table with 500,000 small files (average 1KB each). OPTIMIZE is run. What is the target file size that OPTIMIZE aims for by default in Databricks?",options:["A. 32MB","B. 64MB","C. 128MB","D. 256MB","E. 512MB"],answer:"C",explanation:"<strong>Correct: C.</strong> Databricks OPTIMIZE targets a default file size of <strong>128MB</strong> per output file. This is considered the sweet spot between: (1) having too many small files (high listing and scan overhead); and (2) having too few large files (poor parallelism and slow partial reads). The target can be configured with <code>spark.databricks.delta.optimize.maxFileSize</code>. Running OPTIMIZE on a table with 500,000 × 1KB = ~500MB of data would consolidate into approximately 4 files of 128MB each."},
  {section:"Delta Lake & Tooling",text:"A data engineer uses DESCRIBE HISTORY on a Delta table and finds version 25 was a DELETE operation that removed 1M rows by mistake. They want to see the exact SQL predicate used in that DELETE. Where is this information found?",options:["A. In the Delta transaction log JSON file for version 25, under the 'operationParameters' field","B. In the system.access.audit table, filtered by operation_type = 'DELETE'","C. In the Spark UI history server for the job that ran the DELETE","D. In the table's event log under the 'delete_predicate' column","E. This information is not stored by Delta Lake; only the affected file names are tracked"],answer:"A",explanation:"<strong>Correct: A.</strong> <code>DESCRIBE HISTORY table_name</code> returns operation details including <code>operationParameters</code> which contains the exact predicate used for DML operations. For a DELETE, it shows the WHERE clause. For MERGE, it shows the condition. The data comes from the Delta transaction log JSON files (stored in <code>_delta_log/</code>) where each commit records the operation type, parameters, metrics (rows affected), and user info. This is invaluable for debugging accidental DML operations."},
  {section:"Data Processing",text:"A data engineer runs a Structured Streaming query in update output mode writing to a Delta table. What type of records does the Delta sink receive?",options:["A. Only newly inserted records since the last trigger.","B. All rows in the result table on every trigger (full recomputation).","C. Only rows whose values changed since the last trigger (updated/new rows).","D. All rows with a change flag indicating whether they were inserted, updated, or deleted.","E. Update mode is not supported for Delta Lake sinks; use append mode instead."],answer:"C",explanation:"<strong>Correct: C.</strong> In <strong>update output mode</strong>, Spark only outputs rows that changed (new or updated) since the last trigger — not the full result set (that's 'complete' mode) and not just new raw input rows (that's 'append' mode). This is efficient for streaming aggregations where only a subset of groups change each trigger. However, update mode does NOT output deleted rows — for that, you need foreachBatch with MERGE logic."},
  {section:"Security & Governance",text:"A data engineer implements a batch pipeline that processes PII data. The pipeline must apply masking before writing to the silver table. The masking logic: keep email for rows where consent=true, set to NULL otherwise. Which implementation is CORRECT?",options:["A. Apply a column mask in Unity Catalog on the silver table's email column","B. In the pipeline transformation: SELECT CASE WHEN consent=true THEN email ELSE NULL END AS email, ...","C. Use GDPR_MASK() built-in Databricks function on the email column","D. Set the table property 'delta.pii.maskingEnabled=true' on the silver table","E. Grant SELECT on email only to users where consent matches their session variable"],answer:"B",explanation:"<strong>Correct: B.</strong> Masking PII AT INGESTION TIME (in the pipeline transformation) is different from access-time masking (column masks). Here the requirement is to store already-masked data in the silver table — consent=false rows should have NULL stored, not just displayed as NULL. This is done in the ETL logic: <code>CASE WHEN consent=true THEN email ELSE NULL END AS email</code>. Unity Catalog column masks (option A) are read-time masks — the actual data stored is still the real email. The question requires masking the data before storage."},
  {section:"CI/CD & Deployment",text:"A data engineer accidentally ran a notebook that wrote incorrect data to a production Delta table. The error was discovered immediately. What is the FASTEST way to recover?",options:["A. Delete all files in the Delta table's cloud storage directory and re-run the ingestion pipeline.","B. Run RESTORE TABLE prod_table TO VERSION AS OF (latest_version - 1) to revert to the prior state.","C. Use MERGE to overwrite all records with values from a backup table.","D. Run VACUUM to remove the incorrect data files, then re-ingest.","E. Disable the table, fix the data externally, re-enable, and run OPTIMIZE."],answer:"B",explanation:"<strong>Correct: B.</strong> Delta Lake's <code>RESTORE TABLE</code> is the fastest recovery mechanism. It reverts the table to the previous version by recording a new transaction that points back to the prior state — this operation itself takes seconds for metadata, without copying data. <code>RESTORE TABLE prod_table TO VERSION AS OF N</code> where N is the last good version. After restoring, you can re-run the corrected notebook. No data movement or external operations needed."},
  {section:"Lakeflow Declarative Pipelines",text:"A Lakeflow pipeline definition uses Python. A data engineer defines a streaming table and a materialized view in the same pipeline. In which order does Lakeflow execute them?",options:["A. Alphabetical order by table name.","B. In the order they appear in the Python file.","C. Lakeflow automatically analyzes dependencies between tables and executes them in the correct topological order.","D. Streaming tables always execute before materialized views, regardless of dependencies.","E. The order is non-deterministic; data engineers must manually specify execution order using depends_on."],answer:"C",explanation:"<strong>Correct: C.</strong> Lakeflow Declarative Pipelines automatically builds a DAG (Directed Acyclic Graph) of dependencies between tables by analyzing the FROM clauses in each table definition. It executes tables in topological order — upstream tables before downstream ones. You don't need to manually specify execution order. If Table B reads from Table A, Lakeflow ensures A runs first, then B. This is a core benefit of the declarative pipeline model."},
  {section:"Data Modeling & Medallion",text:"A table in the gold layer serves a real-time dashboard showing the top 100 products by revenue in the past 24 hours. The underlying silver data updates every 5 minutes. Which design minimizes dashboard query latency?",options:["A. Configure a Lakeflow materialized view that automatically recomputes on silver updates.","B. Create a pre-aggregated gold Delta table, updated by a scheduled job every 5 minutes, with liquid clustering on product_id and window_start.","C. Query the silver table directly with a SQL view that computes aggregations at query time.","D. Use Delta Live Tables with Continuous trigger mode to keep the gold table always current.","E. Cache the silver table using spark.catalog.cacheTable() on a long-running cluster."],answer:"B",explanation:"<strong>Correct: B.</strong> For real-time dashboard latency, the best approach is a pre-aggregated gold table (not computed at query time). A scheduled job (every 5 min) runs the aggregation query and overwrites the gold table — the dashboard queries a small, pre-computed table with indexed/clustered keys rather than aggregating billions of silver rows on-demand. Option A (MV) is also valid but may have higher latency. Option C (SQL view) computes at query time — highest latency for complex aggregations over large silver data."},
  {section:"Delta Lake & Tooling",text:"A data engineer configures a Delta table with the property delta.autoOptimize.optimizeWrite=true. What does this do?",options:["A. Automatically runs OPTIMIZE after every write operation, consolidating files immediately.","B. Automatically adjusts the number of output files at write time to produce fewer, larger files instead of many small files from multiple concurrent writers.","C. Enables background auto-compaction that runs asynchronously after each write.","D. Automatically tunes spark.sql.shuffle.partitions for each write operation.","E. Enables write-time encryption for all data written to the Delta table."],answer:"B",explanation:"<strong>Correct: B.</strong> <code>delta.autoOptimize.optimizeWrite=true</code> (also called 'Optimized Writes') enables Databricks to automatically tune the number of output files during a write. Without this, each Spark task writes one file — leading to many small files when there are many tasks. With Optimized Writes, Databricks coalesces data before writing to produce appropriately-sized files (targeting ~128MB). Note: <code>delta.autoOptimize.autoCompact=true</code> enables post-write background compaction, which is different."},
  {section:"Data Process",text:"A data engineer needs to broadcast a large lookup DataFrame (~200MB) to all executors. The auto-broadcast threshold is 10MB. Which code correctly forces a broadcast join?",options:["A. df.join(lookup.hint('broadcast'), 'key')","B. df.join(broadcast(lookup), 'key') using the broadcast() function from pyspark.sql.functions","C. spark.conf.set('spark.sql.autoBroadcastJoinThreshold', '209715200') then df.join(lookup, 'key')","D. Both B and C are correct approaches","E. df.join(lookup, 'key').hint('BROADCASTJOIN')"],answer:"D",explanation:"<strong>Correct: D.</strong> Two valid approaches to force broadcast join for a table exceeding the auto-threshold: (1) <code>from pyspark.sql.functions import broadcast; df.join(broadcast(lookup), 'key')</code> — explicit broadcast hint per query; (2) <code>spark.conf.set('spark.sql.autoBroadcastJoinThreshold', 209715200)</code> to raise the threshold to 200MB, then join normally. Option A (<code>.hint('broadcast')</code>) also works. Option C raises the threshold so the 200MB table falls below it, enabling auto-broadcast."},
  {section:"Monitoring & Alerting",text:"A data pipeline SLA requires that the streaming job must process all data within 10 minutes of arrival. How should the data engineer monitor and alert on SLA breaches?",options:["A. Set up a SQL Alert that queries the streaming query's progress metrics stored in a Delta table every minute.","B. Configure a Workflows job notification with duration_warning_threshold_seconds set to 600.","C. Use the Lakeflow pipeline's built-in SLA monitoring feature with max_latency_seconds=600.","D. Monitor using system.billing.usage and alert when job cost exceeds a threshold.","E. Configure a CloudWatch alarm (for AWS) on the Spark UI metrics endpoint."],answer:"B",explanation:"<strong>Correct: B.</strong> Databricks Workflows supports <code>health.rules</code> with duration-based alerts. You can configure the job to send a notification when a run exceeds a duration threshold: set <code>on_duration_warning_threshold_exceeded</code> notification with <code>no_alert_for_skipped_runs</code> and specify the threshold in seconds. This is the native Databricks way to alert on SLA breaches. For streaming jobs specifically, you can also track the processingTime metric in streaming query progress."},
  {section:"Delta Lake & Tooling",text:"A data engineer creates a Delta table using CREATE TABLE ... DEEP CLONE source_table. The source table has 10 versions of history. What history does the clone have?",options:["A. The clone has all 10 versions of history from the source table.","B. The clone starts at version 0 — it has a fresh transaction log with only the clone operation recorded; no source history is preserved.","C. The clone has version 0 (initial state) and version 1 (the clone operation); remaining history is linked from the source.","D. The clone's history shows the clone operation as version 10 (continuing from the source's last version).","E. Deep clone copies all source files and metadata but the clone's history can only be accessed by querying the source."],answer:"B",explanation:"<strong>Correct: B.</strong> A deep clone creates an independent copy of the table with a NEW transaction log starting at version 0 (or version 1). The source table's history is NOT copied to the clone. The clone's <code>DESCRIBE HISTORY</code> shows only operations performed on the clone after it was created, starting with the CLONE operation as version 0. The clone is fully independent — changes to the source do not affect the clone and vice versa (unlike a shallow clone which references source files)."},
  {section:"Security & Governance",text:"Two data engineers simultaneously run: Engineer A: UPDATE orders SET status='shipped' WHERE id=100 / Engineer B: UPDATE orders SET status='cancelled' WHERE id=100. Both see the table at version 50. What happens?",options:["A. Both updates succeed; the table now has two conflicting rows for id=100.","B. Both updates fail due to a write conflict; engineers must retry.","C. One update succeeds (committed as version 51); the other detects a conflict and fails, requiring a retry.","D. The updates are merged automatically based on timestamp; the later update wins.","E. Delta Lake queues the updates and applies them sequentially without errors."],answer:"C",explanation:"<strong>Correct: C.</strong> Delta Lake's Optimistic Concurrency Control (OCC) allows both transactions to start. When they try to commit, one commits first (version 51). The second transaction detects that the files it read (version 50) were modified (a new version was committed) and its changes conflict with the committed version on the same row/file. The second transaction fails with a concurrent modification error. The application must retry — re-read the current state and re-apply the update."},
  {section:"Data Processing",text:"A data engineer needs to process a Delta table where records arrive out of order and may arrive up to 7 days late. The pipeline must produce daily aggregates. Which approach handles this CORRECTLY?",options:["A. Use Structured Streaming with withWatermark('event_time', '7 days') and window('event_time', '1 day') aggregation.","B. Use a batch job that runs daily and re-aggregates the last 8 days of data to account for late arrivals.","C. Use Trigger.Once() to process all late-arriving records in a single run each morning.","D. Set spark.streaming.lateDataThreshold=7days in the streaming configuration.","E. Use INSERT OVERWRITE with dynamic partition overwrite to reprocess affected date partitions."],answer:"B",explanation:"<strong>Correct: B.</strong> For 7-day late arrivals with daily aggregates, a batch reprocessing approach is often more practical: run a daily batch job that re-aggregates the past 8 days (current day + 7 days of potential late arrivals). Use <code>INSERT OVERWRITE</code> with dynamic partition overwrite (<code>spark.sql.sources.partitionOverwriteMode=dynamic</code>) to update only affected date partitions. The streaming approach (A) with 7-day watermark would keep state for 7 days (high memory), and late data after 7 days would still be dropped. For analytics use cases, batch with partition overwrite is more reliable."}
  ]
},
// EXAM 3
{
  title: "Practice Exam 3",
  focus: "Advanced Scenarios, Edge Cases, Mixed Topics",
  questions: [
  {section:"Delta Lake & Tooling",text:"A Delta table has both partitioning (by date) AND Liquid Clustering (by customer_id) configured. Which statement is TRUE?",options:["A. This is valid and both optimizations work together; partitioning prunes directories and clustering prunes files within partitions.","B. This configuration is invalid; you cannot use both partitioning and Liquid Clustering on the same table.","C. Liquid Clustering overrides partitioning; the date partition directories are ignored.","D. Partitioning is automatically converted to Liquid Clustering when CLUSTER BY is specified.","E. The table uses partitioning for writes and Liquid Clustering for reads, optimizing both paths."],answer:"B",explanation:"<strong>Correct: B.</strong> Liquid Clustering and traditional partitioning are <strong>mutually exclusive</strong> in Delta Lake. You cannot have both on the same table. This is by design — Liquid Clustering is meant to replace partitioning as a more flexible, maintenance-free alternative. When creating a table with <code>CLUSTER BY</code>, specifying <code>PARTITIONED BY</code> will produce an error. If you have an existing partitioned table and want Liquid Clustering, you must create a new table without partitions and migrate the data."},
  {section:"Data Processing",text:"A data engineer implements a stateful streaming aggregation: count of events per user per day. After 30 days, the job crashes due to OutOfMemoryError. What is the ROOT CAUSE?",options:["A. The checkpoint location ran out of disk space due to 30 days of checkpoint files.","B. Stateful aggregations without watermarks maintain state for EVERY key seen since the stream started, causing state to grow indefinitely until OOM.","C. The executor memory is too small for the daily aggregation result set.","D. Spark's state store has a 30-day TTL that causes a state explosion during cleanup.","E. The Delta sink is buffering 30 days of output in memory before committing."],answer:"B",explanation:"<strong>Correct: B.</strong> Without a watermark (<code>withWatermark()</code>), stateful Structured Streaming operations maintain state for every unique key indefinitely. After 30 days of processing user events, the state store contains an entry for every user-day combination seen since day 1 — potentially millions of entries. This state is kept in executor memory (with spillover to disk). Eventually the state exhausts memory. Fix: add <code>withWatermark('event_time', '1 day')</code> to allow Spark to expire state for windows older than the watermark, bounding state size."},
  {section:"Lakeflow Declarative Pipelines",text:"A Lakeflow pipeline uses a SQL materialized view defined as: CREATE OR REFRESH MATERIALIZED VIEW gold_revenue AS SELECT date, SUM(amount) AS revenue FROM silver_orders GROUP BY date. The silver_orders table is updated continuously. When does Lakeflow recompute the gold_revenue materialized view?",options:["A. Immediately after every INSERT to silver_orders, with sub-second latency.","B. During each pipeline trigger (triggered mode) or on a schedule (continuous mode), Lakeflow determines if upstream data changed and recomputes accordingly.","C. Only when the data engineer manually runs REFRESH MATERIALIZED VIEW gold_revenue.","D. At midnight UTC every day, regardless of when silver_orders was updated.","E. Only when a downstream query reads gold_revenue and the cached result is stale."],answer:"B",explanation:"<strong>Correct: B.</strong> Lakeflow Materialized Views are recomputed during pipeline runs. In <strong>Triggered mode</strong>, the pipeline runs on schedule (or on-demand) and updates all tables including MVs. In <strong>Continuous mode</strong>, the pipeline detects upstream changes and recomputes MVs with low latency. The recomputation is automatic — you don't manually REFRESH. Lakeflow may recompute incrementally if the query supports it (simple aggregations), or fully if not. The key: recomputation happens at pipeline trigger time, not sub-second."},
  {section:"Performance Optimization",text:"A query joining two 1TB tables runs in 45 minutes. The engineer checks the Spark UI and finds 95% of time is spent in the shuffle read stage. Which approach will have the GREATEST impact on reducing shuffle time?",options:["A. Increase spark.sql.shuffle.partitions from 200 to 2000 for more parallelism.","B. Pre-sort both tables by the join key and use sortMergeJoin with bucketing to avoid the shuffle entirely.","C. Use coalesce() to reduce the number of partitions before the join.","D. Enable delta.autoOptimize.optimizeWrite on both tables.","E. Convert both tables to Parquet format for faster shuffle reads."],answer:"B",explanation:"<strong>Correct: B.</strong> The most impactful optimization for eliminating shuffle in sort-merge joins is <strong>bucketing</strong>: pre-sort and pre-partition both tables by the join key using the same number of buckets. When bucketed tables are joined on the bucket key, Spark recognizes that data is already co-partitioned and skips the shuffle entirely (exchange eliminated). This is the gold standard for repeated heavy joins. Requires creating the tables with <code>CLUSTERED BY (join_key) INTO N BUCKETS</code> and matching N between both tables."},
  {section:"Security & Governance",text:"A data engineer needs to grant a data analyst access to read all tables in schema 'analytics' but prevent them from seeing the salary column in the employees table. Which combination of Unity Catalog features achieves this?",options:["A. Grant SELECT on the schema and apply a column mask on salary that returns NULL for the analyst group.","B. Create a view of employees without the salary column and grant SELECT only on the view, not the base table.","C. Grant SELECT on the schema, then REVOKE SELECT (salary) on employees from the analyst group.","D. Apply a row filter on employees that excludes rows where salary IS NOT NULL for analysts.","E. A and B are both valid; A is the Unity Catalog-native approach, B is the legacy approach."],answer:"E",explanation:"<strong>Correct: E.</strong> Both approaches work: (A) Column mask — set salary to NULL for analysts using IS_MEMBER() check in the mask function — is the Unity Catalog-native, centrally managed approach; (B) Creating a view without the salary column and granting access to the view (not the base table) is the classic approach that works in any SQL system. For exam purposes, Unity Catalog column masks (A) are the preferred modern approach. Unity Catalog does not support column-level REVOKE (C) — that's not a valid syntax."},
