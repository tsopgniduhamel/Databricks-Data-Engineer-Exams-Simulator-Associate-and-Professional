<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Databricks DE Pro — Practice Exams</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #ff4d00;
    --accent2: #ff8c42;
    --blue: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* ===================== HOME SCREEN ===================== */
  #home-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .logo-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 6px 14px;
    border-radius: 2px;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  h1.hero {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.1;
    text-align: center;
    margin-bottom: 14px;
    letter-spacing: -1px;
  }

  h1.hero span {
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    color: var(--text-dim);
    font-size: 15px;
    text-align: center;
    margin-bottom: 56px;
    max-width: 480px;
    line-height: 1.6;
  }

  .exam-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 960px;
  }

  .exam-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 28px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .exam-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0);
    transition: transform 0.3s ease;
    transform-origin: left;
  }

  .exam-card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(255,77,0,0.15);
  }

  .exam-card:hover::before { transform: scaleX(1); }

  .card-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .card-meta {
    display: flex;
    gap: 16px;
  }

  .meta-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-dim);
  }

  .card-score {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .card-score.has-score { color: var(--green); }

  /* ===================== EXAM SCREEN ===================== */
  #exam-screen { display: none; min-height: 100vh; }

  .exam-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .exam-header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .back-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .exam-title-bar {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
  }
  .exam-title-bar strong { color: var(--text); }

  .timer {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 6px;
    min-width: 90px;
    text-align: center;
  }
  .timer.warning { color: var(--yellow); border-color: var(--yellow); }
  .timer.danger { color: var(--red); border-color: var(--red); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .progress-container {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    max-width: 300px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .progress-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .exam-body {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 64px);
  }

  /* QUESTION NAV SIDEBAR */
  .q-nav {
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
  }

  .q-nav-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .q-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    margin-bottom: 20px;
  }

  .q-dot {
    aspect-ratio: 1;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .q-dot:hover { border-color: var(--blue); color: var(--blue); }
  .q-dot.answered { background: var(--surface2); border-color: var(--blue); color: var(--blue); }
  .q-dot.current { background: var(--accent); border-color: var(--accent); color: white; }
  .q-dot.flagged { border-color: var(--yellow); color: var(--yellow); }
  .q-dot.correct { background: rgba(34,197,94,0.15); border-color: var(--green); color: var(--green); }
  .q-dot.wrong { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }

  .nav-legend {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    border: 1px solid;
    flex-shrink: 0;
  }

  /* QUESTION AREA */
  .q-area {
    padding: 40px 48px;
    max-width: 900px;
  }

  .q-section-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .q-number {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .q-text {
    font-size: 16px;
    line-height: 1.7;
    margin-bottom: 12px;
    font-weight: 400;
    color: var(--text);
  }

  .q-scenario {
    background: var(--surface2);
    border-left: 3px solid var(--blue);
    border-radius: 0 8px 8px 0;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  .q-code {
    background: #050810;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 13px;
    line-height: 1.7;
    color: #a5f3fc;
    font-family: var(--mono);
    overflow-x: auto;
    white-space: pre;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
  }

  .option {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: all 0.18s;
  }

  .option:hover { border-color: var(--blue); background: var(--surface2); }

  .option.selected {
    border-color: var(--blue);
    background: rgba(59,130,246,0.08);
  }

  .option.correct {
    border-color: var(--green);
    background: rgba(34,197,94,0.08);
    pointer-events: none;
  }

  .option.wrong {
    border-color: var(--red);
    background: rgba(239,68,68,0.08);
    pointer-events: none;
  }

  .option.reveal-correct {
    border-color: var(--green);
    background: rgba(34,197,94,0.05);
    pointer-events: none;
  }

  .option-letter {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    width: 18px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .option.selected .option-letter { color: var(--blue); }
  .option.correct .option-letter { color: var(--green); }
  .option.wrong .option-letter { color: var(--red); }
  .option.reveal-correct .option-letter { color: var(--green); }

  .option-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }

  /* EXPLANATION BOX */
  .explanation {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 24px;
    animation: fadeIn 0.3s ease;
  }

  .explanation.show { display: block; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  .explanation-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .explanation-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .explanation-badge.correct { background: rgba(34,197,94,0.15); color: var(--green); }
  .explanation-badge.wrong { background: rgba(239,68,68,0.15); color: var(--red); }

  .explanation-text {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-dim);
  }

  .explanation-text strong { color: var(--text); }

  .q-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    padding: 10px 22px;
    border-radius: 7px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-secondary:hover { border-color: var(--blue); color: var(--text); }

  .btn-flag {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 10px 14px;
    border-radius: 7px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-flag.active { border-color: var(--yellow); color: var(--yellow); background: rgba(245,158,11,0.08); }
  .btn-flag:hover { border-color: var(--yellow); }

  .btn-submit-exam {
    background: var(--surface);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 10px 20px;
    border-radius: 7px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }
  .btn-submit-exam:hover { background: rgba(34,197,94,0.1); }

  /* ===================== RESULTS SCREEN ===================== */
  #results-screen {
    display: none;
    min-height: 100vh;
    padding: 60px 24px;
  }

  .results-inner {
    max-width: 880px;
    margin: 0 auto;
  }

  .results-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .score-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    border: 4px solid;
  }

  .score-circle.pass { border-color: var(--green); box-shadow: 0 0 60px rgba(34,197,94,0.2); }
  .score-circle.fail { border-color: var(--red); box-shadow: 0 0 60px rgba(239,68,68,0.2); }

  .score-pct {
    font-size: 42px;
    font-weight: 800;
    font-family: var(--mono);
    line-height: 1;
  }
  .score-circle.pass .score-pct { color: var(--green); }
  .score-circle.fail .score-pct { color: var(--red); }

  .score-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
    letter-spacing: 1px;
  }

  .result-verdict {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .result-sub {
    color: var(--text-dim);
    font-size: 14px;
  }

  .results-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
  }

  .stat-num {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: var(--mono);
  }

  .section-breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 32px;
  }

  .section-breakdown h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: var(--mono);
  }

  .section-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .section-name {
    font-size: 12px;
    color: var(--text-dim);
    width: 260px;
    flex-shrink: 0;
  }

  .section-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .section-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
  }

  .section-pct {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  .results-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  /* REVIEW MODE */
  .review-banner {
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 8px;
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--blue);
    text-align: center;
    margin-bottom: 24px;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .exam-body { grid-template-columns: 1fr; }
    .q-nav { display: none; }
    .q-area { padding: 24px 20px; }
    .results-stats { grid-template-columns: repeat(2, 1fr); }
    .exam-header { padding: 0 12px; gap: 8px; }
    .progress-container { max-width: 120px; }
  }
</style>
</head>
<body>
<div class="app">

<!-- ===================== HOME SCREEN ===================== -->
<div id="home-screen">
  <div class="logo-badge">DATABRICKS CERTIFIED</div>
  <h1 class="hero">Data Engineer <span>Professional</span><br>Practice Exams</h1>
  <p class="hero-sub">3 full-length, 60-question exams with detailed explanations. Simulates the real exam format and difficulty.</p>
  <div class="exam-cards" id="exam-cards"></div>
</div>

<!-- ===================== EXAM SCREEN ===================== -->
<div id="exam-screen">
  <div class="exam-header">
    <div class="exam-header-left">
      <button class="back-btn" onclick="confirmExit()">← Home</button>
      <div class="exam-title-bar"><strong id="exam-title-bar"></strong></div>
    </div>
    <div class="progress-container">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text">0 / 60</div>
    </div>
    <div class="timer" id="timer">2:00:00</div>
    <button class="btn-submit-exam" onclick="submitExam()">Submit Exam</button>
  </div>
  <div class="exam-body">
    <div class="q-nav">
      <div class="q-nav-title">Questions</div>
      <div class="q-grid" id="q-grid"></div>
      <div class="nav-legend">
        <div class="legend-item"><div class="legend-dot" style="background:rgba(59,130,246,0.15);border-color:#3b82f6"></div>Answered</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent);border-color:var(--accent)"></div>Current</div>
        <div class="legend-item"><div class="legend-dot" style="border-color:var(--yellow);color:var(--yellow)"></div>Flagged</div>
      </div>
    </div>
    <div class="q-area" id="q-area"></div>
  </div>
</div>

<!-- ===================== RESULTS SCREEN ===================== -->
<div id="results-screen">
  <div class="results-inner" id="results-inner"></div>
</div>

</div>

<script>
const EXAMS = [{"title": "Practice Exam 1", "focus": "Lakeflow · CI/CD · Delta Lake · Streaming", "questions": [{"section": "Lakeflow", "text": "A data engineer writes a Lakeflow Spark Declarative Pipeline. Which of the following correctly defines a <strong>streaming table</strong> that reads from an Auto Loader source?", "code": "<span class=\"cm\"># Option A</span>\n<span class=\"kw\">@dlt</span>.table\n<span class=\"kw\">def</span> <span class=\"fn\">bronze_events</span>():\n    <span class=\"kw\">return</span> spark.readStream.<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>).<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>,<span class=\"str\">\"json\"</span>).<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw\"</span>)\n\n<span class=\"cm\"># Option B</span>\n<span class=\"kw\">@dlt</span>.view\n<span class=\"kw\">def</span> <span class=\"fn\">bronze_events</span>():\n    <span class=\"kw\">return</span> spark.readStream.<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>).<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>,<span class=\"str\">\"json\"</span>).<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw\"</span>)\n\n<span class=\"cm\"># Option C</span>\n<span class=\"kw\">@dlt</span>.table\n<span class=\"kw\">def</span> <span class=\"fn\">bronze_events</span>():\n    <span class=\"kw\">return</span> spark.read.<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>).<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>,<span class=\"str\">\"json\"</span>).<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw\"</span>)\n\n<span class=\"cm\"># Option D</span>\n<span class=\"kw\">@dlt</span>.streaming_table\n<span class=\"kw\">def</span> <span class=\"fn\">bronze_events</span>():\n    <span class=\"kw\">return</span> dlt.<span class=\"fn\">read_stream</span>(<span class=\"str\">\"cloudFiles\"</span>)", "options": ["A. Option A — @dlt.table with readStream", "B. Option B — @dlt.view with readStream", "C. Option C — @dlt.table with spark.read (batch)", "D. Option D — @dlt.streaming_table decorator"], "answerIndex": 0, "explanation": "In Lakeflow Declarative Pipelines, @dlt.table is the correct decorator for both streaming tables and materialized views — the framework infers streaming vs. batch from whether the function returns a streaming DataFrame (readStream) or a batch DataFrame (spark.read). Option A is correct: @dlt.table with readStream automatically creates a Streaming Table. Option B creates a temporary view (not persisted to storage). Option C uses batch read — it would create a Materialized View, not a streaming table. Option D (@dlt.streaming_table) is not a valid decorator.", "exampleCode": "<span class=\"cm\"># CORRECT: Streaming Table in Lakeflow</span>\n<span class=\"kw\">@dlt</span>.table(\n    comment=<span class=\"str\">\"Raw bronze events from Auto Loader\"</span>,\n    table_properties={<span class=\"str\">\"quality\"</span>: <span class=\"str\">\"bronze\"</span>}\n)\n<span class=\"kw\">def</span> <span class=\"fn\">bronze_events</span>():\n    <span class=\"kw\">return</span> (spark.readStream\n        .<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>)\n        .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>, <span class=\"str\">\"json\"</span>)\n        .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.schemaLocation\"</span>, <span class=\"str\">\"/mnt/schema\"</span>)\n        .<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw\"</span>))"}, {"section": "Lakeflow", "text": "A data engineer adds a data quality expectation to a Lakeflow pipeline. Which code correctly implements a rule that <strong>drops</strong> invalid rows (where <code>amount &le; 0</code>) and allows the pipeline to continue?", "code": "<span class=\"cm\"># Option A</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect</span>(<span class=\"str\">\"positive_amount\"</span>, <span class=\"str\">\"amount > 0\"</span>)\n<span class=\"kw\">@dlt</span>.table\n<span class=\"kw\">def</span> <span class=\"fn\">silver_orders</span>(): ...\n\n<span class=\"cm\"># Option B</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect_or_drop</span>(<span class=\"str\">\"positive_amount\"</span>, <span class=\"str\">\"amount > 0\"</span>)\n<span class=\"kw\">@dlt</span>.table\n<span class=\"kw\">def</span> <span class=\"fn\">silver_orders</span>(): ...\n\n<span class=\"cm\"># Option C</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect_or_fail</span>(<span class=\"str\">\"positive_amount\"</span>, <span class=\"str\">\"amount > 0\"</span>)\n<span class=\"kw\">@dlt</span>.table\n<span class=\"kw\">def</span> <span class=\"fn\">silver_orders</span>(): ...\n\n<span class=\"cm\"># Option D</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect_all_or_drop</span>({<span class=\"str\">\"positive_amount\"</span>: <span class=\"str\">\"amount > 0\"</span>})\n<span class=\"kw\">@dlt</span>.table\n<span class=\"kw\">def</span> <span class=\"fn\">silver_orders</span>(): ...", "options": ["A. @dlt.expect — logs a warning, keeps the row", "B. @dlt.expect_or_drop — drops violating rows, continues", "C. @dlt.expect_or_fail — fails the entire pipeline", "D. @dlt.expect_all_or_drop — works the same as expect_or_drop for a single rule"], "answerIndex": 1, "explanation": "expect_or_drop silently drops rows violating the expectation and continues the pipeline. Option A (expect) keeps the row but records a warning — useful for monitoring without enforcement. Option C (expect_or_fail) halts the entire pipeline run — too aggressive for a 'continue on bad data' requirement. Option D (expect_all_or_drop) works with a dictionary of rules and does drop rows, but it's used for multiple rules. For a single rule requiring drop-and-continue, expect_or_drop is the correct and idiomatic choice.", "exampleCode": "<span class=\"cm\"># Three expectation types — key exam knowledge:</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect</span>(<span class=\"str\">\"name\"</span>, <span class=\"str\">\"expr\"</span>)          <span class=\"cm\"># warn, keep row, continue</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect_or_drop</span>(<span class=\"str\">\"name\"</span>, <span class=\"str\">\"expr\"</span>) <span class=\"cm\"># DROP row, continue</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect_or_fail</span>(<span class=\"str\">\"name\"</span>, <span class=\"str\">\"expr\"</span>) <span class=\"cm\"># FAIL pipeline</span>\n\n<span class=\"cm\"># Multiple rules:</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect_all_or_drop</span>({\n    <span class=\"str\">\"positive_amount\"</span>: <span class=\"str\">\"amount > 0\"</span>,\n    <span class=\"str\">\"valid_status\"</span>: <span class=\"str\">\"status IN ('open','closed')\"</span>\n})"}, {"section": "CI/CD", "text": "A data engineer configures a <strong>Databricks Asset Bundle</strong>. Which <code>databricks.yml</code> snippet correctly deploys a notebook job to <strong>production</strong> using a job cluster with a specific node type and <strong>disallows retries</strong>?", "code": "<span class=\"cm\"># Option A</span>\nresources:\n  jobs:\n    etl_job:\n      tasks:\n        - task_key: process\n          max_retries: <span class=\"num\">0</span>\n          new_cluster:\n            node_type_id: Standard_DS3_v2\n            num_workers: <span class=\"num\">4</span>\n\n<span class=\"cm\"># Option B</span>\nresources:\n  jobs:\n    etl_job:\n      tasks:\n        - task_key: process\n          max_retries: <span class=\"num\">-1</span>\n          new_cluster:\n            node_type_id: Standard_DS3_v2\n            num_workers: <span class=\"num\">4</span>\n\n<span class=\"cm\"># Option C</span>\nresources:\n  jobs:\n    etl_job:\n      retry_on_timeout: <span class=\"kw\">false</span>\n      tasks:\n        - task_key: process\n          existing_cluster_id: <span class=\"str\">\"abc-123\"</span>\n\n<span class=\"cm\"># Option D</span>\nresources:\n  jobs:\n    etl_job:\n      tasks:\n        - task_key: process\n          max_retries: <span class=\"num\">1</span>\n          new_cluster:\n            node_type_id: Standard_DS3_v2", "options": ["A. max_retries: 0 with new_cluster — correct for no retries on a job cluster", "B. max_retries: -1 — this means unlimited retries", "C. retry_on_timeout: false with existing_cluster_id — uses an interactive cluster", "D. max_retries: 1 — allows one retry"], "answerIndex": 0, "explanation": "max_retries: 0 explicitly disallows retries. A new_cluster block provisions an ephemeral job cluster that is terminated after the run — the cost-efficient approach for production jobs. Option B: max_retries: -1 means unlimited retries in Databricks — the opposite of what is needed. Option C uses an existing_cluster_id which attaches to a persistent interactive cluster — more expensive and not best practice for production jobs. retry_on_timeout: false only prevents retries on timeout specifically, not all failures. Option D allows exactly one retry.", "exampleCode": "<span class=\"cm\"># Complete correct DABs job config with no retries:</span>\nresources:\n  jobs:\n    etl_job:\n      name: Production ETL\n      tasks:\n        - task_key: process_data\n          max_retries: <span class=\"num\">0</span>          <span class=\"cm\"># no retries</span>\n          notebook_task:\n            notebook_path: ./notebooks/etl\n          new_cluster:             <span class=\"cm\"># job cluster, not interactive</span>\n            spark_version: <span class=\"str\">\"14.3.x-scala2.12\"</span>\n            node_type_id: Standard_DS3_v2\n            num_workers: <span class=\"num\">4</span>"}, {"section": "Delta Lake", "text": "A data engineer runs the following command. What is the effect on the <strong>physical data files</strong> on cloud storage?", "code": "<span class=\"kw\">DELETE FROM</span> prod.sales.transactions\n<span class=\"kw\">WHERE</span> customer_id = <span class=\"num\">9901</span>\n  <span class=\"kw\">AND</span> transaction_date < <span class=\"str\">'2020-01-01'</span>", "options": ["A. The matching Parquet files are immediately deleted from cloud storage", "B. The rows are logically marked as deleted in the Delta transaction log; physical files remain until VACUUM runs", "C. The DELETE rewrites all affected Parquet files excluding the deleted rows immediately", "D. The transaction log entry is created but the physical files are only deleted after OPTIMIZE runs"], "answerIndex": 1, "explanation": "Delta Lake's DELETE is a logical operation — it records the deletion in the transaction log but does NOT immediately remove physical files. The files remain on cloud storage for the duration of the retention period (default 7 days) to support time travel queries. Physical removal requires running VACUUM after the retention period expires. If deletion vectors are enabled, a small bitmap file is written instead of rewriting the affected Parquet files. Without deletion vectors, DELETE rewrites the affected data files (excluding deleted rows), but the old file versions still remain until VACUUM. For GDPR compliance, you must explicitly run VACUUM RETAIN 0 HOURS after disabling the safety check.", "exampleCode": "<span class=\"cm\">-- Physical deletion procedure for GDPR compliance:</span>\n<span class=\"kw\">DELETE FROM</span> prod.sales.transactions <span class=\"kw\">WHERE</span> customer_id = <span class=\"num\">9901</span>;\n\n<span class=\"kw\">SET</span> spark.databricks.delta.retentionDurationCheck.enabled = <span class=\"kw\">false</span>;\n<span class=\"kw\">VACUUM</span> prod.sales.transactions <span class=\"kw\">RETAIN</span> <span class=\"num\">0</span> <span class=\"kw\">HOURS</span>;\n<span class=\"kw\">SET</span> spark.databricks.delta.retentionDurationCheck.enabled = <span class=\"kw\">true</span>;"}, {"section": "Streaming", "text": "A Structured Streaming job uses a <strong>10-second trigger interval</strong>. During peak load, micro-batches consistently take <strong>25 seconds</strong> to complete. What happens to the stream?", "code": "df = (spark.readStream\n    .<span class=\"fn\">format</span>(<span class=\"str\">\"kafka\"</span>)\n    .<span class=\"fn\">option</span>(<span class=\"str\">\"kafka.bootstrap.servers\"</span>, <span class=\"str\">\"host:9092\"</span>)\n    .<span class=\"fn\">option</span>(<span class=\"str\">\"subscribe\"</span>, <span class=\"str\">\"events\"</span>)\n    .<span class=\"fn\">load</span>())\n\nquery = (df\n    .<span class=\"fn\">writeStream</span>\n    .<span class=\"fn\">trigger</span>(processingTime=<span class=\"str\">\"10 seconds\"</span>)\n    .<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n    .<span class=\"fn\">option</span>(<span class=\"str\">\"checkpointLocation\"</span>, <span class=\"str\">\"/chk\"</span>)\n    .<span class=\"fn\">start</span>())", "options": ["A. The stream fails — processing must complete within the trigger interval", "B. The stream queues up multiple batches; eventually memory is exhausted and the job crashes", "C. Spark waits for the current batch to finish before starting the next trigger cycle — batches run back-to-back with no gap", "D. Spark automatically switches to continuous processing mode to handle the overload"], "answerIndex": 2, "explanation": "In Structured Streaming, the trigger interval is a minimum gap between batch starts, not a hard deadline. If a batch takes longer than the trigger interval (25s > 10s), Spark simply starts the next batch immediately after the previous one completes — no queuing of multiple concurrent batches (there is always at most one batch running at a time). Batches run sequentially. This means data accumulates in the source between batches, creating backpressure but not an immediate failure. The stream won't crash unless there is a resource issue (OOM, executor failure, etc.). The practical effect: the pipeline runs behind real-time during peak periods.", "exampleCode": "<span class=\"cm\"># If batch > trigger interval: batches run sequentially (no gap)</span>\n<span class=\"cm\"># Timeline example:</span>\n<span class=\"cm\"># t=0:  Batch 1 starts</span>\n<span class=\"cm\"># t=25: Batch 1 finishes → Batch 2 starts immediately (not at t=10)</span>\n<span class=\"cm\"># t=50: Batch 2 finishes → Batch 3 starts</span>\n\n<span class=\"cm\"># To fix: profile the batch, reduce processing time, or accept latency</span>\n<span class=\"cm\"># Use .trigger(availableNow=True) for scheduled batch processing instead</span>"}, {"section": "Performance", "text": "A data engineer needs to write a 1TB PySpark DataFrame to Parquet with a target file size of <strong>512MB per file</strong>. No Delta Lake features are available. Which approach correctly achieves this <strong>without sorting the data</strong>?", "code": "<span class=\"cm\"># Option A</span>\ndf.<span class=\"fn\">repartition</span>(<span class=\"num\">2048</span>).<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/out\"</span>)\n\n<span class=\"cm\"># Option B</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.files.maxPartitionBytes\"</span>, <span class=\"str\">\"536870912\"</span>)  <span class=\"cm\"># 512MB</span>\ndf.<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/out\"</span>)\n\n<span class=\"cm\"># Option C</span>\ndf.<span class=\"fn\">coalesce</span>(<span class=\"num\">2048</span>).<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/out\"</span>)\n\n<span class=\"cm\"># Option D</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.shuffle.partitions\"</span>, <span class=\"str\">\"2048\"</span>)\ndf.<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/out\"</span>)", "options": ["A. repartition(2048) — full shuffle, creates 2048 equal partitions", "B. maxPartitionBytes = 512MB — controls INPUT file splitting, not output file size", "C. coalesce(2048) — reduces partitions without a full shuffle", "D. shuffle.partitions = 2048 — controls post-shuffle partition count, not write output"], "answerIndex": 0, "explanation": "repartition(N) performs a full shuffle to create exactly N evenly-sized partitions, each written as one output file. For 1TB / 512MB = 2048 files. This is the correct approach when you need precise control over output file count and size. Option B (maxPartitionBytes) controls how Spark splits INPUT files when reading — it has no effect on output file size. Option C (coalesce) only reduces partitions without a shuffle, so it cannot increase the partition count if the DataFrame has fewer than 2048 partitions; also coalesce creates uneven partitions by merging existing ones. Option D (shuffle.partitions) only affects the number of partitions after a shuffle operation like groupBy/join, not a direct write.", "exampleCode": "<span class=\"cm\"># Calculation: 1TB / 512MB = 2048 partitions</span>\n<span class=\"cm\"># 1 TB = 1024 * 1024 MB = 1,048,576 MB</span>\n<span class=\"cm\"># 1,048,576 / 512 = 2,048</span>\n\ndf.<span class=\"fn\">repartition</span>(<span class=\"num\">2048</span>).<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/mnt/output\"</span>)\n\n<span class=\"cm\"># coalesce vs repartition:</span>\n<span class=\"cm\"># coalesce(N): N must be LESS than current count, no shuffle (fast)</span>\n<span class=\"cm\"># repartition(N): any N, full shuffle (precise, even distribution)</span>"}, {"section": "Delta Lake", "text": "A data engineer executes the following SQL. What does the <code>VERSION AS OF</code> clause achieve and what is a key limitation?", "code": "<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> prod.sales.orders <span class=\"kw\">VERSION AS OF</span> <span class=\"num\">42</span>\n\n<span class=\"cm\">-- Then later:</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> prod.sales.orders <span class=\"kw\">TIMESTAMP AS OF</span> <span class=\"str\">'2024-03-15 09:00:00'</span>", "options": ["A. Reads the table as it existed at version 42; works indefinitely as long as the table exists", "B. Reads the table as it existed at version 42; fails if VACUUM has removed the underlying data files for that version", "C. Reads the table schema at version 42 but always returns current data", "D. Creates a snapshot clone of the table at version 42 that persists in storage"], "answerIndex": 1, "explanation": "Delta Lake time travel queries (VERSION AS OF or TIMESTAMP AS OF) read the table as it existed at a specific point in history. This works by reading the Delta transaction log to find the file list for that version, then reading those specific Parquet files. The critical limitation: if VACUUM has been run and has removed the physical Parquet files associated with that version (files older than the retention period, default 7 days), the time travel query fails with a file-not-found error even though the transaction log entry still exists. The transaction log itself is retained separately (controlled by delta.logRetentionDuration), but the actual data files may be gone.", "exampleCode": "<span class=\"cm\">-- Time travel works while files exist:</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> orders <span class=\"kw\">VERSION AS OF</span> <span class=\"num\">42</span>         <span class=\"cm\">-- by version</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> orders <span class=\"kw\">TIMESTAMP AS OF</span> <span class=\"str\">'2024-03-15'</span>  <span class=\"cm\">-- by timestamp</span>\n\n<span class=\"cm\">-- Prevent VACUUM from breaking time travel:</span>\n<span class=\"kw\">ALTER TABLE</span> orders <span class=\"kw\">SET TBLPROPERTIES</span> (\n  <span class=\"str\">'delta.deletedFileRetentionDuration'</span> = <span class=\"str\">'interval 30 days'</span>\n);"}, {"section": "Performance", "text": "A data engineer runs the following OPTIMIZE command on a large Delta table. What does the <code>WHERE</code> clause do?", "code": "<span class=\"kw\">OPTIMIZE</span> prod.sales.fact_orders\n<span class=\"kw\">WHERE</span> order_date = <span class=\"str\">'2024-06-15'</span>\n\n<span class=\"cm\">-- The table is partitioned by order_date</span>", "options": ["A. Filters rows within all partitions — only rows with order_date='2024-06-15' are included in the compaction", "B. Limits OPTIMIZE to only the files within the order_date='2024-06-15' partition, significantly reducing scope", "C. Creates a new optimized partition for that date, leaving other partitions unchanged", "D. The WHERE clause in OPTIMIZE is not valid SQL — this command will fail"], "answerIndex": 1, "explanation": "The WHERE clause in OPTIMIZE uses partition predicates to limit the operation to specific partitions. Only the data files in the partition where order_date = '2024-06-15' are compacted into larger files. Files in all other date partitions are untouched. This is critical for large tables with many partitions (e.g., 3 years of daily data = ~1000+ partitions) — running OPTIMIZE on the full table daily would be extremely expensive. The recommended pattern: schedule OPTIMIZE WHERE <most_recent_partition(s)> as part of the ingestion pipeline after each batch load.", "exampleCode": "<span class=\"cm\">-- Efficient pattern: optimize only recently written partitions</span>\n<span class=\"kw\">OPTIMIZE</span> prod.sales.fact_orders\n<span class=\"kw\">WHERE</span> order_date >= <span class=\"fn\">date_sub</span>(<span class=\"fn\">current_date</span>(), <span class=\"num\">3</span>)\n<span class=\"kw\">ZORDER BY</span> (customer_id, product_id);\n\n<span class=\"cm\">-- For liquid clustered tables (no ZORDER needed):</span>\n<span class=\"kw\">OPTIMIZE</span> prod.sales.fact_orders\n<span class=\"kw\">WHERE</span> order_date = <span class=\"str\">'2024-06-15'</span>  <span class=\"cm\">-- incremental re-clustering</span>"}, {"section": "Streaming", "text": "A data engineer implements deduplication in Structured Streaming. Which code correctly deduplicates by <code>event_id</code> within a <strong>2-hour window</strong> while bounding state size?", "code": "<span class=\"cm\"># Option A — No watermark</span>\ndf.<span class=\"fn\">dropDuplicates</span>([<span class=\"str\">\"event_id\"</span>])\n\n<span class=\"cm\"># Option B — Watermark before dropDuplicates</span>\n(df\n  .<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"event_timestamp\"</span>, <span class=\"str\">\"2 hours\"</span>)\n  .<span class=\"fn\">dropDuplicates</span>([<span class=\"str\">\"event_id\"</span>, <span class=\"str\">\"event_timestamp\"</span>]))\n\n<span class=\"cm\"># Option C — Watermark after dropDuplicates</span>\n(df\n  .<span class=\"fn\">dropDuplicates</span>([<span class=\"str\">\"event_id\"</span>])\n  .<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"event_timestamp\"</span>, <span class=\"str\">\"2 hours\"</span>))\n\n<span class=\"cm\"># Option D — Use distinct() instead</span>\ndf.<span class=\"fn\">distinct</span>()", "options": ["A. Option A — dropDuplicates without watermark", "B. Option B — watermark BEFORE dropDuplicates, including event_timestamp in dedup keys", "C. Option C — watermark AFTER dropDuplicates (wrong order)", "D. Option D — distinct() works for streaming deduplication"], "answerIndex": 1, "explanation": "Option B is correct. The watermark must be defined BEFORE dropDuplicates, and the event_time column must be included in the deduplication key subset for the watermark to bound the state. The watermark tells Spark: 'after 2 hours have passed since event_timestamp, we can safely evict state for those event_ids.' Without this, state grows unboundedly. Option A: without a watermark, state for ALL seen event_ids is retained forever → OOM after days of running. Option C: watermark defined AFTER dropDuplicates — Spark cannot use the watermark to bound the dedup state. Option D: distinct() is a batch operation and won't work correctly in streaming for cross-batch deduplication.", "exampleCode": "<span class=\"cm\"># CORRECT streaming deduplication with bounded state:</span>\n(df\n  .<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"event_timestamp\"</span>, <span class=\"str\">\"2 hours\"</span>)  <span class=\"cm\"># 1st: define watermark</span>\n  .<span class=\"fn\">dropDuplicates</span>([<span class=\"str\">\"event_id\"</span>, <span class=\"str\">\"event_timestamp\"</span>])  <span class=\"cm\"># 2nd: dedup</span>\n  .<span class=\"fn\">writeStream</span>\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"checkpointLocation\"</span>, <span class=\"str\">\"/chk\"</span>)\n  .<span class=\"fn\">start</span>())"}, {"section": "Data Modeling", "text": "A data engineer runs the following MERGE to implement an upsert. What happens when <strong>two source rows</strong> have the same <code>order_id</code> as a target row?", "code": "<span class=\"kw\">MERGE INTO</span> silver.orders <span class=\"kw\">AS</span> target\n<span class=\"kw\">USING</span> (\n  <span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> staging.orders_updates\n) <span class=\"kw\">AS</span> source\n<span class=\"kw\">ON</span> target.order_id = source.order_id\n<span class=\"kw\">WHEN MATCHED THEN</span>\n  <span class=\"kw\">UPDATE SET</span> *\n<span class=\"kw\">WHEN NOT MATCHED THEN</span>\n  <span class=\"kw\">INSERT</span> *", "options": ["A. The last source row (by arrival order) wins and updates the target row", "B. Delta Lake raises an error: multiple source rows matched the same target row — non-deterministic update", "C. The MERGE applies both updates sequentially, resulting in the most recent update winning", "D. The MERGE silently deduplicates the source before applying the update"], "answerIndex": 1, "explanation": "Delta Lake's MERGE follows the SQL standard: when multiple source rows match the same target row, the result would be non-deterministic (which source row's values should win?). Delta raises an AnalysisException. This is a common production bug when the source dataset has duplicates (e.g., CDC source with late-arriving duplicate events). The fix: deduplicate the source before the MERGE using ROW_NUMBER() or a distinct/dedup query to ensure at most one source row per target key.", "exampleCode": "<span class=\"cm\">-- FIX: Deduplicate source before MERGE</span>\n<span class=\"kw\">MERGE INTO</span> silver.orders <span class=\"kw\">AS</span> target\n<span class=\"kw\">USING</span> (\n  <span class=\"kw\">SELECT</span> *\n  <span class=\"kw\">FROM</span> (\n    <span class=\"kw\">SELECT</span> *,\n      <span class=\"fn\">ROW_NUMBER</span>() <span class=\"kw\">OVER</span> (\n        <span class=\"kw\">PARTITION BY</span> order_id\n        <span class=\"kw\">ORDER BY</span> updated_at <span class=\"kw\">DESC</span>\n      ) <span class=\"kw\">AS</span> rn\n    <span class=\"kw\">FROM</span> staging.orders_updates\n  )\n  <span class=\"kw\">WHERE</span> rn = <span class=\"num\">1</span>  <span class=\"cm\">-- keep only the latest per order_id</span>\n) <span class=\"kw\">AS</span> source\n<span class=\"kw\">ON</span> target.order_id = source.order_id\n<span class=\"kw\">WHEN MATCHED THEN</span> <span class=\"kw\">UPDATE SET</span> *\n<span class=\"kw\">WHEN NOT MATCHED THEN</span> <span class=\"kw\">INSERT</span> *"}, {"section": "Security", "text": "A data engineer creates the following view to implement column-level security. An analyst NOT in the <code>marketing</code> group queries the view. What is returned?", "code": "<span class=\"kw\">CREATE VIEW</span> prod.analytics.customer_view <span class=\"kw\">AS</span>\n<span class=\"kw\">SELECT</span>\n  customer_id,\n  <span class=\"kw\">CASE WHEN</span> <span class=\"fn\">is_member</span>(<span class=\"str\">'marketing'</span>) <span class=\"kw\">THEN</span> email\n       <span class=\"kw\">ELSE</span> <span class=\"str\">'REDACTED'</span>\n  <span class=\"kw\">END AS</span> email,\n  age,\n  ltv\n<span class=\"kw\">FROM</span> prod.analytics.customers", "options": ["A. The query fails — the analyst doesn't have permission to access the underlying table", "B. Four columns returned; email column contains 'REDACTED' for every row", "C. Four columns returned; email column contains NULL for every row", "D. Two columns returned (customer_id and ltv); email and age are hidden for non-marketing users"], "answerIndex": 1, "explanation": "This is a dynamic view pattern. The CASE WHEN is_member('marketing') expression is evaluated at query time per session. For analysts not in the marketing group, is_member('marketing') returns false, so the CASE returns the string 'REDACTED' for every row. The column is still returned — it just shows 'REDACTED' instead of the actual email. The view returns all four columns (customer_id, email, age, ltv) — only the email values are masked. Option A is wrong because with views in Unity Catalog, the analyst needs SELECT on the VIEW but not on the underlying table (ownership chain provides access). This is from the official exam guide sample questions.", "exampleCode": "<span class=\"cm\">-- For analysts NOT in marketing group:</span>\n<span class=\"cm\">-- Returns: customer_id | email      | age | ltv</span>\n<span class=\"cm\">--          1001        | REDACTED   | 34  | 850</span>\n<span class=\"cm\">--          1002        | REDACTED   | 28  | 1200</span>\n\n<span class=\"cm\">-- Modern equivalent using Unity Catalog column masks:</span>\n<span class=\"kw\">CREATE FUNCTION</span> mask_email(email <span class=\"kw\">STRING</span>)\n<span class=\"kw\">RETURN CASE WHEN</span> <span class=\"fn\">is_account_group_member</span>(<span class=\"str\">'marketing'</span>) <span class=\"kw\">THEN</span> email <span class=\"kw\">ELSE</span> <span class=\"str\">'REDACTED'</span> <span class=\"kw\">END</span>;\n\n<span class=\"kw\">ALTER TABLE</span> customers <span class=\"kw\">ALTER COLUMN</span> email <span class=\"kw\">SET MASK</span> mask_email;"}, {"section": "Performance", "text": "A data engineer examines a query profile and sees <strong>Files read: 8,400</strong> but <strong>Files pruned: 12</strong>. The table has liquid clustering on <code>region</code> and the query filters on <code>WHERE region = 'EMEA'</code>. What is the most likely root cause?", "code": "<span class=\"cm\">-- Query profile output:</span>\n<span class=\"cm\">-- Files read:   8,400</span>\n<span class=\"cm\">-- Files pruned: 12</span>\n<span class=\"cm\">-- Bytes read:   890 GB</span>\n<span class=\"cm\">-- Bytes read after filter: 2.1 GB</span>\n\n<span class=\"kw\">SELECT</span> <span class=\"fn\">SUM</span>(revenue) <span class=\"kw\">FROM</span> prod.fact_sales\n<span class=\"kw\">WHERE</span> region = <span class=\"str\">'EMEA'</span>\n  <span class=\"kw\">AND</span> sale_date >= <span class=\"str\">'2024-01-01'</span>", "options": ["A. Liquid clustering is not compatible with the Databricks SQL warehouse used for the query", "B. OPTIMIZE has never been run since the table was created — data is not yet physically clustered", "C. The region column has too many distinct values for liquid clustering to work effectively", "D. Liquid clustering only works with Z-ORDER syntax — CLUSTER BY must be converted"], "answerIndex": 1, "explanation": "Liquid clustering requires OPTIMIZE to physically rearrange data files according to the clustering columns. When a table is created with CLUSTER BY and data is loaded, the files are written in ingestion order — they are NOT automatically clustered. Until OPTIMIZE runs, data for all regions is mixed across all files, making data skipping ineffective. The evidence: 8,400 files read, only 12 pruned — almost no skipping. After running OPTIMIZE, statistics are collected and data is co-located by region, enabling skipping of ~95%+ of files for a single region filter.", "exampleCode": "<span class=\"cm\">-- Step 1: Verify clustering status</span>\n<span class=\"kw\">DESCRIBE</span> <span class=\"kw\">DETAIL</span> prod.fact_sales;\n<span class=\"cm\">-- Look at: clusteringColumns, numFiles, sizeInBytes</span>\n\n<span class=\"cm\">-- Step 2: Run OPTIMIZE to physically cluster data</span>\n<span class=\"kw\">OPTIMIZE</span> prod.fact_sales;\n<span class=\"cm\">-- For large tables, cluster incrementally on recent partitions</span>\n\n<span class=\"cm\">-- Step 3: Re-run query — files pruned should now be ~8,300+</span>"}, {"section": "Governance", "text": "A data engineer grants permissions. Which of the following grants allows a user to <strong>only browse metadata</strong> (table names, schema, comments) in a catalog without reading any data?", "code": "<span class=\"cm\">-- Option A</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod_catalog <span class=\"kw\">TO</span> new_analyst;\n\n<span class=\"cm\">-- Option B</span>\n<span class=\"kw\">GRANT</span> BROWSE <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod_catalog <span class=\"kw\">TO</span> new_analyst;\n\n<span class=\"cm\">-- Option C</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod_catalog <span class=\"kw\">TO</span> new_analyst;\n\n<span class=\"cm\">-- Option D</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span>, <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod_catalog.analytics <span class=\"kw\">TO</span> new_analyst;", "options": ["A. GRANT USAGE ON CATALOG — allows navigating to objects, required before queries but not for browse-only", "B. GRANT BROWSE ON CATALOG — grants metadata read access (table names, schema, comments) without data access", "C. GRANT SELECT ON CATALOG — grants read access to all data in all tables in the catalog", "D. GRANT USAGE, SELECT ON SCHEMA — grants data access to a specific schema"], "answerIndex": 1, "explanation": "BROWSE is a Unity Catalog privilege specifically designed for metadata-only access: the grantee can see that tables exist, view their schema, column names, and comments in the catalog browser — but cannot run SELECT or access actual data. This is ideal for data discovery use cases where new team members need to explore available datasets. USAGE (Option A) is required to navigate to and use objects — it's a prerequisite for queries but doesn't enable browsing without also needing SELECT. It's more of a 'can traverse this level' permission. SELECT (Option C) at the catalog level grants full data read access across all tables — too broad.", "exampleCode": "<span class=\"cm\">-- Minimum privilege hierarchy for full data access:</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod_catalog <span class=\"kw\">TO</span> analyst;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod_catalog.analytics <span class=\"kw\">TO</span> analyst;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> <span class=\"kw\">TABLE</span> prod_catalog.analytics.orders <span class=\"kw\">TO</span> analyst;\n\n<span class=\"cm\">-- Browse only (metadata, no data access):</span>\n<span class=\"kw\">GRANT</span> BROWSE <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod_catalog <span class=\"kw\">TO</span> new_analyst;"}, {"section": "Performance", "text": "A data engineer examines a slow query. The Query Profile shows a <strong>Sort-Merge Join</strong> with 600GB shuffle write between a 2TB fact table and a 200MB dimension table. AQE is enabled. Which configuration change most directly fixes this?", "code": "<span class=\"cm\">-- Current configuration:</span>\nspark.conf.<span class=\"fn\">get</span>(<span class=\"str\">\"spark.sql.adaptive.enabled\"</span>)               <span class=\"cm\"># true</span>\nspark.conf.<span class=\"fn\">get</span>(<span class=\"str\">\"spark.sql.autoBroadcastJoinThreshold\"</span>)    <span class=\"cm\"># 10485760 (10MB)</span>\nspark.conf.<span class=\"fn\">get</span>(<span class=\"str\">\"spark.sql.adaptive.autoBroadcastJoinThreshold\"</span>) <span class=\"cm\"># 10485760 (10MB)</span>\n\n<span class=\"cm\">-- The dimension table is 200MB after predicate pushdown</span>", "options": ["A. Set spark.sql.autoBroadcastJoinThreshold to 209715200 (200MB) — static planning threshold", "B. Set spark.sql.adaptive.autoBroadcastJoinThreshold to 209715200 (200MB) — AQE runtime threshold", "C. Add a broadcast hint in the SQL query: SELECT /*+ BROADCAST(dim) */ ...", "D. Options B and C both work; B is automatic, C is manual but guaranteed"], "answerIndex": 3, "explanation": "Both B and C are correct approaches. Option B: Setting spark.sql.adaptive.autoBroadcastJoinThreshold to 200MB allows AQE to automatically convert the sort-merge join to a broadcast join at RUNTIME using actual data sizes (post-predicate-pushdown). This is cluster-wide config. Option C: Adding a BROADCAST hint in the query forces the broadcast regardless of the threshold — useful for one-off queries or when you know the dimension is small. The distinction: the static threshold (Option A: spark.sql.autoBroadcastJoinThreshold) is checked at PLAN time using estimated sizes, which may underestimate after filtering. The AQE threshold (B) is checked at runtime with actual sizes — more accurate. For a 200MB table with AQE enabled, both B and C are effective solutions.", "exampleCode": "<span class=\"cm\">-- Option B: AQE auto-broadcast (cluster config)</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.autoBroadcastJoinThreshold\"</span>, <span class=\"str\">\"209715200\"</span>)\n\n<span class=\"cm\">-- Option C: Manual BROADCAST hint (query-level)</span>\n<span class=\"kw\">SELECT</span> <span class=\"cm\">/*+ BROADCAST(d) */</span>\n  f.*, d.category\n<span class=\"kw\">FROM</span> fact_sales f\n<span class=\"kw\">JOIN</span> dim_product d <span class=\"kw\">ON</span> f.product_id = d.product_id"}, {"section": "Ingestion", "text": "A data engineer uses COPY INTO to load JSON files into a Delta table. On the second run, new files have arrived. What does COPY INTO do?", "code": "<span class=\"cm\">-- First run (Monday):</span>\n<span class=\"kw\">COPY INTO</span> prod.bronze.events\n<span class=\"kw\">FROM</span> <span class=\"str\">'abfss://container@storage.dfs.core.windows.net/raw/'</span>\nFILEFORMAT = JSON\n<span class=\"kw\">COPY_OPTIONS</span> (<span class=\"str\">'mergeSchema'</span> = <span class=\"str\">'true'</span>)\n\n<span class=\"cm\">-- New files arrive Tuesday</span>\n\n<span class=\"cm\">-- Second run (Tuesday):</span>\n<span class=\"kw\">COPY INTO</span> prod.bronze.events\n<span class=\"kw\">FROM</span> <span class=\"str\">'abfss://container@storage.dfs.core.windows.net/raw/'</span>\nFILEFORMAT = JSON\n<span class=\"kw\">COPY_OPTIONS</span> (<span class=\"str\">'mergeSchema'</span> = <span class=\"str\">'true'</span>)", "options": ["A. All files (Monday + Tuesday) are re-ingested, creating duplicates", "B. Only the new Tuesday files are loaded; Monday's files are skipped because COPY INTO tracks already-loaded files in the Delta log", "C. The second COPY INTO fails because the target table already has data", "D. COPY INTO requires a FORCE = true option to load new files on subsequent runs"], "answerIndex": 1, "explanation": "COPY INTO is idempotent — it maintains a load history in the Delta table's transaction log. On the second run, it automatically identifies which files have already been successfully loaded (Monday's files) and skips them, loading only the new Tuesday files. This makes COPY INTO safe to run repeatedly on the same source path without creating duplicates. This is a key difference from spark.read + write (which would re-process everything) and from Auto Loader (which uses a checkpoint directory instead of the Delta log for tracking).", "exampleCode": "<span class=\"cm\">-- COPY INTO tracks ingested files in the Delta transaction log</span>\n<span class=\"cm\">-- Safe to run repeatedly — idempotent by default</span>\n\n<span class=\"cm\">-- To force re-ingestion of all files (break idempotency):</span>\n<span class=\"kw\">COPY INTO</span> prod.bronze.events\n<span class=\"kw\">FROM</span> <span class=\"str\">'abfss://...'</span>\nFILEFORMAT = JSON\nFORCE = <span class=\"kw\">true</span>  <span class=\"cm\">-- WARNING: re-ingests ALL files including previously loaded ones</span>"}, {"section": "Data Modeling", "text": "A data engineer implements SCD Type 2 using the following MERGE. What is wrong with this implementation?", "code": "<span class=\"kw\">MERGE INTO</span> dim.customers <span class=\"kw\">AS</span> target\n<span class=\"kw\">USING</span> source_updates <span class=\"kw\">AS</span> source\n<span class=\"kw\">ON</span> target.customer_id = source.customer_id\n   <span class=\"kw\">AND</span> target.is_active = <span class=\"kw\">true</span>\n<span class=\"kw\">WHEN MATCHED AND</span> source.address != target.address <span class=\"kw\">THEN</span>\n  <span class=\"kw\">UPDATE SET</span>\n    target.is_active = <span class=\"kw\">false</span>,\n    target.end_date = <span class=\"fn\">current_date</span>()\n<span class=\"kw\">WHEN NOT MATCHED THEN</span>\n  <span class=\"kw\">INSERT</span> (customer_id, address, is_active, start_date, end_date)\n  <span class=\"kw\">VALUES</span> (source.customer_id, source.address, <span class=\"kw\">true</span>, <span class=\"fn\">current_date</span>(), <span class=\"kw\">null</span>)", "options": ["A. The ON clause is incorrect — SCD Type 2 should not filter by is_active in the join condition", "B. This MERGE correctly implements SCD Type 2 — no issues", "C. The new active row is never inserted for updated customers — WHEN MATCHED closes the old row, but WHEN NOT MATCHED only fires for brand-new customers (no matching customer_id at all)", "D. SCD Type 2 requires DELETE instead of UPDATE to close old rows"], "answerIndex": 2, "explanation": "This is a critical SCD Type 2 bug. The MERGE has: WHEN MATCHED → closes old row (sets is_active=false). WHEN NOT MATCHED → inserts new customer. But WHEN NOT MATCHED only fires when there is NO row matching the ON condition. For an existing customer whose address changed, there IS a matching row (same customer_id, is_active=true), so WHEN NOT MATCHED never fires for them — the new active row is never created. The MERGE only closes the old row without creating a new active one. Fix: use a two-pass approach (separate UPDATE + INSERT), or use a union trick to pre-stage both the updated row and new row in the source.", "exampleCode": "<span class=\"cm\">-- FIX: Two-pass SCD Type 2 approach</span>\n<span class=\"cm\">-- Pass 1: Close old rows</span>\n<span class=\"kw\">UPDATE</span> dim.customers\n<span class=\"kw\">SET</span> is_active = <span class=\"kw\">false</span>, end_date = <span class=\"fn\">current_date</span>()\n<span class=\"kw\">WHERE</span> customer_id <span class=\"kw\">IN</span> (<span class=\"kw\">SELECT</span> customer_id <span class=\"kw\">FROM</span> source_updates)\n  <span class=\"kw\">AND</span> is_active = <span class=\"kw\">true</span>;\n\n<span class=\"cm\">-- Pass 2: Insert new active rows</span>\n<span class=\"kw\">INSERT INTO</span> dim.customers\n<span class=\"kw\">SELECT</span> customer_id, address, <span class=\"kw\">true</span>, <span class=\"fn\">current_date</span>(), <span class=\"kw\">null</span>\n<span class=\"kw\">FROM</span> source_updates;"}, {"section": "Streaming", "text": "A Lakeflow pipeline uses APPLY CHANGES INTO for CDC. The source sends events out-of-order. Which configuration ensures the correct final state even with late-arriving updates?", "code": "<span class=\"kw\">APPLY CHANGES INTO</span> LIVE.silver_customers\n<span class=\"kw\">FROM</span> STREAM(LIVE.bronze_cdc)\nKEYS (customer_id)\nSEQUENCE BY updated_at    <span class=\"cm\">-- version/timestamp from source CDC system</span>\nSTORED AS SCD TYPE <span class=\"num\">1</span>", "options": ["A. The SEQUENCE BY clause ensures the record with the highest updated_at always wins, regardless of arrival order", "B. Records are applied in the order they arrive in the stream — out-of-order records may corrupt state", "C. APPLY CHANGES INTO does not support out-of-order records — use a watermark instead", "D. The KEYS clause handles ordering — SEQUENCE BY is optional for out-of-order handling"], "answerIndex": 0, "explanation": "SEQUENCE BY is the key mechanism for handling out-of-order CDC records in APPLY CHANGES INTO. Regardless of when records arrive in the stream, the record with the HIGHEST value in the SEQUENCE BY column (updated_at) is considered the 'current' state. A late-arriving old record (lower updated_at) that arrives after a newer record has already been applied will be ignored for Type 1, or tracked as history for Type 2. This is the fundamental advantage over raw MERGE which applies records in arrival order. The SEQUENCE BY column must come from the CDC source system (e.g., the source database's commit timestamp or LSN).", "exampleCode": "<span class=\"cm\">-- APPLY CHANGES INTO with SCD Type 2 for full history:</span>\n<span class=\"kw\">APPLY CHANGES INTO</span> LIVE.silver_customers\n<span class=\"kw\">FROM</span> STREAM(LIVE.bronze_cdc)\nKEYS (customer_id)\nSEQUENCE BY updated_at\nSTORED AS SCD TYPE <span class=\"num\">2</span>\nTRACK HISTORY <span class=\"kw\">ON</span> *  <span class=\"cm\">-- track all columns for history</span>\n<span class=\"cm\">-- or: TRACK HISTORY ON (address, email)  -- only specific columns</span>"}, {"section": "Security", "text": "A data engineer implements pseudonymization. The requirement is: same <code>user_id</code> must ALWAYS map to the same pseudonym, the original user_id cannot be recovered from the pseudonym, and it must be consistent across different tables. Which SQL expression achieves this?", "code": "<span class=\"cm\">-- Option A: SHA-256 hash with salt</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">sha2</span>(<span class=\"fn\">concat</span>(user_id, <span class=\"str\">'secret_salt_2024'</span>), <span class=\"num\">256</span>) <span class=\"kw\">AS</span> user_pseudonym\n\n<span class=\"cm\">-- Option B: Random UUID</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">uuid</span>() <span class=\"kw\">AS</span> user_pseudonym\n\n<span class=\"cm\">-- Option C: AES encryption</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">aes_encrypt</span>(user_id, <span class=\"str\">'encryption_key'</span>) <span class=\"kw\">AS</span> user_pseudonym\n\n<span class=\"cm\">-- Option D: MD5 hash (no salt)</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">md5</span>(user_id) <span class=\"kw\">AS</span> user_pseudonym", "options": ["A. SHA-256 with a salt — deterministic, non-reversible, consistent across tables", "B. uuid() — generates a random unique value each time, not consistent", "C. aes_encrypt() — deterministic but reversible with the key (not pseudonymization)", "D. md5() — deterministic but vulnerable to rainbow table attacks without a salt"], "answerIndex": 0, "explanation": "SHA-256 with a secret salt (sha2(concat(user_id, 'salt'), 256)) satisfies all three requirements: (1) Deterministic — same user_id + same salt always produces the same hash output, so it's consistent across different tables and runs. (2) Non-reversible — SHA-256 is a one-way cryptographic hash function; you cannot recover user_id from the hash. (3) Consistent — as long as the same salt is used, any table can produce the same pseudonym for the same user_id. Option B (uuid()) generates a new random value every time — not consistent. Option C (aes_encrypt) is reversible with the encryption key — this is encryption, not pseudonymization. Option D (md5 without salt) is deterministic but vulnerable to rainbow table attacks; MD5 is also cryptographically weak.", "exampleCode": "<span class=\"cm\">-- RECOMMENDED: SHA-256 with secret salt</span>\n<span class=\"kw\">SELECT</span>\n  <span class=\"fn\">sha2</span>(<span class=\"fn\">concat</span>(CAST(user_id <span class=\"kw\">AS</span> <span class=\"kw\">STRING</span>), <span class=\"str\">'${secret_salt}'</span>), <span class=\"num\">256</span>) <span class=\"kw\">AS</span> user_pseudonym,\n  order_amount\n<span class=\"kw\">FROM</span> orders;\n\n<span class=\"cm\">-- Store the salt in Databricks Secrets, not in code:</span>\nsecret_salt = dbutils.secrets.<span class=\"fn\">get</span>(<span class=\"str\">\"pii-scope\"</span>, <span class=\"str\">\"hash-salt\"</span>)"}, {"section": "CI/CD", "text": "A data engineer runs <code>databricks bundle deploy</code> and the job fails to create because of a missing required field. Which command should have been run FIRST to catch this before deployment?", "code": "<span class=\"cm\"># Current workflow:</span>\n$ databricks bundle deploy --target prod\n<span class=\"cm\"># Error: Required field 'spark_version' missing in new_cluster config</span>\n\n<span class=\"cm\"># Option A:</span>\n$ databricks bundle validate\n\n<span class=\"cm\"># Option B:</span>\n$ databricks bundle run --dry-run\n\n<span class=\"cm\"># Option C:</span>\n$ databricks bundle plan\n\n<span class=\"cm\"># Option D:</span>\n$ databricks bundle lint", "options": ["A. databricks bundle validate — checks YAML syntax and structure locally without connecting to Databricks", "B. databricks bundle run --dry-run — simulates a job run without executing", "C. databricks bundle plan — shows what changes will be deployed (like Terraform plan)", "D. databricks bundle lint — checks code style in notebooks"], "answerIndex": 0, "explanation": "databricks bundle validate checks the databricks.yml syntax, resolves variable references for the specified target, and validates the bundle structure — all locally without making any Databricks API calls. It would catch the missing 'spark_version' field in the cluster config before any deployment attempt. Options B and C: --dry-run and plan are not valid DABs CLI commands. Option D: lint is not a DABs command. The validate command is the 'pre-flight check' in CI/CD pipelines — always run bundle validate as a CI step before bundle deploy.", "exampleCode": "<span class=\"cm\"># Recommended CI/CD pipeline with DABs:</span>\n<span class=\"cm\"># Step 1: Validate (local check, no API calls)</span>\n$ databricks bundle validate --target prod\n\n<span class=\"cm\"># Step 2: Deploy to staging</span>\n$ databricks bundle deploy --target staging\n\n<span class=\"cm\"># Step 3: Run tests on staging</span>\n$ databricks bundle run etl_job --target staging\n\n<span class=\"cm\"># Step 4: Deploy to production</span>\n$ databricks bundle deploy --target prod"}, {"section": "Monitoring", "text": "A data engineer needs to find the <strong>top 5 most expensive SQL queries</strong> run on Databricks SQL warehouses in the past 7 days, measured by DBU cost. Which query returns this?", "code": "<span class=\"cm\">-- Option A:</span>\n<span class=\"kw\">SELECT</span> statement_id, statement_text, duration_ms, total_task_duration_ms\n<span class=\"kw\">FROM</span> system.query.history\n<span class=\"kw\">WHERE</span> start_time >= <span class=\"fn\">date_sub</span>(<span class=\"fn\">current_timestamp</span>(), <span class=\"num\">7</span>)\n<span class=\"kw\">ORDER BY</span> total_task_duration_ms <span class=\"kw\">DESC</span>\n<span class=\"kw\">LIMIT</span> <span class=\"num\">5</span>\n\n<span class=\"cm\">-- Option B:</span>\n<span class=\"kw\">SELECT</span> job_id, run_id, <span class=\"fn\">SUM</span>(usage_quantity) <span class=\"kw\">AS</span> total_dbu\n<span class=\"kw\">FROM</span> system.billing.usage\n<span class=\"kw\">WHERE</span> usage_start_time >= <span class=\"fn\">date_sub</span>(<span class=\"fn\">current_date</span>(), <span class=\"num\">7</span>)\n<span class=\"kw\">GROUP BY</span> job_id, run_id\n<span class=\"kw\">ORDER BY</span> total_dbu <span class=\"kw\">DESC</span>\n<span class=\"kw\">LIMIT</span> <span class=\"num\">5</span>\n\n<span class=\"cm\">-- Option C:</span>\n<span class=\"kw\">SELECT</span> user_name, action_name, request_params\n<span class=\"kw\">FROM</span> system.access.audit\n<span class=\"kw\">WHERE</span> event_time >= <span class=\"fn\">date_sub</span>(<span class=\"fn\">current_date</span>(), <span class=\"num\">7</span>)\n<span class=\"kw\">LIMIT</span> <span class=\"num\">5</span>", "options": ["A. system.query.history — contains per-query metrics including duration and task time for SQL warehouses", "B. system.billing.usage — tracks DBU consumption at job/run level, not per individual SQL query", "C. system.access.audit — tracks access events, not query cost or performance metrics", "D. A is correct for duration-based ranking; for true DBU cost per query, use system.query.history with cost columns"], "answerIndex": 0, "explanation": "system.query.history is the correct system table for SQL warehouse query metrics. It contains per-query information including statement text, user, warehouse, duration, bytes read, rows produced, and task duration — which correlates directly to DBU cost. system.billing.usage (Option B) tracks aggregate DBU consumption by workspace/cluster/job but doesn't have individual SQL query granularity. system.access.audit (Option C) is for access auditing (who accessed what), not performance/cost metrics. Option D is partially correct but the question asks for the best option — A is the direct answer.", "exampleCode": "<span class=\"cm\">-- Complete query for top expensive SQL queries:</span>\n<span class=\"kw\">SELECT</span>\n  statement_id,\n  executed_by <span class=\"kw\">AS</span> user_name,\n  warehouse_id,\n  <span class=\"fn\">ROUND</span>(duration_ms / <span class=\"num\">1000.0</span>, <span class=\"num\">2</span>) <span class=\"kw\">AS</span> duration_seconds,\n  <span class=\"fn\">ROUND</span>(total_task_duration_ms / <span class=\"num\">1000.0</span>, <span class=\"num\">2</span>) <span class=\"kw\">AS</span> total_task_seconds,\n  read_bytes,\n  <span class=\"fn\">LEFT</span>(statement_text, <span class=\"num\">100</span>) <span class=\"kw\">AS</span> query_preview\n<span class=\"kw\">FROM</span> system.query.history\n<span class=\"kw\">WHERE</span> start_time >= <span class=\"fn\">date_sub</span>(<span class=\"fn\">current_timestamp</span>(), <span class=\"num\">7</span>)\n  <span class=\"kw\">AND</span> status = <span class=\"str\">'FINISHED'</span>\n<span class=\"kw\">ORDER BY</span> total_task_duration_ms <span class=\"kw\">DESC</span>\n<span class=\"kw\">LIMIT</span> <span class=\"num\">5</span>"}, {"section": "Delta Lake", "text": "A data engineer runs the following to enable Change Data Feed and reads from it. What does this streaming query read?", "code": "<span class=\"kw\">ALTER TABLE</span> silver.orders\n<span class=\"kw\">SET TBLPROPERTIES</span> (<span class=\"str\">'delta.enableChangeDataFeed'</span> = <span class=\"str\">'true'</span>);\n\n<span class=\"cm\">-- Streaming CDF reader:</span>\ncdf_df = (spark.readStream\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"readChangeFeed\"</span>, <span class=\"str\">\"true\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"startingVersion\"</span>, <span class=\"num\">0</span>)\n  .<span class=\"fn\">table</span>(<span class=\"str\">\"silver.orders\"</span>))", "options": ["A. All historical data in the table from the beginning, as a full snapshot", "B. Only INSERT operations — CDF does not capture UPDATE or DELETE", "C. All changes (INSERT, UPDATE, DELETE) starting from version 0, including _change_type, _commit_version, and _commit_timestamp columns", "D. Changes starting from when CDF was enabled — version 0 data before CDF was enabled is not included"], "answerIndex": 2, "explanation": "CDF streaming with startingVersion: 0 reads all recorded change events starting from version 0. Each record includes the data columns PLUS: _change_type (insert/update_preimage/update_postimage/delete), _commit_version (which Delta version this change belongs to), and _commit_timestamp. CDF captures ALL DML operations: INSERT, UPDATE (two records: preimage and postimage), and DELETE. Important nuance: CDF can only be read for versions AFTER it was enabled. If CDF was enabled at version 10, you cannot read CDF for versions 0-9. However, if startingVersion: 0 is specified and CDF was enabled from version 0, all changes from version 0 are available.", "exampleCode": "<span class=\"cm\">-- CDF output schema (in addition to table columns):</span>\n<span class=\"cm\">-- _change_type:      'insert' | 'update_preimage' | 'update_postimage' | 'delete'</span>\n<span class=\"cm\">-- _commit_version:   long (Delta version number)</span>\n<span class=\"cm\">-- _commit_timestamp: timestamp of the commit</span>\n\n<span class=\"cm\">-- Batch CDF read (by version range):</span>\nspark.read.<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"readChangeFeed\"</span>, <span class=\"str\">\"true\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"startingVersion\"</span>, <span class=\"num\">5</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"endingVersion\"</span>, <span class=\"num\">10</span>)\n  .<span class=\"fn\">table</span>(<span class=\"str\">\"silver.orders\"</span>)"}, {"section": "Data Modeling", "text": "A data engineer partitions a table. Based on the schema below, which column is the best candidate for partitioning and why?", "code": "<span class=\"cm\">-- Table schema: social media posts</span>\nuser_id     LONG,      <span class=\"cm\">-- 50 million unique users</span>\npost_text   STRING,    <span class=\"cm\">-- free text, variable length</span>\npost_id     STRING,    <span class=\"cm\">-- UUID, globally unique</span>\nlongitude   FLOAT,\nlatitude    FLOAT,\npost_time   TIMESTAMP, <span class=\"cm\">-- exact timestamp</span>\ndate        DATE       <span class=\"cm\">-- derived from post_time, ~365 values/year</span>\n\n<span class=\"cm\">-- Query patterns:</span>\n<span class=\"cm\">-- 90% of queries filter by date range</span>\n<span class=\"cm\">-- Occasional filters on user_id</span>", "options": ["A. post_id — unique identifier, good for point lookups", "B. post_time — exact timestamp, high granularity", "C. date — low cardinality (~365 values/year), matches 90% of query patterns", "D. user_id — 50M unique values, enables per-user access control"], "answerIndex": 2, "explanation": "date is the correct partition column. Good partition columns have LOW cardinality (fewer, larger partitions) and match the dominant query filter pattern. date has ~365 unique values per year — a manageable number of partitions, each containing a day's worth of data. 90% of queries filter by date range, so partition pruning eliminates most files. post_id (A) has billions of unique values — each partition would have 1-2 rows → catastrophic small files problem. post_time (B) is a timestamp — potentially billions of distinct values → same small files problem. user_i
