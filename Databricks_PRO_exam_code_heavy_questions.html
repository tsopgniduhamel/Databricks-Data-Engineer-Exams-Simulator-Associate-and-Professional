=\"str\">\"/mnt/output\"</span>)\n\n<span class=\"cm\"># coalesce vs repartition:</span>\n<span class=\"cm\"># coalesce(N): N must be LESS than current count, no shuffle (fast)</span>\n<span class=\"cm\"># repartition(N): any N, full shuffle (precise, even distribution)</span>"}, {"section": "Delta Lake", "text": "A data engineer executes the following SQL. What does the <code>VERSION AS OF</code> clause achieve and what is a key limitation?", "code": "<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> prod.sales.orders <span class=\"kw\">VERSION AS OF</span> <span class=\"num\">42</span>\n\n<span class=\"cm\">-- Then later:</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> prod.sales.orders <span class=\"kw\">TIMESTAMP AS OF</span> <span class=\"str\">'2024-03-15 09:00:00'</span>", "options": ["A. Reads the table as it existed at version 42; works indefinitely as long as the table exists", "B. Reads the table as it existed at version 42; fails if VACUUM has removed the underlying data files for that version", "C. Reads the table schema at version 42 but always returns current data", "D. Creates a snapshot clone of the table at version 42 that persists in storage"], "answerIndex": 1, "explanation": "Delta Lake time travel queries (VERSION AS OF or TIMESTAMP AS OF) read the table as it existed at a specific point in history. This works by reading the Delta transaction log to find the file list for that version, then reading those specific Parquet files. The critical limitation: if VACUUM has been run and has removed the physical Parquet files associated with that version (files older than the retention period, default 7 days), the time travel query fails with a file-not-found error even though the transaction log entry still exists. The transaction log itself is retained separately (controlled by delta.logRetentionDuration), but the actual data files may be gone.", "exampleCode": "<span class=\"cm\">-- Time travel works while files exist:</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> orders <span class=\"kw\">VERSION AS OF</span> <span class=\"num\">42</span>         <span class=\"cm\">-- by version</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> orders <span class=\"kw\">TIMESTAMP AS OF</span> <span class=\"str\">'2024-03-15'</span>  <span class=\"cm\">-- by timestamp</span>\n\n<span class=\"cm\">-- Prevent VACUUM from breaking time travel:</span>\n<span class=\"kw\">ALTER TABLE</span> orders <span class=\"kw\">SET TBLPROPERTIES</span> (\n  <span class=\"str\">'delta.deletedFileRetentionDuration'</span> = <span class=\"str\">'interval 30 days'</span>\n);"}, {"section": "Performance", "text": "A data engineer runs the following OPTIMIZE command on a large Delta table. What does the <code>WHERE</code> clause do?", "code": "<span class=\"kw\">OPTIMIZE</span> prod.sales.fact_orders\n<span class=\"kw\">WHERE</span> order_date = <span class=\"str\">'2024-06-15'</span>\n\n<span class=\"cm\">-- The table is partitioned by order_date</span>", "options": ["A. Filters rows within all partitions — only rows with order_date='2024-06-15' are included in the compaction", "B. Limits OPTIMIZE to only the files within the order_date='2024-06-15' partition, significantly reducing scope", "C. Creates a new optimized partition for that date, leaving other partitions unchanged", "D. The WHERE clause in OPTIMIZE is not valid SQL — this command will fail"], "answerIndex": 1, "explanation": "The WHERE clause in OPTIMIZE uses partition predicates to limit the operation to specific partitions. Only the data files in the partition where order_date = '2024-06-15' are compacted into larger files. Files in all other date partitions are untouched. This is critical for large tables with many partitions (e.g., 3 years of daily data = ~1000+ partitions) — running OPTIMIZE on the full table daily would be extremely expensive. The recommended pattern: schedule OPTIMIZE WHERE <most_recent_partition(s)> as part of the ingestion pipeline after each batch load.", "exampleCode": "<span class=\"cm\">-- Efficient pattern: optimize only recently written partitions</span>\n<span class=\"kw\">OPTIMIZE</span> prod.sales.fact_orders\n<span class=\"kw\">WHERE</span> order_date >= <span class=\"fn\">date_sub</span>(<span class=\"fn\">current_date</span>(), <span class=\"num\">3</span>)\n<span class=\"kw\">ZORDER BY</span> (customer_id, product_id);\n\n<span class=\"cm\">-- For liquid clustered tables (no ZORDER needed):</span>\n<span class=\"kw\">OPTIMIZE</span> prod.sales.fact_orders\n<span class=\"kw\">WHERE</span> order_date = <span class=\"str\">'2024-06-15'</span>  <span class=\"cm\">-- incremental re-clustering</span>"}, {"section": "Streaming", "text": "A data engineer implements deduplication in Structured Streaming. Which code correctly deduplicates by <code>event_id</code> within a <strong>2-hour window</strong> while bounding state size?", "code": "<span class=\"cm\"># Option A — No watermark</span>\ndf.<span class=\"fn\">dropDuplicates</span>([<span class=\"str\">\"event_id\"</span>])\n\n<span class=\"cm\"># Option B — Watermark before dropDuplicates</span>\n(df\n  .<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"event_timestamp\"</span>, <span class=\"str\">\"2 hours\"</span>)\n  .<span class=\"fn\">dropDuplicates</span>([<span class=\"str\">\"event_id\"</span>, <span class=\"str\">\"event_timestamp\"</span>]))\n\n<span class=\"cm\"># Option C — Watermark after dropDuplicates</span>\n(df\n  .<span class=\"fn\">dropDuplicates</span>([<span class=\"str\">\"event_id\"</span>])\n  .<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"event_timestamp\"</span>, <span class=\"str\">\"2 hours\"</span>))\n\n<span class=\"cm\"># Option D — Use distinct() instead</span>\ndf.<span class=\"fn\">distinct</span>()", "options": ["A. Option A — dropDuplicates without watermark", "B. Option B — watermark BEFORE dropDuplicates, including event_timestamp in dedup keys", "C. Option C — watermark AFTER dropDuplicates (wrong order)", "D. Option D — distinct() works for streaming deduplication"], "answerIndex": 1, "explanation": "Option B is correct. The watermark must be defined BEFORE dropDuplicates, and the event_time column must be included in the deduplication key subset for the watermark to bound the state. The watermark tells Spark: 'after 2 hours have passed since event_timestamp, we can safely evict state for those event_ids.' Without this, state grows unboundedly. Option A: without a watermark, state for ALL seen event_ids is retained forever → OOM after days of running. Option C: watermark defined AFTER dropDuplicates — Spark cannot use the watermark to bound the dedup state. Option D: distinct() is a batch operation and won't work correctly in streaming for cross-batch deduplication.", "exampleCode": "<span class=\"cm\"># CORRECT streaming deduplication with bounded state:</span>\n(df\n  .<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"event_timestamp\"</span>, <span class=\"str\">\"2 hours\"</span>)  <span class=\"cm\"># 1st: define watermark</span>\n  .<span class=\"fn\">dropDuplicates</span>([<span class=\"str\">\"event_id\"</span>, <span class=\"str\">\"event_timestamp\"</span>])  <span class=\"cm\"># 2nd: dedup</span>\n  .<span class=\"fn\">writeStream</span>\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"checkpointLocation\"</span>, <span class=\"str\">\"/chk\"</span>)\n  .<span class=\"fn\">start</span>())"}, {"section": "Data Modeling", "text": "A data engineer runs the following MERGE to implement an upsert. What happens when <strong>two source rows</strong> have the same <code>order_id</code> as a target row?", "code": "<span class=\"kw\">MERGE INTO</span> silver.orders <span class=\"kw\">AS</span> target\n<span class=\"kw\">USING</span> (\n  <span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> staging.orders_updates\n) <span class=\"kw\">AS</span> source\n<span class=\"kw\">ON</span> target.order_id = source.order_id\n<span class=\"kw\">WHEN MATCHED THEN</span>\n  <span class=\"kw\">UPDATE SET</span> *\n<span class=\"kw\">WHEN NOT MATCHED THEN</span>\n  <span class=\"kw\">INSERT</span> *", "options": ["A. The last source row (by arrival order) wins and updates the target row", "B. Delta Lake raises an error: multiple source rows matched the same target row — non-deterministic update", "C. The MERGE applies both updates sequentially, resulting in the most recent update winning", "D. The MERGE silently deduplicates the source before applying the update"], "answerIndex": 1, "explanation": "Delta Lake's MERGE follows the SQL standard: when multiple source rows match the same target row, the result would be non-deterministic (which source row's values should win?). Delta raises an AnalysisException. This is a common production bug when the source dataset has duplicates (e.g., CDC source with late-arriving duplicate events). The fix: deduplicate the source before the MERGE using ROW_NUMBER() or a distinct/dedup query to ensure at most one source row per target key.", "exampleCode": "<span class=\"cm\">-- FIX: Deduplicate source before MERGE</span>\n<span class=\"kw\">MERGE INTO</span> silver.orders <span class=\"kw\">AS</span> target\n<span class=\"kw\">USING</span> (\n  <span class=\"kw\">SELECT</span> *\n  <span class=\"kw\">FROM</span> (\n    <span class=\"kw\">SELECT</span> *,\n      <span class=\"fn\">ROW_NUMBER</span>() <span class=\"kw\">OVER</span> (\n        <span class=\"kw\">PARTITION BY</span> order_id\n        <span class=\"kw\">ORDER BY</span> updated_at <span class=\"kw\">DESC</span>\n      ) <span class=\"kw\">AS</span> rn\n    <span class=\"kw\">FROM</span> staging.orders_updates\n  )\n  <span class=\"kw\">WHERE</span> rn = <span class=\"num\">1</span>  <span class=\"cm\">-- keep only the latest per order_id</span>\n) <span class=\"kw\">AS</span> source\n<span class=\"kw\">ON</span> target.order_id = source.order_id\n<span class=\"kw\">WHEN MATCHED THEN</span> <span class=\"kw\">UPDATE SET</span> *\n<span class=\"kw\">WHEN NOT MATCHED THEN</span> <span class=\"kw\">INSERT</span> *"}, {"section": "Delta Lake", "text": "A data engineer runs the following to enable Change Data Feed and reads from it. What does this streaming query read?", "code": "<span class=\"kw\">ALTER TABLE</span> silver.orders\n<span class=\"kw\">SET TBLPROPERTIES</span> (<span class=\"str\">'delta.enableChangeDataFeed'</span> = <span class=\"str\">'true'</span>);\n\n<span class=\"cm\">-- Streaming CDF reader:</span>\ncdf_df = (spark.readStream\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"readChangeFeed\"</span>, <span class=\"str\">\"true\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"startingVersion\"</span>, <span class=\"num\">0</span>)\n  .<span class=\"fn\">table</span>(<span class=\"str\">\"silver.orders\"</span>))", "options": ["A. All historical data in the table from the beginning, as a full snapshot", "B. Only INSERT operations — CDF does not capture UPDATE or DELETE", "C. All changes (INSERT, UPDATE, DELETE) starting from version 0, including _change_type, _commit_version, and _commit_timestamp columns", "D. Changes starting from when CDF was enabled — version 0 data before CDF was enabled is not included"], "answerIndex": 2, "explanation": "CDF streaming with startingVersion: 0 reads all recorded change events starting from version 0. Each record includes the data columns PLUS: _change_type (insert/update_preimage/update_postimage/delete), _commit_version (which Delta version this change belongs to), and _commit_timestamp. CDF captures ALL DML operations: INSERT, UPDATE (two records: preimage and postimage), and DELETE. Important nuance: CDF can only be read for versions AFTER it was enabled. If CDF was enabled at version 10, you cannot read CDF for versions 0-9. However, if startingVersion: 0 is specified and CDF was enabled from version 0, all changes from version 0 are available.", "exampleCode": "<span class=\"cm\">-- CDF output schema (in addition to table columns):</span>\n<span class=\"cm\">-- _change_type:      'insert' | 'update_preimage' | 'update_postimage' | 'delete'</span>\n<span class=\"cm\">-- _commit_version:   long (Delta version number)</span>\n<span class=\"cm\">-- _commit_timestamp: timestamp of the commit</span>\n\n<span class=\"cm\">-- Batch CDF read (by version range):</span>\nspark.read.<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"readChangeFeed\"</span>, <span class=\"str\">\"true\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"startingVersion\"</span>, <span class=\"num\">5</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"endingVersion\"</span>, <span class=\"num\">10</span>)\n  .<span class=\"fn\">table</span>(<span class=\"str\">\"silver.orders\"</span>)"}, {"section": "Data Modeling", "text": "A data engineer partitions a table. Based on the schema below, which column is the best candidate for partitioning and why?", "code": "<span class=\"cm\">-- Table schema: social media posts</span>\nuser_id     LONG,      <span class=\"cm\">-- 50 million unique users</span>\npost_text   STRING,    <span class=\"cm\">-- free text, variable length</span>\npost_id     STRING,    <span class=\"cm\">-- UUID, globally unique</span>\nlongitude   FLOAT,\nlatitude    FLOAT,\npost_time   TIMESTAMP, <span class=\"cm\">-- exact timestamp</span>\ndate        DATE       <span class=\"cm\">-- derived from post_time, ~365 values/year</span>\n\n<span class=\"cm\">-- Query patterns:</span>\n<span class=\"cm\">-- 90% of queries filter by date range</span>\n<span class=\"cm\">-- Occasional filters on user_id</span>", "options": ["A. post_id — unique identifier, good for point lookups", "B. post_time — exact timestamp, high granularity", "C. date — low cardinality (~365 values/year), matches 90% of query patterns", "D. user_id — 50M unique values, enables per-user access control"], "answerIndex": 2, "explanation": "date is the correct partition column. Good partition columns have LOW cardinality (fewer, larger partitions) and match the dominant query filter pattern. date has ~365 unique values per year — a manageable number of partitions, each containing a day's worth of data. 90% of queries filter by date range, so partition pruning eliminates most files. post_id (A) has billions of unique values — each partition would have 1-2 rows → catastrophic small files problem. post_time (B) is a timestamp — potentially billions of distinct values → same small files problem. user_id (C) has 50M unique values → 50M tiny partitions. This is directly from the official exam guide sample questions.", "exampleCode": "<span class=\"cm\">-- CORRECT: Partition by date (low cardinality + matches query pattern)</span>\n<span class=\"kw\">CREATE TABLE</span> prod.social.posts (\n  user_id LONG, post_text STRING, post_id STRING,\n  longitude FLOAT, latitude FLOAT,\n  post_time TIMESTAMP, date DATE\n)\n<span class=\"kw\">PARTITIONED BY</span> (date);\n\n<span class=\"cm\">-- For high-cardinality columns (user_id), use Liquid Clustering instead:</span>\n<span class=\"kw\">CREATE TABLE</span> prod.social.posts (...)\n<span class=\"kw\">CLUSTER BY</span> (date, user_id);"}, {"section": "Performance", "text": "A data engineer configures a job cluster for a pipeline that runs hourly with 10 minutes of processing time. Which configuration provides the <strong>lowest cost</strong> while meeting a 1-hour SLA?", "code": "<span class=\"cm\">-- Option A: Interactive cluster (always on)</span>\ncluster_type: interactive\nautotermination_minutes: <span class=\"num\">120</span>\n\n<span class=\"cm\">-- Option B: Job cluster (ephemeral, per-run)</span>\ncluster_type: job\nschedule: <span class=\"str\">\"0 * * * *\"</span>  <span class=\"cm\"># every hour</span>\nnew_cluster:\n  num_workers: <span class=\"num\">4</span>\n\n<span class=\"cm\">-- Option C: Streaming job with 60-min trigger</span>\ndf.writeStream.trigger(processingTime=<span class=\"str\">\"60 minutes\"</span>)\n\n<span class=\"cm\">-- Option D: Job cluster triggered on file arrival</span>\ntrigger: file_arrival\npath: <span class=\"str\">\"/mnt/source\"</span>", "options": ["A. Interactive cluster with autotermination — cluster stays up between runs, wastes DBUs", "B. Job cluster scheduled hourly — cluster spins up for 10 min, terminates, lowest cost for batch", "C. Streaming job with 60-min trigger — keeps cluster running all 60 minutes between batches", "D. File arrival trigger — only runs when data arrives, but file arrival timing may not guarantee 1-hour SLA"], "answerIndex": 1, "explanation": "A job cluster scheduled hourly is the lowest-cost solution for a batch pipeline. The cluster provisions at job start, runs for the 10 minutes of processing, then terminates automatically. You pay for only 10 minutes of compute per hour (10/60 = ~17% utilization). Option A (interactive cluster): even with 120-min autotermination, the cluster stays running between jobs — paying for 60 minutes every hour when only 10 minutes of work is needed. Option C (streaming with 60-min trigger): the streaming job keeps the cluster alive continuously, running the trigger every 60 minutes — you pay for the full 60 minutes. Option D (file arrival): could work but doesn't guarantee the hourly SLA if files arrive sporadically. This is directly from the exam guide sample questions.", "exampleCode": "<span class=\"cm\"># Most cost-efficient for batch with hourly SLA:</span>\n<span class=\"cm\"># Job cluster: ~10 min compute per hour billed</span>\n<span class=\"cm\"># Interactive cluster: ~60 min compute per hour billed  </span>\n<span class=\"cm\"># Streaming: ~60 min compute per hour billed</span>\n\n<span class=\"cm\"># In DABs:</span>\nresources:\n  jobs:\n    hourly_etl:\n      schedule:\n        quartz_cron_expression: <span class=\"str\">\"0 0 * * * ?\"</span>\n        timezone_id: <span class=\"str\">\"UTC\"</span>\n      tasks:\n        - new_cluster:    <span class=\"cm\"># ephemeral job cluster</span>\n            num_workers: <span class=\"num\">4</span>"}, {"section": "Streaming", "text": "A streaming query uses <code>outputMode('append')</code> with a windowed aggregation. The query fails with: <em>AnalysisException: Append output mode not supported when there are streaming aggregations without watermark</em>. Which fix is correct?", "code": "<span class=\"cm\">-- FAILING query:</span>\n(df\n  .<span class=\"fn\">groupBy</span>(<span class=\"fn\">window</span>(col(<span class=\"str\">\"event_ts\"</span>), <span class=\"str\">\"10 minutes\"</span>), col(<span class=\"str\">\"device_id\"</span>))\n  .<span class=\"fn\">agg</span>(<span class=\"fn\">count</span>(<span class=\"str\">\"*\"</span>).<span class=\"fn\">alias</span>(<span class=\"str\">\"event_count\"</span>))\n  .<span class=\"fn\">writeStream</span>\n  .<span class=\"fn\">outputMode</span>(<span class=\"str\">\"append\"</span>)\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n  .<span class=\"fn\">start</span>())", "options": ["A. Change outputMode to 'complete' — no watermark needed", "B. Add a watermark before groupBy: df.withWatermark('event_ts', '5 minutes').groupBy(...)", "C. Change outputMode to 'update' — supports aggregations without watermark", "D. Both B and C fix the error, but for different trade-offs"], "answerIndex": 3, "explanation": "Both B and C fix the error but with different trade-offs. Option B (add watermark + append mode): adding a watermark allows append mode for aggregations. With a watermark, Spark knows when a window is 'finalized' (no more late data expected) and can emit the window's result ONCE in append mode. This is the correct production approach when you want final, non-retracted results. Option C (change to 'update' mode): update mode emits updated results for each window every time new data arrives — intermediate results are produced. No watermark is required. Trade-off: update mode produces intermediate results; append mode (with watermark) produces only final results. For writing to Delta, update mode works fine. Option A (complete mode): re-emits ALL windows every batch — high memory usage, not scalable for unbounded streaming.", "exampleCode": "<span class=\"cm\"># Option B: Watermark + append mode (final results only)</span>\n(df\n  .<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"event_ts\"</span>, <span class=\"str\">\"5 minutes\"</span>)   <span class=\"cm\"># adds watermark</span>\n  .<span class=\"fn\">groupBy</span>(<span class=\"fn\">window</span>(col(<span class=\"str\">\"event_ts\"</span>), <span class=\"str\">\"10 minutes\"</span>), col(<span class=\"str\">\"device_id\"</span>))\n  .<span class=\"fn\">agg</span>(<span class=\"fn\">count</span>(<span class=\"str\">\"*\"</span>).<span class=\"fn\">alias</span>(<span class=\"str\">\"event_count\"</span>))\n  .<span class=\"fn\">writeStream</span>.<span class=\"fn\">outputMode</span>(<span class=\"str\">\"append\"</span>).<span class=\"fn\">start</span>())\n\n<span class=\"cm\"># Option C: Update mode (no watermark needed, intermediate results)</span>\n  .<span class=\"fn\">writeStream</span>.<span class=\"fn\">outputMode</span>(<span class=\"str\">\"update\"</span>).<span class=\"fn\">start</span>())"}, {"section": "Delta Lake", "text": "A data engineer uses secrets to connect to a JDBC database. After uploading the password to Databricks Secrets and running the code below, what is printed?", "code": "password = dbutils.secrets.<span class=\"fn\">get</span>(scope=<span class=\"str\">\"db_creds\"</span>, key=<span class=\"str\">\"jdbc_password\"</span>)\n<span class=\"fn\">print</span>(password)\n\ndf = (spark.read.<span class=\"fn\">format</span>(<span class=\"str\">\"jdbc\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"url\"</span>, connection)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"dbtable\"</span>, tablename)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"user\"</span>, username)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"password\"</span>, password)\n  .<span class=\"fn\">load</span>())", "options": ["A. The JDBC connection succeeds; the string '[REDACTED]' is printed — Databricks automatically masks secrets in output", "B. The JDBC connection succeeds; the actual password is printed in plain text", "C. An interactive password input box appears in the notebook", "D. The code fails — secrets cannot be passed to .option() as strings"], "answerIndex": 0, "explanation": "Databricks Secrets automatically redacts secret values in notebook output. When you print() a secret value retrieved via dbutils.secrets.get(), Databricks intercepts the output and replaces the secret with '[REDACTED]'. The actual password string IS passed correctly to the JDBC .option() call (the connection works), but it's never exposed in notebook output, logs, or job run output. This is a core Databricks security feature — secrets are 'write-only' from the perspective of notebook output. This is directly from the exam guide sample questions.", "exampleCode": "<span class=\"cm\"># Secrets are redacted in ALL output channels:</span>\npassword = dbutils.secrets.<span class=\"fn\">get</span>(scope=<span class=\"str\">\"db_creds\"</span>, key=<span class=\"str\">\"jdbc_password\"</span>)\n<span class=\"fn\">print</span>(password)     <span class=\"cm\"># prints: [REDACTED]</span>\npassword             <span class=\"cm\"># cell output: [REDACTED]</span>\n\n<span class=\"cm\"># But the actual value IS used correctly in operations:</span>\ndf = spark.read.<span class=\"fn\">format</span>(<span class=\"str\">\"jdbc\"</span>).<span class=\"fn\">option</span>(<span class=\"str\">\"password\"</span>, password).<span class=\"fn\">load</span>()\n<span class=\"cm\"># ^ This works fine — the real password is passed to JDBC</span>"}, {"section": "Ingestion", "text": "A data engineer writes data to a Parquet file without Delta Lake. They want the target file size to be 512MB. Without rearranging/sorting data, which configuration correctly controls output file size?", "code": "<span class=\"cm\">-- Target: 1 TB dataset → 512 MB files = 2048 files</span>\n\n<span class=\"cm\">-- Option A:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.files.maxPartitionBytes\"</span>, <span class=\"str\">\"536870912\"</span>)\ndf.<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/output\"</span>)\n\n<span class=\"cm\">-- Option B:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.advisoryPartitionSizeInBytes\"</span>, <span class=\"str\">\"536870912\"</span>)\ndf.<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/output\"</span>)\n\n<span class=\"cm\">-- Option C:</span>\ndf.<span class=\"fn\">repartition</span>(<span class=\"num\">2048</span>).<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/output\"</span>)\n\n<span class=\"cm\">-- Option D:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.shuffle.partitions\"</span>, <span class=\"str\">\"2048\"</span>)\ndf.<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/output\"</span>)", "options": ["A. maxPartitionBytes — controls INPUT splitting, not output file size", "B. advisoryPartitionSizeInBytes — AQE advisory size for post-shuffle partitions, not direct write control", "C. repartition(2048) — creates exactly 2048 output files through a full shuffle", "D. shuffle.partitions=2048 — affects shuffle partitions only, not direct write output"], "answerIndex": 2, "explanation": "repartition(N) is the correct approach to control output file count (and thus file size) for a write operation. Each partition becomes one output file, so repartition(2048) produces exactly 2048 files. For 1TB / 2048 files ≈ 512MB per file. Option A (maxPartitionBytes): this setting controls how Spark splits INPUT files when reading, not output file size during write. Option B (advisoryPartitionSizeInBytes): this is an AQE hint for post-shuffle partition target size — it may influence output through AQE coalescing, but it's not a direct write control. Option D (shuffle.partitions): only affects the number of partitions created AFTER a shuffle operation (groupBy/join), not a direct write. This question is from the official exam guide sample questions.", "exampleCode": "<span class=\"cm\"># Correct approach: repartition to control output file count</span>\n<span class=\"cm\"># 1 TB / 512 MB = 2,048 partitions = 2,048 output files</span>\n\ndf.<span class=\"fn\">repartition</span>(<span class=\"num\">2048</span>).<span class=\"fn\">write</span>.<span class=\"fn\">mode</span>(<span class=\"str\">\"overwrite\"</span>).<span class=\"fn\">parquet</span>(<span class=\"str\">\"/output\"</span>)\n\n<span class=\"cm\"># Alternatively (with sorting - but question says without rearranging):</span>\n<span class=\"cm\"># df.repartitionByRange(2048, col(\"some_key\")).write.parquet(\"/output\")</span>\n\n<span class=\"cm\"># Key config reference:</span>\n<span class=\"cm\"># maxPartitionBytes       → INPUT file splitting (reading)</span>\n<span class=\"cm\"># shuffle.partitions      → POST-SHUFFLE partition count</span>\n<span class=\"cm\"># advisoryPartitionSizeInBytes → AQE post-shuffle target size</span>\n<span class=\"cm\"># repartition(N)          → OUTPUT file count (writing)</span>"}, {"section": "Governance", "text": "A Databricks job has three tasks. Task A has no dependencies. Tasks B and C both depend on Task A and run in parallel. Task A and B complete successfully; Task C fails. What is the state of data committed to the Lakehouse?", "code": "<span class=\"cm\">-- Job DAG:</span>\n<span class=\"cm\">-- A (no deps) → B (parallel) → [B succeeds]</span>\n<span class=\"cm\">--            → C (parallel) → [C fails]</span>\n\n<span class=\"cm\">-- Each task is a notebook that writes to Delta:</span>\n<span class=\"cm\">-- Task A: writes to bronze.raw_events</span>\n<span class=\"cm\">-- Task B: writes to silver.clean_events</span>\n<span class=\"cm\">-- Task C: writes to gold.aggregated_metrics (FAILED mid-write)</span>", "options": ["A. All changes from A and B are committed; C's partial changes may be committed or rolled back depending on where it failed", "B. No changes are committed — Databricks Jobs rolls back all tasks if any task fails", "C. All changes from A and B are committed; any completed Delta writes in C are also committed (Delta is per-table atomic)", "D. Only A's changes are committed — B and C ran after A so they depend on A completing the full job"], "answerIndex": 0, "explanation": "Databricks Jobs does NOT provide cross-task transactional atomicity. Each task executes independently. When Task C fails: Tasks A and B have already committed their Delta writes (each Delta write is atomic at the table level). Whatever Delta writes Task C completed before failing are committed (Delta ACID guarantees atomicity per write operation). Whatever writes Task C had in-flight when it failed are rolled back by Delta's ACID guarantee. The key point: the Job orchestrator doesn't roll back A and B when C fails — those commits are permanent. This is directly from the exam guide sample questions. Use Repair Run to re-run only the failed Task C.", "exampleCode": "<span class=\"cm\">-- Job failure behavior:</span>\n<span class=\"cm\">-- Task A: bronze.raw_events → COMMITTED ✓</span>\n<span class=\"cm\">-- Task B: silver.clean_events → COMMITTED ✓</span>\n<span class=\"cm\">-- Task C: gold.aggregated_metrics → partial writes COMMITTED,</span>\n<span class=\"cm\">--         in-flight write at failure point → ROLLED BACK by Delta ACID</span>\n\n<span class=\"cm\">-- Recovery: Use Repair Run to re-run Task C only</span>\n<span class=\"cm\">-- databricks runs repair --run-id <id> --rerun-tasks task_c</span>"}, {"section": "Streaming", "text": "A data engineer uses Structured Streaming with a stream-stream join between a <code>clicks</code> stream and an <code>impressions</code> stream. Both streams have events that can arrive up to <strong>2 hours late</strong>. What is required for this join to work correctly?", "code": "clicks_df = (spark.readStream.<span class=\"fn\">format</span>(<span class=\"str\">\"kafka\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"subscribe\"</span>, <span class=\"str\">\"clicks\"</span>).<span class=\"fn\">load</span>())\n\nimpressions_df = (spark.readStream.<span class=\"fn\">format</span>(<span class=\"str\">\"kafka\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"subscribe\"</span>, <span class=\"str\">\"impressions\"</span>).<span class=\"fn\">load</span>())\n\n<span class=\"cm\"># How should the join be configured?</span>", "options": ["A. No special configuration — Spark handles stream-stream joins automatically", "B. Both streams need a watermark of at least 2 hours to bound the join state", "C. One stream must be converted to a static DataFrame using collect() before joining", "D. Stream-stream joins require both streams to originate from the same Kafka cluster"], "answerIndex": 1, "explanation": "Stream-stream joins require watermarks on BOTH input streams to bound the state maintained for unmatched events. Without watermarks, Spark must retain ALL historical events from both streams (every click event waiting for a matching impression, and vice versa) — state grows unboundedly, causing OOM. With a 2-hour watermark on both streams, Spark can safely discard unmatched events that are more than 2 hours old from state. The watermark threshold should be >= the maximum expected lateness (2 hours in this case). The join predicate also needs to include an event-time constraint for the watermark to be effective.", "exampleCode": "<span class=\"cm\"># CORRECT: Stream-stream join with watermarks on both sides</span>\nclicks = (spark.readStream.<span class=\"fn\">format</span>(<span class=\"str\">\"kafka\"</span>).<span class=\"fn\">option</span>(<span class=\"str\">\"subscribe\"</span>,<span class=\"str\">\"clicks\"</span>).<span class=\"fn\">load</span>()\n  .<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"click_time\"</span>, <span class=\"str\">\"2 hours\"</span>))\n\nimpressions = (spark.readStream.<span class=\"fn\">format</span>(<span class=\"str\">\"kafka\"</span>).<span class=\"fn\">option</span>(<span class=\"str\">\"subscribe\"</span>,<span class=\"str\">\"impressions\"</span>).<span class=\"fn\">load</span>()\n  .<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"impression_time\"</span>, <span class=\"str\">\"2 hours\"</span>))\n\njoined = clicks.<span class=\"fn\">join</span>(impressions,\n  expr(<span class=\"str\">\"\"\"\n    click_id = impression_id AND\n    click_time BETWEEN impression_time AND impression_time + INTERVAL 2 HOURS\n  \"\"\"</span>))"}, {"section": "Delta Lake", "text": "A data engineer creates a shallow clone for testing and runs DML on it. Which statement correctly describes the relationship between clone and source?", "code": "<span class=\"cm\">-- Create shallow clone:</span>\n<span class=\"kw\">CREATE TABLE</span> test.orders_clone\n<span class=\"kw\">SHALLOW CLONE</span> prod.orders;\n\n<span class=\"cm\">-- Run DML on clone:</span>\n<span class=\"kw\">DELETE FROM</span> test.orders_clone\n<span class=\"kw\">WHERE</span> status = <span class=\"str\">'cancelled'</span>;\n\n<span class=\"cm\">-- Question: what is the state of prod.orders?</span>", "options": ["A. prod.orders also has cancelled rows deleted — shallow clones share data files", "B. prod.orders is unaffected — the clone has an independent transaction log; the DELETE is recorded only there", "C. The DELETE fails — DML is not supported on shallow clones", "D. The clone becomes a deep clone automatically when DML is performed"], "answerIndex": 1, "explanation": "Shallow clones share the underlying Parquet data files with the source table but have an independent transaction log (_delta_log). When you run DELETE on the clone, Delta records deletion vectors (or new file references) in the CLONE's transaction log only. The original production data files are never modified or deleted. prod.orders remains completely unaffected. Subsequent writes to the clone create new files in the clone's storage location. This is exactly why shallow clones are ideal for testing DML operations — zero data copy, full isolation, no risk to production data.", "exampleCode": "<span class=\"cm\">-- Shallow vs Deep clone comparison:</span>\n<span class=\"kw\">CREATE TABLE</span> test.clone_shallow <span class=\"kw\">SHALLOW CLONE</span> prod.orders;\n<span class=\"cm\">-- ^ Shares data files, independent transaction log</span>\n<span class=\"cm\">--   DML on clone: does NOT affect source</span>\n<span class=\"cm\">--   Fast (just copies the log, not data)</span>\n\n<span class=\"kw\">CREATE TABLE</span> test.clone_deep <span class=\"kw\">DEEP CLONE</span> prod.orders;\n<span class=\"cm\">-- ^ Copies ALL data files to new location, independent log</span>\n<span class=\"cm\">--   Fully independent: changes to either never affect the other</span>\n<span class=\"cm\">--   Slow for large tables (copies all data)</span>"}, {"section": "Performance", "text": "A data engineer examines a window function query that is very slow. The Spark UI shows one task in the window function stage taking 40 minutes while others take 2 minutes. What is the root cause and fix?", "code": "<span class=\"kw\">SELECT</span>\n  customer_id,\n  order_id,\n  amount,\n  <span class=\"fn\">ROW_NUMBER</span>() <span class=\"kw\">OVER</span> (\n    <span class=\"kw\">PARTITION BY</span> customer_id\n    <span class=\"kw\">ORDER BY</span> order_date\n  ) <span class=\"kw\">AS</span> order_rank\n<span class=\"kw\">FROM</span> prod.orders\n\n<span class=\"cm\">-- customer_id distribution:</span>\n<span class=\"cm\">-- Top 10 customers: 45% of all rows</span>\n<span class=\"cm\">-- Remaining 10M customers: 55% of all rows</span>", "options": ["A. Window functions are inherently single-threaded — use a UDF instead", "B. Data skew: a few customer_ids have millions of rows while others have few. All rows for one customer_id must go to the same executor. Fix: pre-filter top customers and process separately, or use salting where applicable", "C. The ORDER BY in the window function is causing a full table sort — remove it", "D. Increase spark.sql.shuffle.partitions to distribute the window function partitions more evenly"], "answerIndex": 1, "explanation": "The window function PARTITION BY customer_id requires all rows for each customer_id to be on the same executor. With 45% of rows concentrated in the top 10 customers, one executor has a partition that is thousands of times larger than others — classic data skew. Increasing shuffle.partitions (Option D) doesn't help because all rows for customer_id='mega_customer' must still go to ONE partition regardless of how many total partitions exist. The fix: identify the skewed customer_ids, process them separately (e.g., pre-filter and run a separate window function), or accept the limitation for genuinely skewed data that cannot be salted (salting breaks window function semantics — all rows for a customer must be together).", "exampleCode": "<span class=\"cm\">-- Identify skewed keys:</span>\n<span class=\"kw\">SELECT</span> customer_id, <span class=\"fn\">COUNT</span>(*) <span class=\"kw\">AS</span> row_count\n<span class=\"kw\">FROM</span> prod.orders\n<span class=\"kw\">GROUP BY</span> customer_id\n<span class=\"kw\">ORDER BY</span> row_count <span class=\"kw\">DESC</span>\n<span class=\"kw\">LIMIT</span> <span class=\"num\">20</span>;\n\n<span class=\"cm\">-- Fix: Process skewed customers separately</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> orders <span class=\"kw\">WHERE</span> customer_id <span class=\"kw\">IN</span> (<span class=\"str\">'mega1'</span>, <span class=\"str\">'mega2'</span>)\n<span class=\"cm\">-- ^ Run as separate, potentially larger job</span>\n\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> orders <span class=\"kw\">WHERE</span> customer_id <span class=\"kw\">NOT IN</span> (<span class=\"str\">'mega1'</span>, <span class=\"str\">'mega2'</span>)\n<span class=\"cm\">-- ^ Run as regular job</span>"}, {"section": "Delta Lake", "text": "A data engineer needs to perform a GDPR deletion and physically remove a customer's data. The table uses <strong>deletion vectors</strong>. After DELETE, which additional steps are needed for physical removal?", "code": "<span class=\"cm\">-- Table has deletion vectors enabled:</span>\n<span class=\"kw\">ALTER TABLE</span> prod.customers\n<span class=\"kw\">SET TBLPROPERTIES</span> (<span class=\"str\">'delta.enableDeletionVectors'</span> = <span class=\"str\">'true'</span>);\n\n<span class=\"cm\">-- Step 1: Logical delete</span>\n<span class=\"kw\">DELETE FROM</span> prod.customers\n<span class=\"kw\">WHERE</span> customer_id = <span class=\"str\">'CUST-9901'</span>;\n\n<span class=\"cm\">-- What additional steps ensure physical removal from cloud storage?</span>", "options": ["A. Nothing more needed — deletion vectors physically remove the data immediately", "B. Run OPTIMIZE to rewrite files without the deleted rows, then VACUUM to remove the old files", "C. Run VACUUM RETAIN 0 HOURS immediately — deletion vectors make this safe without running OPTIMIZE first", "D. Deletion vectors mean GDPR deletion is impossible — you must drop and recreate the table"], "answerIndex": 1, "explanation": "With deletion vectors, DELETE does NOT rewrite the data files — it writes a small bitmap file marking which rows are deleted. The original Parquet files still contain the customer's data. For GDPR physical deletion: (1) OPTIMIZE rewrites the affected files, merging deletion vectors into the Parquet files and producing clean files that don't contain the deleted rows. (2) VACUUM removes the old pre-OPTIMIZE files (which still had the customer data). Only after both steps is the data physically gone from cloud storage. Without OPTIMIZE, VACUUM alone does not help because the original files (containing the data) are still referenced by pre-OPTIMIZE Delta versions.", "exampleCode": "<span class=\"cm\">-- Complete GDPR deletion with deletion vectors:</span>\n\n<span class=\"cm\">-- Step 1: Logical delete</span>\n<span class=\"kw\">DELETE FROM</span> prod.customers <span class=\"kw\">WHERE</span> customer_id = <span class=\"str\">'CUST-9901'</span>;\n\n<span class=\"cm\">-- Step 2: OPTIMIZE to rewrite files (merges deletion vectors into Parquet)</span>\n<span class=\"kw\">OPTIMIZE</span> prod.customers;\n\n<span class=\"cm\">-- Step 3: VACUUM to physically remove old file versions</span>\n<span class=\"kw\">SET</span> spark.databricks.delta.retentionDurationCheck.enabled = <span class=\"kw\">false</span>;\n<span class=\"kw\">VACUUM</span> prod.customers <span class=\"kw\">RETAIN</span> <span class=\"num\">0</span> <span class=\"kw\">HOURS</span>;\n<span class=\"kw\">SET</span> spark.databricks.delta.retentionDurationCheck.enabled = <span class=\"kw\">true</span>;"}, {"section": "Streaming", "text": "A data engineer uses <code>trigger(availableNow=True)</code>. How does this differ from <code>trigger(once=True)</code>?", "code": "<span class=\"cm\"># Option A: availableNow=True</span>\nquery = (df.writeStream\n  .<span class=\"fn\">trigger</span>(availableNow=<span class=\"kw\">True</span>)\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"checkpointLocation\"</span>, <span class=\"str\">\"/chk\"</span>)\n  .<span class=\"fn\">start</span>())\n\n<span class=\"cm\"># Option B: once=True</span>\nquery = (df.writeStream\n  .<span class=\"fn\">trigger</span>(once=<span class=\"kw\">True</span>)\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"checkpointLocation\"</span>, <span class=\"str\">\"/chk\"</span>)\n  .<span class=\"fn\">start</span>())", "options": ["A. They are equivalent — both process all available data and stop", "B. once=True processes all available data in ONE large micro-batch; availableNow=True processes all available data in MULTIPLE optimally-sized micro-batches, then stops — more memory-efficient for large backlogs", "C. availableNow=True is continuous mode; once=True is scheduled mode", "D. once=True is deprecated — availableNow=True is the only supported option now"], "answerIndex": 1, "explanation": "Both triggers process all available data and then terminate the streaming query. The key difference: once=True creates ONE single micro-batch containing all available data — if there's a 100GB backlog, it processes all 100GB in a single batch, which can cause memory issues or very long batch times. availableNow=True (introduced in Spark 3.3) processes all available data in MULTIPLE smaller micro-batches (similar to normal streaming), then stops when there's no more data. This is more memory-efficient and fault-tolerant for large backlogs. availableNow=True is the recommended replacement for once=True in modern Databricks. Both maintain checkpoints for exactly-once semantics.", "exampleCode": "<span class=\"cm\"># once=True: ONE big batch (all backlog at once)</span>\n<span class=\"cm\">#   → Can OOM with large backlogs</span>\n<span class=\"cm\">#   → Legacy, not recommended</span>\n\n<span class=\"cm\"># availableNow=True: Multiple small batches until caught up, then stops</span>\n<span class=\"cm\">#   → Memory efficient</span>\n<span class=\"cm\">#   → Better fault tolerance (checkpoint after each batch)</span>\n<span class=\"cm\">#   → Recommended for scheduled batch ingestion using streaming API</span>\n\n<span class=\"cm\"># Use case: run every hour in a Databricks Job to ingest new files</span>\nquery = (df.writeStream\n  .<span class=\"fn\">trigger</span>(availableNow=<span class=\"kw\">True</span>)\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n  .<span class=\"fn\">start</span>())"}, {"section": "Data Modeling", "text": "A data engineer implements a lookup table join in PySpark. The lookup table has 500 rows. Which approach is correct to ensure this is executed as a <strong>broadcast join</strong> regardless of AQE settings?", "code": "<span class=\"cm\"># Lookup table: 500 rows, ~50KB</span>\nlookup_df = spark.<span class=\"fn\">table</span>(<span class=\"str\">\"prod.reference.currency_codes\"</span>)\ntransactions_df = spark.<span class=\"fn\">table</span>(<span class=\"str\">\"prod.fact.transactions\"</span>)  <span class=\"cm\"># 5 billion rows</span>\n\n<span class=\"cm\"># Option A:</span>\nresult = transactions_df.<span class=\"fn\">join</span>(lookup_df, <span class=\"str\">\"currency_code\"</span>)\n\n<span class=\"cm\"># Option B:</span>\n<span class=\"kw\">from</span> pyspark.sql.functions <span class=\"kw\">import</span> broadcast\nresult = transactions_df.<span class=\"fn\">join</span>(<span class=\"fn\">broadcast</span>(lookup_df), <span class=\"str\">\"currency_code\"</span>)\n\n<span class=\"cm\"># Option C:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.autoBroadcastJoinThreshold\"</span>, <span class=\"str\">\"52428800\"</span>)  <span class=\"cm\"># 50MB</span>\nresult = transactions_df.<span class=\"fn\">join</span>(lookup_df, <span class=\"str\">\"currency_code\"</span>)\n\n<span class=\"cm\"># Option D:</span>\nlookup_df.<span class=\"fn\">cache</span>()\nresult = transactions_df.<span class=\"fn\">join</span>(lookup_df, <span class=\"str\">\"currency_code\"</span>)", "options": ["A. Option A — relies on AQE or default threshold to auto-broadcast", "B. Option B — broadcast() hint forces broadcast join regardless of AQE or threshold settings", "C. Option C — increases threshold to include the table, but depends on size estimation accuracy", "D. Option D — cache() makes the join faster but doesn't change join strategy to broadcast"], "answerIndex": 1, "explanation": "The broadcast() hint explicitly tells Spark to use a broadcast join for that DataFrame, regardless of its size, AQE settings, or the autoBroadcastJoinThreshold. This is the guaranteed approach. Option A relies on Spark automatically detecting the table is small enough — unreliable if size estimation is off or threshold is too low. Option C increases the threshold, which works if the estimated size is correctly below 50MB, but this changes cluster-wide behavior and may fail if the table size estimate is wrong. Option D (cache) stores the table in memory but doesn't change the join strategy — the join is still Sort-Merge, just with cached data (which is already in memory after cache()). broadcast() is the explicit, guaranteed approach.", "exampleCode": "<span class=\"kw\">from</span> pyspark.sql.functions <span class=\"kw\">import</span> broadcast\n\n<span class=\"cm\"># CORRECT: Force broadcast join with hint</span>\nresult = transactions_df.<span class=\"fn\">join</span>(\n    <span class=\"fn\">broadcast</span>(lookup_df),  <span class=\"cm\"># explicitly force broadcast</span>\n    <span class=\"str\">\"currency_code\"</span>\n)\n\n<span class=\"cm\"># Equivalent in SQL:</span>\n<span class=\"kw\">SELECT</span> <span class=\"cm\">/*+ BROADCAST(c) */</span> t.*, c.currency_name\n<span class=\"kw\">FROM</span> transactions t\n<span class=\"kw\">JOIN</span> currency_codes c <span class=\"kw\">ON</span> t.currency_code = c.currency_code"}, {"section": "Governance", "text": "A Unity Catalog schema is dropped with <code>DROP SCHEMA prod.analytics CASCADE</code>. What happens to the managed tables inside?", "code": "<span class=\"cm\">-- Schema contains:</span>\n<span class=\"cm\">-- prod.analytics.orders     (MANAGED table)</span>\n<span class=\"cm\">-- prod.analytics.customers  (MANAGED table)</span>\n<span class=\"cm\">-- prod.analytics.ext_sales  (EXTERNAL table, LOCATION '/mnt/ext/sales')</span>\n\n<span class=\"kw\">DROP SCHEMA</span> prod.analytics <span class=\"kw\">CASCADE</span>", "options": ["A. All three tables' metadata is deleted; physical files for managed tables are deleted; physical files for external tables are left in place", "B. All three tables' metadata and physical files are deleted (including external table files)", "C. The command fails — CASCADE is not supported in Unity Catalog", "D. Only the schema metadata is deleted; all table data remains in cloud storage"], "answerIndex": 0, "explanation": "In Unity Catalog, DROP SCHEMA CASCADE deletes: (1) all table metadata for all tables in the schema, and (2) the physical data files for MANAGED tables (because Unity Catalog owns the storage lifecycle for managed tables). EXTERNAL tables: only the metadata is deleted. The physical files at '/mnt/ext/sales' remain untouched — external table files are not owned by Unity Catalog. This is a critical distinction: managed table DROP = metadata + data deleted. External table DROP = metadata only deleted, files preserved. CASCADE applies this recursively to all objects in the schema.", "exampleCode": "<span class=\"cm\">-- DROP SCHEMA CASCADE behavior in Unity Catalog:</span>\n<span class=\"cm\">-- prod.analytics.orders (MANAGED):    metadata deleted + data files deleted ❌</span>\n<span class=\"cm\">-- prod.analytics.customers (MANAGED): metadata deleted + data files deleted ❌</span>\n<span class=\"cm\">-- prod.analytics.ext_sales (EXTERNAL): metadata deleted, files PRESERVED ✓</span>\n\n<span class=\"cm\">-- To verify table type before dropping:</span>\n<span class=\"kw\">DESCRIBE</span> <span class=\"kw\">EXTENDED</span> prod.analytics.ext_sales;\n<span class=\"cm\">-- Look for: Type = EXTERNAL or MANAGED</span>\n<span class=\"cm\">-- And: Location = path to data files</span>"}, {"section": "Performance", "text": "A data engineer has a window function query. After analysis, they find that <code>customer_id</code> has a highly skewed distribution. What is the correct approach?", "code": "<span class=\"kw\">SELECT</span>\n  customer_id, order_id, amount,\n  <span class=\"fn\">SUM</span>(amount) <span class=\"kw\">OVER</span> (<span class=\"kw\">PARTITION BY</span> customer_id) <span class=\"kw\">AS</span> customer_total,\n  <span class=\"fn\">ROW_NUMBER</span>() <span class=\"kw\">OVER</span> (<span class=\"kw\">PARTITION BY</span> customer_id <span class=\"kw\">ORDER BY</span> order_date) <span class=\"kw\">AS</span> order_seq\n<span class=\"kw\">FROM</span> prod.orders\n\n<span class=\"cm\">-- Distribution: top 5 customers have 40% of rows</span>\n<span class=\"cm\">-- salting cannot be applied (PARTITION BY semantics require all rows per customer_id together)</span>", "options": ["A. Apply salting to the customer_id column to distribute the load", "B. Process skewed customer_ids separately with a targeted query, then UNION ALL with results for regular customers", "C. Increase spark.sql.shuffle.partitions to 10,000 to give each customer_id its own partition", "D. Use a broadcast join instead of a window function"], "answerIndex": 1, "explanation": "Salting cannot be applied to window functions because PARTITION BY customer_id semantically requires ALL rows for each customer_id to be on the same executor — salting would split rows for the same customer_id across executors, producing incorrect results. The correct approach: identify the skewed customer_ids, process them in a SEPARATE query (they get their own large executors), and UNION ALL with the results for the non-skewed customers (which run efficiently across many partitions). Increasing shuffle.partitions (Option C) doesn't help because all rows for one customer_id must still go to exactly ONE partition regardless of the total count. This is an important distinction from join skew (where salting IS applicable).", "exampleCode": "<span class=\"cm\">-- FIX: Process skewed customers separately</span>\n<span class=\"kw\">WITH</span> skewed_customers <span class=\"kw\">AS</span> (\n  <span class=\"kw\">SELECT</span> <span class=\"str\">'MEGA_CUST_1'</span> <span class=\"kw\">AS</span> customer_id <span class=\"kw\">UNION ALL</span>\n  <span class=\"kw\">SELECT</span> <span class=\"str\">'MEGA_CUST_2'</span>\n),\nskewed_results <span class=\"kw\">AS</span> (\n  <span class=\"kw\">SELECT</span> o.customer_id, o.order_id, o.amount,\n    <span class=\"fn\">SUM</span>(amount) <span class=\"kw\">OVER</span> (<span class=\"kw\">PARTITION BY</span> o.customer_id) <span class=\"kw\">AS</span> customer_total\n  <span class=\"kw\">FROM</span> prod.orders o\n  <span class=\"kw\">JOIN</span> skewed_customers s <span class=\"kw\">ON</span> o.customer_id = s.customer_id\n),\nregular_results <span class=\"kw\">AS</span> (\n  <span class=\"kw\">SELECT</span> customer_id, order_id, amount,\n    <span class=\"fn\">SUM</span>(amount) <span class=\"kw\">OVER</span> (<span class=\"kw\">PARTITION BY</span> customer_id) <span class=\"kw\">AS</span> customer_total\n  <span class=\"kw\">FROM</span> prod.orders\n  <span class=\"kw\">WHERE</span> customer_id <span class=\"kw\">NOT IN</span> (<span class=\"kw\">SELECT</span> customer_id <span class=\"kw\">FROM</span> skewed_customers)\n)\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> skewed_results\n<span class=\"kw\">UNION ALL</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> regular_results"}, {"section": "Data Modeling", "text": "A data engineer implements liquid clustering. Which benefit does liquid clustering have over Z-ORDER that makes it preferable for tables with frequent data ingestion?", "code": "<span class=\"cm\">-- Z-ORDER approach:</span>\n<span class=\"kw\">CREATE TABLE</span> prod.events (...);\n<span class=\"kw\">INSERT INTO</span> prod.events <span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> new_data;\n<span class=\"kw\">OPTIMIZE</span> prod.events <span class=\"kw\">ZORDER BY</span> (event_type, region); <span class=\"cm\">-- re-sorts ALL data</span>\n\n<span class=\"cm\">-- Liquid Clustering approach:</span>\n<span class=\"kw\">CREATE TABLE</span> prod.events (...) <span class=\"kw\">CLUSTER BY</span> (event_type, region);\n<span class=\"kw\">INSERT INTO</span> prod.events <span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> new_data;\n<span class=\"kw\">OPTIMIZE</span> prod.events; <span class=\"cm\">-- incremental: only re-clusters new/changed files</span>", "options": ["A. Liquid clustering supports more clustering columns (up to 8 vs Z-ORDER's 4)", "B. OPTIMIZE with liquid clustering is incremental — only new/changed files are re-clustered; Z-ORDER re-sorts all data from scratch", "C. Liquid clustering provides better compression than Z-ORDER", "D. Liquid clustering works with partitioned tables; Z-ORDER does not"], "answerIndex": 1, "explanation": "The key advantage of liquid clustering over Z-ORDER is that OPTIMIZE is incremental. When new data is added to a liquid-clustered table, OPTIMIZE only re-clusters the newly added files — it leaves already-clustered files untouched. For Z-ORDER, OPTIMIZE re-sorts ALL data in the table from scratch every time it runs, which is prohibitively expensive for large tables with frequent ingestion. This makes liquid clustering far more practical for production tables: you can run OPTIMIZE after each batch load without full-table rewrites. Additionally, liquid clustering is more flexible — clustering columns can be changed without rewriting all data.", "exampleCode": "<span class=\"cm\">-- Liquid clustering: incremental OPTIMIZE (efficient for frequent ingestion)</span>\n<span class=\"kw\">CREATE TABLE</span> prod.events (...) <span class=\"kw\">CLUSTER BY</span> (event_type, region);\n\n<span class=\"cm\">-- After each batch load, only new files are re-clustered:</span>\n<span class=\"kw\">OPTIMIZE</span> prod.events;  <span class=\"cm\">-- fast: only touches new files</span>\n\n<span class=\"cm\">-- Z-ORDER: full re-sort every time (expensive for large tables)</span>\n<span class=\"kw\">OPTIMIZE</span> prod.events <span class=\"kw\">ZORDER BY</span> (event_type, region); <span class=\"cm\">-- rewrites ALL files</span>\n\n<span class=\"cm\">-- Can change clustering columns without rewriting data:</span>\n<span class=\"kw\">ALTER TABLE</span> prod.events <span class=\"kw\">CLUSTER BY</span> (region, customer_id); <span class=\"cm\">-- just update metadata</span>"}, {"section": "Streaming", "text": "A data engineer needs to set a watermark on a streaming aggregation. What is the effect of setting the watermark <strong>too low</strong> (e.g., 1 minute when events can be 30 minutes late)?", "code": "(df\n  .<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"event_ts\"</span>, <span class=\"str\">\"1 minute\"</span>)  <span class=\"cm\"># too low: events can be 30min late</span>\n  .<span class=\"fn\">groupBy</span>(<span class=\"fn\">window</span>(col(<span class=\"str\">\"event_ts\"</span>), <span class=\"str\">\"10 minutes\"</span>), col(<span class=\"str\">\"device_id\"</span>))\n  .<span class=\"fn\">agg</span>(<span class=\"fn\">count</span>(<span class=\"str\">\"*\"</span>).<span class=\"fn\">alias</span>(<span class=\"str\">\"event_count\"</span>))\n  .<span class=\"fn\">writeStream</span>.<span class=\"fn\">outputMode</span>(<span class=\"str\">\"append\"</span>).<span class=\"fn\">start</span>())", "options": ["A. Events more than 1 minute late are dropped and not counted — results are incomplete/incorrect", "B. The watermark automatically adjusts to accommodate late events — it's a minimum, not a maximum", "C. The query fails — watermark must be larger than the trigger interval", "D. The pipeline buffers late events indefinitely until they can be counted"], "answerIndex": 0, "explanation": "A watermark that is too low for the actual lateness of the data causes data loss. Events arriving more than 1 minute late are beyond the watermark threshold and are silently dropped — they never contribute to any window's aggregate. In this case, with events potentially 30 minutes late but a 1-minute watermark, up to 96%+ of late data could be dropped, producing significantly undercounted event_count results. The watermark should be set to at least the maximum expected lateness of data to ensure correctness. Setting it higher increases the state Spark must maintain (more memory) but ensures accuracy. The trade-off: low watermark = low latency but incomplete results; high watermark = high latency but complete results.", "exampleCode": "<span class=\"cm\"># WRONG: watermark too low → drops 30-min-late events</span>\n.<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"event_ts\"</span>, <span class=\"str\">\"1 minute\"</span>)  <span class=\"cm\"># events up to 30min late = dropped</span>\n\n<span class=\"cm\"># CORRECT: watermark matches maximum expected lateness</span>\n.<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"event_ts\"</span>, <span class=\"str\">\"30 minutes\"</span>)  <span class=\"cm\"># events up to 30min late = counted</span>\n\n<span class=\"cm\"># Trade-off:</span>\n<span class=\"cm\"># Low watermark → less state memory, lower latency, but drops late data</span>\n<span class=\"cm\"># High watermark → more state memory, higher latency, but complete results</span>"}, {"section": "Performance", "text": "A Delta table query profile shows <code>Files read: 12,500 / Files pruned: 0</code>. The table has liquid clustering on <code>sale_date</code> and the query filters <code>WHERE sale_date = '2024-06-15'</code>. OPTIMIZE was last run 3 months ago. 90% of the table's data has been added since then. Why is data skipping ineffective?", "code": "<span class=\"cm\">-- Table: 12,500 total files</span>\n<span class=\"cm\">-- Liquid clustering on: sale_date</span>\n<span class=\"cm\">-- Last OPTIMIZE: 3 months ago</span>\n<span class=\"cm\">-- Data added since OPTIMIZE: ~11,250 files (90%)</span>\n\n<span class=\"kw\">SELECT</span> <span class=\"fn\">SUM</span>(revenue) <span class=\"kw\">FROM</span> prod.sales\n<span class=\"kw\">WHERE</span> sale_date = <span class=\"str\">'2024-06-15'</span>", "options": ["A. Liquid clustering statistics expire after 30 days — they must be refreshed with ANALYZE TABLE", "B. 90% of files were written after the last OPTIMIZE — they are not clustered, so data for all sale_dates is mixed across those 11,250 new files with no effective data skipping", "C. Liquid clustering only works for date ranges, not equality filters", "D. The filter must use the CLUSTER HINT syntax for liquid clustering to activate"], "answerIndex": 1, "explanation": "Liquid clustering is only effective for files that have been processed by OPTIMIZE. When data is loaded (INSERT/MERGE/streaming write), new files are written in ingestion order — data for all sale_dates is mixed within each new file. OPTIMIZE physically rearranges these files to co-locate data with the same sale_date, collecting statistics that enable data skipping. With 90% of files written after the last OPTIMIZE, 11,250 files have no clustering — scanning them all for WHERE sale_date='2024-06-15' provides zero pruning. Only the 1,250 originally optimized files benefit from skipping. Fix: run OPTIMIZE now to cluster the recent data.", "exampleCode": "<span class=\"cm\">-- Diagnosis: check clustering status</span>\n<span class=\"kw\">DESCRIBE</span> <span class=\"kw\">DETAIL</span> prod.sales;\n<span class=\"cm\">-- Check: numFiles, clusteringColumns</span>\n\n<span class=\"cm\">-- Fix: run OPTIMIZE to cluster all recent data</span>\n<span class=\"kw\">OPTIMIZE</span> prod.sales;  <span class=\"cm\">-- clusters the 11,250 unclustered files</span>\n\n<span class=\"cm\">-- Best practice: schedule OPTIMIZE after each significant batch load</span>\n<span class=\"cm\">-- In a Lakeflow pipeline, OPTIMIZE runs automatically via Auto Optimize</span>\n<span class=\"cm\">-- OR schedule as the final task in the ingestion job</span>"}, {"section": "Ingestion", "text": "A data engineer reads mixed-format data. Files in <code>/mnt/raw/events</code> are JSON files. Which Auto Loader configuration correctly sets up incremental ingestion with schema inference and rescue of unparseable records?", "code": "<span class=\"cm\"># Option A:</span>\nspark.readStream.<span class=\"fn\">format</span>(<span class=\"str\">\"json\"</span>).<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw/events\"</span>)\n\n<span class=\"cm\"># Option B:</span>\n(spark.readStream\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>, <span class=\"str\">\"json\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.schemaLocation\"</span>, <span class=\"str\">\"/mnt/schema/events\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.schemaEvolutionMode\"</span>, <span class=\"str\">\"rescue\"</span>)\n  .<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw/events\"</span>))\n\n<span class=\"cm\"># Option C:</span>\n(spark.readStream\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>, <span class=\"str\">\"json\"</span>)\n  .<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw/events\"</span>))\n\n<span class=\"cm\"># Option D:</span>\nspark.read.<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>).<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>, <span class=\"str\">\"json\"</span>).<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw\"</span>)", "options": ["A. Option A — standard readStream.format('json') does not support Auto Loader features (checkpoint, file tracking)", "B. Option B — cloudFiles format with schemaLocation for inference and 'rescue' mode for unparseable data", "C. Option C — cloudFiles without schemaLocation; will attempt inference without persisting schema", "D. Option D — uses spark.read (batch), not readStream — not incremental"], "answerIndex": 1, "explanation": "Option B is correct for incremental ingestion with schema inference and rescue. cloudFiles.format='json': tells Auto Loader to parse files as JSON. schemaLocation: required for schema inference — Auto Loader reads the first batch, infers the schema, saves it to this location, and reuses it on subsequent runs (instead of re-inferring every time). schemaEvolutionMode='rescue': unknown/unparseable fields that don't match the inferred schema are saved in a special _rescued_data column as a JSON string, rather than failing or silently dropping them. Option A: standard readStream.format('json') doesn't track files or support Auto Loader features. Option C: missing schemaLocation — schema is re-inferred every restart (inconsistent, slow). Option D: batch read (not streaming).", "exampleCode": "<span class=\"cm\"># Complete Auto Loader configuration with schema rescue:</span>\nbronze_df = (spark.readStream\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>, <span class=\"str\">\"json\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.schemaLocation\"</span>, <span class=\"str\">\"/mnt/schema/events\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.schemaEvolutionMode\"</span>, <span class=\"str\">\"rescue\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.inferColumnTypes\"</span>, <span class=\"str\">\"true\"</span>)\n  .<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw/events\"</span>))\n<span class=\"cm\"># _rescued_data column contains any fields not matching the inferred schema</span>"}, {"section": "Delta Lake", "text": "A data engineer needs to RENAME a Delta table that was created with an external LOCATION. What happens to the data files on cloud storage?", "code": "<span class=\"kw\">CREATE TABLE</span> prod.sales_by_stor\n<span class=\"kw\">USING DELTA</span>\n<span class=\"kw\">LOCATION</span> <span class=\"str\">\"/mnt/prod/sales_by_store\"</span>\n\n<span class=\"cm\">-- Rename (typo fix):</span>\n<span class=\"kw\">ALTER TABLE</span> prod.sales_by_stor <span class=\"kw\">RENAME TO</span> prod.sales_by_store", "options": ["A. The data files are moved from /mnt/prod/sales_by_store to a new path matching the new table name", "B. All related files and metadata are dropped and recreated in a single ACID transaction", "C. The table reference in the metastore is updated; the data files remain at the original LOCATION path", "D. A new Delta transaction log is created for the renamed table at the new path"], "answerIndex": 2, "explanation": "For an EXTERNAL table (created with LOCATION), ALTER TABLE ... RENAME TO only updates the table reference in the metastore — the physical data files remain exactly where they are (/mnt/prod/sales_by_store). The data path is NOT renamed or moved. The new table name simply points to the same underlying data. The transaction log for the external table is also unchanged — it records the rename as a metadata update. This is directly from the exam guide sample questions. For a MANAGED table (no LOCATION), the behavior may differ depending on the metastore, but for external tables, files are always unchanged.", "exampleCode": "<span class=\"cm\">-- EXTERNAL table rename: only metastore updated</span>\n<span class=\"cm\">-- Data files at /mnt/prod/sales_by_store: UNCHANGED ✓</span>\n<span class=\"cm\">-- Metastore entry: updated from sales_by_stor → sales_by_store ✓</span>\n<span class=\"cm\">-- Delta transaction log: records the rename operation ✓</span>\n\n<span class=\"cm\">-- To verify after rename:</span>\n<span class=\"kw\">DESCRIBE</span> <span class=\"kw\">EXTENDED</span> prod.sales_by_store;\n<span class=\"cm\">-- Location still shows: /mnt/prod/sales_by_store (unchanged)</span>"}, {"section": "Streaming", "text": "A streaming job processes financial transactions. The engineer uses <code>foreachBatch</code> to write to two Delta tables. The job fails after writing to Table1 but before Table2. On restart, what is the risk and how is it mitigated?", "code": "<span class=\"kw\">def</span> <span class=\"fn\">write_to_both</span>(batch_df, batch_id):\n    <span class=\"cm\"># Write to Table 1 (succeeds)</span>\n    batch_df.<span class=\"fn\">write</span>.<span class=\"fn\">mode</span>(<span class=\"str\">\"append\"</span>).<span class=\"fn\">saveAsTable</span>(<span class=\"str\">\"gold.summary\"</span>)\n\n    <span class=\"cm\"># Job fails here — before writing Table 2</span>\n    batch_df.<span class=\"fn\">write</span>.<span class=\"fn\">mode</span>(<span class=\"str\">\"append\"</span>).<span class=\"fn\">saveAsTable</span>(<span class=\"str\">\"gold.audit_log\"</span>)\n\nquery = df.<span class=\"fn\">writeStream</span>.<span class=\"fn\">foreachBatch</span>(<span class=\"fn\">write_to_both</span>).<span class=\"fn\">start</span>()", "options": ["A. No risk — foreachBatch provides atomic writes across both tables", "B. On restart, the batch replays (from checkpoint). Table1 gets duplicate records; Table2 gets the data for the first time — inconsistent state", "C. On restart, Delta automatically rolls back Table1's write before replaying", "D. The checkpoint prevents replay — the batch is skipped on restart"], "answerIndex": 1, "explanation": "foreachBatch does NOT provide atomic multi-table writes. Each Delta write is individually atomic, but there is no coordination across tables. When the job restarts, the Structured Streaming checkpoint records that batch_id N was NOT completed (because the function didn't return successfully). On restart, batch_id N is replayed — write_to_both is called again with the same data. Table1 (gold.summary) gets the data AGAIN (duplicate). Table2 (gold.audit_log) gets it for the first time. Fix: make Table1 writes idempotent using the batch_id: write.format('delta').mode('overwrite').option('replaceWhere', f'batch_id={batch_id}') or by including batch_id as a deduplication key.", "exampleCode": "<span class=\"cm\"># FIX: Idempotent writes using batch_id</span>\n<span class=\"kw\">def</span> <span class=\"fn\">write_to_both</span>(batch_df, batch_id):\n    <span class=\"cm\"># Add batch_id for idempotency tracking</span>\n    df_with_id = batch_df.<span class=\"fn\">withColumn</span>(<span class=\"str\">\"batch_id\"</span>, <span class=\"fn\">lit</span>(batch_id))\n\n    <span class=\"cm\"># Idempotent write: use replaceWhere to overwrite this batch's data</span>\n    (df_with_id.<span class=\"fn\">write</span>.<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n      .<span class=\"fn\">mode</span>(<span class=\"str\">\"overwrite\"</span>)\n      .<span class=\"fn\">option</span>(<span class=\"str\">\"replaceWhere\"</span>, <span class=\"fn\">f</span><span class=\"str\">\"batch_id = {batch_id}\"</span>)\n      .<span class=\"fn\">saveAsTable</span>(<span class=\"str\">\"gold.summary\"</span>))\n\n    (df_with_id.<span class=\"fn\">write</span>.<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n      .<span class=\"fn\">mode</span>(<span class=\"str\">\"overwrite\"</span>)\n      .<span class=\"fn\">option</span>(<span class=\"str\">\"replaceWhere\"</span>, <span class=\"fn\">f</span><span class=\"str\">\"batch_id = {batch_id}\"</span>)\n      .<span class=\"fn\">saveAsTable</span>(<span class=\"str\">\"gold.audit_log\"</span>))"}, {"section": "Delta Lake", "text": "A data engineer needs to add a check constraint to prevent <code>price &lt; 0</code>. Which command is correct and what happens to existing data?", "code": "<span class=\"cm\">-- Option A:</span>\n<span class=\"kw\">ALTER TABLE</span> prod.products\n<span class=\"kw\">ADD CONSTRAINT</span> valid_price <span class=\"kw\">CHECK</span> (price >= <span class=\"num\">0</span>)\n\n<span class=\"cm\">-- Option B:</span>\n<span class=\"kw\">ALTER TABLE</span> prod.products\n<span class=\"kw\">ADD COLUMN</span> price DECIMAL(<span class=\"num\">10</span>,<span class=\"num\">2</span>) <span class=\"kw\">CHECK</span> (price >= <span class=\"num\">0</span>)\n\n<span class=\"cm\">-- Option C:</span>\n<span class=\"kw\">CREATE TABLE</span> prod.products_new\n<span class=\"kw\">AS SELECT</span> * <span class=\"kw\">FROM</span> prod.products\n<span class=\"kw\">WHERE</span> price >= <span class=\"num\">0</span>\n\n<span class=\"cm\">-- Option D:</span>\n<span class=\"kw\">ALTER TABLE</span> prod.products\n<span class=\"kw\">SET TBLPROPERTIES</span> (<span class=\"str\">'delta.constraints.valid_price'</span> = <span class=\"str\">'price >= 0'</span>)", "options": ["A. Correct syntax; existing data is checked — if any rows violate, the command fails", "B. Incorrect — CHECK is not valid in ADD COLUMN syntax for Delta", "C. Creates a new table, not a constraint on the existing table", "D. Incorrect — constraints are not set via TBLPROPERTIES"], "answerIndex": 0, "explanation": "ALTER TABLE ... ADD CONSTRAINT <name> CHECK (<expression>) is the correct Delta Lake constraint syntax. When this command runs, Delta validates the constraint against ALL existing rows. If any existing row has price < 0, the command fails with a ConstraintViolationException and the constraint is NOT added. If all existing rows pass, the constraint is added and future writes that violate it will fail the entire batch. Option B is invalid syntax for Delta. Option D might seem plausible but constraints cannot be set via TBLPROPERTIES — the dedicated CONSTRAINT syntax is required. Once added, constraints appear in DESCRIBE DETAIL and DESCRIBE EXTENDED.", "exampleCode": "<span class=\"cm\">-- Correct constraint management:</span>\n<span class=\"cm\">-- Add constraint (checks existing data):</span>\n<span class=\"kw\">ALTER TABLE</span> prod.products\n<span class=\"kw\">ADD CONSTRAINT</span> valid_price <span class=\"kw\">CHECK</span> (price >= <span class=\"num\">0</span>);\n\n<span class=\"cm\">-- Remove constraint:</span>\n<span class=\"kw\">ALTER TABLE</span> prod.products\n<span class=\"kw\">DROP CONSTRAINT</span> valid_price;\n\n<span class=\"cm\">-- View constraints:</span>\n<span class=\"kw\">DESCRIBE</span> <span class=\"kw\">DETAIL</span> prod.products;  <span class=\"cm\">-- shows tableFeatures</span>\n<span class=\"kw\">SHOW TBLPROPERTIES</span> prod.products; <span class=\"cm\">-- shows delta.constraints.*</span>"}, {"section": "Ingestion", "text": "A data engineer reads from Auto Loader with schema inference. After 2 weeks, a new field <code>discount_pct</code> is added to the source JSON. What happens to the Auto Loader pipeline?", "code": "bronze_df = (spark.readStream\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>, <span class=\"str\">\"json\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.schemaLocation\"</span>, <span class=\"str\">\"/mnt/schema/orders\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.schemaEvolutionMode\"</span>, <span class=\"str\">\"addNewColumns\"</span>)\n  .<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw/orders\"</span>))", "options": ["A. The pipeline fails with a schema mismatch error when the new field is encountered", "B. The new field is silently ignored — Auto Loader only reads columns in the original schema", "C. The pipeline detects the new column, adds it to the inferred schema, restarts the stream to apply the schema update, and continues processing including the new field", "D. The new field is written as NULL in existing rows and populated in new rows, with no stream restart needed"], "answerIndex": 2, "explanation": "With cloudFiles.schemaEvolutionMode = 'addNewColumns' (the default), Auto Loader detects new columns in the source data and automatically evolves the schema. When discount_pct first appears: Auto Loader updates the schema file in the schemaLocation, triggers an automatic stream restart to apply the new schema, and continues processing. New files with discount_pct are correctly ingested. Historical files without discount_pct have NULL for that column. Without specifying schemaEvolutionMode or with mode='none', the pipeline would fail on schema mismatch. This is the key configuration for handling evolving JSON sources.", "exampleCode": "<span class=\"cm\"># Schema evolution modes in Auto Loader:</span>\n<span class=\"cm\"># 'addNewColumns' (default): auto-detect and add new columns, restart stream</span>\n<span class=\"cm\"># 'rescue'   : unknown columns written to _rescued_data JSON column</span>\n<span class=\"cm\"># 'failOnNewColumns': fail if new columns detected</span>\n<span class=\"cm\"># 'none'     : ignore new columns</span>\n\nbronze_df = (spark.readStream\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>, <span class=\"str\">\"json\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.schemaLocation\"</span>, <span class=\"str\">\"/mnt/schema\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.schemaEvolutionMode\"</span>, <span class=\"str\">\"addNewColumns\"</span>)\n  .<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw\"</span>))"}, {"section": "Monitoring", "text": "A data engineer sets up a Lakeflow pipeline monitor. Which query against the Event Log returns the pass/fail counts for a specific expectation named <code>valid_amount</code> for the last 5 pipeline runs?", "code": "<span class=\"cm\">-- Option A:</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> system.lakeflow.pipeline_runs\n<span class=\"kw\">WHERE</span> expectation_name = <span class=\"str\">'valid_amount'</span>\n<span class=\"kw\">LIMIT</span> <span class=\"num\">5</span>\n\n<span class=\"cm\">-- Option B:</span>\n<span class=\"kw\">SELECT</span>\n  details:flow_progress:data_quality:expectations <span class=\"kw\">AS</span> expectations,\n  timestamp, origin.update_id\n<span class=\"kw\">FROM</span> <span class=\"fn\">event_log</span>(<span class=\"str\">'&lt;pipeline_id&gt;'</span>)\n<span class=\"kw\">WHERE</span> event_type = <span class=\"str\">'flow_progress'</span>\n  <span class=\"kw\">AND</span> details:flow_progress:data_quality <span class=\"kw\">IS NOT NULL</span>\n<span class=\"kw\">ORDER BY</span> timestamp <span class=\"kw\">DESC</span>\n<span class=\"kw\">LIMIT</span> <span class=\"num\">5</span>\n\n<span class=\"cm\">-- Option C:</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> system.query.history\n<span class=\"kw\">WHERE</span> statement_text <span class=\"kw\">LIKE</span> <span class=\"str\">'%valid_amount%'</span>", "options": ["A. system.lakeflow.pipeline_runs — does not contain expectation-level detail", "B. event_log() function with flow_progress filter — correct source for expectation metrics", "C. system.query.history — tracks SQL queries, not pipeline expec
