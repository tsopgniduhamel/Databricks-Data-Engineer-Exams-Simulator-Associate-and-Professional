 EXTERNAL table (created with LOCATION), ALTER TABLE ... RENAME TO only updates the table reference in the metastore — the physical data files remain exactly where they are (/mnt/prod/sales_by_store). The data path is NOT renamed or moved. The new table name simply points to the same underlying data. The transaction log for the external table is also unchanged — it records the rename as a metadata update. This is directly from the exam guide sample questions. For a MANAGED table (no LOCATION), the behavior may differ depending on the metastore, but for external tables, files are always unchanged.", "exampleCode": "<span class=\"cm\">-- EXTERNAL table rename: only metastore updated</span>\n<span class=\"cm\">-- Data files at /mnt/prod/sales_by_store: UNCHANGED ✓</span>\n<span class=\"cm\">-- Metastore entry: updated from sales_by_stor → sales_by_store ✓</span>\n<span class=\"cm\">-- Delta transaction log: records the rename operation ✓</span>\n\n<span class=\"cm\">-- To verify after rename:</span>\n<span class=\"kw\">DESCRIBE</span> <span class=\"kw\">EXTENDED</span> prod.sales_by_store;\n<span class=\"cm\">-- Location still shows: /mnt/prod/sales_by_store (unchanged)</span>"}, {"section": "Security", "text": "A data engineer needs to share data with partners but must exclude the <code>cost_margin</code> column. What is the most maintainable Unity Catalog approach?", "code": "<span class=\"cm\">-- Table: prod.analytics.product_performance</span>\n<span class=\"cm\">-- Columns: product_id, region, revenue, units_sold, cost_margin (CONFIDENTIAL)</span>\n\n<span class=\"cm\">-- Option A: Create a view</span>\n<span class=\"kw\">CREATE VIEW</span> prod.analytics.product_performance_external <span class=\"kw\">AS</span>\n<span class=\"kw\">SELECT</span> product_id, region, revenue, units_sold\n<span class=\"kw\">FROM</span> prod.analytics.product_performance;\n\n<span class=\"cm\">-- Option B: Delta Sharing with column list</span>\n<span class=\"kw\">CREATE SHARE</span> partner_share;\n<span class=\"kw\">ALTER SHARE</span> partner_share\n<span class=\"kw\">ADD TABLE</span> prod.analytics.product_performance\n  <span class=\"kw\">WITH</span> COLUMN LIST (product_id, region, revenue, units_sold);\n\n<span class=\"cm\">-- Option C: REVOKE SELECT on cost_margin from external group</span>\n<span class=\"kw\">REVOKE SELECT</span> (cost_margin) <span class=\"kw\">ON</span> TABLE prod.analytics.product_performance\n<span class=\"kw\">FROM</span> external_partners;", "options": ["A. Create a view — maintainable, but partners need access to view only", "B. Delta Sharing with column list — shares live data externally without the confidential column, no data copy", "C. REVOKE SELECT on column — column-level REVOKE is not supported in Unity Catalog", "D. Both A and B are valid; B is better when sharing with external/non-Databricks platforms"], "answerIndex": 3, "explanation": "Both A and B are valid approaches. Option A (view): creates a view that excludes cost_margin. Grant SELECT on the view to external partners — they cannot see the underlying table or the cost_margin column. Maintainable: if new columns are added to the base table and should be excluded, update the view. Option B (Delta Sharing with column list): the COLUMN LIST parameter in ADD TABLE for a Delta Share filters which columns are visible to recipients. This is ideal for sharing with non-Databricks external partners — they use the Delta Sharing open protocol and never see cost_margin. Option C is invalid — Unity Catalog does not support column-level REVOKE syntax. Option D is correct: both A and B work; B is specifically designed for cross-platform external sharing.", "exampleCode": "<span class=\"cm\">-- Option A: View for internal Databricks users</span>\n<span class=\"kw\">CREATE VIEW</span> prod.analytics.product_performance_external <span class=\"kw\">AS</span>\n<span class=\"kw\">SELECT</span> product_id, region, revenue, units_sold\n<span class=\"kw\">FROM</span> prod.analytics.product_performance;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> VIEW prod.analytics.product_performance_external\n<span class=\"kw\">TO</span> external_partners;\n\n<span class=\"cm\">-- Option B: Delta Sharing for external/non-Databricks recipients</span>\n<span class=\"kw\">CREATE SHARE</span> partner_share;\n<span class=\"kw\">ALTER SHARE</span> partner_share\n<span class=\"kw\">ADD TABLE</span> prod.analytics.product_performance\n  <span class=\"kw\">WITH</span> COLUMN LIST (product_id, region, revenue, units_sold);\n<span class=\"kw\">CREATE RECIPIENT</span> partner_company;\n<span class=\"kw\">GRANT SELECT ON SHARE</span> partner_share <span class=\"kw\">TO RECIPIENT</span> partner_company;"}, {"section": "Data Modeling", "text": "A data engineer implements Lakeflow CDC using APPLY CHANGES INTO. After 6 months, they discover some records were processed with an incorrect updated_at timestamp. What is the impact?", "code": "<span class=\"kw\">APPLY CHANGES INTO</span> LIVE.silver_customers\n<span class=\"kw\">FROM</span> STREAM(LIVE.bronze_cdc)\nKEYS (customer_id)\nSEQUENCE BY updated_at   <span class=\"cm\">-- Records with incorrect (too-old) updated_at arrive</span>\nSTORED AS SCD TYPE <span class=\"num\">1</span>", "options": ["A. No impact — APPLY CHANGES INTO corrects timestamps automatically", "B. Records with an incorrectly old updated_at are ignored if a newer version of that customer already exists in the target — the incorrect record's 'old' timestamp loses to the existing record's newer timestamp", "C. The pipeline fails — APPLY CHANGES INTO validates timestamps against a system clock", "D. All historical records are reprocessed with the corrected timestamp"], "answerIndex": 1, "explanation": "APPLY CHANGES INTO uses the SEQUENCE BY column to determine record ordering — the record with the HIGHEST updated_at value wins for SCD Type 1. If a record arrives with an incorrectly old updated_at (e.g., updated_at='2020-01-01' when the customer was last updated with updated_at='2024-06-01'), the existing record in the target has a higher sequence value (2024-06-01 > 2020-01-01), so the incorrect record is silently ignored — it doesn't overwrite the current state. This is the CORRECT behavior: APPLY CHANGES INTO is designed to be idempotent and resistant to out-of-order delivery. The issue: if the incorrect record arrives BEFORE any correct record (e.g., as the first record for that customer), it would be applied (no existing record to compare against).", "exampleCode": "<span class=\"cm\">-- SEQUENCE BY semantics: highest value wins (SCD Type 1)</span>\n<span class=\"cm\">-- Scenario 1: Correct order</span>\n<span class=\"cm\">-- Record 1: customer_id=1, updated_at=2024-01-01 → APPLIED (first)</span>\n<span class=\"cm\">-- Record 2: customer_id=1, updated_at=2024-06-01 → APPLIED (newer, wins)</span>\n<span class=\"cm\">-- Record 3: customer_id=1, updated_at=2020-01-01 (incorrect) → IGNORED (older)</span>\n\n<span class=\"cm\">-- Scenario 2: Incorrect record arrives first</span>\n<span class=\"cm\">-- Record 1: customer_id=2, updated_at=2020-01-01 (incorrect) → APPLIED (first)</span>\n<span class=\"cm\">-- Record 2: customer_id=2, updated_at=2024-06-01 → APPLIED (newer, overwrites)</span>\n<span class=\"cm\">-- Final state: correct (2024 record wins)</span>"}, {"section": "CI/CD", "text": "A Databricks Git Folder is linked to a GitHub repository. A developer pushes a commit to the <code>main</code> branch. What must the engineer do to update the notebooks in the Databricks workspace?", "code": "<span class=\"cm\"># After git push to main branch on GitHub:</span>\n<span class=\"cm\"># Option A: No action needed — workspace auto-syncs</span>\n\n<span class=\"cm\"># Option B: CLI command</span>\n$ databricks repos update --repo-id <span class=\"num\">12345</span> --branch main\n\n<span class=\"cm\"># Option C: REST API</span>\n<span class=\"kw\">PATCH</span> /api/2.0/repos/12345\n{<span class=\"str\">\"branch\"</span>: <span class=\"str\">\"main\"</span>}\n\n<span class=\"cm\"># Option D:</span>\n$ databricks workspace import ./notebook.py /Workspace/Repos/main/notebook", "options": ["A. No action needed — Databricks Git Folders auto-sync with the remote repository", "B. Run databricks repos update CLI command to pull the latest commit", "C. Call PATCH /api/2.0/repos/12345 to pull the latest from main — equivalent to a git pull", "D. Options B and C both correctly pull the latest commit; A is incorrect (no auto-sync)"], "answerIndex": 3, "explanation": "Databricks Git Folders do NOT automatically sync when commits are pushed to the remote repository. A pull action must be explicitly triggered. Both Option B (CLI) and Option C (REST API) accomplish this — they instruct the workspace to pull the latest commit from the specified branch. Option A is incorrect: there is no auto-sync functionality. This is by design — teams control WHEN changes are promoted to the workspace (preventing accidental deployment of untested code). In a CI/CD pipeline, the PATCH /api/2.0/repos/{repo_id} call is typically added as a deployment step after tests pass.", "exampleCode": "<span class=\"cm\"># Option B: CLI pull (git pull equivalent)</span>\n$ databricks repos update --repo-id <span class=\"num\">12345</span> --branch main\n\n<span class=\"cm\"># Option C: REST API pull</span>\n$ curl -X PATCH /api/2.0/repos/12345   -H <span class=\"str\">\"Authorization: Bearer $TOKEN\"</span>   -d <span class=\"str\">'{\"branch\": \"main\"}'</span>\n\n<span class=\"cm\"># In CI/CD pipeline (GitHub Actions example):</span>\n- name: Deploy to Databricks workspace\n  run: |\n    curl -X PATCH $DATABRICKS_HOST/api/2.0/repos/$REPO_ID       -H \"Authorization: Bearer $DATABRICKS_TOKEN\"       -d '{\"branch\": \"main\"}'"}, {"section": "Governance", "text": "A data engineer runs DESCRIBE HISTORY on a Delta table. Which information does this command return that is useful for debugging a data issue?", "code": "<span class=\"kw\">DESCRIBE HISTORY</span> prod.sales.orders <span class=\"kw\">LIMIT</span> <span class=\"num\">10</span>", "options": ["A. The column-level lineage showing which upstream tables contributed each column", "B. The last 10 schema versions of the table showing column additions and removals", "C. The last 10 Delta operations including version, timestamp, user, operation type (WRITE/UPDATE/DELETE/MERGE/OPTIMIZE), and operation metrics", "D. The last 10 VACUUM operations showing which files were deleted"], "answerIndex": 2, "explanation": "DESCRIBE HISTORY returns the Delta transaction log audit trail: each row represents one Delta operation with: version (incrementing integer), timestamp (when the commit occurred), user (who performed the operation), operation (WRITE, UPDATE, DELETE, MERGE, OPTIMIZE, VACUUM COMMIT, RESTORE, etc.), and operationMetrics (rows added, rows removed, files added, files changed, etc.). This is invaluable for debugging: 'Who deleted those rows?' 'When did this table last receive data?' 'What did the last MERGE affect?' It does NOT show column lineage (A), schema version history (B), or VACUUM file details in the same table (D).", "exampleCode": "<span class=\"cm\">-- DESCRIBE HISTORY output columns:</span>\n<span class=\"cm\">-- version:          Delta version number (0, 1, 2, ...)</span>\n<span class=\"cm\">-- timestamp:        When the operation was committed</span>\n<span class=\"cm\">-- userId/userName:  Who performed the operation</span>\n<span class=\"cm\">-- operation:        WRITE | UPDATE | DELETE | MERGE | OPTIMIZE | RESTORE</span>\n<span class=\"cm\">-- operationMetrics: {numTargetRowsUpdated, numTargetRowsDeleted, ...}</span>\n<span class=\"cm\">-- operationParameters: parameters used (e.g., predicates for UPDATE)</span>\n\n<span class=\"kw\">DESCRIBE HISTORY</span> prod.sales.orders;\n<span class=\"kw\">DESCRIBE HISTORY</span> prod.sales.orders <span class=\"kw\">LIMIT</span> <span class=\"num\">5</span>; <span class=\"cm\">-- last 5 operations</span>"}, {"section": "Performance", "text": "A Databricks SQL query on a Delta table shows <code>Files read: 3,200 / Files pruned: 0</code> after the engineer verified that liquid clustering was applied and OPTIMIZE was run. The query filter is <code>WHERE event_category = 'purchase'</code>. The table is clustered on <code>(event_date, event_category)</code>. What is the likely issue?", "code": "<span class=\"cm\">-- Table: CLUSTER BY (event_date, event_category)</span>\n<span class=\"cm\">-- OPTIMIZE was run 1 week ago</span>\n\n<span class=\"cm\">-- Query 1 (fast after OPTIMIZE):</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> events <span class=\"kw\">WHERE</span> event_date = <span class=\"str\">'2024-06-15'</span>\n<span class=\"cm\">-- Files pruned: 3,100 / 3,200 ✓</span>\n\n<span class=\"cm\">-- Query 2 (no pruning):</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> events <span class=\"kw\">WHERE</span> event_category = <span class=\"str\">'purchase'</span>\n<span class=\"cm\">-- Files pruned: 0 / 3,200 ✗</span>", "options": ["A. Liquid clustering on two columns means only the first column (event_date) gets effective skipping; secondary column skipping is not supported", "B. Liquid clustering co-locates data for multiple clustering columns together — data is optimally laid out when BOTH columns are filtered simultaneously. Filtering on only event_category without event_date may not achieve effective skipping", "C. The event_category column has too many distinct values for skipping to work", "D. Query 2 needs a CLUSTER HINT to activate skipping for the secondary column"], "answerIndex": 1, "explanation": "Liquid clustering organizes data to maximize co-location for the clustering key columns used TOGETHER. When both event_date AND event_category are used in a filter, the data layout (from OPTIMIZE) is most effective at pruning files — data with event_date='2024-06-15' AND event_category='purchase' is co-located, so Spark can skip most files. When only event_category is filtered (without event_date), the data layout from the clustering algorithm may not provide effective per-category skipping because files contain a mix of event_categories spread across different date ranges. This is a key nuance: clustering on (A, B) optimizes for queries filtering on A, or A+B, but not necessarily B alone.", "exampleCode": "<span class=\"cm\">-- Clustering column order matters:</span>\n<span class=\"cm\">-- CLUSTER BY (event_date, event_category)</span>\n<span class=\"cm\">--   ✓ WHERE event_date = X                  → good skipping (first col)</span>\n<span class=\"cm\">--   ✓ WHERE event_date = X AND event_cat = Y → best skipping (both cols)</span>\n<span class=\"cm\">--   △ WHERE event_category = Y              → limited skipping (second col alone)</span>\n\n<span class=\"cm\">-- If event_category is the dominant filter, adjust clustering:</span>\n<span class=\"kw\">ALTER TABLE</span> events <span class=\"kw\">CLUSTER BY</span> (event_category, event_date);\n<span class=\"kw\">OPTIMIZE</span> events;  <span class=\"cm\">-- re-cluster with new column order</span>"}, {"section": "Streaming", "text": "A data engineer monitors a streaming Lakeflow pipeline. The Event Log shows that the batch processing time has increased from 30 seconds to 8 minutes over the past 2 weeks. No new data volume increase. Which investigation step should be first?", "code": "<span class=\"cm\">-- Monitoring query to investigate:</span>\n<span class=\"kw\">SELECT</span>\n  timestamp,\n  details:flow_progress:metrics:numOutputRows,\n  details:flow_progress:metrics:numStateRows,\n  details:flow_progress:source_info:startOffset,\n  details:flow_progress:source_info:endOffset\n<span class=\"kw\">FROM</span> <span class=\"fn\">event_log</span>(<span class=\"str\">'&lt;pipeline_id&gt;'</span>)\n<span class=\"kw\">WHERE</span> event_type = <span class=\"str\">'flow_progress'</span>\n<span class=\"kw\">ORDER BY</span> timestamp <span class=\"kw\">DESC</span>", "options": ["A. Check if the source has changed — new file format or larger individual files", "B. Check numStateRows trend in the Event Log — if it's growing unboundedly, missing or too-large watermark is causing state bloat", "C. Scale up the cluster — more workers will reduce processing time", "D. Disable liquid clustering to reduce write overhead per micro-batch"], "answerIndex": 1, "explanation": "Gradual performance degradation over 2 weeks without input volume changes is a classic signature of unbounded state growth. The numStateRows metric in the Lakeflow Event Log tracks how many rows are stored in the streaming state store. If it's growing every batch (not decreasing or plateauing), state from old batches is never evicted — this happens when a watermark is missing or set too loosely for a stateful operation (windowed aggregation, stream-stream join, dropDuplicates). As the RocksDB state store grows, each batch takes longer to read/write/commit state. Fix: add or tighten the watermark to bound state eviction.", "exampleCode": "<span class=\"cm\">-- Monitor state growth trend:</span>\n<span class=\"kw\">SELECT</span>\n  timestamp,\n  details:flow_progress:metrics:numStateRows <span class=\"kw\">AS</span> state_rows,\n  details:flow_progress:batch_id\n<span class=\"kw\">FROM</span> <span class=\"fn\">event_log</span>(<span class=\"str\">'&lt;pipeline_id&gt;'</span>)\n<span class=\"kw\">WHERE</span> event_type = <span class=\"str\">'flow_progress'</span>\n<span class=\"kw\">ORDER BY</span> timestamp\n<span class=\"cm\">-- If state_rows grows each batch → unbounded state → add/fix watermark</span>\n\n<span class=\"cm\">-- Fix: Add proper watermark</span>\ndf.<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"event_ts\"</span>, <span class=\"str\">\"1 hour\"</span>)  <span class=\"cm\"># evict state older than 1 hour</span>"}, {"section": "Delta Lake", "text": "A data engineer needs to verify that a specific data file is still referenced by the current Delta table version (to determine if VACUUM will remove it). Which command lists all currently active data files?", "code": "<span class=\"cm\">-- Options to list current/active files:</span>\n\n<span class=\"cm\">-- Option A:</span>\n<span class=\"kw\">DESCRIBE HISTORY</span> prod.orders;\n\n<span class=\"cm\">-- Option B:</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> prod.orders.files\n\n<span class=\"cm\">-- Option C:</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">input_file_name</span>() <span class=\"kw\">FROM</span> prod.orders\n\n<span class=\"cm\">-- Option D:</span>\n<span class=\"kw\">DESCRIBE DETAIL</span> prod.orders", "options": ["A. DESCRIBE HISTORY — shows operation history, not individual file names", "B. SELECT * FROM <table>.files — lists all active data files with path, size, modification time, and stats", "C. SELECT input_file_name() FROM table — returns one row per data row with the file path", "D. DESCRIBE DETAIL — shows aggregate table stats (numFiles, sizeInBytes) but not individual file names"], "answerIndex": 1, "explanation": "The Delta table function <table>.files (or equivalently SELECT * FROM delta.`<path>`.files) returns a row for each active data file in the current table version — including the file path, size, modification time, partition values, and statistics. Files listed here will NOT be removed by VACUUM (they are currently referenced). Files that exist on disk but are NOT in this list are candidates for VACUUM removal. DESCRIBE HISTORY (A) shows operation metadata, not file paths. input_file_name() (C) requires a full table scan to return file names per row — very expensive for large tables. DESCRIBE DETAIL (D) gives aggregate counts, not individual file paths.", "exampleCode": "<span class=\"cm\">-- List all active files in current Delta version:</span>\n<span class=\"kw\">SELECT</span> path, size, modificationTime, stats\n<span class=\"kw\">FROM</span> prod.orders.files;\n\n<span class=\"cm\">-- For path-based tables:</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> delta.<span class=\"str\">&#96;/mnt/prod/orders&#96;</span>.files;\n\n<span class=\"cm\">-- Files in this output: will NOT be deleted by VACUUM</span>\n<span class=\"cm\">-- Files on disk but NOT here: will be deleted by VACUUM (if > retention)</span>"}, {"section": "Data Modeling", "text": "A data engineer uses PySpark window functions and needs to calculate a <strong>running total</strong> of revenue per customer, ordered by order date. Which code is correct?", "code": "<span class=\"kw\">from</span> pyspark.sql.window <span class=\"kw\">import</span> Window\n<span class=\"kw\">from</span> pyspark.sql.functions <span class=\"kw\">import</span> sum, col\n\n<span class=\"cm\"># Option A — Correct window spec for running total?</span>\nwindow_a = <span class=\"fn\">Window</span>.<span class=\"fn\">partitionBy</span>(<span class=\"str\">\"customer_id\"</span>).<span class=\"fn\">orderBy</span>(<span class=\"str\">\"order_date\"</span>)\ndf.<span class=\"fn\">withColumn</span>(<span class=\"str\">\"running_total\"</span>, <span class=\"fn\">sum</span>(<span class=\"str\">\"revenue\"</span>).<span class=\"fn\">over</span>(window_a))\n\n<span class=\"cm\"># Option B — Partition only, no order</span>\nwindow_b = <span class=\"fn\">Window</span>.<span class=\"fn\">partitionBy</span>(<span class=\"str\">\"customer_id\"</span>)\ndf.<span class=\"fn\">withColumn</span>(<span class=\"str\">\"running_total\"</span>, <span class=\"fn\">sum</span>(<span class=\"str\">\"revenue\"</span>).<span class=\"fn\">over</span>(window_b))\n\n<span class=\"cm\"># Option C — Order only, no partition</span>\nwindow_c = <span class=\"fn\">Window</span>.<span class=\"fn\">orderBy</span>(<span class=\"str\">\"order_date\"</span>)\ndf.<span class=\"fn\">withColumn</span>(<span class=\"str\">\"running_total\"</span>, <span class=\"fn\">sum</span>(<span class=\"str\">\"revenue\"</span>).<span class=\"fn\">over</span>(window_c))", "options": ["A. Option A — partitionBy(customer_id).orderBy(order_date) creates a per-customer running total", "B. Option B — partitionBy without orderBy calculates total per customer (not running)", "C. Option C — orderBy without partitionBy calculates a global running total (not per customer)", "D. Options A and B both produce running totals — the orderBy is optional"], "answerIndex": 0, "explanation": "Option A is correct. For a per-customer running total: partitionBy('customer_id') ensures each customer's rows form an independent window. orderBy('order_date') defines the ordering within each partition — sum() with an ordered window defaults to ROWS UNBOUNDED PRECEDING AND CURRENT ROW (the running/cumulative sum). Option B: without orderBy, sum() over the window calculates the total for the ENTIRE partition (equivalent to GROUP BY customer_id sum) — every row gets the same total, not a running total. Option C: without partitionBy, the window is global — the running total accumulates across ALL customers ordered by order_date, not per customer.", "exampleCode": "<span class=\"kw\">from</span> pyspark.sql.window <span class=\"kw\">import</span> Window\n<span class=\"kw\">from</span> pyspark.sql.functions <span class=\"kw\">import</span> sum, col, lag, row_number\n\n<span class=\"cm\"># Running total per customer (correct):</span>\nwindow = <span class=\"fn\">Window</span>.<span class=\"fn\">partitionBy</span>(<span class=\"str\">\"customer_id\"</span>).<span class=\"fn\">orderBy</span>(<span class=\"str\">\"order_date\"</span>)\ndf.<span class=\"fn\">withColumn</span>(<span class=\"str\">\"running_total\"</span>, <span class=\"fn\">sum</span>(<span class=\"str\">\"revenue\"</span>).<span class=\"fn\">over</span>(window))\n\n<span class=\"cm\"># Total per customer (no running — no orderBy):</span>\nwindow2 = <span class=\"fn\">Window</span>.<span class=\"fn\">partitionBy</span>(<span class=\"str\">\"customer_id\"</span>)\ndf.<span class=\"fn\">withColumn</span>(<span class=\"str\">\"customer_total\"</span>, <span class=\"fn\">sum</span>(<span class=\"str\">\"revenue\"</span>).<span class=\"fn\">over</span>(window2))\n\n<span class=\"cm\"># Row number per customer:</span>\ndf.<span class=\"fn\">withColumn</span>(<span class=\"str\">\"order_rank\"</span>, <span class=\"fn\">row_number</span>().<span class=\"fn\">over</span>(window))"}, {"section": "Delta Lake", "text": "A data engineer runs RESTORE TABLE to undo a bad batch load. What effect does this have on the Delta transaction log?", "code": "<span class=\"kw\">DESCRIBE HISTORY</span> prod.orders;\n<span class=\"cm\">-- version 20: WRITE (bad batch loaded)</span>\n<span class=\"cm\">-- version 19: WRITE (good state)</span>\n\n<span class=\"kw\">RESTORE TABLE</span> prod.orders <span class=\"kw\">TO VERSION AS OF</span> <span class=\"num\">19</span>", "options": ["A. Versions 20 is deleted from the transaction log; the table reverts to version 19", "B. A new version 21 is created that restores the table data to match version 19; versions 19 and 20 remain in history", "C. The table is physically reverted to version 19; a backup of version 20 is stored in a temp location", "D. RESTORE deletes the bad data from all Delta file versions permanently"], "answerIndex": 1, "explanation": "RESTORE TABLE creates a NEW Delta version (version 21 in this case) that makes the table's current state match the specified historical version. The Delta transaction log is append-only — versions 19 and 20 are NEVER deleted. DESCRIBE HISTORY after RESTORE shows version 21 as a RESTORE operation. The data files from the bad batch (version 20) remain on storage until VACUUM runs after the retention period. This is important: RESTORE does not physically remove the bad data — it just makes version 19's file set the 'current' view. For physically removing the bad batch data, you would then need VACUUM.", "exampleCode": "<span class=\"cm\">-- After RESTORE, DESCRIBE HISTORY shows:</span>\n<span class=\"cm\">-- version 21: RESTORE (this is the new entry)</span>\n<span class=\"cm\">-- version 20: WRITE (bad batch — still in history)</span>\n<span class=\"cm\">-- version 19: WRITE (the restored state)</span>\n\n<span class=\"cm\">-- RESTORE is additive — does not delete history</span>\n<span class=\"cm\">-- To verify the restore worked:</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">COUNT</span>(*) <span class=\"kw\">FROM</span> prod.orders;         <span class=\"cm\">-- current (= v19 count)</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">COUNT</span>(*) <span class=\"kw\">FROM</span> prod.orders <span class=\"kw\">VERSION AS OF</span> <span class=\"num\">19</span>; <span class=\"cm\">-- same</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">COUNT</span>(*) <span class=\"kw\">FROM</span> prod.orders <span class=\"kw\">VERSION AS OF</span> <span class=\"num\">20</span>; <span class=\"cm\">-- shows bad batch count</span>"}, {"section": "Performance", "text": "A data engineer needs to control the Spark SQL shuffle partition count adaptively. Which combination of configurations is correct for AQE to automatically coalesce tiny shuffle partitions?", "code": "<span class=\"cm\"># Option A:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.enabled\"</span>, <span class=\"str\">\"true\"</span>)\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.coalescePartitions.enabled\"</span>, <span class=\"str\">\"true\"</span>)\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.advisoryPartitionSizeInBytes\"</span>, <span class=\"str\">\"134217728\"</span>) <span class=\"cm\"># 128MB</span>\n\n<span class=\"cm\"># Option B:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.enabled\"</span>, <span class=\"str\">\"false\"</span>)\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.shuffle.partitions\"</span>, <span class=\"str\">\"200\"</span>)\n\n<span class=\"cm\"># Option C:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.enabled\"</span>, <span class=\"str\">\"true\"</span>)\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.shuffle.partitions\"</span>, <span class=\"str\">\"200\"</span>)\n<span class=\"cm\"># (coalescePartitions not explicitly set)</span>", "options": ["A. Option A — explicitly enables AQE + coalescePartitions with a target size (most explicit/complete)", "B. Option B — AQE disabled; shuffle.partitions=200 is static, no adaptive coalescing", "C. Option C — AQE enabled; coalescePartitions.enabled defaults to true when AQE is enabled", "D. Options A and C are both correct — coalescePartitions.enabled defaults to true with AQE"], "answerIndex": 3, "explanation": "Both A and C are correct. In Databricks, when spark.sql.adaptive.enabled = true (the Databricks default), spark.sql.adaptive.coalescePartitions.enabled also defaults to true — you don't need to explicitly set it. Option A explicitly sets all three parameters — fully explicit and correct, recommended for clarity. Option C enables AQE and sets shuffle.partitions (the initial count before coalescing) — coalescePartitions is implicitly enabled. Both will result in AQE automatically merging small post-shuffle partitions based on advisoryPartitionSizeInBytes (default 64MB). Option B disables AQE entirely — no adaptive coalescing.", "exampleCode": "<span class=\"cm\"># AQE Partition Coalescing — how it works:</span>\n<span class=\"cm\"># 1. shuffle.partitions sets the INITIAL count (e.g., 200)</span>\n<span class=\"cm\"># 2. After shuffle, if many partitions are tiny (e.g., 200 partitions, avg 500KB each)</span>\n<span class=\"cm\"># 3. AQE merges them toward advisoryPartitionSizeInBytes (default 64MB)</span>\n<span class=\"cm\"># 4. Result: fewer, appropriately-sized partitions</span>\n\n<span class=\"cm\"># Defaults in Databricks (no config needed):</span>\n<span class=\"cm\"># spark.sql.adaptive.enabled = true</span>\n<span class=\"cm\"># spark.sql.adaptive.coalescePartitions.enabled = true</span>\n<span class=\"cm\"># spark.sql.adaptive.advisoryPartitionSizeInBytes = 67108864 (64MB)</span>"}, {"section": "Governance", "text": "A data engineer needs to grant a service principal permissions to create and read tables in <code>prod.analytics</code>. What is the MINIMUM set of Unity Catalog permissions required?", "code": "<span class=\"cm\">-- Option A:</span>\n<span class=\"kw\">GRANT</span> ALL PRIVILEGES <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n\n<span class=\"cm\">-- Option B:</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n<span class=\"kw\">GRANT</span> CREATE TABLE <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n\n<span class=\"cm\">-- Option C:</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n<span class=\"kw\">GRANT</span> CREATE TABLE, <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n\n<span class=\"cm\">-- Option D:</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n<span class=\"kw\">GRANT</span> CREATE TABLE <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;", "options": ["A. ALL PRIVILEGES on schema — too broad, not minimum privilege", "B. USAGE on catalog + USAGE on schema + CREATE TABLE + SELECT on schema — correct minimum set", "C. Missing USAGE on schema — without USAGE on the schema, the service principal cannot access it", "D. Missing SELECT — CREATE TABLE alone doesn't grant read access to existing tables"], "answerIndex": 1, "explanation": "Option B is the minimum required set. USAGE on catalog (prod): required to navigate to the catalog. USAGE on schema (prod.analytics): required to use/access the schema. CREATE TABLE on schema: allows creating new tables within the schema. SELECT on schema: allows reading data from tables in the schema (SELECT at the schema level grants SELECT on all current and future tables). Note: SELECT is NOT implied by CREATE TABLE — these are separate privileges. Without USAGE on the schema (Option C), the service principal cannot access any objects in the schema even with other grants. Without SELECT (Option D), CREATE TABLE gives the ability to create tables but not read them.", "exampleCode": "<span class=\"cm\">-- Minimum grants for create + read in Unity Catalog:</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod <span class=\"kw\">TO</span> &#96;my-service-principal&#96;;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-service-principal&#96;;\n<span class=\"kw\">GRANT</span> CREATE TABLE <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-service-principal&#96;;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-service-principal&#96;;\n\n<span class=\"cm\">-- For write access to existing tables, also add:</span>\n<span class=\"kw\">GRANT</span> MODIFY <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-service-principal&#96;;"}]}, {"title": "Practice Exam 2", "focus": "Security · Performance · Governance · Ingestion", "questions": [{"section": "Security", "text": "A data engineer creates the following view to implement column-level security. An analyst NOT in the <code>marketing</code> group queries the view. What is returned?", "code": "<span class=\"kw\">CREATE VIEW</span> prod.analytics.customer_view <span class=\"kw\">AS</span>\n<span class=\"kw\">SELECT</span>\n  customer_id,\n  <span class=\"kw\">CASE WHEN</span> <span class=\"fn\">is_member</span>(<span class=\"str\">'marketing'</span>) <span class=\"kw\">THEN</span> email\n       <span class=\"kw\">ELSE</span> <span class=\"str\">'REDACTED'</span>\n  <span class=\"kw\">END AS</span> email,\n  age,\n  ltv\n<span class=\"kw\">FROM</span> prod.analytics.customers", "options": ["A. The query fails — the analyst doesn't have permission to access the underlying table", "B. Four columns returned; email column contains 'REDACTED' for every row", "C. Four columns returned; email column contains NULL for every row", "D. Two columns returned (customer_id and ltv); email and age are hidden for non-marketing users"], "answerIndex": 1, "explanation": "This is a dynamic view pattern. The CASE WHEN is_member('marketing') expression is evaluated at query time per session. For analysts not in the marketing group, is_member('marketing') returns false, so the CASE returns the string 'REDACTED' for every row. The column is still returned — it just shows 'REDACTED' instead of the actual email. The view returns all four columns (customer_id, email, age, ltv) — only the email values are masked. Option A is wrong because with views in Unity Catalog, the analyst needs SELECT on the VIEW but not on the underlying table (ownership chain provides access). This is from the official exam guide sample questions.", "exampleCode": "<span class=\"cm\">-- For analysts NOT in marketing group:</span>\n<span class=\"cm\">-- Returns: customer_id | email      | age | ltv</span>\n<span class=\"cm\">--          1001        | REDACTED   | 34  | 850</span>\n<span class=\"cm\">--          1002        | REDACTED   | 28  | 1200</span>\n\n<span class=\"cm\">-- Modern equivalent using Unity Catalog column masks:</span>\n<span class=\"kw\">CREATE FUNCTION</span> mask_email(email <span class=\"kw\">STRING</span>)\n<span class=\"kw\">RETURN CASE WHEN</span> <span class=\"fn\">is_account_group_member</span>(<span class=\"str\">'marketing'</span>) <span class=\"kw\">THEN</span> email <span class=\"kw\">ELSE</span> <span class=\"str\">'REDACTED'</span> <span class=\"kw\">END</span>;\n\n<span class=\"kw\">ALTER TABLE</span> customers <span class=\"kw\">ALTER COLUMN</span> email <span class=\"kw\">SET MASK</span> mask_email;"}, {"section": "Performance", "text": "A data engineer examines a query profile and sees <strong>Files read: 8,400</strong> but <strong>Files pruned: 12</strong>. The table has liquid clustering on <code>region</code> and the query filters on <code>WHERE region = 'EMEA'</code>. What is the most likely root cause?", "code": "<span class=\"cm\">-- Query profile output:</span>\n<span class=\"cm\">-- Files read:   8,400</span>\n<span class=\"cm\">-- Files pruned: 12</span>\n<span class=\"cm\">-- Bytes read:   890 GB</span>\n<span class=\"cm\">-- Bytes read after filter: 2.1 GB</span>\n\n<span class=\"kw\">SELECT</span> <span class=\"fn\">SUM</span>(revenue) <span class=\"kw\">FROM</span> prod.fact_sales\n<span class=\"kw\">WHERE</span> region = <span class=\"str\">'EMEA'</span>\n  <span class=\"kw\">AND</span> sale_date >= <span class=\"str\">'2024-01-01'</span>", "options": ["A. Liquid clustering is not compatible with the Databricks SQL warehouse used for the query", "B. OPTIMIZE has never been run since the table was created — data is not yet physically clustered", "C. The region column has too many distinct values for liquid clustering to work effectively", "D. Liquid clustering only works with Z-ORDER syntax — CLUSTER BY must be converted"], "answerIndex": 1, "explanation": "Liquid clustering requires OPTIMIZE to physically rearrange data files according to the clustering columns. When a table is created with CLUSTER BY and data is loaded, the files are written in ingestion order — they are NOT automatically clustered. Until OPTIMIZE runs, data for all regions is mixed across all files, making data skipping ineffective. The evidence: 8,400 files read, only 12 pruned — almost no skipping. After running OPTIMIZE, statistics are collected and data is co-located by region, enabling skipping of ~95%+ of files for a single region filter.", "exampleCode": "<span class=\"cm\">-- Step 1: Verify clustering status</span>\n<span class=\"kw\">DESCRIBE</span> <span class=\"kw\">DETAIL</span> prod.fact_sales;\n<span class=\"cm\">-- Look at: clusteringColumns, numFiles, sizeInBytes</span>\n\n<span class=\"cm\">-- Step 2: Run OPTIMIZE to physically cluster data</span>\n<span class=\"kw\">OPTIMIZE</span> prod.fact_sales;\n<span class=\"cm\">-- For large tables, cluster incrementally on recent partitions</span>\n\n<span class=\"cm\">-- Step 3: Re-run query — files pruned should now be ~8,300+</span>"}, {"section": "Governance", "text": "A data engineer grants permissions. Which of the following grants allows a user to <strong>only browse metadata</strong> (table names, schema, comments) in a catalog without reading any data?", "code": "<span class=\"cm\">-- Option A</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod_catalog <span class=\"kw\">TO</span> new_analyst;\n\n<span class=\"cm\">-- Option B</span>\n<span class=\"kw\">GRANT</span> BROWSE <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod_catalog <span class=\"kw\">TO</span> new_analyst;\n\n<span class=\"cm\">-- Option C</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod_catalog <span class=\"kw\">TO</span> new_analyst;\n\n<span class=\"cm\">-- Option D</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span>, <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod_catalog.analytics <span class=\"kw\">TO</span> new_analyst;", "options": ["A. GRANT USAGE ON CATALOG — allows navigating to objects, required before queries but not for browse-only", "B. GRANT BROWSE ON CATALOG — grants metadata read access (table names, schema, comments) without data access", "C. GRANT SELECT ON CATALOG — grants read access to all data in all tables in the catalog", "D. GRANT USAGE, SELECT ON SCHEMA — grants data access to a specific schema"], "answerIndex": 1, "explanation": "BROWSE is a Unity Catalog privilege specifically designed for metadata-only access: the grantee can see that tables exist, view their schema, column names, and comments in the catalog browser — but cannot run SELECT or access actual data. This is ideal for data discovery use cases where new team members need to explore available datasets. USAGE (Option A) is required to navigate to and use objects — it's a prerequisite for queries but doesn't enable browsing without also needing SELECT. It's more of a 'can traverse this level' permission. SELECT (Option C) at the catalog level grants full data read access across all tables — too broad.", "exampleCode": "<span class=\"cm\">-- Minimum privilege hierarchy for full data access:</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod_catalog <span class=\"kw\">TO</span> analyst;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod_catalog.analytics <span class=\"kw\">TO</span> analyst;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> <span class=\"kw\">TABLE</span> prod_catalog.analytics.orders <span class=\"kw\">TO</span> analyst;\n\n<span class=\"cm\">-- Browse only (metadata, no data access):</span>\n<span class=\"kw\">GRANT</span> BROWSE <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod_catalog <span class=\"kw\">TO</span> new_analyst;"}, {"section": "Performance", "text": "A data engineer examines a slow query. The Query Profile shows a <strong>Sort-Merge Join</strong> with 600GB shuffle write between a 2TB fact table and a 200MB dimension table. AQE is enabled. Which configuration change most directly fixes this?", "code": "<span class=\"cm\">-- Current configuration:</span>\nspark.conf.<span class=\"fn\">get</span>(<span class=\"str\">\"spark.sql.adaptive.enabled\"</span>)               <span class=\"cm\"># true</span>\nspark.conf.<span class=\"fn\">get</span>(<span class=\"str\">\"spark.sql.autoBroadcastJoinThreshold\"</span>)    <span class=\"cm\"># 10485760 (10MB)</span>\nspark.conf.<span class=\"fn\">get</span>(<span class=\"str\">\"spark.sql.adaptive.autoBroadcastJoinThreshold\"</span>) <span class=\"cm\"># 10485760 (10MB)</span>\n\n<span class=\"cm\">-- The dimension table is 200MB after predicate pushdown</span>", "options": ["A. Set spark.sql.autoBroadcastJoinThreshold to 209715200 (200MB) — static planning threshold", "B. Set spark.sql.adaptive.autoBroadcastJoinThreshold to 209715200 (200MB) — AQE runtime threshold", "C. Add a broadcast hint in the SQL query: SELECT /*+ BROADCAST(dim) */ ...", "D. Options B and C both work; B is automatic, C is manual but guaranteed"], "answerIndex": 3, "explanation": "Both B and C are correct approaches. Option B: Setting spark.sql.adaptive.autoBroadcastJoinThreshold to 200MB allows AQE to automatically convert the sort-merge join to a broadcast join at RUNTIME using actual data sizes (post-predicate-pushdown). This is cluster-wide config. Option C: Adding a BROADCAST hint in the query forces the broadcast regardless of the threshold — useful for one-off queries or when you know the dimension is small. The distinction: the static threshold (Option A: spark.sql.autoBroadcastJoinThreshold) is checked at PLAN time using estimated sizes, which may underestimate after filtering. The AQE threshold (B) is checked at runtime with actual sizes — more accurate. For a 200MB table with AQE enabled, both B and C are effective solutions.", "exampleCode": "<span class=\"cm\">-- Option B: AQE auto-broadcast (cluster config)</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.autoBroadcastJoinThreshold\"</span>, <span class=\"str\">\"209715200\"</span>)\n\n<span class=\"cm\">-- Option C: Manual BROADCAST hint (query-level)</span>\n<span class=\"kw\">SELECT</span> <span class=\"cm\">/*+ BROADCAST(d) */</span>\n  f.*, d.category\n<span class=\"kw\">FROM</span> fact_sales f\n<span class=\"kw\">JOIN</span> dim_product d <span class=\"kw\">ON</span> f.product_id = d.product_id"}, {"section": "Ingestion", "text": "A data engineer uses COPY INTO to load JSON files into a Delta table. On the second run, new files have arrived. What does COPY INTO do?", "code": "<span class=\"cm\">-- First run (Monday):</span>\n<span class=\"kw\">COPY INTO</span> prod.bronze.events\n<span class=\"kw\">FROM</span> <span class=\"str\">'abfss://container@storage.dfs.core.windows.net/raw/'</span>\nFILEFORMAT = JSON\n<span class=\"kw\">COPY_OPTIONS</span> (<span class=\"str\">'mergeSchema'</span> = <span class=\"str\">'true'</span>)\n\n<span class=\"cm\">-- New files arrive Tuesday</span>\n\n<span class=\"cm\">-- Second run (Tuesday):</span>\n<span class=\"kw\">COPY INTO</span> prod.bronze.events\n<span class=\"kw\">FROM</span> <span class=\"str\">'abfss://container@storage.dfs.core.windows.net/raw/'</span>\nFILEFORMAT = JSON\n<span class=\"kw\">COPY_OPTIONS</span> (<span class=\"str\">'mergeSchema'</span> = <span class=\"str\">'true'</span>)", "options": ["A. All files (Monday + Tuesday) are re-ingested, creating duplicates", "B. Only the new Tuesday files are loaded; Monday's files are skipped because COPY INTO tracks already-loaded files in the Delta log", "C. The second COPY INTO fails because the target table already has data", "D. COPY INTO requires a FORCE = true option to load new files on subsequent runs"], "answerIndex": 1, "explanation": "COPY INTO is idempotent — it maintains a load history in the Delta table's transaction log. On the second run, it automatically identifies which files have already been successfully loaded (Monday's files) and skips them, loading only the new Tuesday files. This makes COPY INTO safe to run repeatedly on the same source path without creating duplicates. This is a key difference from spark.read + write (which would re-process everything) and from Auto Loader (which uses a checkpoint directory instead of the Delta log for tracking).", "exampleCode": "<span class=\"cm\">-- COPY INTO tracks ingested files in the Delta transaction log</span>\n<span class=\"cm\">-- Safe to run repeatedly — idempotent by default</span>\n\n<span class=\"cm\">-- To force re-ingestion of all files (break idempotency):</span>\n<span class=\"kw\">COPY INTO</span> prod.bronze.events\n<span class=\"kw\">FROM</span> <span class=\"str\">'abfss://...'</span>\nFILEFORMAT = JSON\nFORCE = <span class=\"kw\">true</span>  <span class=\"cm\">-- WARNING: re-ingests ALL files including previously loaded ones</span>"}, {"section": "Data Modeling", "text": "A data engineer implements SCD Type 2 using the following MERGE. What is wrong with this implementation?", "code": "<span class=\"kw\">MERGE INTO</span> dim.customers <span class=\"kw\">AS</span> target\n<span class=\"kw\">USING</span> source_updates <span class=\"kw\">AS</span> source\n<span class=\"kw\">ON</span> target.customer_id = source.customer_id\n   <span class=\"kw\">AND</span> target.is_active = <span class=\"kw\">true</span>\n<span class=\"kw\">WHEN MATCHED AND</span> source.address != target.address <span class=\"kw\">THEN</span>\n  <span class=\"kw\">UPDATE SET</span>\n    target.is_active = <span class=\"kw\">false</span>,\n    target.end_date = <span class=\"fn\">current_date</span>()\n<span class=\"kw\">WHEN NOT MATCHED THEN</span>\n  <span class=\"kw\">INSERT</span> (customer_id, address, is_active, start_date, end_date)\n  <span class=\"kw\">VALUES</span> (source.customer_id, source.address, <span class=\"kw\">true</span>, <span class=\"fn\">current_date</span>(), <span class=\"kw\">null</span>)", "options": ["A. The ON clause is incorrect — SCD Type 2 should not filter by is_active in the join condition", "B. This MERGE correctly implements SCD Type 2 — no issues", "C. The new active row is never inserted for updated customers — WHEN MATCHED closes the old row, but WHEN NOT MATCHED only fires for brand-new customers (no matching customer_id at all)", "D. SCD Type 2 requires DELETE instead of UPDATE to close old rows"], "answerIndex": 2, "explanation": "This is a critical SCD Type 2 bug. The MERGE has: WHEN MATCHED → closes old row (sets is_active=false). WHEN NOT MATCHED → inserts new customer. But WHEN NOT MATCHED only fires when there is NO row matching the ON condition. For an existing customer whose address changed, there IS a matching row (same customer_id, is_active=true), so WHEN NOT MATCHED never fires for them — the new active row is never created. The MERGE only closes the old row without creating a new active one. Fix: use a two-pass approach (separate UPDATE + INSERT), or use a union trick to pre-stage both the updated row and new row in the source.", "exampleCode": "<span class=\"cm\">-- FIX: Two-pass SCD Type 2 approach</span>\n<span class=\"cm\">-- Pass 1: Close old rows</span>\n<span class=\"kw\">UPDATE</span> dim.customers\n<span class=\"kw\">SET</span> is_active = <span class=\"kw\">false</span>, end_date = <span class=\"fn\">current_date</span>()\n<span class=\"kw\">WHERE</span> customer_id <span class=\"kw\">IN</span> (<span class=\"kw\">SELECT</span> customer_id <span class=\"kw\">FROM</span> source_updates)\n  <span class=\"kw\">AND</span> is_active = <span class=\"kw\">true</span>;\n\n<span class=\"cm\">-- Pass 2: Insert new active rows</span>\n<span class=\"kw\">INSERT INTO</span> dim.customers\n<span class=\"kw\">SELECT</span> customer_id, address, <span class=\"kw\">true</span>, <span class=\"fn\">current_date</span>(), <span class=\"kw\">null</span>\n<span class=\"kw\">FROM</span> source_updates;"}, {"section": "Streaming", "text": "A Lakeflow pipeline uses APPLY CHANGES INTO for CDC. The source sends events out-of-order. Which configuration ensures the correct final state even with late-arriving updates?", "code": "<span class=\"kw\">APPLY CHANGES INTO</span> LIVE.silver_customers\n<span class=\"kw\">FROM</span> STREAM(LIVE.bronze_cdc)\nKEYS (customer_id)\nSEQUENCE BY updated_at    <span class=\"cm\">-- version/timestamp from source CDC system</span>\nSTORED AS SCD TYPE <span class=\"num\">1</span>", "options": ["A. The SEQUENCE BY clause ensures the record with the highest updated_at always wins, regardless of arrival order", "B. Records are applied in the order they arrive in the stream — out-of-order records may corrupt state", "C. APPLY CHANGES INTO does not support out-of-order records — use a watermark instead", "D. The KEYS clause handles ordering — SEQUENCE BY is optional for out-of-order handling"], "answerIndex": 0, "explanation": "SEQUENCE BY is the key mechanism for handling out-of-order CDC records in APPLY CHANGES INTO. Regardless of when records arrive in the stream, the record with the HIGHEST value in the SEQUENCE BY column (updated_at) is considered the 'current' state. A late-arriving old record (lower updated_at) that arrives after a newer record has already been applied will be ignored for Type 1, or tracked as history for Type 2. This is the fundamental advantage over raw MERGE which applies records in arrival order. The SEQUENCE BY column must come from the CDC source system (e.g., the source database's commit timestamp or LSN).", "exampleCode": "<span class=\"cm\">-- APPLY CHANGES INTO with SCD Type 2 for full history:</span>\n<span class=\"kw\">APPLY CHANGES INTO</span> LIVE.silver_customers\n<span class=\"kw\">FROM</span> STREAM(LIVE.bronze_cdc)\nKEYS (customer_id)\nSEQUENCE BY updated_at\nSTORED AS SCD TYPE <span class=\"num\">2</span>\nTRACK HISTORY <span class=\"kw\">ON</span> *  <span class=\"cm\">-- track all columns for history</span>\n<span class=\"cm\">-- or: TRACK HISTORY ON (address, email)  -- only specific columns</span>"}, {"section": "Security", "text": "A data engineer implements pseudonymization. The requirement is: same <code>user_id</code> must ALWAYS map to the same pseudonym, the original user_id cannot be recovered from the pseudonym, and it must be consistent across different tables. Which SQL expression achieves this?", "code": "<span class=\"cm\">-- Option A: SHA-256 hash with salt</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">sha2</span>(<span class=\"fn\">concat</span>(user_id, <span class=\"str\">'secret_salt_2024'</span>), <span class=\"num\">256</span>) <span class=\"kw\">AS</span> user_pseudonym\n\n<span class=\"cm\">-- Option B: Random UUID</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">uuid</span>() <span class=\"kw\">AS</span> user_pseudonym\n\n<span class=\"cm\">-- Option C: AES encryption</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">aes_encrypt</span>(user_id, <span class=\"str\">'encryption_key'</span>) <span class=\"kw\">AS</span> user_pseudonym\n\n<span class=\"cm\">-- Option D: MD5 hash (no salt)</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">md5</span>(user_id) <span class=\"kw\">AS</span> user_pseudonym", "options": ["A. SHA-256 with a salt — deterministic, non-reversible, consistent across tables", "B. uuid() — generates a random unique value each time, not consistent", "C. aes_encrypt() — deterministic but reversible with the key (not pseudonymization)", "D. md5() — deterministic but vulnerable to rainbow table attacks without a salt"], "answerIndex": 0, "explanation": "SHA-256 with a secret salt (sha2(concat(user_id, 'salt'), 256)) satisfies all three requirements: (1) Deterministic — same user_id + same salt always produces the same hash output, so it's consistent across different tables and runs. (2) Non-reversible — SHA-256 is a one-way cryptographic hash function; you cannot recover user_id from the hash. (3) Consistent — as long as the same salt is used, any table can produce the same pseudonym for the same user_id. Option B (uuid()) generates a new random value every time — not consistent. Option C (aes_encrypt) is reversible with the encryption key — this is encryption, not pseudonymization. Option D (md5 without salt) is deterministic but vulnerable to rainbow table attacks; MD5 is also cryptographically weak.", "exampleCode": "<span class=\"cm\">-- RECOMMENDED: SHA-256 with secret salt</span>\n<span class=\"kw\">SELECT</span>\n  <span class=\"fn\">sha2</span>(<span class=\"fn\">concat</span>(CAST(user_id <span class=\"kw\">AS</span> <span class=\"kw\">STRING</span>), <span class=\"str\">'${secret_salt}'</span>), <span class=\"num\">256</span>) <span class=\"kw\">AS</span> user_pseudonym,\n  order_amount\n<span class=\"kw\">FROM</span> orders;\n\n<span class=\"cm\">-- Store the salt in Databricks Secrets, not in code:</span>\nsecret_salt = dbutils.secrets.<span class=\"fn\">get</span>(<span class=\"str\">\"pii-scope\"</span>, <span class=\"str\">\"hash-salt\"</span>)"}, {"section": "CI/CD", "text": "A data engineer runs <code>databricks bundle deploy</code> and the job fails to create because of a missing required field. Which command should have been run FIRST to catch this before deployment?", "code": "<span class=\"cm\"># Current workflow:</span>\n$ databricks bundle deploy --target prod\n<span class=\"cm\"># Error: Required field 'spark_version' missing in new_cluster config</span>\n\n<span class=\"cm\"># Option A:</span>\n$ databricks bundle validate\n\n<span class=\"cm\"># Option B:</span>\n$ databricks bundle run --dry-run\n\n<span class=\"cm\"># Option C:</span>\n$ databricks bundle plan\n\n<span class=\"cm\"># Option D:</span>\n$ databricks bundle lint", "options": ["A. databricks bundle validate — checks YAML syntax and structure locally without connecting to Databricks", "B. databricks bundle run --dry-run — simulates a job run without executing", "C. databricks bundle plan — shows what changes will be deployed (like Terraform plan)", "D. databricks bundle lint — checks code style in notebooks"], "answerIndex": 0, "explanation": "databricks bundle validate checks the databricks.yml syntax, resolves variable references for the specified target, and validates the bundle structure — all locally without making any Databricks API calls. It would catch the missing 'spark_version' field in the cluster config before any deployment attempt. Options B and C: --dry-run and plan are not valid DABs CLI commands. Option D: lint is not a DABs command. The validate command is the 'pre-flight check' in CI/CD pipelines — always run bundle validate as a CI step before bundle deploy.", "exampleCode": "<span class=\"cm\"># Recommended CI/CD pipeline with DABs:</span>\n<span class=\"cm\"># Step 1: Validate (local check, no API calls)</span>\n$ databricks bundle validate --target prod\n\n<span class=\"cm\"># Step 2: Deploy to staging</span>\n$ databricks bundle deploy --target staging\n\n<span class=\"cm\"># Step 3: Run tests on staging</span>\n$ databricks bundle run etl_job --target staging\n\n<span class=\"cm\"># Step 4: Deploy to production</span>\n$ databricks bundle deploy --target prod"}, {"section": "Monitoring", "text": "A data engineer needs to find the <strong>top 5 most expensive SQL queries</strong> run on Databricks SQL warehouses in the past 7 days, measured by DBU cost. Which query returns this?", "code": "<span class=\"cm\">-- Option A:</span>\n<span class=\"kw\">SELECT</span> statement_id, statement_text, duration_ms, total_task_duration_ms\n<span class=\"kw\">FROM</span> system.query.history\n<span class=\"kw\">WHERE</span> start_time >= <span class=\"fn\">date_sub</span>(<span class=\"fn\">current_timestamp</span>(), <span class=\"num\">7</span>)\n<span class=\"kw\">ORDER BY</span> total_task_duration_ms <span class=\"kw\">DESC</span>\n<span class=\"kw\">LIMIT</span> <span class=\"num\">5</span>\n\n<span class=\"cm\">-- Option B:</span>\n<span class=\"kw\">SELECT</span> job_id, run_id, <span class=\"fn\">SUM</span>(usage_quantity) <span class=\"kw\">AS</span> total_dbu\n<span class=\"kw\">FROM</span> system.billing.usage\n<span class=\"kw\">WHERE</span> usage_start_time >= <span class=\"fn\">date_sub</span>(<span class=\"fn\">current_date</span>(), <span class=\"num\">7</span>)\n<span class=\"kw\">GROUP BY</span> job_id, run_id\n<span class=\"kw\">ORDER BY</span> total_dbu <span class=\"kw\">DESC</span>\n<span class=\"kw\">LIMIT</span> <span class=\"num\">5</span>\n\n<span class=\"cm\">-- Option C:</span>\n<span class=\"kw\">SELECT</span> user_name, action_name, request_params\n<span class=\"kw\">FROM</span> system.access.audit\n<span class=\"kw\">WHERE</span> event_time >= <span class=\"fn\">date_sub</span>(<span class=\"fn\">current_date</span>(), <span class=\"num\">7</span>)\n<span class=\"kw\">LIMIT</span> <span class=\"num\">5</span>", "options": ["A. system.query.history — contains per-query metrics including duration and task time for SQL warehouses", "B. system.billing.usage — tracks DBU consumption at job/run level, not per individual SQL query", "C. system.access.audit — tracks access events, not query cost or performance metrics", "D. A is correct for duration-based ranking; for true DBU cost per query, use system.query.history with cost columns"], "answerIndex": 0, "explanation": "system.query.history is the correct system table for SQL warehouse query metrics. It contains per-query information including statement text, user, warehouse, duration, bytes read, rows produced, and task duration — which correlates directly to DBU cost. system.billing.usage (Option B) tracks aggregate DBU consumption by workspace/cluster/job but doesn't have individual SQL query granularity. system.access.audit (Option C) is for access auditing (who accessed what), not performance/cost metrics. Option D is partially correct but the question asks for the best option — A is the direct answer.", "exampleCode": "<span class=\"cm\">-- Complete query for top expensive SQL queries:</span>\n<span class=\"kw\">SELECT</span>\n  statement_id,\n  executed_by <span class=\"kw\">AS</span> user_name,\n  warehouse_id,\n  <span class=\"fn\">ROUND</span>(duration_ms / <span class=\"num\">1000.0</span>, <span class=\"num\">2</span>) <span class=\"kw\">AS</span> duration_seconds,\n  <span class=\"fn\">ROUND</span>(total_task_duration_ms / <span class=\"num\">1000.0</span>, <span class=\"num\">2</span>) <span class=\"kw\">AS</span> total_task_seconds,\n  read_bytes,\n  <span class=\"fn\">LEFT</span>(statement_text, <span class=\"num\">100</span>) <span class=\"kw\">AS</span> query_preview\n<span class=\"kw\">FROM</span> system.query.history\n<span class=\"kw\">WHERE</span> start_time >= <span class=\"fn\">date_sub</span>(<span class=\"fn\">current_timestamp</span>(), <span class=\"num\">7</span>)\n  <span class=\"kw\">AND</span> status = <span class=\"str\">'FINISHED'</span>\n<span class=\"kw\">ORDER BY</span> total_task_duration_ms <span class=\"kw\">DESC</span>\n<span class=\"kw\">LIMIT</span> <span class=\"num\">5</span>"}, {"section": "Lakeflow", "text": "A data engineer writes a Lakeflow Spark Declarative Pipeline. Which of the following correctly defines a <strong>streaming table</strong> that reads from an Auto Loader source?", "code": "<span class=\"cm\"># Option A</span>\n<span class=\"kw\">@dlt</span>.table\n<span class=\"kw\">def</span> <span class=\"fn\">bronze_events</span>():\n    <span class=\"kw\">return</span> spark.readStream.<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>).<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>,<span class=\"str\">\"json\"</span>).<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw\"</span>)\n\n<span class=\"cm\"># Option B</span>\n<span class=\"kw\">@dlt</span>.view\n<span class=\"kw\">def</span> <span class=\"fn\">bronze_events</span>():\n    <span class=\"kw\">return</span> spark.readStream.<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>).<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>,<span class=\"str\">\"json\"</span>).<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw\"</span>)\n\n<span class=\"cm\"># Option C</span>\n<span class=\"kw\">@dlt</span>.table\n<span class=\"kw\">def</span> <span class=\"fn\">bronze_events</span>():\n    <span class=\"kw\">return</span> spark.read.<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>).<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>,<span class=\"str\">\"json\"</span>).<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw\"</span>)\n\n<span class=\"cm\"># Option D</span>\n<span class=\"kw\">@dlt</span>.streaming_table\n<span class=\"kw\">def</span> <span class=\"fn\">bronze_events</span>():\n    <span class=\"kw\">return</span> dlt.<span class=\"fn\">read_stream</span>(<span class=\"str\">\"cloudFiles\"</span>)", "options": ["A. Option A — @dlt.table with readStream", "B. Option B — @dlt.view with readStream", "C. Option C — @dlt.table with spark.read (batch)", "D. Option D — @dlt.streaming_table decorator"], "answerIndex": 0, "explanation": "In Lakeflow Declarative Pipelines, @dlt.table is the correct decorator for both streaming tables and materialized views — the framework infers streaming vs. batch from whether the function returns a streaming DataFrame (readStream) or a batch DataFrame (spark.read). Option A is correct: @dlt.table with readStream automatically creates a Streaming Table. Option B creates a temporary view (not persisted to storage). Option C uses batch read — it would create a Materialized View, not a streaming table. Option D (@dlt.streaming_table) is not a valid decorator.", "exampleCode": "<span class=\"cm\"># CORRECT: Streaming Table in Lakeflow</span>\n<span class=\"kw\">@dlt</span>.table(\n    comment=<span class=\"str\">\"Raw bronze events from Auto Loader\"</span>,\n    table_properties={<span class=\"str\">\"quality\"</span>: <span class=\"str\">\"bronze\"</span>}\n)\n<span class=\"kw\">def</span> <span class=\"fn\">bronze_events</span>():\n    <span class=\"kw\">return</span> (spark.readStream\n        .<span class=\"fn\">format</span>(<span class=\"str\">\"cloudFiles\"</span>)\n        .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.format\"</span>, <span class=\"str\">\"json\"</span>)\n        .<span class=\"fn\">option</span>(<span class=\"str\">\"cloudFiles.schemaLocation\"</span>, <span class=\"str\">\"/mnt/schema\"</span>)\n        .<span class=\"fn\">load</span>(<span class=\"str\">\"/mnt/raw\"</span>))"}, {"section": "Lakeflow", "text": "A data engineer adds a data quality expectation to a Lakeflow pipeline. Which code correctly implements a rule that <strong>drops</strong> invalid rows (where <code>amount &le; 0</code>) and allows the pipeline to continue?", "code": "<span class=\"cm\"># Option A</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect</span>(<span class=\"str\">\"positive_amount\"</span>, <span class=\"str\">\"amount > 0\"</span>)\n<span class=\"kw\">@dlt</span>.table\n<span class=\"kw\">def</span> <span class=\"fn\">silver_orders</span>(): ...\n\n<span class=\"cm\"># Option B</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect_or_drop</span>(<span class=\"str\">\"positive_amount\"</span>, <span class=\"str\">\"amount > 0\"</span>)\n<span class=\"kw\">@dlt</span>.table\n<span class=\"kw\">def</span> <span class=\"fn\">silver_orders</span>(): ...\n\n<span class=\"cm\"># Option C</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect_or_fail</span>(<span class=\"str\">\"positive_amount\"</span>, <span class=\"str\">\"amount > 0\"</span>)\n<span class=\"kw\">@dlt</span>.table\n<span class=\"kw\">def</span> <span class=\"fn\">silver_orders</span>(): ...\n\n<span class=\"cm\"># Option D</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect_all_or_drop</span>({<span class=\"str\">\"positive_amount\"</span>: <span class=\"str\">\"amount > 0\"</span>})\n<span class=\"kw\">@dlt</span>.table\n<span class=\"kw\">def</span> <span class=\"fn\">silver_orders</span>(): ...", "options": ["A. @dlt.expect — logs a warning, keeps the row", "B. @dlt.expect_or_drop — drops violating rows, continues", "C. @dlt.expect_or_fail — fails the entire pipeline", "D. @dlt.expect_all_or_drop — works the same as expect_or_drop for a single rule"], "answerIndex": 1, "explanation": "expect_or_drop silently drops rows violating the expectation and continues the pipeline. Option A (expect) keeps the row but records a warning — useful for monitoring without enforcement. Option C (expect_or_fail) halts the entire pipeline run — too aggressive for a 'continue on bad data' requirement. Option D (expect_all_or_drop) works with a dictionary of rules and does drop rows, but it's used for multiple rules. For a single rule requiring drop-and-continue, expect_or_drop is the correct and idiomatic choice.", "exampleCode": "<span class=\"cm\"># Three expectation types — key exam knowledge:</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect</span>(<span class=\"str\">\"name\"</span>, <span class=\"str\">\"expr\"</span>)          <span class=\"cm\"># warn, keep row, continue</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect_or_drop</span>(<span class=\"str\">\"name\"</span>, <span class=\"str\">\"expr\"</span>) <span class=\"cm\"># DROP row, continue</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect_or_fail</span>(<span class=\"str\">\"name\"</span>, <span class=\"str\">\"expr\"</span>) <span class=\"cm\"># FAIL pipeline</span>\n\n<span class=\"cm\"># Multiple rules:</span>\n<span class=\"kw\">@dlt</span>.<span class=\"fn\">expect_all_or_drop</span>({\n    <span class=\"str\">\"positive_amount\"</span>: <span class=\"str\">\"amount > 0\"</span>,\n    <span class=\"str\">\"valid_status\"</span>: <span class=\"str\">\"status IN ('open','closed')\"</span>\n})"}, {"section": "CI/CD", "text": "A data engineer configures a <strong>Databricks Asset Bundle</strong>. Which <code>databricks.yml</code> snippet correctly deploys a notebook job to <strong>production</strong> using a job cluster with a specific node type and <strong>disallows retries</strong>?", "code": "<span class=\"cm\"># Option A</span>\nresources:\n  jobs:\n    etl_job:\n      tasks:\n        - task_key: process\n          max_retries: <span class=\"num\">0</span>\n          new_cluster:\n            node_type_id: Standard_DS3_v2\n            num_workers: <span class=\"num\">4</span>\n\n<span class=\"cm\"># Option B</span>\nresources:\n  jobs:\n    etl_job:\n      tasks:\n        - task_key: process\n          max_retries: <span class=\"num\">-1</span>\n          new_cluster:\n            node_type_id: Standard_DS3_v2\n            num_workers: <span class=\"num\">4</span>\n\n<span class=\"cm\"># Option C</span>\nresources:\n  jobs:\n    etl_job:\n      retry_on_timeout: <span class=\"kw\">false</span>\n      tasks:\n        - task_key: process\n          existing_cluster_id: <span class=\"str\">\"abc-123\"</span>\n\n<span class=\"cm\"># Option D</span>\nresources:\n  jobs:\n    etl_job:\n      tasks:\n        - task_key: process\n          max_retries: <span class=\"num\">1</span>\n          new_cluster:\n            node_type_id: Standard_DS3_v2", "options": ["A. max_retries: 0 with new_cluster — correct for no retries on a job cluster", "B. max_retries: -1 — this means unlimited retries", "C. retry_on_timeout: false with existing_cluster_id — uses an interactive cluster", "D. max_retries: 1 — allows one retry"], "answerIndex": 0, "explanation": "max_retries: 0 explicitly disallows retries. A new_cluster block provisions an ephemeral job cluster that is terminated after the run — the cost-efficient approach for production jobs. Option B: max_retries: -1 means unlimited retries in Databricks — the opposite of what is needed. Option C uses an existing_cluster_id which attaches to a persistent interactive cluster — more expensive and not best practice for production jobs. retry_on_timeout: false only prevents retries on timeout specifically, not all failures. Option D allows exactly one retry.", "exampleCode": "<span class=\"cm\"># Complete correct DABs job config with no retries:</span>\nresources:\n  jobs:\n    etl_job:\n      name: Production ETL\n      tasks:\n        - task_key: process_data\n          max_retries: <span class=\"num\">0</span>          <span class=\"cm\"># no retries</span>\n          notebook_task:\n            notebook_path: ./notebooks/etl\n          new_cluster:             <span class=\"cm\"># job cluster, not interactive</span>\n            spark_version: <span class=\"str\">\"14.3.x-scala2.12\"</span>\n            node_type_id: Standard_DS3_v2\n            num_workers: <span class=\"num\">4</span>"}, {"section": "Delta Lake", "text": "A data engineer runs the following command. What is the effect on the <strong>physical data files</strong> on cloud storage?", "code": "<span class=\"kw\">DELETE FROM</span> prod.sales.transactions\n<span class=\"kw\">WHERE</span> customer_id = <span class=\"num\">9901</span>\n  <span class=\"kw\">AND</span> transaction_date < <span class=\"str\">'2020-01-01'</span>", "options": ["A. The matching Parquet files are immediately deleted from cloud storage", "B. The rows are logically marked as deleted in the Delta transaction log; physical files remain until VACUUM runs", "C. The DELETE rewrites all affected Parquet files excluding the deleted rows immediately", "D. The transaction log entry is created but the physical files are only deleted after OPTIMIZE runs"], "answerIndex": 1, "explanation": "Delta Lake's DELETE is a logical operation — it records the deletion in the transaction log but does NOT immediately remove physical files. The files remain on cloud storage for the duration of the retention period (default 7 days) to support time travel queries. Physical removal requires running VACUUM after the retention period expires. If deletion vectors are enabled, a small bitmap file is written instead of rewriting the affected Parquet files. Without deletion vectors, DELETE rewrites the affected data files (excluding deleted rows), but the old file versions still remain until VACUUM. For GDPR compliance, you must explicitly run VACUUM RETAIN 0 HOURS after disabling the safety check.", "exampleCode": "<span class=\"cm\">-- Physical deletion procedure for GDPR compliance:</span>\n<span class=\"kw\">DELETE FROM</span> prod.sales.transactions <span class=\"kw\">WHERE</span> customer_id = <span class=\"num\">9901</span>;\n\n<span class=\"kw\">SET</span> spark.databricks.delta.retentionDurationCheck.enabled = <span class=\"kw\">false</span>;\n<span class=\"kw\">VACUUM</span> prod.sales.transactions <span class=\"kw\">RETAIN</span> <span class=\"num\">0</span> <span class=\"kw\">HOURS</span>;\n<span class=\"kw\">SET</span> spark.databricks.delta.retentionDurationCheck.enabled = <span class=\"kw\">true</span>;"}, {"section": "Streaming", "text": "A Structured Streaming job uses a <strong>10-second trigger interval</strong>. During peak load, micro-batches consistently take <strong>25 seconds</strong> to complete. What happens to the stream?", "code": "df = (spark.readStream\n    .<span class=\"fn\">format</span>(<span class=\"str\">\"kafka\"</span>)\n    .<span class=\"fn\">option</span>(<span class=\"str\">\"kafka.bootstrap.servers\"</span>, <span class=\"str\">\"host:9092\"</span>)\n    .<span class=\"fn\">option</span>(<span class=\"str\">\"subscribe\"</span>, <span class=\"str\">\"events\"</span>)\n    .<span class=\"fn\">load</span>())\n\nquery = (df\n    .<span class=\"fn\">writeStream</span>\n    .<span class=\"fn\">trigger</span>(processingTime=<span class=\"str\">\"10 seconds\"</span>)\n    .<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n    .<span class=\"fn\">option</span>(<span class=\"str\">\"checkpointLocation\"</span>, <span class=\"str\">\"/chk\"</span>)\n    .<span class=\"fn\">start</span>())", "options": ["A. The stream fails — processing must complete within the trigger interval", "B. The stream queues up multiple batches; eventually memory is exhausted and the job crashes", "C. Spark waits for the current batch to finish before starting the next trigger cycle — batches run back-to-back with no gap", "D. Spark automatically switches to continuous processing mode to handle the overload"], "answerIndex": 2, "explanation": "In Structured Streaming, the trigger interval is a minimum gap between batch starts, not a hard deadline. If a batch takes longer than the trigger interval (25s > 10s), Spark simply starts the next batch immediately after the previous one completes — no queuing of multiple concurrent batches (there is always at most one batch running at a time). Batches run sequentially. This means data accumulates in the source between batches, creating backpressure but not an immediate failure. The stream won't crash unless there is a resource issue (OOM, executor failure, etc.). The practical effect: the pipeline runs behind real-time during peak periods.", "exampleCode": "<span class=\"cm\"># If batch > trigger interval: batches run sequentially (no gap)</span>\n<span class=\"cm\"># Timeline example:</span>\n<span class=\"cm\"># t=0:  Batch 1 starts</span>\n<span class=\"cm\"># t=25: Batch 1 finishes → Batch 2 starts immediately (not at t=10)</span>\n<span class=\"cm\"># t=50: Batch 2 finishes → Batch 3 starts</span>\n\n<span class=\"cm\"># To fix: profile the batch, reduce processing time, or accept latency</span>\n<span class=\"cm\"># Use .trigger(availableNow=True) for scheduled batch processing instead</span>"}, {"section": "Performance", "text": "A data engineer needs to write a 1TB PySpark DataFrame to Parquet with a target file size of <strong>512MB per file</strong>. No Delta Lake features are available. Which approach correctly achieves this <strong>without sorting the data</strong>?", "code": "<span class=\"cm\"># Option A</span>\ndf.<span class=\"fn\">repartition</span>(<span class=\"num\">2048</span>).<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/out\"</span>)\n\n<span class=\"cm\"># Option B</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.files.maxPartitionBytes\"</span>, <span class=\"str\">\"536870912\"</span>)  <span class=\"cm\"># 512MB</span>\ndf.<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/out\"</span>)\n\n<span class=\"cm\"># Option C</span>\ndf.<span class=\"fn\">coalesce</span>(<span class=\"num\">2048</span>).<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/out\"</span>)\n\n<span class=\"cm\"># Option D</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.shuffle.partitions\"</span>, <span class=\"str\">\"2048\"</span>)\ndf.<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/out\"</span>)", "options": ["A. repartition(2048) — full shuffle, creates 2048 equal partitions", "B. maxPartitionBytes = 512MB — controls INPUT file splitting, not output file size", "C. coalesce(2048) — reduces partitions without a full shuffle", "D. shuffle.partitions = 2048 — controls post-shuffle partition count, not write output"], "answerIndex": 0, "explanation": "repartition(N) performs a full shuffle to create exactly N evenly-sized partitions, each written as one output file. For 1TB / 512MB = 2048 files. This is the correct approach when you need precise control over output file count and size. Option B (maxPartitionBytes) controls how Spark splits INPUT files when reading — it has no effect on output file size. Option C (coalesce) only reduces partitions without a shuffle, so it cannot increase the partition count if the DataFrame has fewer than 2048 partitions; also coalesce creates uneven partitions by merging existing ones. Option D (shuffle.partitions) only affects the number of partitions after a shuffle operation like groupBy/join, not a direct write.", "exampleCode": "<span class=\"cm\"># Calculation: 1TB / 512MB = 2048 partitions</span>\n<span class=\"cm\"># 1 TB = 1024 * 1024 MB = 1,048,576 MB</span>\n<span class=\"cm\"># 1,048,576 / 512 = 2,048</span>\n\ndf.<span class=\"fn\">repartition</span>(<span class=\"num\">2048</span>).<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class
