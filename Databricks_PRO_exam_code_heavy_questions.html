tations"], "answerIndex": 1, "explanation": "Lakeflow pipeline expectation metrics are stored in the pipeline's Event Log, accessible via the event_log('<pipeline_id>') table-valued function. The relevant event_type is 'flow_progress' and the expectation data is nested in the details column under details:flow_progress:data_quality:expectations. This contains pass/fail counts per expectation per pipeline run, with timestamps and update_id for tracking across runs. system.lakeflow.pipeline_runs (Option A) tracks run-level metadata (start/end time, status) but not individual expectation details. system.query.history (Option C) is for SQL warehouse queries only.", "exampleCode": "<span class=\"cm\">-- Complete expectation monitoring query:</span>\n<span class=\"kw\">SELECT</span>\n  timestamp,\n  origin.update_id <span class=\"kw\">AS</span> run_id,\n  <span class=\"fn\">explode</span>(\n    <span class=\"fn\">from_json</span>(details:flow_progress:data_quality:expectations, <span class=\"str\">'ARRAY&lt;STRUCT&lt;name:STRING,passed_records:LONG,failed_records:LONG&gt;&gt;'</span>)\n  ) <span class=\"kw\">AS</span> expectation\n<span class=\"kw\">FROM</span> <span class=\"fn\">event_log</span>(<span class=\"str\">'&lt;pipeline_id&gt;'</span>)\n<span class=\"kw\">WHERE</span> event_type = <span class=\"str\">'flow_progress'</span>\n<span class=\"kw\">ORDER BY</span> timestamp <span class=\"kw\">DESC</span>\n<span class=\"kw\">LIMIT</span> <span class=\"num\">50</span>"}, {"section": "Delta Lake", "text": "A data engineer sets these two Delta table properties. What is the difference between them?", "code": "<span class=\"kw\">ALTER TABLE</span> orders <span class=\"kw\">SET TBLPROPERTIES</span> (\n  <span class=\"str\">'delta.logRetentionDuration'</span> = <span class=\"str\">'interval 90 days'</span>,\n  <span class=\"str\">'delta.deletedFileRetentionDuration'</span> = <span class=\"str\">'interval 30 days'</span>\n)", "options": ["A. Both control the same thing — how long old data is kept before VACUUM removes it", "B. logRetentionDuration controls the transaction log history (affects time travel range); deletedFileRetentionDuration controls how long physically deleted data files are kept before VACUUM can remove them", "C. logRetentionDuration controls how long the table exists before expiration; deletedFileRetentionDuration controls row-level data retention", "D. deletedFileRetentionDuration applies to VACUUM; logRetentionDuration applies to OPTIMIZE"], "answerIndex": 1, "explanation": "These are two distinct retention mechanisms. delta.logRetentionDuration (90 days): controls how long the Delta transaction log JSON files (_delta_log/*.json) are retained. This directly determines how far back in time you can travel — you can only time travel to versions that still have their log entries. Default: 30 days. delta.deletedFileRetentionDuration (30 days): controls how long physically deleted or overwritten Parquet data files are kept after they are no longer referenced by the current table version. VACUUM uses this as the minimum retention period. Default: 7 days. Setting this longer than 7 days means VACUUM won't delete files younger than this threshold, preserving older data files for time travel even if they're 'logically deleted'.", "exampleCode": "<span class=\"cm\">-- Summary of what each controls:</span>\n<span class=\"cm\">-- logRetentionDuration      → How long _delta_log/*.json files kept</span>\n<span class=\"cm\">--                              → Controls time travel range</span>\n<span class=\"cm\">-- deletedFileRetentionDuration → How long VACUUM waits before deleting</span>\n<span class=\"cm\">--                              → Minimum threshold for VACUUM</span>\n\n<span class=\"cm\">-- Time travel fails if EITHER:</span>\n<span class=\"cm\">-- 1. Log entry for that version has been cleaned (logRetentionDuration)</span>\n<span class=\"cm\">-- 2. Data files for that version have been VACUUM'd (deletedFileRetentionDuration)</span>"}, {"section": "Data Modeling", "text": "A data engineer designs a gold-layer aggregation. Which table type in Lakeflow is the correct choice for <code>SELECT region, SUM(revenue) FROM silver.orders GROUP BY region</code> that needs to reflect corrections to historical data?", "code": "<span class=\"cm\">-- Option A: Streaming Table</span>\n<span class=\"kw\">@dlt</span>.table\n<span class=\"kw\">def</span> <span class=\"fn\">gold_revenue_by_region</span>():\n    <span class=\"kw\">return</span> (spark.readStream\n        .<span class=\"fn\">table</span>(<span class=\"str\">\"LIVE.silver_orders\"</span>)\n        .<span class=\"fn\">groupBy</span>(<span class=\"str\">\"region\"</span>)\n        .<span class=\"fn\">agg</span>(<span class=\"fn\">sum</span>(<span class=\"str\">\"revenue\"</span>))\n\n<span class=\"cm\"># Option B: Materialized View (SQL syntax)</span>\n<span class=\"kw\">CREATE OR REFRESH MATERIALIZED VIEW</span> gold_revenue_by_region\n<span class=\"kw\">AS</span>\n<span class=\"kw\">SELECT</span> region, <span class=\"fn\">SUM</span>(revenue) <span class=\"kw\">AS</span> total_revenue\n<span class=\"kw\">FROM</span> LIVE.silver_orders\n<span class=\"kw\">GROUP BY</span> region", "options": ["A. Streaming Table — processes data incrementally, handles corrections automatically", "B. Materialized View — recomputes from source on each pipeline run, naturally reflects corrections", "C. Both work equally well for this use case", "D. Streaming Table is better because it is lower latency"], "answerIndex": 1, "explanation": "Materialized Views (MVs) are the correct choice for aggregations that must reflect corrections. MVs recompute their result FROM SOURCE on each pipeline run. If a historical order's revenue is corrected in silver.orders, the next MV pipeline run recomputes SUM(revenue) and reflects the corrected total. Streaming Tables process data incrementally — they see each new micro-batch but cannot easily revise historical aggregations when source rows change. To handle a revenue correction in a Streaming Table, you'd need CDF + complex stateful logic to subtract the old value and add the new one. For correctness with corrections, MVs are the idiomatic Lakeflow choice.", "exampleCode": "<span class=\"cm\">-- CORRECT: Materialized View for aggregations needing corrections</span>\n<span class=\"kw\">CREATE OR REFRESH MATERIALIZED VIEW</span> LIVE.gold_revenue_by_region\n<span class=\"kw\">AS</span>\n<span class=\"kw\">SELECT</span>\n  region,\n  <span class=\"fn\">SUM</span>(revenue) <span class=\"kw\">AS</span> total_revenue,\n  <span class=\"fn\">COUNT</span>(*) <span class=\"kw\">AS</span> order_count\n<span class=\"kw\">FROM</span> LIVE.silver_orders\n<span class=\"kw\">GROUP BY</span> region;\n<span class=\"cm\">-- Recomputes from silver.orders on every pipeline run</span>\n<span class=\"cm\">-- Corrections to silver automatically reflected in next run</span>"}, {"section": "Performance", "text": "AQE is enabled. A data engineer runs a query joining two tables. The query profile shows a Sort-Merge Join despite one side being filtered to 8MB. Which AQE sub-feature should have converted this automatically?", "code": "<span class=\"cm\">-- Cluster configuration:</span>\nspark.conf.<span class=\"fn\">get</span>(<span class=\"str\">\"spark.sql.adaptive.enabled\"</span>)                        <span class=\"cm\"># true</span>\nspark.conf.<span class=\"fn\">get</span>(<span class=\"str\">\"spark.sql.adaptive.autoBroadcastJoinThreshold\"</span>)   <span class=\"cm\"># 10485760 (10MB)</span>\n\n<span class=\"cm\">-- Runtime: one join side = 8MB after predicate pushdown</span>\n<span class=\"cm\">-- But profile shows: Sort-Merge Join, 120GB shuffle</span>", "options": ["A. AQE Skew Join Optimization — splits skewed partitions", "B. AQE Post-shuffle Coalescing — merges small partitions", "C. AQE Dynamic Join Selection — converts SMJ to broadcast join at runtime when one side is small enough", "D. AQE Dynamic Partition Pruning — prunes partitions at query time"], "answerIndex": 2, "explanation": "AQE's Dynamic Join Selection (or Dynamic Switch to Broadcast Join) automatically converts a Sort-Merge Join to a Broadcast Join at RUNTIME when it detects that one side of the join is smaller than the adaptive broadcast threshold. In this case, 8MB < 10MB (the autoBroadcastJoinThreshold), so AQE should have converted it automatically. If it didn't, possible causes: the threshold check may have occurred BEFORE predicate pushdown reduced the table to 8MB (static planning), AQE adaptive broadcast threshold may differ from autoBroadcastJoinThreshold, or there's a join hint forcing SMJ. Fix: explicitly set spark.sql.adaptive.autoBroadcastJoinThreshold to a value above the filtered size, or add a BROADCAST hint.", "exampleCode": "<span class=\"cm\">-- Three AQE sub-features (exam must-know):</span>\n<span class=\"cm\">-- 1. Post-shuffle coalescing: merges tiny post-shuffle partitions</span>\n<span class=\"cm\">-- 2. Dynamic join selection: SMJ → Broadcast at runtime</span>\n<span class=\"cm\">-- 3. Skew join: splits skewed partitions into sub-partitions</span>\n\n<span class=\"cm\">-- Fix for 8MB table not being broadcast:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.autoBroadcastJoinThreshold\"</span>, <span class=\"str\">\"20971520\"</span>) <span class=\"cm\"># 20MB</span>\n<span class=\"cm\">-- OR use hint:</span>\n<span class=\"kw\">SELECT</span> <span class=\"cm\">/*+ BROADCAST(small_table) */</span> ..."}, {"section": "Security", "text": "A data engineer implements row-level security in Unity Catalog. Only rows where <code>region = get_user_region()</code> should be visible. Which commands correctly implement this?", "code": "<span class=\"cm\">-- Step 1: Create filter function</span>\n<span class=\"kw\">CREATE FUNCTION</span> prod.security.<span class=\"fn\">region_filter</span>(region <span class=\"kw\">STRING</span>)\n<span class=\"kw\">RETURN</span>\n  <span class=\"fn\">IS_ACCOUNT_GROUP_MEMBER</span>(<span class=\"str\">'data_admins'</span>)  <span class=\"cm\">-- admins see all</span>\n  <span class=\"kw\">OR</span> region = <span class=\"fn\">current_user_region</span>();      <span class=\"cm\">-- others see own region</span>\n\n<span class=\"cm\">-- Step 2: Apply to table</span>\n<span class=\"kw\">ALTER TABLE</span> prod.sales.transactions\n<span class=\"kw\">SET ROW FILTER</span> prod.security.<span class=\"fn\">region_filter</span> <span class=\"kw\">ON</span> (region);", "options": ["A. Incorrect — row filters require a WHERE clause, not a function", "B. Incorrect — the filter function must return a full DataFrame, not a boolean", "C. Correct — the function returns boolean; TRUE means the row is visible; applied to the 'region' column", "D. Incorrect — IS_ACCOUNT_GROUP_MEMBER cannot be used in a row filter function"], "answerIndex": 2, "explanation": "This is the correct Unity Catalog Row Filter implementation. The filter function returns a boolean: TRUE means the row is visible to the querying user, FALSE means it's hidden. When applied with SET ROW FILTER ... ON (region), the region column value is passed as an argument to the function for each row. Data admins (IS_ACCOUNT_GROUP_MEMBER('data_admins')) see all rows (function always returns TRUE for them). Other users only see rows where their region matches. The filter is applied transparently at query time — users don't even know about the filter. IS_ACCOUNT_GROUP_MEMBER is fully supported in row filter functions.", "exampleCode": "<span class=\"cm\">-- Complete row filter implementation:</span>\n<span class=\"kw\">CREATE FUNCTION</span> prod.security.<span class=\"fn\">region_filter</span>(region_col <span class=\"kw\">STRING</span>)\n<span class=\"kw\">RETURN</span>\n  <span class=\"fn\">IS_ACCOUNT_GROUP_MEMBER</span>(<span class=\"str\">'data_admins'</span>)\n  <span class=\"kw\">OR</span> region_col = <span class=\"fn\">SESSION_USER</span>()  <span class=\"cm\">-- or a lookup function</span>\n  <span class=\"kw\">OR</span> <span class=\"fn\">IS_ACCOUNT_GROUP_MEMBER</span>(<span class=\"fn\">CONCAT</span>(<span class=\"str\">'region_'</span>, region_col));\n\n<span class=\"kw\">ALTER TABLE</span> prod.sales.transactions\n<span class=\"kw\">SET ROW FILTER</span> prod.security.<span class=\"fn\">region_filter</span> <span class=\"kw\">ON</span> (region);\n\n<span class=\"cm\">-- Remove row filter:</span>\n<span class=\"kw\">ALTER TABLE</span> prod.sales.transactions <span class=\"kw\">DROP ROW FILTER</span>;"}, {"section": "CI/CD", "text": "A data engineer uses the Databricks REST API to programmatically trigger a job and retrieve its output after completion. What is the correct sequence of API calls?", "code": "<span class=\"cm\"># Step sequence options:</span>\n\n<span class=\"cm\"># Option A:</span>\n<span class=\"cm\"># 1. GET /api/2.1/jobs/get?job_id=123</span>\n<span class=\"cm\"># 2. POST /api/2.1/jobs/run-now  → {run_id: 456}</span>\n<span class=\"cm\"># 3. GET /api/2.1/jobs/runs/get-output?run_id=456</span>\n\n<span class=\"cm\"># Option B:</span>\n<span class=\"cm\"># 1. POST /api/2.1/jobs/run-now  → {run_id: 456}</span>\n<span class=\"cm\"># 2. Poll GET /api/2.1/jobs/runs/get?run_id=456 until state=TERMINATED</span>\n<span class=\"cm\"># 3. GET /api/2.1/jobs/runs/get-output?run_id=456</span>\n\n<span class=\"cm\"># Option C:</span>\n<span class=\"cm\"># 1. POST /api/2.1/jobs/runs/submit  → {run_id: 456}</span>\n<span class=\"cm\"># 2. GET /api/2.1/jobs/runs/export?run_id=456</span>\n\n<span class=\"cm\"># Option D:</span>\n<span class=\"cm\"># 1. POST /api/2.1/jobs/run-now  → {run_id: 456}</span>\n<span class=\"cm\"># 2. GET /api/2.1/jobs/runs/get-output?run_id=456  (immediately)</span>", "options": ["A. Option A — incorrectly calls GET job before triggering the run", "B. Option B — correct: trigger run, poll for completion, then get output", "C. Option C — runs/submit is for one-time runs without a saved job; runs/export is not the right endpoint for output", "D. Option D — calling get-output immediately without polling may return before the run completes"], "answerIndex": 1, "explanation": "Option B is the correct sequence. (1) POST /jobs/run-now triggers the existing saved job and immediately returns a run_id. (2) Poll GET /jobs/runs/get with the run_id until life_cycle_state = 'TERMINATED' (or 'INTERNAL_ERROR', 'SKIPPED'). Without polling, you don't know if the run finished. (3) GET /jobs/runs/get-output with the run_id retrieves the notebook output, return value, and error details (if failed). Option A incorrectly adds an unnecessary GET job step before triggering. Option C uses the wrong output endpoint (runs/export is for exporting notebook content, not run output). Option D calls get-output before the run finishes — the output would be incomplete.", "exampleCode": "<span class=\"cm\"># Complete programmatic job trigger with output retrieval:</span>\n\n<span class=\"kw\">import</span> requests, time\n\n<span class=\"cm\"># Step 1: Trigger run</span>\nresp = requests.<span class=\"fn\">post</span>(<span class=\"str\">\"/api/2.1/jobs/run-now\"</span>, json={<span class=\"str\">\"job_id\"</span>: <span class=\"num\">123</span>})\nrun_id = resp.json()[<span class=\"str\">\"run_id\"</span>]\n\n<span class=\"cm\"># Step 2: Poll until terminated</span>\n<span class=\"kw\">while True</span>:\n    state = requests.<span class=\"fn\">get</span>(<span class=\"str\">f\"/api/2.1/jobs/runs/get?run_id={run_id}\"</span>)\n    life_cycle = state.json()[<span class=\"str\">\"state\"</span>][<span class=\"str\">\"life_cycle_state\"</span>]\n    <span class=\"kw\">if</span> life_cycle == <span class=\"str\">\"TERMINATED\"</span>: <span class=\"kw\">break</span>\n    time.<span class=\"fn\">sleep</span>(<span class=\"num\">10</span>)\n\n<span class=\"cm\"># Step 3: Get output</span>\noutput = requests.<span class=\"fn\">get</span>(<span class=\"str\">f\"/api/2.1/jobs/runs/get-output?run_id={run_id}\"</span>)"}, {"section": "Security", "text": "A data engineer needs to share data with partners but must exclude the <code>cost_margin</code> column. What is the most maintainable Unity Catalog approach?", "code": "<span class=\"cm\">-- Table: prod.analytics.product_performance</span>\n<span class=\"cm\">-- Columns: product_id, region, revenue, units_sold, cost_margin (CONFIDENTIAL)</span>\n\n<span class=\"cm\">-- Option A: Create a view</span>\n<span class=\"kw\">CREATE VIEW</span> prod.analytics.product_performance_external <span class=\"kw\">AS</span>\n<span class=\"kw\">SELECT</span> product_id, region, revenue, units_sold\n<span class=\"kw\">FROM</span> prod.analytics.product_performance;\n\n<span class=\"cm\">-- Option B: Delta Sharing with column list</span>\n<span class=\"kw\">CREATE SHARE</span> partner_share;\n<span class=\"kw\">ALTER SHARE</span> partner_share\n<span class=\"kw\">ADD TABLE</span> prod.analytics.product_performance\n  <span class=\"kw\">WITH</span> COLUMN LIST (product_id, region, revenue, units_sold);\n\n<span class=\"cm\">-- Option C: REVOKE SELECT on cost_margin from external group</span>\n<span class=\"kw\">REVOKE SELECT</span> (cost_margin) <span class=\"kw\">ON</span> TABLE prod.analytics.product_performance\n<span class=\"kw\">FROM</span> external_partners;", "options": ["A. Create a view — maintainable, but partners need access to view only", "B. Delta Sharing with column list — shares live data externally without the confidential column, no data copy", "C. REVOKE SELECT on column — column-level REVOKE is not supported in Unity Catalog", "D. Both A and B are valid; B is better when sharing with external/non-Databricks platforms"], "answerIndex": 3, "explanation": "Both A and B are valid approaches. Option A (view): creates a view that excludes cost_margin. Grant SELECT on the view to external partners — they cannot see the underlying table or the cost_margin column. Maintainable: if new columns are added to the base table and should be excluded, update the view. Option B (Delta Sharing with column list): the COLUMN LIST parameter in ADD TABLE for a Delta Share filters which columns are visible to recipients. This is ideal for sharing with non-Databricks external partners — they use the Delta Sharing open protocol and never see cost_margin. Option C is invalid — Unity Catalog does not support column-level REVOKE syntax. Option D is correct: both A and B work; B is specifically designed for cross-platform external sharing.", "exampleCode": "<span class=\"cm\">-- Option A: View for internal Databricks users</span>\n<span class=\"kw\">CREATE VIEW</span> prod.analytics.product_performance_external <span class=\"kw\">AS</span>\n<span class=\"kw\">SELECT</span> product_id, region, revenue, units_sold\n<span class=\"kw\">FROM</span> prod.analytics.product_performance;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> VIEW prod.analytics.product_performance_external\n<span class=\"kw\">TO</span> external_partners;\n\n<span class=\"cm\">-- Option B: Delta Sharing for external/non-Databricks recipients</span>\n<span class=\"kw\">CREATE SHARE</span> partner_share;\n<span class=\"kw\">ALTER SHARE</span> partner_share\n<span class=\"kw\">ADD TABLE</span> prod.analytics.product_performance\n  <span class=\"kw\">WITH</span> COLUMN LIST (product_id, region, revenue, units_sold);\n<span class=\"kw\">CREATE RECIPIENT</span> partner_company;\n<span class=\"kw\">GRANT SELECT ON SHARE</span> partner_share <span class=\"kw\">TO RECIPIENT</span> partner_company;"}, {"section": "Data Modeling", "text": "A data engineer implements Lakeflow CDC using APPLY CHANGES INTO. After 6 months, they discover some records were processed with an incorrect updated_at timestamp. What is the impact?", "code": "<span class=\"kw\">APPLY CHANGES INTO</span> LIVE.silver_customers\n<span class=\"kw\">FROM</span> STREAM(LIVE.bronze_cdc)\nKEYS (customer_id)\nSEQUENCE BY updated_at   <span class=\"cm\">-- Records with incorrect (too-old) updated_at arrive</span>\nSTORED AS SCD TYPE <span class=\"num\">1</span>", "options": ["A. No impact — APPLY CHANGES INTO corrects timestamps automatically", "B. Records with an incorrectly old updated_at are ignored if a newer version of that customer already exists in the target — the incorrect record's 'old' timestamp loses to the existing record's newer timestamp", "C. The pipeline fails — APPLY CHANGES INTO validates timestamps against a system clock", "D. All historical records are reprocessed with the corrected timestamp"], "answerIndex": 1, "explanation": "APPLY CHANGES INTO uses the SEQUENCE BY column to determine record ordering — the record with the HIGHEST updated_at value wins for SCD Type 1. If a record arrives with an incorrectly old updated_at (e.g., updated_at='2020-01-01' when the customer was last updated with updated_at='2024-06-01'), the existing record in the target has a higher sequence value (2024-06-01 > 2020-01-01), so the incorrect record is silently ignored — it doesn't overwrite the current state. This is the CORRECT behavior: APPLY CHANGES INTO is designed to be idempotent and resistant to out-of-order delivery. The issue: if the incorrect record arrives BEFORE any correct record (e.g., as the first record for that customer), it would be applied (no existing record to compare against).", "exampleCode": "<span class=\"cm\">-- SEQUENCE BY semantics: highest value wins (SCD Type 1)</span>\n<span class=\"cm\">-- Scenario 1: Correct order</span>\n<span class=\"cm\">-- Record 1: customer_id=1, updated_at=2024-01-01 → APPLIED (first)</span>\n<span class=\"cm\">-- Record 2: customer_id=1, updated_at=2024-06-01 → APPLIED (newer, wins)</span>\n<span class=\"cm\">-- Record 3: customer_id=1, updated_at=2020-01-01 (incorrect) → IGNORED (older)</span>\n\n<span class=\"cm\">-- Scenario 2: Incorrect record arrives first</span>\n<span class=\"cm\">-- Record 1: customer_id=2, updated_at=2020-01-01 (incorrect) → APPLIED (first)</span>\n<span class=\"cm\">-- Record 2: customer_id=2, updated_at=2024-06-01 → APPLIED (newer, overwrites)</span>\n<span class=\"cm\">-- Final state: correct (2024 record wins)</span>"}, {"section": "CI/CD", "text": "A Databricks Git Folder is linked to a GitHub repository. A developer pushes a commit to the <code>main</code> branch. What must the engineer do to update the notebooks in the Databricks workspace?", "code": "<span class=\"cm\"># After git push to main branch on GitHub:</span>\n<span class=\"cm\"># Option A: No action needed — workspace auto-syncs</span>\n\n<span class=\"cm\"># Option B: CLI command</span>\n$ databricks repos update --repo-id <span class=\"num\">12345</span> --branch main\n\n<span class=\"cm\"># Option C: REST API</span>\n<span class=\"kw\">PATCH</span> /api/2.0/repos/12345\n{<span class=\"str\">\"branch\"</span>: <span class=\"str\">\"main\"</span>}\n\n<span class=\"cm\"># Option D:</span>\n$ databricks workspace import ./notebook.py /Workspace/Repos/main/notebook", "options": ["A. No action needed — Databricks Git Folders auto-sync with the remote repository", "B. Run databricks repos update CLI command to pull the latest commit", "C. Call PATCH /api/2.0/repos/12345 to pull the latest from main — equivalent to a git pull", "D. Options B and C both correctly pull the latest commit; A is incorrect (no auto-sync)"], "answerIndex": 3, "explanation": "Databricks Git Folders do NOT automatically sync when commits are pushed to the remote repository. A pull action must be explicitly triggered. Both Option B (CLI) and Option C (REST API) accomplish this — they instruct the workspace to pull the latest commit from the specified branch. Option A is incorrect: there is no auto-sync functionality. This is by design — teams control WHEN changes are promoted to the workspace (preventing accidental deployment of untested code). In a CI/CD pipeline, the PATCH /api/2.0/repos/{repo_id} call is typically added as a deployment step after tests pass.", "exampleCode": "<span class=\"cm\"># Option B: CLI pull (git pull equivalent)</span>\n$ databricks repos update --repo-id <span class=\"num\">12345</span> --branch main\n\n<span class=\"cm\"># Option C: REST API pull</span>\n$ curl -X PATCH /api/2.0/repos/12345   -H <span class=\"str\">\"Authorization: Bearer $TOKEN\"</span>   -d <span class=\"str\">'{\"branch\": \"main\"}'</span>\n\n<span class=\"cm\"># In CI/CD pipeline (GitHub Actions example):</span>\n- name: Deploy to Databricks workspace\n  run: |\n    curl -X PATCH $DATABRICKS_HOST/api/2.0/repos/$REPO_ID       -H \"Authorization: Bearer $DATABRICKS_TOKEN\"       -d '{\"branch\": \"main\"}'"}, {"section": "Governance", "text": "A data engineer runs DESCRIBE HISTORY on a Delta table. Which information does this command return that is useful for debugging a data issue?", "code": "<span class=\"kw\">DESCRIBE HISTORY</span> prod.sales.orders <span class=\"kw\">LIMIT</span> <span class=\"num\">10</span>", "options": ["A. The column-level lineage showing which upstream tables contributed each column", "B. The last 10 schema versions of the table showing column additions and removals", "C. The last 10 Delta operations including version, timestamp, user, operation type (WRITE/UPDATE/DELETE/MERGE/OPTIMIZE), and operation metrics", "D. The last 10 VACUUM operations showing which files were deleted"], "answerIndex": 2, "explanation": "DESCRIBE HISTORY returns the Delta transaction log audit trail: each row represents one Delta operation with: version (incrementing integer), timestamp (when the commit occurred), user (who performed the operation), operation (WRITE, UPDATE, DELETE, MERGE, OPTIMIZE, VACUUM COMMIT, RESTORE, etc.), and operationMetrics (rows added, rows removed, files added, files changed, etc.). This is invaluable for debugging: 'Who deleted those rows?' 'When did this table last receive data?' 'What did the last MERGE affect?' It does NOT show column lineage (A), schema version history (B), or VACUUM file details in the same table (D).", "exampleCode": "<span class=\"cm\">-- DESCRIBE HISTORY output columns:</span>\n<span class=\"cm\">-- version:          Delta version number (0, 1, 2, ...)</span>\n<span class=\"cm\">-- timestamp:        When the operation was committed</span>\n<span class=\"cm\">-- userId/userName:  Who performed the operation</span>\n<span class=\"cm\">-- operation:        WRITE | UPDATE | DELETE | MERGE | OPTIMIZE | RESTORE</span>\n<span class=\"cm\">-- operationMetrics: {numTargetRowsUpdated, numTargetRowsDeleted, ...}</span>\n<span class=\"cm\">-- operationParameters: parameters used (e.g., predicates for UPDATE)</span>\n\n<span class=\"kw\">DESCRIBE HISTORY</span> prod.sales.orders;\n<span class=\"kw\">DESCRIBE HISTORY</span> prod.sales.orders <span class=\"kw\">LIMIT</span> <span class=\"num\">5</span>; <span class=\"cm\">-- last 5 operations</span>"}, {"section": "Performance", "text": "A Databricks SQL query on a Delta table shows <code>Files read: 3,200 / Files pruned: 0</code> after the engineer verified that liquid clustering was applied and OPTIMIZE was run. The query filter is <code>WHERE event_category = 'purchase'</code>. The table is clustered on <code>(event_date, event_category)</code>. What is the likely issue?", "code": "<span class=\"cm\">-- Table: CLUSTER BY (event_date, event_category)</span>\n<span class=\"cm\">-- OPTIMIZE was run 1 week ago</span>\n\n<span class=\"cm\">-- Query 1 (fast after OPTIMIZE):</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> events <span class=\"kw\">WHERE</span> event_date = <span class=\"str\">'2024-06-15'</span>\n<span class=\"cm\">-- Files pruned: 3,100 / 3,200 ✓</span>\n\n<span class=\"cm\">-- Query 2 (no pruning):</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> events <span class=\"kw\">WHERE</span> event_category = <span class=\"str\">'purchase'</span>\n<span class=\"cm\">-- Files pruned: 0 / 3,200 ✗</span>", "options": ["A. Liquid clustering on two columns means only the first column (event_date) gets effective skipping; secondary column skipping is not supported", "B. Liquid clustering co-locates data for multiple clustering columns together — data is optimally laid out when BOTH columns are filtered simultaneously. Filtering on only event_category without event_date may not achieve effective skipping", "C. The event_category column has too many distinct values for skipping to work", "D. Query 2 needs a CLUSTER HINT to activate skipping for the secondary column"], "answerIndex": 1, "explanation": "Liquid clustering organizes data to maximize co-location for the clustering key columns used TOGETHER. When both event_date AND event_category are used in a filter, the data layout (from OPTIMIZE) is most effective at pruning files — data with event_date='2024-06-15' AND event_category='purchase' is co-located, so Spark can skip most files. When only event_category is filtered (without event_date), the data layout from the clustering algorithm may not provide effective per-category skipping because files contain a mix of event_categories spread across different date ranges. This is a key nuance: clustering on (A, B) optimizes for queries filtering on A, or A+B, but not necessarily B alone.", "exampleCode": "<span class=\"cm\">-- Clustering column order matters:</span>\n<span class=\"cm\">-- CLUSTER BY (event_date, event_category)</span>\n<span class=\"cm\">--   ✓ WHERE event_date = X                  → good skipping (first col)</span>\n<span class=\"cm\">--   ✓ WHERE event_date = X AND event_cat = Y → best skipping (both cols)</span>\n<span class=\"cm\">--   △ WHERE event_category = Y              → limited skipping (second col alone)</span>\n\n<span class=\"cm\">-- If event_category is the dominant filter, adjust clustering:</span>\n<span class=\"kw\">ALTER TABLE</span> events <span class=\"kw\">CLUSTER BY</span> (event_category, event_date);\n<span class=\"kw\">OPTIMIZE</span> events;  <span class=\"cm\">-- re-cluster with new column order</span>"}, {"section": "Streaming", "text": "A data engineer monitors a streaming Lakeflow pipeline. The Event Log shows that the batch processing time has increased from 30 seconds to 8 minutes over the past 2 weeks. No new data volume increase. Which investigation step should be first?", "code": "<span class=\"cm\">-- Monitoring query to investigate:</span>\n<span class=\"kw\">SELECT</span>\n  timestamp,\n  details:flow_progress:metrics:numOutputRows,\n  details:flow_progress:metrics:numStateRows,\n  details:flow_progress:source_info:startOffset,\n  details:flow_progress:source_info:endOffset\n<span class=\"kw\">FROM</span> <span class=\"fn\">event_log</span>(<span class=\"str\">'&lt;pipeline_id&gt;'</span>)\n<span class=\"kw\">WHERE</span> event_type = <span class=\"str\">'flow_progress'</span>\n<span class=\"kw\">ORDER BY</span> timestamp <span class=\"kw\">DESC</span>", "options": ["A. Check if the source has changed — new file format or larger individual files", "B. Check numStateRows trend in the Event Log — if it's growing unboundedly, missing or too-large watermark is causing state bloat", "C. Scale up the cluster — more workers will reduce processing time", "D. Disable liquid clustering to reduce write overhead per micro-batch"], "answerIndex": 1, "explanation": "Gradual performance degradation over 2 weeks without input volume changes is a classic signature of unbounded state growth. The numStateRows metric in the Lakeflow Event Log tracks how many rows are stored in the streaming state store. If it's growing every batch (not decreasing or plateauing), state from old batches is never evicted — this happens when a watermark is missing or set too loosely for a stateful operation (windowed aggregation, stream-stream join, dropDuplicates). As the RocksDB state store grows, each batch takes longer to read/write/commit state. Fix: add or tighten the watermark to bound state eviction.", "exampleCode": "<span class=\"cm\">-- Monitor state growth trend:</span>\n<span class=\"kw\">SELECT</span>\n  timestamp,\n  details:flow_progress:metrics:numStateRows <span class=\"kw\">AS</span> state_rows,\n  details:flow_progress:batch_id\n<span class=\"kw\">FROM</span> <span class=\"fn\">event_log</span>(<span class=\"str\">'&lt;pipeline_id&gt;'</span>)\n<span class=\"kw\">WHERE</span> event_type = <span class=\"str\">'flow_progress'</span>\n<span class=\"kw\">ORDER BY</span> timestamp\n<span class=\"cm\">-- If state_rows grows each batch → unbounded state → add/fix watermark</span>\n\n<span class=\"cm\">-- Fix: Add proper watermark</span>\ndf.<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"event_ts\"</span>, <span class=\"str\">\"1 hour\"</span>)  <span class=\"cm\"># evict state older than 1 hour</span>"}, {"section": "Delta Lake", "text": "A data engineer needs to verify that a specific data file is still referenced by the current Delta table version (to determine if VACUUM will remove it). Which command lists all currently active data files?", "code": "<span class=\"cm\">-- Options to list current/active files:</span>\n\n<span class=\"cm\">-- Option A:</span>\n<span class=\"kw\">DESCRIBE HISTORY</span> prod.orders;\n\n<span class=\"cm\">-- Option B:</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> prod.orders.files\n\n<span class=\"cm\">-- Option C:</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">input_file_name</span>() <span class=\"kw\">FROM</span> prod.orders\n\n<span class=\"cm\">-- Option D:</span>\n<span class=\"kw\">DESCRIBE DETAIL</span> prod.orders", "options": ["A. DESCRIBE HISTORY — shows operation history, not individual file names", "B. SELECT * FROM <table>.files — lists all active data files with path, size, modification time, and stats", "C. SELECT input_file_name() FROM table — returns one row per data row with the file path", "D. DESCRIBE DETAIL — shows aggregate table stats (numFiles, sizeInBytes) but not individual file names"], "answerIndex": 1, "explanation": "The Delta table function <table>.files (or equivalently SELECT * FROM delta.`<path>`.files) returns a row for each active data file in the current table version — including the file path, size, modification time, partition values, and statistics. Files listed here will NOT be removed by VACUUM (they are currently referenced). Files that exist on disk but are NOT in this list are candidates for VACUUM removal. DESCRIBE HISTORY (A) shows operation metadata, not file paths. input_file_name() (C) requires a full table scan to return file names per row — very expensive for large tables. DESCRIBE DETAIL (D) gives aggregate counts, not individual file paths.", "exampleCode": "<span class=\"cm\">-- List all active files in current Delta version:</span>\n<span class=\"kw\">SELECT</span> path, size, modificationTime, stats\n<span class=\"kw\">FROM</span> prod.orders.files;\n\n<span class=\"cm\">-- For path-based tables:</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> delta.<span class=\"str\">&#96;/mnt/prod/orders&#96;</span>.files;\n\n<span class=\"cm\">-- Files in this output: will NOT be deleted by VACUUM</span>\n<span class=\"cm\">-- Files on disk but NOT here: will be deleted by VACUUM (if > retention)</span>"}, {"section": "Data Modeling", "text": "A data engineer uses PySpark window functions and needs to calculate a <strong>running total</strong> of revenue per customer, ordered by order date. Which code is correct?", "code": "<span class=\"kw\">from</span> pyspark.sql.window <span class=\"kw\">import</span> Window\n<span class=\"kw\">from</span> pyspark.sql.functions <span class=\"kw\">import</span> sum, col\n\n<span class=\"cm\"># Option A — Correct window spec for running total?</span>\nwindow_a = <span class=\"fn\">Window</span>.<span class=\"fn\">partitionBy</span>(<span class=\"str\">\"customer_id\"</span>).<span class=\"fn\">orderBy</span>(<span class=\"str\">\"order_date\"</span>)\ndf.<span class=\"fn\">withColumn</span>(<span class=\"str\">\"running_total\"</span>, <span class=\"fn\">sum</span>(<span class=\"str\">\"revenue\"</span>).<span class=\"fn\">over</span>(window_a))\n\n<span class=\"cm\"># Option B — Partition only, no order</span>\nwindow_b = <span class=\"fn\">Window</span>.<span class=\"fn\">partitionBy</span>(<span class=\"str\">\"customer_id\"</span>)\ndf.<span class=\"fn\">withColumn</span>(<span class=\"str\">\"running_total\"</span>, <span class=\"fn\">sum</span>(<span class=\"str\">\"revenue\"</span>).<span class=\"fn\">over</span>(window_b))\n\n<span class=\"cm\"># Option C — Order only, no partition</span>\nwindow_c = <span class=\"fn\">Window</span>.<span class=\"fn\">orderBy</span>(<span class=\"str\">\"order_date\"</span>)\ndf.<span class=\"fn\">withColumn</span>(<span class=\"str\">\"running_total\"</span>, <span class=\"fn\">sum</span>(<span class=\"str\">\"revenue\"</span>).<span class=\"fn\">over</span>(window_c))", "options": ["A. Option A — partitionBy(customer_id).orderBy(order_date) creates a per-customer running total", "B. Option B — partitionBy without orderBy calculates total per customer (not running)", "C. Option C — orderBy without partitionBy calculates a global running total (not per customer)", "D. Options A and B both produce running totals — the orderBy is optional"], "answerIndex": 0, "explanation": "Option A is correct. For a per-customer running total: partitionBy('customer_id') ensures each customer's rows form an independent window. orderBy('order_date') defines the ordering within each partition — sum() with an ordered window defaults to ROWS UNBOUNDED PRECEDING AND CURRENT ROW (the running/cumulative sum). Option B: without orderBy, sum() over the window calculates the total for the ENTIRE partition (equivalent to GROUP BY customer_id sum) — every row gets the same total, not a running total. Option C: without partitionBy, the window is global — the running total accumulates across ALL customers ordered by order_date, not per customer.", "exampleCode": "<span class=\"kw\">from</span> pyspark.sql.window <span class=\"kw\">import</span> Window\n<span class=\"kw\">from</span> pyspark.sql.functions <span class=\"kw\">import</span> sum, col, lag, row_number\n\n<span class=\"cm\"># Running total per customer (correct):</span>\nwindow = <span class=\"fn\">Window</span>.<span class=\"fn\">partitionBy</span>(<span class=\"str\">\"customer_id\"</span>).<span class=\"fn\">orderBy</span>(<span class=\"str\">\"order_date\"</span>)\ndf.<span class=\"fn\">withColumn</span>(<span class=\"str\">\"running_total\"</span>, <span class=\"fn\">sum</span>(<span class=\"str\">\"revenue\"</span>).<span class=\"fn\">over</span>(window))\n\n<span class=\"cm\"># Total per customer (no running — no orderBy):</span>\nwindow2 = <span class=\"fn\">Window</span>.<span class=\"fn\">partitionBy</span>(<span class=\"str\">\"customer_id\"</span>)\ndf.<span class=\"fn\">withColumn</span>(<span class=\"str\">\"customer_total\"</span>, <span class=\"fn\">sum</span>(<span class=\"str\">\"revenue\"</span>).<span class=\"fn\">over</span>(window2))\n\n<span class=\"cm\"># Row number per customer:</span>\ndf.<span class=\"fn\">withColumn</span>(<span class=\"str\">\"order_rank\"</span>, <span class=\"fn\">row_number</span>().<span class=\"fn\">over</span>(window))"}, {"section": "Delta Lake", "text": "A data engineer runs RESTORE TABLE to undo a bad batch load. What effect does this have on the Delta transaction log?", "code": "<span class=\"kw\">DESCRIBE HISTORY</span> prod.orders;\n<span class=\"cm\">-- version 20: WRITE (bad batch loaded)</span>\n<span class=\"cm\">-- version 19: WRITE (good state)</span>\n\n<span class=\"kw\">RESTORE TABLE</span> prod.orders <span class=\"kw\">TO VERSION AS OF</span> <span class=\"num\">19</span>", "options": ["A. Versions 20 is deleted from the transaction log; the table reverts to version 19", "B. A new version 21 is created that restores the table data to match version 19; versions 19 and 20 remain in history", "C. The table is physically reverted to version 19; a backup of version 20 is stored in a temp location", "D. RESTORE deletes the bad data from all Delta file versions permanently"], "answerIndex": 1, "explanation": "RESTORE TABLE creates a NEW Delta version (version 21 in this case) that makes the table's current state match the specified historical version. The Delta transaction log is append-only — versions 19 and 20 are NEVER deleted. DESCRIBE HISTORY after RESTORE shows version 21 as a RESTORE operation. The data files from the bad batch (version 20) remain on storage until VACUUM runs after the retention period. This is important: RESTORE does not physically remove the bad data — it just makes version 19's file set the 'current' view. For physically removing the bad batch data, you would then need VACUUM.", "exampleCode": "<span class=\"cm\">-- After RESTORE, DESCRIBE HISTORY shows:</span>\n<span class=\"cm\">-- version 21: RESTORE (this is the new entry)</span>\n<span class=\"cm\">-- version 20: WRITE (bad batch — still in history)</span>\n<span class=\"cm\">-- version 19: WRITE (the restored state)</span>\n\n<span class=\"cm\">-- RESTORE is additive — does not delete history</span>\n<span class=\"cm\">-- To verify the restore worked:</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">COUNT</span>(*) <span class=\"kw\">FROM</span> prod.orders;         <span class=\"cm\">-- current (= v19 count)</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">COUNT</span>(*) <span class=\"kw\">FROM</span> prod.orders <span class=\"kw\">VERSION AS OF</span> <span class=\"num\">19</span>; <span class=\"cm\">-- same</span>\n<span class=\"kw\">SELECT</span> <span class=\"fn\">COUNT</span>(*) <span class=\"kw\">FROM</span> prod.orders <span class=\"kw\">VERSION AS OF</span> <span class=\"num\">20</span>; <span class=\"cm\">-- shows bad batch count</span>"}, {"section": "Performance", "text": "A data engineer needs to control the Spark SQL shuffle partition count adaptively. Which combination of configurations is correct for AQE to automatically coalesce tiny shuffle partitions?", "code": "<span class=\"cm\"># Option A:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.enabled\"</span>, <span class=\"str\">\"true\"</span>)\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.coalescePartitions.enabled\"</span>, <span class=\"str\">\"true\"</span>)\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.advisoryPartitionSizeInBytes\"</span>, <span class=\"str\">\"134217728\"</span>) <span class=\"cm\"># 128MB</span>\n\n<span class=\"cm\"># Option B:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.enabled\"</span>, <span class=\"str\">\"false\"</span>)\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.shuffle.partitions\"</span>, <span class=\"str\">\"200\"</span>)\n\n<span class=\"cm\"># Option C:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.enabled\"</span>, <span class=\"str\">\"true\"</span>)\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.shuffle.partitions\"</span>, <span class=\"str\">\"200\"</span>)\n<span class=\"cm\"># (coalescePartitions not explicitly set)</span>", "options": ["A. Option A — explicitly enables AQE + coalescePartitions with a target size (most explicit/complete)", "B. Option B — AQE disabled; shuffle.partitions=200 is static, no adaptive coalescing", "C. Option C — AQE enabled; coalescePartitions.enabled defaults to true when AQE is enabled", "D. Options A and C are both correct — coalescePartitions.enabled defaults to true with AQE"], "answerIndex": 3, "explanation": "Both A and C are correct. In Databricks, when spark.sql.adaptive.enabled = true (the Databricks default), spark.sql.adaptive.coalescePartitions.enabled also defaults to true — you don't need to explicitly set it. Option A explicitly sets all three parameters — fully explicit and correct, recommended for clarity. Option C enables AQE and sets shuffle.partitions (the initial count before coalescing) — coalescePartitions is implicitly enabled. Both will result in AQE automatically merging small post-shuffle partitions based on advisoryPartitionSizeInBytes (default 64MB). Option B disables AQE entirely — no adaptive coalescing.", "exampleCode": "<span class=\"cm\"># AQE Partition Coalescing — how it works:</span>\n<span class=\"cm\"># 1. shuffle.partitions sets the INITIAL count (e.g., 200)</span>\n<span class=\"cm\"># 2. After shuffle, if many partitions are tiny (e.g., 200 partitions, avg 500KB each)</span>\n<span class=\"cm\"># 3. AQE merges them toward advisoryPartitionSizeInBytes (default 64MB)</span>\n<span class=\"cm\"># 4. Result: fewer, appropriately-sized partitions</span>\n\n<span class=\"cm\"># Defaults in Databricks (no config needed):</span>\n<span class=\"cm\"># spark.sql.adaptive.enabled = true</span>\n<span class=\"cm\"># spark.sql.adaptive.coalescePartitions.enabled = true</span>\n<span class=\"cm\"># spark.sql.adaptive.advisoryPartitionSizeInBytes = 67108864 (64MB)</span>"}, {"section": "Governance", "text": "A data engineer needs to grant a service principal permissions to create and read tables in <code>prod.analytics</code>. What is the MINIMUM set of Unity Catalog permissions required?", "code": "<span class=\"cm\">-- Option A:</span>\n<span class=\"kw\">GRANT</span> ALL PRIVILEGES <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n\n<span class=\"cm\">-- Option B:</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n<span class=\"kw\">GRANT</span> CREATE TABLE <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n\n<span class=\"cm\">-- Option C:</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n<span class=\"kw\">GRANT</span> CREATE TABLE, <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n\n<span class=\"cm\">-- Option D:</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;\n<span class=\"kw\">GRANT</span> CREATE TABLE <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-sp&#96;;", "options": ["A. ALL PRIVILEGES on schema — too broad, not minimum privilege", "B. USAGE on catalog + USAGE on schema + CREATE TABLE + SELECT on schema — correct minimum set", "C. Missing USAGE on schema — without USAGE on the schema, the service principal cannot access it", "D. Missing SELECT — CREATE TABLE alone doesn't grant read access to existing tables"], "answerIndex": 1, "explanation": "Option B is the minimum required set. USAGE on catalog (prod): required to navigate to the catalog. USAGE on schema (prod.analytics): required to use/access the schema. CREATE TABLE on schema: allows creating new tables within the schema. SELECT on schema: allows reading data from tables in the schema (SELECT at the schema level grants SELECT on all current and future tables). Note: SELECT is NOT implied by CREATE TABLE — these are separate privileges. Without USAGE on the schema (Option C), the service principal cannot access any objects in the schema even with other grants. Without SELECT (Option D), CREATE TABLE gives the ability to create tables but not read them.", "exampleCode": "<span class=\"cm\">-- Minimum grants for create + read in Unity Catalog:</span>\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">CATALOG</span> prod <span class=\"kw\">TO</span> &#96;my-service-principal&#96;;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">USAGE</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-service-principal&#96;;\n<span class=\"kw\">GRANT</span> CREATE TABLE <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-service-principal&#96;;\n<span class=\"kw\">GRANT</span> <span class=\"kw\">SELECT</span> <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-service-principal&#96;;\n\n<span class=\"cm\">-- For write access to existing tables, also add:</span>\n<span class=\"kw\">GRANT</span> MODIFY <span class=\"kw\">ON</span> <span class=\"kw\">SCHEMA</span> prod.analytics <span class=\"kw\">TO</span> &#96;my-service-principal&#96;;"}]}, {"title": "Practice Exam 3", "focus": "Delta Lake · Data Modeling · Performance · Streaming", "questions": [{"section": "Delta Lake", "text": "A data engineer runs the following to enable Change Data Feed and reads from it. What does this streaming query read?", "code": "<span class=\"kw\">ALTER TABLE</span> silver.orders\n<span class=\"kw\">SET TBLPROPERTIES</span> (<span class=\"str\">'delta.enableChangeDataFeed'</span> = <span class=\"str\">'true'</span>);\n\n<span class=\"cm\">-- Streaming CDF reader:</span>\ncdf_df = (spark.readStream\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"readChangeFeed\"</span>, <span class=\"str\">\"true\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"startingVersion\"</span>, <span class=\"num\">0</span>)\n  .<span class=\"fn\">table</span>(<span class=\"str\">\"silver.orders\"</span>))", "options": ["A. All historical data in the table from the beginning, as a full snapshot", "B. Only INSERT operations — CDF does not capture UPDATE or DELETE", "C. All changes (INSERT, UPDATE, DELETE) starting from version 0, including _change_type, _commit_version, and _commit_timestamp columns", "D. Changes starting from when CDF was enabled — version 0 data before CDF was enabled is not included"], "answerIndex": 2, "explanation": "CDF streaming with startingVersion: 0 reads all recorded change events starting from version 0. Each record includes the data columns PLUS: _change_type (insert/update_preimage/update_postimage/delete), _commit_version (which Delta version this change belongs to), and _commit_timestamp. CDF captures ALL DML operations: INSERT, UPDATE (two records: preimage and postimage), and DELETE. Important nuance: CDF can only be read for versions AFTER it was enabled. If CDF was enabled at version 10, you cannot read CDF for versions 0-9. However, if startingVersion: 0 is specified and CDF was enabled from version 0, all changes from version 0 are available.", "exampleCode": "<span class=\"cm\">-- CDF output schema (in addition to table columns):</span>\n<span class=\"cm\">-- _change_type:      'insert' | 'update_preimage' | 'update_postimage' | 'delete'</span>\n<span class=\"cm\">-- _commit_version:   long (Delta version number)</span>\n<span class=\"cm\">-- _commit_timestamp: timestamp of the commit</span>\n\n<span class=\"cm\">-- Batch CDF read (by version range):</span>\nspark.read.<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"readChangeFeed\"</span>, <span class=\"str\">\"true\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"startingVersion\"</span>, <span class=\"num\">5</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"endingVersion\"</span>, <span class=\"num\">10</span>)\n  .<span class=\"fn\">table</span>(<span class=\"str\">\"silver.orders\"</span>)"}, {"section": "Data Modeling", "text": "A data engineer partitions a table. Based on the schema below, which column is the best candidate for partitioning and why?", "code": "<span class=\"cm\">-- Table schema: social media posts</span>\nuser_id     LONG,      <span class=\"cm\">-- 50 million unique users</span>\npost_text   STRING,    <span class=\"cm\">-- free text, variable length</span>\npost_id     STRING,    <span class=\"cm\">-- UUID, globally unique</span>\nlongitude   FLOAT,\nlatitude    FLOAT,\npost_time   TIMESTAMP, <span class=\"cm\">-- exact timestamp</span>\ndate        DATE       <span class=\"cm\">-- derived from post_time, ~365 values/year</span>\n\n<span class=\"cm\">-- Query patterns:</span>\n<span class=\"cm\">-- 90% of queries filter by date range</span>\n<span class=\"cm\">-- Occasional filters on user_id</span>", "options": ["A. post_id — unique identifier, good for point lookups", "B. post_time — exact timestamp, high granularity", "C. date — low cardinality (~365 values/year), matches 90% of query patterns", "D. user_id — 50M unique values, enables per-user access control"], "answerIndex": 2, "explanation": "date is the correct partition column. Good partition columns have LOW cardinality (fewer, larger partitions) and match the dominant query filter pattern. date has ~365 unique values per year — a manageable number of partitions, each containing a day's worth of data. 90% of queries filter by date range, so partition pruning eliminates most files. post_id (A) has billions of unique values — each partition would have 1-2 rows → catastrophic small files problem. post_time (B) is a timestamp — potentially billions of distinct values → same small files problem. user_id (C) has 50M unique values → 50M tiny partitions. This is directly from the official exam guide sample questions.", "exampleCode": "<span class=\"cm\">-- CORRECT: Partition by date (low cardinality + matches query pattern)</span>\n<span class=\"kw\">CREATE TABLE</span> prod.social.posts (\n  user_id LONG, post_text STRING, post_id STRING,\n  longitude FLOAT, latitude FLOAT,\n  post_time TIMESTAMP, date DATE\n)\n<span class=\"kw\">PARTITIONED BY</span> (date);\n\n<span class=\"cm\">-- For high-cardinality columns (user_id), use Liquid Clustering instead:</span>\n<span class=\"kw\">CREATE TABLE</span> prod.social.posts (...)\n<span class=\"kw\">CLUSTER BY</span> (date, user_id);"}, {"section": "Performance", "text": "A data engineer configures a job cluster for a pipeline that runs hourly with 10 minutes of processing time. Which configuration provides the <strong>lowest cost</strong> while meeting a 1-hour SLA?", "code": "<span class=\"cm\">-- Option A: Interactive cluster (always on)</span>\ncluster_type: interactive\nautotermination_minutes: <span class=\"num\">120</span>\n\n<span class=\"cm\">-- Option B: Job cluster (ephemeral, per-run)</span>\ncluster_type: job\nschedule: <span class=\"str\">\"0 * * * *\"</span>  <span class=\"cm\"># every hour</span>\nnew_cluster:\n  num_workers: <span class=\"num\">4</span>\n\n<span class=\"cm\">-- Option C: Streaming job with 60-min trigger</span>\ndf.writeStream.trigger(processingTime=<span class=\"str\">\"60 minutes\"</span>)\n\n<span class=\"cm\">-- Option D: Job cluster triggered on file arrival</span>\ntrigger: file_arrival\npath: <span class=\"str\">\"/mnt/source\"</span>", "options": ["A. Interactive cluster with autotermination — cluster stays up between runs, wastes DBUs", "B. Job cluster scheduled hourly — cluster spins up for 10 min, terminates, lowest cost for batch", "C. Streaming job with 60-min trigger — keeps cluster running all 60 minutes between batches", "D. File arrival trigger — only runs when data arrives, but file arrival timing may not guarantee 1-hour SLA"], "answerIndex": 1, "explanation": "A job cluster scheduled hourly is the lowest-cost solution for a batch pipeline. The cluster provisions at job start, runs for the 10 minutes of processing, then terminates automatically. You pay for only 10 minutes of compute per hour (10/60 = ~17% utilization). Option A (interactive cluster): even with 120-min autotermination, the cluster stays running between jobs — paying for 60 minutes every hour when only 10 minutes of work is needed. Option C (streaming with 60-min trigger): the streaming job keeps the cluster alive continuously, running the trigger every 60 minutes — you pay for the full 60 minutes. Option D (file arrival): could work but doesn't guarantee the hourly SLA if files arrive sporadically. This is directly from the exam guide sample questions.", "exampleCode": "<span class=\"cm\"># Most cost-efficient for batch with hourly SLA:</span>\n<span class=\"cm\"># Job cluster: ~10 min compute per hour billed</span>\n<span class=\"cm\"># Interactive cluster: ~60 min compute per hour billed  </span>\n<span class=\"cm\"># Streaming: ~60 min compute per hour billed</span>\n\n<span class=\"cm\"># In DABs:</span>\nresources:\n  jobs:\n    hourly_etl:\n      schedule:\n        quartz_cron_expression: <span class=\"str\">\"0 0 * * * ?\"</span>\n        timezone_id: <span class=\"str\">\"UTC\"</span>\n      tasks:\n        - new_cluster:    <span class=\"cm\"># ephemeral job cluster</span>\n            num_workers: <span class=\"num\">4</span>"}, {"section": "Streaming", "text": "A streaming query uses <code>outputMode('append')</code> with a windowed aggregation. The query fails with: <em>AnalysisException: Append output mode not supported when there are streaming aggregations without watermark</em>. Which fix is correct?", "code": "<span class=\"cm\">-- FAILING query:</span>\n(df\n  .<span class=\"fn\">groupBy</span>(<span class=\"fn\">window</span>(col(<span class=\"str\">\"event_ts\"</span>), <span class=\"str\">\"10 minutes\"</span>), col(<span class=\"str\">\"device_id\"</span>))\n  .<span class=\"fn\">agg</span>(<span class=\"fn\">count</span>(<span class=\"str\">\"*\"</span>).<span class=\"fn\">alias</span>(<span class=\"str\">\"event_count\"</span>))\n  .<span class=\"fn\">writeStream</span>\n  .<span class=\"fn\">outputMode</span>(<span class=\"str\">\"append\"</span>)\n  .<span class=\"fn\">format</span>(<span class=\"str\">\"delta\"</span>)\n  .<span class=\"fn\">start</span>())", "options": ["A. Change outputMode to 'complete' — no watermark needed", "B. Add a watermark before groupBy: df.withWatermark('event_ts', '5 minutes').groupBy(...)", "C. Change outputMode to 'update' — supports aggregations without watermark", "D. Both B and C fix the error, but for different trade-offs"], "answerIndex": 3, "explanation": "Both B and C fix the error but with different trade-offs. Option B (add watermark + append mode): adding a watermark allows append mode for aggregations. With a watermark, Spark knows when a window is 'finalized' (no more late data expected) and can emit the window's result ONCE in append mode. This is the correct production approach when you want final, non-retracted results. Option C (change to 'update' mode): update mode emits updated results for each window every time new data arrives — intermediate results are produced. No watermark is required. Trade-off: update mode produces intermediate results; append mode (with watermark) produces only final results. For writing to Delta, update mode works fine. Option A (complete mode): re-emits ALL windows every batch — high memory usage, not scalable for unbounded streaming.", "exampleCode": "<span class=\"cm\"># Option B: Watermark + append mode (final results only)</span>\n(df\n  .<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"event_ts\"</span>, <span class=\"str\">\"5 minutes\"</span>)   <span class=\"cm\"># adds watermark</span>\n  .<span class=\"fn\">groupBy</span>(<span class=\"fn\">window</span>(col(<span class=\"str\">\"event_ts\"</span>), <span class=\"str\">\"10 minutes\"</span>), col(<span class=\"str\">\"device_id\"</span>))\n  .<span class=\"fn\">agg</span>(<span class=\"fn\">count</span>(<span class=\"str\">\"*\"</span>).<span class=\"fn\">alias</span>(<span class=\"str\">\"event_count\"</span>))\n  .<span class=\"fn\">writeStream</span>.<span class=\"fn\">outputMode</span>(<span class=\"str\">\"append\"</span>).<span class=\"fn\">start</span>())\n\n<span class=\"cm\"># Option C: Update mode (no watermark needed, intermediate results)</span>\n  .<span class=\"fn\">writeStream</span>.<span class=\"fn\">outputMode</span>(<span class=\"str\">\"update\"</span>).<span class=\"fn\">start</span>())"}, {"section": "Delta Lake", "text": "A data engineer uses secrets to connect to a JDBC database. After uploading the password to Databricks Secrets and running the code below, what is printed?", "code": "password = dbutils.secrets.<span class=\"fn\">get</span>(scope=<span class=\"str\">\"db_creds\"</span>, key=<span class=\"str\">\"jdbc_password\"</span>)\n<span class=\"fn\">print</span>(password)\n\ndf = (spark.read.<span class=\"fn\">format</span>(<span class=\"str\">\"jdbc\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"url\"</span>, connection)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"dbtable\"</span>, tablename)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"user\"</span>, username)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"password\"</span>, password)\n  .<span class=\"fn\">load</span>())", "options": ["A. The JDBC connection succeeds; the string '[REDACTED]' is printed — Databricks automatically masks secrets in output", "B. The JDBC connection succeeds; the actual password is printed in plain text", "C. An interactive password input box appears in the notebook", "D. The code fails — secrets cannot be passed to .option() as strings"], "answerIndex": 0, "explanation": "Databricks Secrets automatically redacts secret values in notebook output. When you print() a secret value retrieved via dbutils.secrets.get(), Databricks intercepts the output and replaces the secret with '[REDACTED]'. The actual password string IS passed correctly to the JDBC .option() call (the connection works), but it's never exposed in notebook output, logs, or job run output. This is a core Databricks security feature — secrets are 'write-only' from the perspective of notebook output. This is directly from the exam guide sample questions.", "exampleCode": "<span class=\"cm\"># Secrets are redacted in ALL output channels:</span>\npassword = dbutils.secrets.<span class=\"fn\">get</span>(scope=<span class=\"str\">\"db_creds\"</span>, key=<span class=\"str\">\"jdbc_password\"</span>)\n<span class=\"fn\">print</span>(password)     <span class=\"cm\"># prints: [REDACTED]</span>\npassword             <span class=\"cm\"># cell output: [REDACTED]</span>\n\n<span class=\"cm\"># But the actual value IS used correctly in operations:</span>\ndf = spark.read.<span class=\"fn\">format</span>(<span class=\"str\">\"jdbc\"</span>).<span class=\"fn\">option</span>(<span class=\"str\">\"password\"</span>, password).<span class=\"fn\">load</span>()\n<span class=\"cm\"># ^ This works fine — the real password is passed to JDBC</span>"}, {"section": "Ingestion", "text": "A data engineer writes data to a Parquet file without Delta Lake. They want the target file size to be 512MB. Without rearranging/sorting data, which configuration correctly controls output file size?", "code": "<span class=\"cm\">-- Target: 1 TB dataset → 512 MB files = 2048 files</span>\n\n<span class=\"cm\">-- Option A:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.files.maxPartitionBytes\"</span>, <span class=\"str\">\"536870912\"</span>)\ndf.<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/output\"</span>)\n\n<span class=\"cm\">-- Option B:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.adaptive.advisoryPartitionSizeInBytes\"</span>, <span class=\"str\">\"536870912\"</span>)\ndf.<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/output\"</span>)\n\n<span class=\"cm\">-- Option C:</span>\ndf.<span class=\"fn\">repartition</span>(<span class=\"num\">2048</span>).<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/output\"</span>)\n\n<span class=\"cm\">-- Option D:</span>\nspark.conf.<span class=\"fn\">set</span>(<span class=\"str\">\"spark.sql.shuffle.partitions\"</span>, <span class=\"str\">\"2048\"</span>)\ndf.<span class=\"fn\">write</span>.<span class=\"fn\">parquet</span>(<span class=\"str\">\"/output\"</span>)", "options": ["A. maxPartitionBytes — controls INPUT splitting, not output file size", "B. advisoryPartitionSizeInBytes — AQE advisory size for post-shuffle partitions, not direct write control", "C. repartition(2048) — creates exactly 2048 output files through a full shuffle", "D. shuffle.partitions=2048 — affects shuffle partitions only, not direct write output"], "answerIndex": 2, "explanation": "repartition(N) is the correct approach to control output file count (and thus file size) for a write operation. Each partition becomes one output file, so repartition(2048) produces exactly 2048 files. For 1TB / 2048 files ≈ 512MB per file. Option A (maxPartitionBytes): this setting controls how Spark splits INPUT files when reading, not output file size during write. Option B (advisoryPartitionSizeInBytes): this is an AQE hint for post-shuffle partition target size — it may influence output through AQE coalescing, but it's not a direct write control. Option D (shuffle.partitions): only affects the number of partitions created AFTER a shuffle operation (groupBy/join), not a direct write. This question is from the official exam guide sample questions.", "exampleCode": "<span class=\"cm\"># Correct approach: repartition to control output file count</span>\n<span class=\"cm\"># 1 TB / 512 MB = 2,048 partitions = 2,048 output files</span>\n\ndf.<span class=\"fn\">repartition</span>(<span class=\"num\">2048</span>).<span class=\"fn\">write</span>.<span class=\"fn\">mode</span>(<span class=\"str\">\"overwrite\"</span>).<span class=\"fn\">parquet</span>(<span class=\"str\">\"/output\"</span>)\n\n<span class=\"cm\"># Alternatively (with sorting - but question says without rearranging):</span>\n<span class=\"cm\"># df.repartitionByRange(2048, col(\"some_key\")).write.parquet(\"/output\")</span>\n\n<span class=\"cm\"># Key config reference:</span>\n<span class=\"cm\"># maxPartitionBytes       → INPUT file splitting (reading)</span>\n<span class=\"cm\"># shuffle.partitions      → POST-SHUFFLE partition count</span>\n<span class=\"cm\"># advisoryPartitionSizeInBytes → AQE post-shuffle target size</span>\n<span class=\"cm\"># repartition(N)          → OUTPUT file count (writing)</span>"}, {"section": "Governance", "text": "A Databricks job has three tasks. Task A has no dependencies. Tasks B and C both depend on Task A and run in parallel. Task A and B complete successfully; Task C fails. What is the state of data committed to the Lakehouse?", "code": "<span class=\"cm\">-- Job DAG:</span>\n<span class=\"cm\">-- A (no deps) → B (parallel) → [B succeeds]</span>\n<span class=\"cm\">--            → C (parallel) → [C fails]</span>\n\n<span class=\"cm\">-- Each task is a notebook that writes to Delta:</span>\n<span class=\"cm\">-- Task A: writes to bronze.raw_events</span>\n<span class=\"cm\">-- Task B: writes to silver.clean_events</span>\n<span class=\"cm\">-- Task C: writes to gold.aggregated_metrics (FAILED mid-write)</span>", "options": ["A. All changes from A and B are committed; C's partial changes may be committed or rolled back depending on where it failed", "B. No changes are committed — Databricks Jobs rolls back all tasks if any task fails", "C. All changes from A and B are committed; any completed Delta writes in C are also committed (Delta is per-table atomic)", "D. Only A's changes are committed — B and C ran after A so they depend on A completing the full job"], "answerIndex": 0, "explanation": "Databricks Jobs does NOT provide cross-task transactional atomicity. Each task executes independently. When Task C fails: Tasks A and B have already committed their Delta writes (each Delta write is atomic at the table level). Whatever Delta writes Task C completed before failing are committed (Delta ACID guarantees atomicity per write operation). Whatever writes Task C had in-flight when it failed are rolled back by Delta's ACID guarantee. The key point: the Job orchestrator doesn't roll back A and B when C fails — those commits are permanent. This is directly from the exam guide sample questions. Use Repair Run to re-run only the failed Task C.", "exampleCode": "<span class=\"cm\">-- Job failure behavior:</span>\n<span class=\"cm\">-- Task A: bronze.raw_events → COMMITTED ✓</span>\n<span class=\"cm\">-- Task B: silver.clean_events → COMMITTED ✓</span>\n<span class=\"cm\">-- Task C: gold.aggregated_metrics → partial writes COMMITTED,</span>\n<span class=\"cm\">--         in-flight write at failure point → ROLLED BACK by Delta ACID</span>\n\n<span class=\"cm\">-- Recovery: Use Repair Run to re-run Task C only</span>\n<span class=\"cm\">-- databricks runs repair --run-id <id> --rerun-tasks task_c</span>"}, {"section": "Streaming", "text": "A data engineer uses Structured Streaming with a stream-stream join between a <code>clicks</code> stream and an <code>impressions</code> stream. Both streams have events that can arrive up to <strong>2 hours late</strong>. What is required for this join to work correctly?", "code": "clicks_df = (spark.readStream.<span class=\"fn\">format</span>(<span class=\"str\">\"kafka\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"subscribe\"</span>, <span class=\"str\">\"clicks\"</span>).<span class=\"fn\">load</span>())\n\nimpressions_df = (spark.readStream.<span class=\"fn\">format</span>(<span class=\"str\">\"kafka\"</span>)\n  .<span class=\"fn\">option</span>(<span class=\"str\">\"subscribe\"</span>, <span class=\"str\">\"impressions\"</span>).<span class=\"fn\">load</span>())\n\n<span class=\"cm\"># How should the join be configured?</span>", "options": ["A. No special configuration — Spark handles stream-stream joins automatically", "B. Both streams need a watermark of at least 2 hours to bound the join state", "C. One stream must be converted to a static DataFrame using collect() before joining", "D. Stream-stream joins require both streams to originate from the same Kafka cluster"], "answerIndex": 1, "explanation": "Stream-stream joins require watermarks on BOTH input streams to bound the state maintained for unmatched events. Without watermarks, Spark must retain ALL historical events from both streams (every click event waiting for a matching impression, and vice versa) — state grows unboundedly, causing OOM. With a 2-hour watermark on both streams, Spark can safely discard unmatched events that are more than 2 hours old from state. The watermark threshold should be >= the maximum expected lateness (2 hours in this case). The join predicate also needs to include an event-time constraint for the watermark to be effective.", "exampleCode": "<span class=\"cm\"># CORRECT: Stream-stream join with watermarks on both sides</span>\nclicks = (spark.readStream.<span class=\"fn\">format</span>(<span class=\"str\">\"kafka\"</span>).<span class=\"fn\">option</span>(<span class=\"str\">\"subscribe\"</span>,<span class=\"str\">\"clicks\"</span>).<span class=\"fn\">load</span>()\n  .<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"click_time\"</span>, <span class=\"str\">\"2 hours\"</span>))\n\nimpressions = (spark.readStream.<span class=\"fn\">format</span>(<span class=\"str\">\"kafka\"</span>).<span class=\"fn\">option</span>(<span class=\"str\">\"subscribe\"</span>,<span class=\"str\">\"impressions\"</span>).<span class=\"fn\">load</span>()\n  .<span class=\"fn\">withWatermark</span>(<span class=\"str\">\"impression_time\"</span>, <span class=\"str\">\"2 hours\"</span>))\n\njoined = clicks.<span class=\"fn\">join</span>(impressions,\n  expr(<span class=\"str\">\"\"\"\n    click_id = impression_id AND\n    click_time BETWEEN impression_time AND impression_time + INTERVAL 2 HOURS\n  \"\"\"</span>))"}, {"section": "Delta Lake", "text": "A data engineer creates a shallow clone for testing and runs DML on it. Which statement correctly describes the relationship between clone and source?", "code": "<span class=\"cm\">-- Create shallow clone:</span>\n<span class=\"kw\">CREATE TABLE</span> test.orders_clone\n<span class=\"kw\">SHALLOW CLONE</span> prod.orders;\n\n<span class=\"cm\">-- Run DML on clone:</span>\n<span class=\"kw\">DELETE FROM</span> test.orders_clone\n<span class=\"kw\">WHERE</span> status = <span class=\"str\">'cancelled'</span>;\n\n<span class=\"cm\">-- Question: what is the state of prod.orders?</span>", "options": ["A. prod.orders also has cancelled rows deleted — shallow clones share data files", "B. prod.orders is unaffected — the clone has an independent transaction log; the DELETE is recorded only there", "C. The DELETE fails — DML is not supported on shallow clones", "D. The clone becomes a deep clone automatically when DML is performed"], "answerIndex": 1, "explanation": "Shallow clones share the underlying Parquet data files with the source table but have an independent transaction log (_delta_log). When you run DELETE on the clone, Delta records deletion vectors (or new file references) in the CLONE's transaction log only. The original production data files are never modified or deleted. prod.orders remains completely unaffected. Subsequent writes to the clone create new files in the clone's storage location. This is exactly why shallow clones are ideal for testing DML operations — zero data copy, full isolation, no risk to production data.", "exampleCode": "<span class=\"cm\">-- Shallow vs Deep clone comparison:</span>\n<span class=\"kw\">CREATE TABLE</span> test.clone_shallow <span class=\"kw\">SHALLOW CLONE</span> prod.orders;\n<span class=\"cm\">-- ^ Shares data files, independent transaction log</span>\n<span class=\"cm\">--   DML on clone: does NOT affect source</span>\n<span class=\"cm\">--   Fast (just copies the log, not data)</span>\n\n<span class=\"kw\">CREATE TABLE</span> test.clone_deep <span class=\"kw\">DEEP CLONE</span> prod.orders;\n<span class=\"cm\">-- ^ Copies ALL data files to new location, independent log</span>\n<span class=\"cm\">--   Fully independent: changes to either never affect the other</span>\n<span class=\"cm\">--   Slow for large tables (copies all data)</span>"}, {"section": "Performance", "text": "A data engineer examines a window function query that is very slow. The Spark UI shows one task in the window function stage taking 40 minutes while others take 2 minutes. What is the root cause and fix?", "code": "<span class=\"kw\">SELECT</span>\n  customer_id,\n  order_id,\n  amount,\n  <span class=\"fn\">ROW_NUMBER</span>() <span class=\"kw\">OVER</span> (\n    <span class=\"kw\">PARTITION BY</span> customer_id\n    <span class=\"kw\">ORDER BY</span> order_date\n  ) <span class=\"kw\">AS</span> order_rank\n<span class=\"kw\">FROM</span> prod.orders\n\n<span class=\"cm\">-- customer_id distribution:</span>\n<span class=\"cm\">-- Top 10 customers: 45% of all rows</span>\n<span class=\"cm\">-- Remaining 10M customers: 55% of all rows</span>", "options": ["A. Window functions are inherently single-threaded — use a UDF instead", "B. Data skew: a few customer_ids have millions of rows while others have few. All rows for one customer_id must go to the same executor. Fix: pre-filter top customers and process separately, or use salting where applicable", "C. The ORDER BY in the window function is causing a full table sort — remove it", "D. Increase spark.sql.shuffle.partitions to distribute the window function partitions more evenly"], "answerIndex": 1, "explanation": "The window function PARTITION BY customer_id requires all rows for each customer_id to be on the same executor. With 45% of rows concentrated in the top 10 customers, one executor has a partition that is thousands of times larger than others — classic data skew. Increasing shuffle.partitions (Option D) doesn't help because all rows for customer_id='mega_customer' must still go to ONE partition regardless of how many total partitions exist. The fix: identify the skewed customer_ids, process them separately (e.g., pre-filter and run a separate window function), or accept the limitation for genuinely skewed data that cannot be salted (salting breaks window function semantics — all rows for a customer must be together).", "exampleCode": "<span class=\"cm\">-- Identify skewed keys:</span>\n<span class=\"kw\">SELECT</span> customer_id, <span class=\"fn\">COUNT</span>(*) <span class=\"kw\">AS</span> row_count\n<span class=\"kw\">FROM</span> prod.orders\n<span class=\"kw\">GROUP BY</span> customer_id\n<span class=\"kw\">ORDER BY</span> row_count <span class=\"kw\">DESC</span>\n<span class=\"kw\">LIMIT</span> <span class=\"num\">20</span>;\n\n<span class=\"cm\">-- Fix: Process skewed customers separately</span>\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> orders <span class=\"kw\">WHERE</span> customer_id <span class=\"kw\">IN</span> (<span class=\"str\">'mega1'</span>, <span class=\"str\">'mega2'</span>)\n<span class=\"cm\">-- ^ Run as separate, potentially larger job</span>\n\n<span class=\"kw\">SELECT</span> * <span class=\"kw\">FROM</span> orders <span class=\"kw\">WHERE</span> customer_id <span class=\"kw\">NOT IN</span> (<span class=\"str\">'mega1'</span>, <span class=\"str\">'mega2'</span>)\n<span class=\"cm\">-- ^ Run as regular job</span>"}, {"section": "Security", "text": "A data engineer needs to share data with partners but must exclude the <code>cost_margin</code> column. What is the most maintainable Unity Catalog approach?", "code": "<span class=\"cm\">-- Table: prod.analytics.product_performance</span>\n<span class=\"cm\">-- Columns: product_id, region, revenue, units_sold, cost_margin (CONFIDENTIAL)</span>\n\n<span class=\"cm\">-- Option A: Create a view</span>\n<span class=\"kw\">CREATE VIEW</span> prod.analytics.product_performance_external <span class=\"kw\">AS</span>\n<span class=\"kw\">SELECT</span> product_id, region, revenue, units_sold\n<span class=\"kw\">FROM</span> prod.analytics.product_performance;\n\n<span class=\"cm\">-- Option B: Delta Sharing with column list</span>\n<span class=\"kw\">CREATE SHARE</span> partner_share;\n<span class=\"kw\">ALTER SHARE</span> partner_share\n<span class=\"kw\">ADD TABLE</span> prod.analytics.product_performance\n  <span class=\"kw\">WITH</span> COLUMN LIST (product_id, region, revenue, units_sold);\n\n<span class=\"cm\">-- Option C: REVOKE SELECT on cost_margin from external group</span>\n<span class=\"kw\">REVOKE SELECT</span> (cost_margin) <span class=\"kw\">ON</span> TABLE prod.analytics.product_performance\n<span class=\"kw\">FROM</span> external_partners;", "options": ["A. Create a view — maintainable, but partners need access to view only", "B. Delta Sharing with column list — shares live data externally without the confidential column, no data copy", "C. REVOKE SELECT on column — column-level REVOKE is not supported in
